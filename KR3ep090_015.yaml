body:
  text: 卷十五楊梅門花街柳巷取歡自覺馬口如刀刺此毒已過也未幾生魚口生疳瘡至遍身亦生瘡膿臭不堪多用敗毒藥愈盛有腐爛而死者蓋此毒中於泄精時泄精元氣虛毒乘虛入若元氣大旺毒難深入即有傳染可一泄愈今遍身毒瘡明是大虛毒深不補虛焉能效倘只敗毒無異下石用三生湯生耆土茯苓三兩生草三錢十二劑全愈方妙在不解毒用生耆補氣氣旺邪自難留得生草化毒土茯苓引毒毒去正無虧氣生血得養龜頭忽生疳瘡服敗毒藥毒從二便出倘大腸燥結則毒不走大腸必盡趨小水出小水口小毒難盡泄毒不留腸中反結外勢毒盛必發安得不腐每連龜身亦爛人多用外藥敷外敷雖不可少然必先消火毒用散毒神丹黃柏生草炒梔子三錢茯苓一兩肉桂一分四劑毒從小便出痛少止後用生勢丹敷之炒黃柏三兩兒茶生草一兩麝片三分大黃三錢乳香沒藥硃砂一錢忌火煅各為極細末和勻滲之不數日膿盡血乾肉長一月愈但不能長龜頭再用大補湯服一二月可種子倘多服敗毒必用瀉火無論命門寒極外勢亦且冰凍安得陽和驟生此前後實有次序疳瘡初發魚口將生不急治必遍身生瘡腐爛身體多不救人多以五虎散敗毒雖毒亦可下泄傷元氣正多苟減敗毒藥又恐留毒蓋毒氣入因元氣虛也今又敗毒以重虛無論毒盡下泄已犯虛虛況以敗毒毒更難散乎宜於補中攻泄毒盡出正無虧用早奪湯參歸苓朮石膏大黃銀花生耆一兩遠志生草花粉三錢柴胡二錢一劑泄惡物掘土埋之二劑臭穢盡減大黃石膏加土茯苓二兩同前藥煎四劑必隱隱瘡形現皮膚內再二劑盡消再二劑不發方用大黃泄毒石膏清毒生草銀花化毒柴胡花粉散毒妙在更用參耆歸術以至仁佐至勇戰撫兼施軍聲更振少加祛除賊化為良豈民變盜哉此方余實親驗願人留意陰虛陽燥加熟地數兩或玄參一兩余莫亂加楊梅誤服輕粉毒虛於內未幾自覺一裹臭氣衝鼻出次日鼻黑不聞香臭緩治鼻壞便不治且毒勢甚盛非杯水可救況楊梅結毒於鼻其毒更盛以毒在肺也毒氣在肺清氣盡為毒氣肺氣出於鼻藏於腎腎感毒移於肺散於皮膚則毒可外出用輕粉收斂發皮膚者盡還肺中肺欲還腎腎不受乃上衝於鼻鼻孔細小不能遽泄毒氣盡結於鼻須多藥解毒以肺不能直治必隔一隔二治用護鼻散玄參銀花三兩麥冬二兩花粉三錢生草一兩桔梗五錢水煎調生丹砂末三錢四劑愈更用全鼻散玄參銀花當歸一兩生草三錢麥冬五錢人參二錢生丹砂一錢如前服十劑盡愈前方過猛以救急後方和平以補虛輕粉毒非丹砂不能去故前後皆用輕粉水銀所燒丹砂水銀之母子見母自相親不相離丹砂出輕粉亦出此人未知倘鼻梁已傾雖不重長命可救楊梅遍身皆爛疼痛非常人謂毒氣在皮膚誰知血虛毒結皮膚乎楊梅發於髓之中毒在骨髓難療在皮膚似易治然毒未出皮膚其毒蘊藏瀉骨中毒可從下外瀉毒已出皮膚其毒開張斂肌中毒不可由表入攻宜補血瀉毒引從小便出實得法用二苓化毒湯白茯苓當歸二兩土茯苓銀花二兩紫草生草二錢水酒各半煎服十劑全愈方平淡實有奇功楊梅生於腎虛不補虛治瘡反瀉毒耗血故世治楊梅多不效腰疽腰眼間忽長疽眼疼痛呼號似陽症然腰腎至陰地未可作陽疽治若竟作陰症又不可此症本過忍不泄而成似陰分之過但腰間雖去腎不遠火盛毒成則陰中有陽未可純以陰症治須合陰陽並治以化毒毒乃如掃倘不補陰竟治其毒則腎氣愈傷毒難速化補陰不補陽則陰無陽不生毒且深藏腎宮不得泄用兩治湯白朮杜仲當歸一兩銀花三兩防己一錢豨蘞草三錢三劑愈用白朮杜仲利腰臍氣通毒自難結又銀花當歸補中有散防己豨蘞直入腎逐濕熱陰陽無偏勝邪正自解紛擎疽手心忽腫突成疽晝夜疼痛非常所謂擎疽也此冤家債主相尋每多流血以死似不必治然自怨自芥處仁遷義亦可救此亦人有火熱之毒乘機竊發也但火熱非起乎一朝解毒難憑於小劑蓋毒成於熱熱起於火火有餘終是水不足非大料滋水安得取勝必大用補水之劑少佐解毒擎疽自愈用釋擎湯玄參銀花二兩生地當歸一兩紫花地丁五錢貝母二錢未潰三劑已潰六劑必愈後苟遷善不減改過不勇未變他病此方滋水治火補正解毒能自居無過又何擬議腳疽腳指忽先癢後痛指甲黑次日腳指黑又次日足面俱黑黑至腳上脛肚即死此無名腫毒因多服春藥是火熱毒非腳疽比腳疽只黑腳指不黑腳面然雖不如無名腫之橫而速殺人則一蓋腳為四餘宜毒不到今毒聚不散反出指甲間則毒盛非常治轉不可輕人之氣血周流毒必不聚一處惟氣血大虧不能遍行經絡火毒惡邪乃團結骨節腳疽正氣血虧不能周到也烏可單瀉毒重虛其氣血必大補氣血加瀉毒藥全勝道也用顧步湯耆歸牛膝金叉石斛一兩人參三錢銀花三兩三劑全愈若已潰多數劑自愈銀花解毒非牛膝石斛不能直達足指非參耆當歸不能使氣通血活以散毒此方即名腫毒亦效也有用刀去腳指不若急用此方補中帶散免痛苦又全生腳腿忽腫一塊色如常又不痛人謂癰疽誰知氣虛乎夫癰成於腫未有腫而不變癰者余何謂氣虛非癰蓋氣所以行血氣行則血行氣血行縱有邪氣斷難成腫彼邪氣盛每因血衰腫而成癰每作痛色必紅赤今不痛不紅有腫之名無腫之實純是氣虛血無所養非邪盛氣不能鼓也惟補正氣不必化毒祛邪用補中益氣湯參歸五錢耆術一兩柴胡陳皮一錢升麻五分生草半夏二錢茯苓三錢十劑腫消蓋真氣奪則虛邪氣盛則實真既虛邪愈盛不補氣氣何以行腫何以化此方善補氣故即消腫況益消痰去濕之品更易收功鬢疽兩鬢忽紅腫生疽高突數寸頭面眼鼻俱浮狀異平常陽毒也蓋鬢近太陽乃陽部位陰氣不能到故當作陽症治然每有變陰症者故陽藥中宜加陰分藥以預防之若潰爛更須陰藥多陽藥少消息善治用理鬢湯已潰爛未潰爛俱收功銀花三兩白芷二錢芎歸一兩夏枯草三錢未潰二劑消已爛四劑愈方用銀花夏枯解火毒得白芷川芎入兩鬢太陽間二味更得施其祛逐又妙當歸補氣血陰陽雙益邪自難變唇疔疔生口角旁或在上下唇不論大小皆脾胃火毒也宜速散否則毒熾且妨飲食每腐爛而死以疔愈小毒愈橫也宜急瀉火毒不可損脾胃氣則毒不難散用救唇湯紫花地丁銀花一兩白果二十個桔梗生草三錢知母一錢三劑全愈潰爛五劑奏功治頭面疔瘡俱效治口唇尤捷者以白果桔梗善走唇口引銀花地丁至患處解毒也瘰癧痰塊生頸項硬如石久成瘰癧流膿血自耳下串連不一有流行患走狀故名鼠瘡又名串瘡言如鼠之能穿也世謂因食鼠竊物而成不盡然也此症多起於痰痰塊多起於郁未有不郁能生痰亦未有無痰成瘰癧者故必以開鬱為主然久則氣血必耗況流膿血乎故消痰不開鬱開鬱並化痰皆虛虛用消𤶱湯白芍白朮一兩柴胡二錢花粉蒲公英三錢茯苓紫貝天葵五錢陳皮甘草一錢附子一片八劑消服一月全愈再服六君必不發蒲公天葵消𤶱神藥非佐以柴芍則肝木不平非補以朮苓則脾胃不健何勝攻痰破塊之烈哉惟有攻有補則調劑咸宜得附子引之直搗中堅故愈沉疴於旦夕瘰癧潰爛頸下及胸膈皆痰塊已頭破欲腐遂發寒熱肌瘦食減盜汗自汗驚悸恍惚大約瘰癧初起先解鬱佐補虛消毒倘執而用之必速死用轉敗丹參歸二兩柴胡二錢白芍銀花三兩白朮一兩半夏五錢生草三錢八劑愈前方減半再十劑瘡口悉平不發此補多於消開鬱化痰存其中世但知攻毒故愈攻愈壞盍以此方試之痔漏肛門內外四旁忽生紅瘰先痛後癢成痔日久不愈此皆濕熱所成縱飲及江南人往往有之正因地氣濕熱又加酒毒也肛門通大腸凡有濕熱亦同大便出何積而成痔以濕熱在大腸不能久留必盡趨肛門肛門大腸鎖鑰有關防之意於是蓄久濕熱之毒肛門獨受有毒必外形不生痔於門內即生痔於門外內外似殊作楚則一烏可舍濕熱而他治乎但肛門去脾胃遠化濕熱必假道於脾胃恐肛門未受益脾胃必先損必須無損脾胃有益肛門者始效用益後湯茯苓白芍山藥苡仁一兩地榆三錢穿山甲一片土炒為末八劑消每味再加十倍以蜜為丸每日未飲先滾水下五錢完一料不再發此利濕去熱脾胃無傷肛門受益肛門邊生小癤不慎酒色腐爛成漏不收口後生肉管流膿水甚苦世人用刀針掛線徒受苦毒未除口難長經年不效亦不戒酒色治不得法也蓋他處皮肉非縱則橫惟肛門皮肉有縱有橫最難生合況大便出入又易損刀針掛線已傷又傷何能長皮肉切戒輕用惟消濕熱毒為佳然漏久氣血必虛不治虛無論漏不可止氣血反傷終難奏功必補中用消何漏不痊用青龜丸烏龜二個茯苓五兩苡仁六兩羊蹄後爪四副穿山甲五錢二味土炒參歸三兩干青苔二兩黃耆八兩松三條陰乾忌火焙白芷槐米一兩各為細末將龜用古石臼搗死拌藥末鍋內蒸熟將龜肉與甲火焙乾為末同藥蜜糊丸日三錢完全愈不發但非戒酒色三月不能奏功此方不可思議去濕不散氣敗毒不損血願人敬服守戒以去病大便先射血後溺糞人謂便血誰知肛門暗生血痔乎久必變漏宜流膿水不知受病不同症亦異此飲燒酒過多熱毒走直腸不得泄乃結小痔不化久之皮破血出此出血於直腸外非出於直腸中乃膀胱血也膀胱化氣不化血酒毒滲入膀胱將酒氣化水出於陰器酒毒爍血不從陰器出不得不趨大腸肛門無奈門別戶牢無可出路酒毒結於直腸外毒向內攻直腸痔生痔生必破有隙可乘膀胱之血注之久且以血引血不只膀胱之血盡歸也乘大便之開合血先奪門而出故先射正見欲出之速若不清上游但截下流非計之善也用清源散黃連槐米地榆人參三七根末三錢苓朮白芍五錢葛根前子二錢白芷三分穿山甲土炒末一錢水煎調末服三劑血更多減黃連再三劑愈宜斷酒能禁女色三月不發妙在黃連多以解酒熱毒先清源也上游無病下流自安又分配得宜去濕化熱堵截有方故慶平成何患洪水哉胸生瘡不慎酒色成漏窾長數頭流血液久則神形困倦腰痛難伸人謂心漏誰知腎虛成漏乎心氣必得腎氣以相生腎氣必得心氣以相閉心漏成於腎氣泄也可不急治腎衰乎然治腎心氣不閉與不補同蓋有出氣無止氣耳或謂凡漏瘡成於濕熱但閉心之竅不去濕熱恐漏亦不愈不知心漏成於腎虛腎虛則寒非熱也腎虛真水虛非邪水盛宜補真陰邪水消溫腎寒濕熱退用溫腎丹鹿茸附子二個青鹽人參二兩瓦蔥二枝紅棗四兩為末煮棗搗為丸日空心酒下三十丸服月餘愈方奇在鹿茸既能益腎中水火更補心中缺陷又附子辛熱無經不達引入心腎填補空竅加青鹽以轉堅蓋漏瘡必多竅孔故流血血得咸則止瓦蔥者消濕熱於無形心漏非濕熱然少有存留則孔竅難塞故用以防變又恐氣虛不能運化更益人參生氣血助茸附通達上下尤易成功頑瘡手足或胸背頭面生惡瘡終年不愈臭腐不堪外藥內服藥不效世謂頑瘡言冥頑難治不治未得其妙也夫生瘡乃氣血不和不和者或濕浸或熱盛或濕熱寒邪交至遂氣結血滯結皮肉而生瘡久之膿血不淨因生蟲人用殺蟲藥反傷皮肉氣血愈虛力難兼到棄皮肉於膜外而不顧瘡乃頑故治瘡宜行氣活血蟲與毒不必治然氣必補始行於周身血必補始行於遍體用救頑湯耆歸麥冬白朮熟地一兩生草三錢棗皮茯苓五錢柴胡防風連翹一錢半夏二錢附子一片二劑更紅腫切勿畏再八劑必愈方活血行氣乃醫之力氣行血活蟲將安寄故不必殺蟲而頑瘡愈內股生瘡斂如豆許翻肉一塊如菌狀人謂蟲蝕外翻誰知肝經風熱爍血乎肝熱則生風此內風也外風清涼內風蘊熱故外風宜散內風宜清然但清風不補血則熱不可解風不可舒必須養血之中益之清熱則燥不能燥熱退風自靜用清風湯白芍一兩參歸五錢白朮炒梔子丹皮沙參花粉三錢甘草柴胡連翹一錢川芎二錢數劑瘡自斂此滋血養肝非消肉化毒何以愈蓋瘡成於肝旺平肝血不燥自風散熱退苟不平肝內降火外追蝕則蝕又翻翻又蝕肉益大氣益虛變且生矣接骨折骨先將骨湊合端正用杉木皮夾之繩縛住緊用布扎無令動搖若因疼痛少鬆反害事收拾停當然後用藥苟皮破出血尤須外治然皮未傷內外夾攻亦佳內治必活血去瘀血不活則瘀不去骨不能接用續骨神丹當歸二兩大黃五錢敗龜板為末生地白芍一兩丹皮續斷三錢牛膝乳香末沒藥末紅花二錢桃仁三十個羊躑躅一錢四劑去大黃又四劑全愈外治用全體神膏當歸生地紅花二兩續斷地榆茜草小薊木瓜人參川芎劉寄奴耆術一兩甘草五錢杏仁去皮柴胡荊芥三錢桑木枝四兩皂角二錢用麻油三斤熬數沸麻布瀝去渣再熬至滴成珠加黃丹末水漂過二斤四兩另收為膏毋使太老再用乳香沒藥自然銅用醋淬七次花蕊石海螵蛸三錢麒麟竭五錢白醋一兩為細末乘未冷時投膏中桑枝攪勻瓦器盛臨用火煨攤膏重一兩用勝金丹麝香花蕊石象皮三錢血竭三兩古石灰紫石英二兩海螵蛸乳香末沒藥末兩樟腦人參兒茶三七根末木耳炭一兩冰片自然銅如前淬干地蝨干土鱉琥珀一錢土狗十個生草末五錢和勻罐盛貼之三方絶奇異倘未甚傷只須膏藥一個不必摻藥末此內外同治旦夕收功由高墮下昏死不蘇人謂惡血奔心誰知氣為血壅乎夫跌僕出於意外若墜下自墮地必死是先挾畏死之心不比一蹶傷者心不及動故氣血錯亂昏絶不救宜逐瘀佐醒氣則血易散氣易開倘徒攻瘀血則氣閉不宣無益用蘇氣湯乳香末沒藥末一錢蘇葉荊芥丹皮三錢當歸五錢白芍五錢大黃二錢桃仁十四個羊躑躅山羊血五分三劑愈此醒氣活血兼用故神妙在羊躑躅與蘇荊因氣亂而亂之血易活氣易蘇金瘡金瘡必多流血血盡發渴飲水則立亡故金瘡須忍渴世有飲水愈者何也必素有熱病得水則熱解不可執以為常是止渴非補血不可然瘡口大開所補仍然外泄故補血仍須止血止血更須生肉則惡血不攻心內火不燒胃庶死可生斷可續用完膚續命湯生地當歸麥冬玄參三兩人參二兩生草乳香末沒藥末劉寄奴花蕊石三錢三七根末續斷白朮五錢地榆一兩四劑愈此補血加止澀則血不流肉易長又助氣者蓋血不速血心補氣以生血且血生接肉不若氣旺接肉更易凡刀傷皆效但視傷之輕重分藥料之多寡物傷門虎傷不論牙爪流血必多其孔一時便黑痛難忍急用生豬油或生豬肉塞之肉入孔隨塞隨化庶不再腐急用地榆末半斤敷傷處血頓止隨用藥解渴蓋流血多虎又有熱毒直來犯心故心渴必甚切忌飲水不得已與小便飲之用制虎湯耆歸生地麥冬地榆三七根末一兩一劑安臥次日傷處大癢又一劑又臥如是五日愈此大補氣血生肌加地榆化虎毒三七止血收口藥無奇收實神蛇傷或足或頭面身腹極腫三日不救毒即攻心死蛇陰物出洞口尚未飲水毒尤酷必以解毒為主但陽藥解之則毒愈熾必須陰分藥順其性解之用祛毒湯白芷蒲公英紫花地丁一兩生草五錢夏枯草二錢白礬三錢三劑全愈白芷得夏枯草陽變為陰地丁公英草礬盡消毒屬陰故助白芷直攻蛇毒或疑蛇毒即忌陽藥何又用白芷不知蛇毒非用白芷不除入陰分藥中自效又問雄黃亦治蛇毒何不用蓋白芷陽中有陰若雄黃純陽外用可建功內用必僨事批本集中癩狗咬方用斑螫麝香大黃等不但孕婦癆瘵人忌用即常人服之甚受苦楚惟馬錢子極佳此方諸書未傳江歸年屢用效故集中方不載方已附奇效醫述後用者查之但以寅傷印結痂愈一言驗癲狗吠去肉大多不在此論文守江癩發癩皮厚生瘡血出如疥或痛癢或乾溼如蟲非蟲人謂濕熱留皮膚誰知氣血不能周到滋潤乎世以苦參湯或豨蘞白芷外治不效正氣血虛也蓋氣足經絡無閉塞血旺毛竅不幹枯且氣血旺則濕熱散消何致瘀滯不通散結皮膚故治癲以補氣血為主佐消濕散熱雖十載沉疴尚效況目前乎用掃癩丹黃耆三兩當歸銀花二兩防風二錢苓朮麥冬白芍熟地玄參一兩生草荊芥花粉三錢棗皮川芎五錢十劑全愈此大補氣血何異槁苗逢甘霖有何塵埃之飛野刑杖受刑皮肉腐爛疼痛呼號似外治佳然刑重徒外治安能使血不犯心是內治斷宜急然外治多神方內治少應驗每一時心亂死今內治用衛心仙丹大黃紅花丹皮木耳三錢當歸生地一兩桃仁三十粒白芥子二錢一劑血散不必二劑外治用護身仙丹大黃當歸龜板一兩乳香沒藥三七根三錢骨碎補五錢麝香五分將豬板油一兩白蠟一兩松香五錢銅鍋內化開各藥為細末拌勻為膏貼傷處外以油紙包布纏住重者二膏若夾棍不必四個可行步內方使惡血盡散外方使死肉速生合用故神奇
