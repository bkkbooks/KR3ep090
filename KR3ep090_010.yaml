body:
  text: 卷十鶴膝足脛漸細足膝漸大痠疼在骨中體亦漸瘦弱人謂鶴膝風誰知水濕入骨乎夫濕必由皮入何徑入骨況骨最堅濕難深入何竟入於膝蓋成於立而行房凡房事必勞筋骨至精泄髓必空虛髓空則骨亦空邪即乘空而入若膝則筋骨聯接之處骨靜膝動動宜散靜宜聚何骨之靜處反瘦削不堪膝之動處反壅腫若盛不知動能變靜不能變不變形消變者形大法當急治腎然所犯者濕乃陰邪陰邪必須陽氣祛之腎精陰水也補精則精旺陰與陰合兩陰無爭鬥之機不戰邪何能去故不補精當補氣用蒸膝湯生耆八兩金叉石斛苡仁二兩肉桂三錢水煎二碗先服一碗即擁被臥覺身中有汗再服第二碗必兩足如火熱切不可坐起任其出汗汗出至湧泉下始緩去被否則萬不可去二劑全愈此方補氣大峻然氣不旺則不能周遍一身雖用利濕健膝藥終難直透邪所犯處而祛之但不加肉桂寒濕裹住膝中亦不能斬關直入骨髓大發其汗蓋此病無風若作風治愈耗其氣安能取效鶴膝有二一本水濕一本風濕前言水濕而風濕入骨又若何大約水濕骨重難移風濕骨輕可走痠痛則一然水濕之痛一定不遷風濕之痛去來無定然不可徒治風濕用散膝湯黃耆五錢防風肉桂三錢茯苓一兩服後亦擁被聽其出汗汗愈多去病愈速黃耆得防風而功愈大多用黃耆恐人難受加入防風能於補中行氣得肉桂辛散引入陽氣直達至陰中又茯苓共入膀胱利水濕內既利水外又出汗風濕能不解乎但大汗人恐亡陽誰知用散藥以出汗者可慮今黃耆補氣出汗乃發邪汗非損正汗反益陽故二劑收功癘風頭面身體見紅斑後漸皮破流水成瘡鬚眉落遍身腐爛人謂大麻風誰知火毒結成乎此病南粵多以地長蛇蟲熱毒之氣裹住於皮膚濕蒸之氣又遏於肌骨故內外蘊結不宣反致由斑而破由破而腐也最惡之症患者亦不幸矣然他處未嘗不有似非僅感蛇蟲蓋毒氣何地蔑有濕乃天地之氣正不可分南北也曾在燕市見一患者平生實未南行可見大麻風隨地皆有法必先解毒然元氣虛者近多徒瀉毒必損真但補正又恐引邪入內要於補中散邪為妙用掃癘湯蒼朮蒼耳子三錢熟地玄參一兩車前二錢銀花二兩苡仁五錢二十劑全愈此方補腎健脾又散風去濕化毒攻補兼施倘純用寒涼或風藥鮮有奏功大麻風有居南粵外亦患者人亦謂火毒誰知感酒濕而成乎蓋酒氣薰蒸最害人或臥酒糟上坐酒缸邊皆能成病大約多得於房事後蓋行房泄精毛竅盡開酒氣易中症與大麻風無異但感酒毒成大麻風家人不染法在兼化酒毒為妙用解癘神丹茯苓二錢白朮苡仁五錢黃連一錢玄參一兩銀花三兩柞木枝三錢二十劑未爛者可愈四十劑已爛者亦愈方健脾兼去濕化毒兼解酒正無傷邪易退倘認火毒祛毒瀉火置酒毒於不問非善治之法也然必聞酒香而生憎飲美醁而添疼此感酒毒也倘聞酒香而流涎飲美醁作癢非酒毒乃火毒也最宜辨遺尿遺尿畏寒喜熱面黃體怯大便溏小水必勤人謂小腸虛誰知腎虛乎腎與膀胱相表裡膀胱之開闔腎實主之腎氣不行於膀胱則水不能出是膀胱必得腎氣而後出腎衰宜膀胱閉也何腎寒膀胱反不閉乎不知膀胱奉令於腎寒則腎失其令耳腎無令以行於膀胱膀胱自不約矣法約膀胱水不如約腎水尤不若溫腎水而腎水縮用溫泉飲白朮巴戟一兩智仁三錢肉桂一錢一劑即止四劑不再遺方中肉桂巴戟溫命門火智仁斷膀胱漏自病與藥宜獨白朮利腰臍人未必知蓋遺尿雖腎寒亦由腰臍之氣不通則水不走小腸竟走膀胱通腰臍氣則水迂迥自走小腸小腸與心為表裡心氣能攝不遺也且白朮又上補心心虛則水瀉心氣旺水又難瀉矣故同群共濟心氣交而泉溫亦心氣交而泉縮年老日夜不必臥而遺尿較前症更重此命門寒極不能制水老人孤陽宜水衰不宜火微何至寒極而自遺蓋人有偏陰偏陽之分陽旺則陰虛火動陽衰則陰冷水沉年少過泄其精水去火又何存夫火無水制則火上炎水無火制則水下泄老人寒極而遺正水中無火耳但必須於水中補火以老人火衰水不甚旺用八味地黃湯熟地棗皮一兩山藥五錢茯苓二錢澤瀉丹皮附桂一錢二劑溺止十劑全愈自後每日服一兩不再發此湯水中補火聖藥水中火旺腎中陽氣自通小腸下達膀胱膀胱得腎氣開合一奉令於腎何敢自私聽水之自出乎氣化自能出能閉惟苓瀉最利水於老人似非甚宜丹皮清骨中熱遺尿症宜助熱不可助寒故略減分量以制附桂斟酌得宜愈見此方之妙但加減奏功去留寡效憎熱喜寒面紅耳熱大便燥結小便艱澀作痛臥反遺尿人謂膀胱熱誰知心火亢乎心與小腸為表裡心熱小腸亦熱然小腸主下行心火大盛小腸之水不敢到腎只到膀胱膀胱與腎相表裡到膀胱即到腎矣然膀胱見小腸水原欲趨腎意不相合且火又盛自化氣而外越聽其自行全無約束故遺尿法將瀉膀胱膀胱無邪補膀胱膀胱無損惟瀉心火遺尿自止用清心蓮子飲加減茯苓二冬蓮子心玄參三錢黃連丹皮二錢白芍五錢陳皮五分紫苑一錢竹葉三十片三劑全愈此專清心不止小腸水此症愈止愈遺脫肛大便直腸脫下不收久則澀痛人謂腸虛下陷誰知陽氣衰不能升乎夫脫肛半成於脾泄泄多則亡陰陰亡必下墜墜甚氣亦下陷腸中濕熱之汙穢反不能速去以取快用力虛努直腸隨努而下逮濕汙盡脫肛症成欲再收上竟不可得法必須升陽佐之去濕熱然提氣不用補氣不易升補氣不潤腸則脫難收用提腸湯人參當歸茯苓三錢黃耆苡仁五錢白芍升麻槐米一錢四劑肛入再四劑不再脫方補氣升提則氣舉上焦一身滯氣自散潤腸則濕熱自行何致邪留肛門使後重不必大便亦脫肛疼痛非常人謂氣虛下陷誰知大腸火奔迫而出乎大腸屬金最畏火火炎上何下逼使直腸脫蓋肛乃魄門屬肺肺與大腸為表裡唇齒相關大腸不勝火乞救於肺肺居膈上遠不可救乃下走肛門聊為避火肛門既屬肺肛門亦金象大腸畏火肛門獨不畏火乎夫大腸寬廣不能容火況肛門直腸能延接客兵以拒火攻乎然魄門與大腸既有同氣禍難相投寧忍坐棄故以己地讓之已甘越境以避此肛門所以脫也疼痛者火焚被創無水以養此症用升提反增苦楚蓋升提多是陽藥陽旺陰愈虛陰虛火益盛宜瀉腸中火火息金自安然胃火盛大腸火亦盛腎水平大腸水亦干不泄胃火不益腎水則大腸水不生火不息何以使大腸氣返於腹中肛門直歸於肛內用歸腸湯玄參熟地一兩石膏丹皮當歸地榆炒荊芥三錢槐米二錢三劑愈此胃腎同治兼清大腸火水源不斷火氣自消故國可歸有不急返乎客去主安自然之理也陽強不倒陽強不倒與女合立泄泄後隨又興起人謂命門火誰知陰衰之極乎夫陰陽原相平無陽則陰脫而泄無陰則陽孤勢舉二者皆殺人較之陰脫驟死陽孤緩死似驟死難治緩死易醫孰知陰脫其陽不絶補陽可以攝陰陽孤其陰已涸補陰難以制陽蓋陽生陰甚速陰接陽甚遲故脫陰留陽可援孤陽無陰不救然陰根於陽補陽陰可生安在陽根於陰補陰即不生陽乎使有一線之陰陰必可續陰續陰必可生陰生則陰日旺陽日平用平陽湯玄參三兩棗皮骨皮丹皮一兩沙參二兩十二劑愈方純補陰更涼骨中髓又恐純陰與陽不入加棗皮陰中有陽引陰入陽制其太剛真善於制陽也倘用知柏寒涼折之反激動龍雷之火恐陰不入陽中陽反離陰外有不死哉操心勤讀平時刻苦搜索及入房鼓勇久戰至陽舉不倒煩躁口渴目紅腫然飲水不解人謂陽旺極誰知心腎二火齊動乎心腎無一刻不交心交於腎腎火無飛騰腎交於心心火無亢烈今日勞心心不交腎夜勞腎腎不交心矣則水火不濟覺一身無非火氣於是心君失權腎水無力命門心包之火反合而不離骨中髓動髓海煎熬肝中龍雷之火起而相應並三焦火附和上炎火盡上升陽無所寄勢不得不歸於下下又無可藏走於宗筋陰器而陽強不倒此至危症非迅解二火陽何能遽倒蓋二火乃虛火不可寒涼直折惟引火歸源少用微寒以退浮游之火用引火湯玄參沙參一兩麥冬二兩丹皮五錢黃連肉桂一錢二劑陽倒四劑火定減連桂各只用三分再數劑火不再動此妙在補陰退陽補陰無膩重連桂同用以交心腎心腎合水氣生水氣生火氣自解況玄參麥冬沙參退火仍補水故火退而解亢陽之禍也發斑身不發熱胸脅間發紅斑不啻如絳云一片人謂心火極熱誰知胃火鬱極乎胃火本炎上何鬱滯不宣蓋風寒外束也然火蘊結胃中終不能藏不得出而必欲出於是外現皮膚髮斑投涼藥則拂熱性變狂投熱藥則助火勢增橫似風藥和解為得然火旺者水必衰不補水竟散火胃中燥熱不得風而愈揚乎誠於水中散火則火得水而有制水佐風而息炎斷不致必汗亡陽成不救用消紅湯乾葛升麻花粉二錢玄參當歸生地麥冬一兩芍藥五錢甘草一錢方妙在補陰制火涼血化斑但散不寒但和不戰自郁宣熱減水旺燥除滿身發斑細小密排時癢痛人謂肺火盛誰知肺火鬱乎肺主皮毛肺氣行皮毛開肺氣鬱皮毛閉夫所以郁者以心火刑金外遇陽風寒火不能達於皮毛斑乃現矣治仍宜瀉火然火鬱皮毛不解表驟瀉火反遏火氣不達外轉內攻表必變里症尤可慮故必散表佐消火斑自散用散斑湯玄參麥冬五錢升麻荊芥二錢白芷甘草黃連一錢生地一兩花粉三錢二劑全消此散多於清以清火則火愈不宣散風則風解火息火丹身熱後其身不涼遍身俱現紅紫名火丹人謂熱在胸膈誰知熱在皮膚夫火丹發斑熱雖同症各異蓋發斑紅白間火丹一身盡紅發斑熱鬱內發外火丹熱鬱外趨內發久有散機趨內必深入故發斑輕火丹重法祛水散火使火外出不內攻用消丹飲玄參三兩升麻桔梗二錢麥冬一兩甘草一錢不必二劑玄參散浮游火麥冬滋肺升桔散表於毛竅甘草調和臟腑經絡引火外出故神效赤白遊風往來不定小兒最多似發斑但發斑有一定之根赤白遊風無一定之色人謂三焦實火誰知胃火鬱熱乎夫胃火不郁必發汗亡陽惟火不宣則熱在內不在外然必由內達外又不可遽達於是或發此移彼或現白改紅竟無定象治法自宜清熱清熱必須涼血然血寒則凝滯不行雖血能止火終難散火又必須行血以舒熱用清火消丹湯生地一兩丹皮玄參赤芍三錢甘草花粉一錢牛膝荊芥二錢四劑愈此方涼血並行血清火併散火無大寒無甚熱郁易開火易達滿身發斑色黃白斑上有水流時痛久之皮爛人謂心肝火誰知脾肺濕熱乎火丹有赤白二症赤丹皮乾白丹皮濕赤丹屬心肝火白丹屬脾肺濕然熱鬱皮毛則赤白乾溼一也夫濕從下受病宜在下身何上身亦成黃白丹蓋脾肺母脾病子願代母將濕氣分散皮毛火熱亦隨外越然脾病肺尚不切膚邪畏肺氣健不敢徑從皮毛而泄反留戀於皮毛外現黃白耳法利水濕解火熱仍從膀胱下走正不必外逐也蓋濕熱原在脾不在肺母逐其仇子有不共逐乎故祛脾之濕熱肺中濕熱自散用除濕逐丹湯防風二朮梔子三錢赤茯苓五錢陳皮五分厚朴豬苓一錢甘草薄桂三分數劑丹退愈此利水多散火少以濕重難消水消火亦消離魂心腎兩傷忽覺己身分為兩人未見己獨見人謂離魂誰知心腎不交乎心不交於腎夢不安腎不交於心神發躁然此猶心病腎不病腎病心不病也故夢雖不安魂猶戀心中神雖發躁魂尚依腎內魂欲離而不能惟心腎兩虧則腎精不能交心心液不能交腎魂乃離然藏魂於肝不藏心腎心腎虧肝氣未傷則肝能藏魂何至離不知腎肝母虧則無不養肝心肝子虧則無液耗肝肝又傷肝傷則血燥血燥則魂不藏往來心腎母不生子不養魂安得不離似宜大補肝血引魂以入然心腎不補仍耗肝氣魂必復離用攝魂湯生棗仁當歸棗皮茯神巴戟五錢麥冬熟地白芍人參一兩遠志柏子仁白芥子二錢數劑不再離此三經並治腎水潤肝不燥肝血旺心不枯自然魂定神安目不歧視思想情人不見以至魂夢交接醒又遠隔晝思夜夢忽忽如失遂覺身分為兩知外事人謂離魂誰知心肝氣鬱乎肝藏魂氣鬱肝氣不宣宜魂不出何反出夫肝鬱必克脾思又傷脾脾傷不能輸精於心肝心氣必燥肝因鬱血干無津以潤心心更燥心燥則肝氣不安欲出氣顧心情人不見愈郁鬱極火炎魂不願藏於肝隨火外出魂既外出軀殼未壞故能回顧己身視身為二必須舒肝鬱滋心燥兼培脾土使土氣得養生津即能歸魂用舒魂丹人參白芍一兩當歸白朮茯神麥冬五錢丹砂末菖蒲柴胡鬱金花粉甘草一錢二劑愈此心脾肝同治舒肝為甚病成於郁解鬱神魂自定狂初起身在床能知外人口罵詈嫌人不出戶迎人亦為離魂誰知胃火犯心乎心本生胃誼關子母何敢犯心使心神出外不知胃乃心嬌子胃弱則心火養胃胃強心反避胃矣蓋心火寧靜胃火沸胃且自顧不暇甚至犯上作亂心君姑息寧下堂而避胃火故心神外出成離魂夫魂離宜隨亡何尚苟延因心神雖出心氣猶未絶耳舍人參石膏湯無二法然必須大劑恣其酣飲最宜多者石膏其次人參大約石膏宜二兩人參鬚一兩倘畏首畏尾少用人參石膏均無濟或謂多用石膏少用人參何不可嗟乎定狂雖藉石膏返魂非人參不可蓋魂出回宮搖搖靡定非多用人參將何以鎮國疰夏夏令便身體昏倦四肢無力思睡腳痠腿軟人謂疰夏之病誰知腎水乏乎夏令火炎流金爍石全藉腎水則五臟不至乾燥然四時皆相生獨夏火剋金人至夏常困倦但不至疰夏之甚疰夏者非夏天精泄之故乃冬不藏也精不藏於冬火難盛於夏困乏之形見然夏令火盛多傷脾胃困乏自是胃氣弱脾氣衰與腎水似無干詎知腎無水不能分潤脾胃脾胃水乾何能制外火之旺乎火無水制土受火刑則脾胃無津勢難轉輸手足四肢無力精神倦怠必以健脾開胃為主脾健胃開飲食自化精以生腎水又得補腎藥蒸動脾胃氣水土不相剋而相生何慮疰夏之病哉方用勝夏湯白朮茯苓棗皮二錢陳皮二分人參五分北味神麯三分熟地五錢白芥子一錢山藥芡實三錢炒棗仁三錢十劑精神煥發二十劑身健輕重多寡配合入妙既無陽勝又無陰衰醒脾胃氣生心腎津可久餌效亦可近圖功炎伏懶飲饌氣力全無腹中悶脹少遇風涼大便泄人謂疰夏誰知脾氣困乏乎夫腎先天脾後天脾氣健飲食自化精以供先天腎水之不足春冬先傷脾土則土衰難以化物飲食必停胃中水無脾土資生則腎氣更涸何能分布筋骨此精神氣力所以乏也然欲脾氣生須補腎中水火用八味丸熟地八兩棗皮山藥四兩丹皮澤瀉茯苓三兩附子一枚桂二兩六味補水附桂補火補火水多於補火則火得水益而不燥土得火利而不濕此補先天以益後天法也腳氣兩腳忽紅腫發熱兩脛俱浮作癢痛人謂傷寒誰知腳氣乎傷寒原有腳氣門腳氣感染濕熱先下受傷寒感風寒先上受故傷寒屬陽症腳氣屬陰症陽病變陰似難治陰病變陽似易醫殊不知濕熱從下感宜從下治若用風藥邪上行反致上犯以風藥多升陽陽升陰邪一至犯心即死非陰變陽之謂也所以腳氣忌用傷寒法宜下消濕熱身熱自解方用消跗散茯苓苡仁一兩茵陳防己梔子炒木瓜一錢澤瀉三錢數劑全愈方利小水使濕熱氣盡從膀胱下泄不必又散邪或疑身發熱未必無邪何但利小便邪即散夫膀胱太陽經也風邪初入多在膀胱膀胱大利邪又何居況腳氣原無風邪不過膀胱氣壅下不行上發熱今治下而下通上又何不通上下氣通熱自解一用風藥引陰濕入陽分反成不治蓋散邪斷斷不可冬月且然況三季乎中邪忽見邪大罵自責口吐頑涎目上視此中肝氣邪也夫邪不同不離五行者近是此中木氣之邪木邪親木又何疑然肝氣不虛邪何從入是邪乃肝氣自召也治邪必須治正正旺邪難留然邪旺一味補正邪拒不入亦必敗之道也又須仍佐祛邪則邪自退用逐客湯柴胡白礬二錢茯苓五錢半夏炒梔子神麯白朮三錢白芍一兩菖蒲甘草枳殼一錢四劑全愈方平肝氣瀉火補肝血而化痰痰火既清邪又何藏況半是攻邪之藥木邪既旺其敢爭乎猝遇邪忽臥倒口吐痰涎不能出聲發狂亂動面目大紅發或上指此中心氣之邪也心屬火邪中心即火邪犯心心君寧靜邪犯立死斷不使邪附於身發狂亂動時日多延不知此火邪犯膻中府非犯心也惟膻中非心比何即不能出聲蓋相臣盜執君膽顫緊閉皇宮何能頒文討賊號召勤王相恐貽害君主怒氣忠勇上現於面目皆盡裂而又身無寸鐵情激嗚咽發上指此邪激外祟形也然相必庸碌邪乃敢犯不治膻中虛惟泄火邪則正益虛邪益旺非治之善也用助相祛除湯人參五錢茯苓生棗仁半夏白芥子三錢遠志黃連白薇二錢甘草枳殼一錢此助膻中氣兼泄火消痰邪不敵正而自遁如朝堂變亂羽林雲集聖主憑城指揮相長恃無恐大呼斬殺賊猶敢拘執相臣乎忽中邪目見鬼神口胡言或說刀斧弓矢傷身疼痛呼號不已此中肺氣邪肺屬金邪乘肺氣虛入自是金氣邪其神必金甲將軍其鬼必猙獰或斷頭折足帶血淋漓似非內召然肺藏魄肺虛魄外遊魄陰鬼神亦陰同類尤易召入且肺主皮毛肺虛毛竅盡開邪乘空竅入腑由腑入臟必須治肺氣虛但肺嬌臟治肺藥不能直入肺則攻邪藥又何能直入肺然肺畏火喜土補脾胃肺氣自旺泄心火肺邪氣自衰少佐消痰逐邪藥何邪不散用助金祛邪丹麥冬一兩茯苓五錢黃連五分蘇葉甘草人參陳皮一錢桔梗花粉神麯二錢白朮三錢三劑愈此方心肺脾胃同治也攻邪不傷正故正回邪即散猝中邪眼目昏花或見婦人小兒目注戀彼此調笑遂心魂牽纏譫語淫亂低聲自語忽忽如失此腎氣水邪也邪乘人邪念而入古云心正不怕邪然邪念生正不衰邪烏能並惟正虛又起邪念是豫可入之機也但腎有補無泄似人腎氣無不虛者不知此言腎中真陰非言腎中正氣正氣虛邪火旺邪火旺邪氣生所以正氣未漓雖真陰少虧邪不能入惟真陰大虧正氣又喪邪始得憑法須補腎正氣邪不必治蓋攻腎邪必損正氣邪不攻邪又何散詎知攻腎邪不在攻腎在攻胃以胃為腎關也邪在腎關腎正氣不能上通心故作鄭聲搗關門之邪正救腎也用搗關救腎湯人參芡實玄參五錢白朮山藥苡仁一兩白芥子澤瀉半夏三錢知母厚朴一錢三劑全愈方妙在治胃邪仍是治腎藥或謂治腎不宜治胃以胃上腎下腎邪宜直入矣何治胃能愈不知入腎藥必先入胃後入於腎邪雖因腎虛入但入腎不肯仍安於腎故泄胃邪即泄腎邪也今兼治則二經俱無藏邪之地故奏功忽感邪狂叫見人則罵大渴索飲身出汗似亡陽然亡陽必躁動非常此雖高聲狂叫臥在床絶不登逾垣聽木聲大笑聆人言開顏畏天光日色人謂陽明熱病誰知中土氣之邪乎脾胃土脾陰胃陽土邪多不正之氣故病兼陰陽攻陽陰邪未去有逗留搗陰陽邪仍在多狂越必陰陽兩治邪始不停留用兼攻湯石膏五錢人參南星半夏三錢白朮麥冬一兩陳皮一錢厚朴二錢三劑全愈方泄陽火平胃祛陰痰養脾脾胃氣旺正足攻邪邪自散人以脾胃為主土正氣衰以致土之邪入邪入正土即崩可不急補正氣乎故諸邪襲人皆急補正土邪尤甚固脾使不崩摧生胃使不消敗倘徒攻邪必死戒之魅憑經年不愈裸體瞪目大聲罵打見藥即傾地人謂邪入心誰知火熱在胃乎胃火一發多不救何魅憑反不發狂或謂裸體瞪目詬罵打人非狂乎然狂乃自己發狂魅憑己不欲狂代為之狂此仍是祟非病然病成於祟似狂畢竟有因不治狂豈能愈惟無祟可治狂有祟治狂藥不能入口然狂病必胃熱熱病見水必心快朵頤吾用水解熱即用水定狂用軫水散用蚯蚓數十條搗爛投水中攪勻少頃去泥取淨水一大盆放病者前切不可勸飲病者見之色發必自飲安臥醒狂定祟去夫祟喜潔惡穢水入蚯蚓則穢宜魅惡然水投病者所喜祟不得禁其飲蚯蚓解胃熱又清心故入即爽然清心熱解祟安可憑中妖偶遇妖狐纏綿不去骨瘦形枯瀕死妖狐本盜人精精為人根本然房勞過泄必勞筋骨因此成癆自不救狐媚盜精人人昏迷後取其筋骨安閒雖泄精多苟藥得宜尚可接續以夢中竊盜腎根未漓也然徒大補精終為妖取必內外兼治狐媚可祛內用斷媚湯巴戟人參熟地一兩棗皮茯苓五錢日一劑須服三月外用卻媚丹花椒一兩生附子細辛三分麝香一分砂仁三粒瓜蒂三枚三奈一錢為末蜜調男搽玉莖上下女搽玉戶內外狐見必大罵去不再來如此七日斷跡內治不過補心腎外治實有妙理妖迷人先以唾入人口咽其精即昏迷妖乘迷乃用舌戰人如夢非夢任其口吮樂甚而泄精外治藥非妖所喜吾即因其惡而制之妖綢繆繾綣數月身干皮裂宛如蛇皮斑此蛇祟也蛇系至陰能盜至陽之氣肺主氣肺氣盡為蛇妖所吸則肺氣不能生津津枯肺無所養肺主皮毛內既不能養肺又何以養皮毛此燥裂如斑之形見法宜補肺氣然補氣邪正所喜不若用解毒藥於健脾利水中則邪易散正可回用逐蛇湯白芷蒼朮車前子一兩白朮二兩小便中必有黑氣噴出隨溲而泄四劑斑少軟另用雄黃白芷二兩為細末滾水煮數沸乘熱薰洗如是三日斑盡消仍服前湯四劑愈再用四君子湯加味治人參茯苓三錢生草二錢白朮麥冬百合一兩天冬沙參五錢一月復原否則毒雖解弱極成癆瘵蓋蛇最怕白芷藥在房煎彼聞氣即遁但煎藥修藥時俱不可令人知以人不知妖斷不覺身體伶仃有皮無肉胸脅間長成鱗甲然健飯人謂與龍交致此然與龍交身變鱗甲必有肉蓋為龍所愛豈有喪命之理且與龍交龍必輸精氣人且變龍遇風雨而化去安有僅存皮骨者乎此非龍交乃龍盜人氣而肉盡消耳真氣為龍所盜蓋龍屬陽惡陰人精屬陰故吸氣不吸精猶存人世長成鱗甲蓋胸脅生鱗甲吸氣時不能一口吞咽龍氣呼吸之間龍涎偶沾濡胸脅遂生鱗甲此必入水沐浴龍怒其穢濁而得也必化龍毒大補真氣用解鱗丹人參三兩白朮二兩茯苓當歸一兩生草麥冬五錢肉桂二錢白礬二錢丹砂末入藥煎不可生用調服取熟用有毒以攻毒白芥子三錢一劑甲消再劑氣旺減藥半二十劑全愈方補氣少佐白礬丹砂白礬最軟堅化痰丹砂最化魚龍毒二味入補氣中全無干礙故成功或問龍吸人氣陽氣盡散宜胃氣消何健飯如故詎識胃為腎之關腎精未散胃火猶存腎火上蒸胃火接續胃氣升故可救全在此山林遇少婦野合大戰泄精如注倦極困臥醒失婦玉莖先微痛後大痛三日腫如黃瓜人謂浪戰傷誰知妖毒乎花妖花木精也花木毒不宜至此不知物歷年久皆有毒花木經千年孔隙間無蛇蟲居乎得冒靈氣雖已成精毒留未化然木氣慈仁花妖每不殺人不過盜人精氣以圖化身不意毒尚在致玉莖腫痛一度不再來者彼亦赧顏耳花木精不皆情物有化老人化道士化秀士者不只化女以迷男子也化女多使玉莖腫痛化男反無恙耳故老樹成精每得婦人精氣便能立變為人或投胎奪舍而去惟化女未免貽害於男天故惡其過使人斬伐花妖每不成人也樹妖花妖均盜人精氣樹妖得成正果以求道心切又不壞人天所恕而成也倘樹妖純盜人精氣不死不休為天所怒非遭斧斤即遇雷霆玉莖腫再不至者畏天耳用安陰湯生草茯苓五錢蚯蚓二條蔥二枝黃柏三錢一劑愈以渣再煎湯洗生草解毒茯苓利水蚯蚓最善消腫黃柏祛火蔥發散同群共濟引毒從膀胱出毒出腫自消遇山魈不覺目挑心許投佩帶勾言語遂引入家相相合肆淫體消瘦久之時隱現常去來彼必自稱仙子號真人且能體人所欲飲饌金物心思立有惟山魈來必欲人盡衣裸體而戰不似他妖喜掩飾也此甚於花妖輕於狐貍蓋狐貍盜精不盡不止山魈只吸人氣適可而止然狐貍易祛山魈難遣以其具神通未便以草木藥治也然得法正無難山魈陽妖必自喜陰故逢女則易合然性最喜潔惡穢裸體戰者恐女子之穢也用善穢湯犬肉二斤先煮湯二碗入人參一兩紅鉛紙一片蓯蓉二蠶砂三錢雞卵二枚山羊血龍骨末秋石一錢山魈知之必在房大罵須令鑼鼓喧天大鬧房中彼必大笑後以此湯灌病人得飲一口山魈知之大笑而去乘山魈去即以犬羊血塗病人面與下身不便處彼必再來見此形狀必絶交此乘好潔而亂之也此方皆穢物又助氣藥在妖惡於人宜洲渚或遇矮人或長老鬚髮頒白道貌可觀引至家談心論道莫擬蹤跡間有化秀士鬥風流變妖姬逞姣好挑以美言贈以珍物惑人野合久之採戰吸精盡情恣欲逐之不避罵之生嗔飛砂走石壞屋倒廬此魚鱉元龜水妖也水怪宜不能離水不知物至千年皆能變為人既能變何憂陸地之遊乎蓋人氣最靈物得之可以入道原只欲竊人精氣不想害人故天置不問逮與人接欲盡取後快遂動殺念作祟興妖法不祛他妖以他妖生於陸水怪生於水也用硫黃數兩研末煎湯遍灑家內外房中時燒之使氣味充閭彼畏不敢入另用蒼朮一兩白朮二兩煎湯與病人服將渣雜硫黃煮薰病者衣被永絶其跡二術純陽之氣妖聞之最惡況硫黃相剋安得不避中毒服砒霜疼痛欲死不急救必腐腸爛胃嘔紫血死砒霜乃石不過經火煅煉毒何至此蓋生於南嶽山鍾南方火毒又經火氣氣大熱又大毒極酷烈安得不殺人性又善走下喉升降腸胃往來上下脫薄皮穿人死疼痛欲死正毒攻突也法必吐出毒然吐難盡去必用解毒藥世有用羊血以吐亦有生者但初服可救時久入胃不治今有救死丹久暫並治生草三兩瓜蒂七個玄參二兩地榆五錢下喉即吐再煎渣服又吐砒善上升又下行甘草最解毒得瓜蒂動吐毒從上出又得玄參地榆解大腸火上下共解況二味潤中解毒故神效惟服之不吐者此腸胃已壞不治急救之可耳倘不及煎藥急將飯鍋煎藥灌之免因循失救服斷腸草初胸前隱疼久之氣不通至腹痛二便俱閉人死此即鉤吻草至陰之物狀似黃精但葉有毛鉤二個最閉氣尤使血不行動氣血閉塞人死非腸固能斷也閩廣多生婦女小忿每偷食覓死如飴取不大疼痛也世有灌羊血得吐則生亦有不肯吐者不救不知此草殺人甚緩不似砒霜酷烈用通腸解毒湯生草大黃金銀花一兩一劑瀉愈方用生草二寶解毒大黃迅逐通氣毒解氣通何能作祟食漏脯致胸膈飽滿吐瀉大腸如刀割泄不止人死漏脯者即隔宿肉食屋漏水滴入故名何致毒殺蓋屋久必有蛇蠍行走塵灰倒掛系蛛蟲毒物結成天雨隨水而下入肉食結而不化食之安得無事縱未經蛇蠍行走食之雖未必死病斷不免倘誤食疼痛吐瀉急用化漏湯山楂大黃厚朴三錢生草五錢白芷麥芽二錢不必三劑此先消肉食所以大黃推蕩白芷甘草從中解毒人有飲吞鴆酒白眼朝天身發寒顫忽忽不知如大醉之狀心中明白但不能語言至眼閉即死夫鴆毒乃鴆之類非鴆鳥之羽毛亦非鴆頂之紅冠也鴆鳥羽毛與鶴頂紅冠皆不能殺人不過生病惟鴆糞則毒此鳥出於異國異國之人恐言鳥糞則人必輕賤故但名為鴆以貴重之也此鳥非蛇蠍不食故毒勝於孔雀之糞孔雀之糞沖酒飲之有死有不死鴆酒飲之則無不死矣蓋鴆毒性熱而功緩善能閉人之氣所以飲之人即不能語言發寒顫者心中熱也心脈通於眼中之大眥心熱則目必上視眼閉而死者心氣絶目乃閉也幸其功緩可施救療之法無如世人未知鐸逢異人之傳何敢自隱飲鴆酒者倘眼未閉雖三日內用藥尚可活方用消鴆湯金銀花八兩煎湯取汁二碗用白礬三錢寒水石三錢菖蒲二錢天花粉三錢麥冬五錢再煎一碗灌之一時辰後眼不上視口能出言再用前一半如前法煎飲二劑愈斷不死也嗟乎鴆毒之殺人醫經並未有言及有救療者世人服鴆毒亦絶少似可不必傳方然而人事何常萬一有誤飲鴆酒者以此方救之實再生之丹也食鱉腹大痛每有手足發青死者鱉無大毒因有蛇化者有龜魚化者龜魚所化俱益人蛇化最毒腹下隱有蛇皮狀且色大紅食必殺人腹大痛毒攻腸也手足屬脾毒中脾現於手足故發青仍當解蛇毒白芷雄黃末三錢山楂丹砂末枳實一錢茯苓五錢二劑愈白芷雄黃制蛇藥山楂丹砂化魚肉合用則毒消加枳實最去積茯苓尤利水更易解散誤服蒙汗藥以致頭重腳輕口吐涎沫眼瞪不語村店多此藥蓋乘人心迷取財物醒來恍恍惚惚辨別不真其藥大約天仙子為君加狐心等物但不殺人世以涼水解亦能少蘇但涼水停心下虛人必變他症用止迷湯茯苓五錢生草三錢瓜蒂七枚陳皮五分大吐醒斷不忘前事蓋茯苓通心生草解毒陳皮清痰寬中又得瓜蒂上湧使藥不停心一吐氣清神朗又不致五臟反覆或問蒙汗藥必痰迷心竅何不用生薑開之不知天仙子得姜愈迷其心斷不可用兩粵有下蠱毒於飲食吃之面目漸黃飲食倦怠二三年無藥解必暴亡世傳土人將各毒蟲與蛇蠍等投缸中使彼此相食食完取一不死者為蠱母此訛也彼地別有蠱藥乃天生之毒土人祕治蠱方法不傳大約用礬石蓋礬石清痰善化堅蠱積腹中內必堅硬外痰包故一物兩用奏功頗神然柔弱者多剛健者少又蠱毒結胸腹正氣必虛徒用礬石不虛虛乎必須補氣血中加消痰化蠱藥則有益無損用破蠱全生湯人參當歸一兩茯苓五錢生草白礬半夏三錢三劑愈此補氣血化痰塊正旺邪自消又攻堅消蠱何蠱不散食菌吞菌胸脹心疼腹痛腸泄而死菌菌亦芝草生莎葉朽木間所謂腐臭出神奇也然竹根柎柯生菌生菌者以土之濕熱也必叢聚蛇蠍惡蟲土中有蟲氣必上騰菌菌得氣濕而不寒易於發生較他産更肥又多毒用解菌湯生草二兩白芷三錢服後用鵝翎掃咽喉必盡吐愈或已過胃引之不吐必腹疼下泄可全生蓋生草解毒白芷制蛇相助成功至易食牛犬肉心痛欲吐不能欲泄不可此毒結心胃不升不降也牛犬肉本補精血此必牛太有病將死時又加束縛激動怒氣毒結皮膚心肝人食成病甚至暴亡法宜消肉食佐以解毒則脹悶寬不死用消肉化毒丹山楂神麯雷丸大黃三錢枳殼厚朴一錢一劑大下肉盡出此下逐神方倘可上湧用吐法不用下法倘吐不效急服此方短見服鹽滷毒必口咸作渴腹疼痛身踡腳縮死鹽補腎何殺人不知鹽滷味苦先入心心遇鹽滷氣抑不通鹽滷見心不受乃犯腎腎見味苦又不受遂往來於心腎間心腎氣不交鹽滷流入腸不救蓋二腸最惡鹽滷入之腸必縮小成結腸結氣又不通安得不踡死必用甘以解之生草三兩煎湯救之初服滷加淡豉一兩必吐如服久加當歸二兩俱同煎飲腸潤未必皆死要在活變恣飲燒酒醉死身必腐爛臭穢酒性熱燒酒純陽無陰尤至熱多飲醉倒熱性發作腐腸爛胃往往不免用井水頻撲心胸解發浸頭於冷水中待溫又易冷水後用解炎化酒湯人參一兩苟無以黃耆二兩代柞木枝二兩黃連寒水石三錢茯苓五錢菖蒲一錢水煎一碗以冰水探冷灌之得入口即不死以柞木枝解酒毒菖蒲引入心茯苓分消酒濕人參固真氣使不隨酒散燒酒氣酒也熱極氣易散越固真氣火毒可解不然火消毒解而氣脫矣此參所必用也愛食河豚致血毒中人舌麻心悶重者腹脹氣難舒口開聲不出久不治害人河豚魚也何毒至此且食之有中不中者蓋因腸胃有宜不宜也大約肝血燥胃氣弱多中毒蓋河豚善怒性不寬廣食之自動氣人肝血燥肝氣自急以急投急不增其急暴乎氣急腹難舒故心悶氣急聲難出故舌麻必吐出其肉則氣舒腹寬聲出口閉用瓜蒂散治瓜蒂七枚白茅根蘆根一兩大吐後前症盡解古有拚死食河豚之語其實不殺人但與性怒者不宜腸鳴腸自鳴終日不已噯氣吞酸不休人謂脾氣虛誰知肝氣之旺乎肝不鬱則脾舒自化水穀之精下傳二腸腸亦安然輸挽順流而下何有不平之鳴惟肝木克脾則土氣不伸腸乃鳴腸鳴乃土氣動非金水動也坤道主靜坤中有風震動之聲出如雷霆之轟天崩軸非明驗乎故不必治腸但治脾土亦不專治脾但治肝木肝木風靜土氣自靜用安土湯白芍甘草一兩柴胡炮姜一錢茯苓三錢蒼朮神麯二錢二劑全止此肝脾同治法肝正脾得養脾安腸自通不止鳴鳴自止妙在多行肝鬱故特神飢後腸鳴按之少止人謂大腸虛誰知胃氣虛乎腸鳴自宜腸虛何屬胃虛蓋胃氣腸氣也足陽明胃手陽明大腸故胃燥大腸亦燥胃虛大腸亦虛大腸糟粕必由胃入大腸氣虛必得胃氣來援今胃虛僅可自顧安能分布大腸此大腸匱乏求濟於同經之胃而頻鳴法須助胃氣胃強腸實何致空虛作鳴用實腸湯黃耆白朮一兩茯苓山藥五錢甘草神麯北味一錢肉果一枚一劑止四劑不發此大補胃氣絶不實大腸然大腸自實鳴自止名實腸湯何不可腸中作水聲如囊裹漿狀此水畜大腸也大腸之開合腎操其權腎權者腎火也大腸寒熱全視腎火大腸寒水注於中不化故作聲然大腸能容糟粕不能容水水入大腸宜隨糟粕出何反作水聲蓋大腸下為直腸直腸下為魄門乃肺操政非腎操政肺居上游有無可如何之勢然肺不能禁邪水之入實能斷邪水之出蓋大腸與肺為表裡肺氣不下行大腸之氣因而不泄魄門正肺門肺門謹閉水從何出所以作裹漿之聲補命門火兼利水水從膀胱而化用五苓散白朮茯苓五錢豬苓澤瀉一錢肉桂三錢一劑膀胱若決江河二劑聲息五苓利水聖藥多加肉桂使腎氣溫和直走膀胱水有出路豈尚流入大腸哉自笑門大笑不止或背人處自笑異常人謂心有邪熱誰知心包火盛乎心包膻中之官喜樂出焉宜笑而笑何病之有所怪者無故大笑似祟憑而非也祟憑必有奇異之徵不只自笑膻中為心主相過熱失其喜樂之令權門威赫妄自尊大縱欲窮奢隨地快心逢人適意及後不必喜亦喜無可樂亦樂豈相臣素志亦權大威傾勢趨習移然也膻中火盛自笑正類此法泄膻中火笑自止用止笑丹生棗仁黃連丹參花粉二錢犀角屑五分丹砂末生草一錢丹皮麥冬茯神三錢三劑愈此泄心包火仍是安心君蓋心君清明相自不敢背主故安心正安心包忽哭忽笑人謂祟誰知積痰類祟乎此病半成於心氣虛心虛不能自主或哭或笑生蓋心氣一虛不能生胃胃氣亦虛胃虛何能化物水穀入胃不化精而化痰痰既化痰將安往勢必仍留胃中胃苦痰濕必取心氣以相資心虛不能生土痰即乘勢入心心惡痰犯堅閉不納又恐胃土沉淪故心痗而作痛痛至則哭痛失則笑亦其常也用茯苓白朮五錢甘草陳皮半夏三錢竹瀝二合水五碗煎三碗頓服以鵝翎掃喉必吐痰升許愈蓋痰在上焦非吐不出非用二陳為吐藥則舊痰出新痰又積笑哭不止惟此一治永愈無故自悲涕泣不止人謂祟憑誰知臟燥乎臟燥肺燥也內經曰悲屬肺肺之志為悲又曰精氣並於肺為悲是悲泣肺主之也肺經虛肺氣乾燥無以潤肺而哀傷欲哭則自悲涕泣是肺氣匱乏補肺何疑然肺嬌臟補肺肺不受益必補其母土旺金自旺用轉輸湯人參茯苓三錢甘草二錢小麥白朮五錢大棗十枚十劑愈此用參朮茯甘補脾脾旺金不再弱但肺燥而悲不潤肺解燥反助土生火不益燥乎不知乃肺氣燥也助土生火正助金生氣氣旺燥自解大麥成於麥秋有秋金之氣入於參朮苓草無夏火之氣故成功少拂意即怒氣填胸不能自遣人謂肝氣抑誰知肝血少乎肝性急宜順不宜逆拂抑逆也必動怒怒極傷肝輕則飧泄重則嘔血然此乃猝然肝因怒而成若肝血少不必有可怒即大怒不必遇當惱即甚惱蓋血少則肝燥燥則氣逆也故前症實後症虛然實者火實非血實虛乃血虛非火虛症異治亦殊用解怒補肝湯白芍一兩當歸五錢澤瀉柴胡荊芥甘草一錢枳殼三分丹皮三錢天花粉二錢五劑自不易怒此平肝非泄肝肝得補而血生郁得血而易散即天性多乖平生多惱多服此藥亦免病晨夕遇無故心煩意燥不能遣夜則口乾舌燥只一更睡熟余常醒人謂肝血少誰知腎水涸乎肝腎子子弱由母虛蓋肝必得水灌溉枝葉敷榮今腎水日耗自顧不遑肝木黃殞勢所不免肝燥無液養心此所以不臥必大補腎水甘霖大降田疇沋渥將見萌芽條達隨風快暢自然心火取給腎宮腎水足濟心主肝氣往來相通何順適乎用運肝湯熟地一兩棗皮四錢歸芍五錢北味炒梔子一錢玄參丹皮三錢十劑臥安三十劑遇怒不怒此補腎六補肝四絶不治心心氣自交腎者因水足心不畏肝火可交通心腎之路也喑啞渴極飲涼水忽喑啞不出聲人謂心火亢誰知肺氣困乎肺主氣氣通音亮氣塞音啞蓋肺屬金金實則不鳴耳但肺最噁心火火刑金宜金所畏金不出聲理也何得水反閉不知水來剋火則火必為水所克金幸水剋火猶恐火刑金肺氣隨水下降金沉水底何能自鳴此症乃水抑肺不升非肺之自敗宣揚肺氣分消水濕不治喑啞自鳴用發聲湯枇杷葉五片貝母二錢茯苓玄參五錢百部蘇葉甘草一錢麥冬雙皮三錢三劑愈此方宣肺氣則肺氣自揚分消水濕火勢自降火降水消金無所畏肺亦何故而不鳴勞損怯弱喘嗽不寧漸喑啞氣息低沉人謂肺氣絶誰知腎水涸乎肺腎母母病何能乳子腎水不足日取給於肺如是子母兩貧自飢餓不出門氣息奄奄所謂金破不鳴也世謂金破宜補土土脾胃也脾胃生金但補脾胃多陽藥用陽藥補土則陽旺陰愈消非徒無益而又害矣必大補腎水子富母自不貧況肺氣夜歸腎宮向子貧不探今子富母必榮幸入室肺氣入腎宮則將息安寧何等逸樂腎且有液以供肺母則肺金頓生必氣息從容重施其清肅用助音湯熟地麥冬一兩北味甘草蘇子一錢天冬地骨皮二錢貝母三分款冬五分沙參五錢四劑喘嗽止二十劑聲出再服二月斷不喑啞後加人參五分山藥一兩茯苓二錢服半年如舊此肺腎兩補故克奏將壞之績渴甚舌上無津兩唇破裂喉中乾燥遂失音人謂肺火旺誰知心火太旺乎肺屬金最畏心火克然頑金不煉何以成器發聲惟金衰心火過旺未免刑金求其聲音疏越得乎法須泄心滋肺則火息肺安然又不可徒泄心蓋心火有餘實因腎水不足水不能制火火得炎上矣倘不補水徒泄火火無水制徒服寒涼反增火焰所謂因激成橫也用鳴金湯黃連桔梗三錢麥冬玄參生地五錢甘草花粉二錢二劑愈妙在泄火且補腎在中尤妙全不補腎仍救肺蓋肺腎子母救肺正生腎腎水生心火降矣瘟疫瘟疫傳染頭痛眩暈胸膈膨脹口吐黃痰鼻流濁水或發紅斑或發如焦黑或嘔涎如紅血或腹大如圍箕或舌爛頭大或腳痛心疼人謂天災流行誰知人召奇奇怪怪不可執一然皆火熱毒鬱而不宣火木炎上拂性則蘊藏腹中所以火閉作熱熱閉成毒由來久矣法宜大泄火毒以泄鬱悶之氣第泄火未免大寒不先發散遽用寒涼火轉閉而不達須於散中用瀉則疫如掃用散瘟湯荊芥花粉麥芽神麯三錢石膏茯苓五錢玄參一兩生草陳皮一錢黃芩二錢三劑愈此泄肝胃火以瘟疫之熱多由二經也妙在荊芥助石膏黃芩泄火又散火火散熱發於外矣火泄毒化於內矣火解毒消瘟神疫鬼鬼自遁又方大黃荊芥生草柴胡川芎蒼朮各一錢白芷五分水二碗煎八分一劑回春此較散瘟湯少異然皆主散火瘟疫治法不可拘執録此以備採擇又云偶傳瘟疫眼角忽大腫身子驟發寒熱喉嚨大脹作痛數日之後即鼻中出血口出狂言見人罵詈發渴若飲之水則又瀉痢不止不過半月其人即亡一見眼角發腫即用七星湯治之二劑即愈若至瀉痢此方不可救矣方另用加味術芩湯救之痢止則生否則不救寧傳方以防疫不可有疫而無方故磬述之不敢隱也二方載後七星湯治傳染瘟疫眼角忽然大腫身驟發寒熱喉嚨大脹作痛罵詈發渴玄參麥冬各一兩天花粉三錢甘草一錢荊芥二錢神麯一錢桔梗二錢水煎服若鼻中出血加犀角一錢切不可用升麻代之寧用黃芩一二錢加味術苓湯治前症瘟疫鼻中出血後飲水瀉痢白朮五錢茯苓一兩貫仲一兩甘草二錢車前子五錢水煎服痢止則生否則不救種子交感女興濃男先痿精射不遠人謂命門之火衰誰知陽氣大虛乎氣旺陽旺氣衰陽衰此五臟真氣不只命門真氣命門真氣乃先天火氣然非五臟後天之氣不生世人戕賊五臟因而命門火氣隨五臟真氣而消磨安能助命門火久戰不泄取女子之歡心以種子似宜急補五臟陽氣然但補脾胃氣心肝肺氣自旺五臟氣旺命門火欲不旺得乎用助氣仙丹人參杜仲五錢耆術一兩當歸故紙山藥三錢茯苓二錢八劑氣大旺自久戰射遠男施女愛妙在補氣不補陰以病成陽衰則陰氣必旺又妙不助火蓋氣盛火自生若兼補火則陽過勝而火炎復亢烈反不種子泄精只一二點人謂腎水之虧誰知天分薄乎精少人身必壯何謂天分薄不知精少者則精不能盡射子宮得天限也得天之厚者果如此乎天豫人以薄醫能逆天行道乎然人苟有遷善之心醫即有種子之法恃強鬥力過思勞心多食傷胃皆耗精苟安閒息力淡漠居心節食養胃藥添精髓用生髓育麟丹人參麥冬蓯蓉六兩棗皮山藥十兩熟地桑堪乾子一斤鹿茸人胞一對龜膠枸杞半斤龜鰾四兩當歸五兩北味三兩柏子仁二兩細末蜜搗成丸早晚滾水下五錢服二月多陽事亦堅方填精益髓又無金石久服不特種子兼延年切勿輕視此方甚健久戰精泄如熱湯澆入子宮婦人吃驚反不生育人謂久戰女興闌子宮緊閉精不能入孰知胎胞居心腎間喜溫不喜寒精熱宜所喜然過寒則陰凝過熱則陽亢胎胞俱不納交際胎口未有不啓者口即啓安有茹而吐之乎惟過熱則口欲開而不能中欲受而不得必棄於外享清涼矣有坐娠數十日而經來者正受胎復墮非外因乃精過熱難存養也似宜泄火然泄火必傷脾胃反無生氣何以種玉但補腎水水旺火自平用平火散熟地一兩玄參五錢麥冬山藥沙參三錢生地丹皮石斛二錢十劑精不過熱交感受胎且永安此補陰無大寒泄火又生陰無事解氛自獲退炎之益何必加知柏苦寒哉泄精寒氣逼人自難得子人謂命門火衰誰知心包火不助乎蓋命門火生於下必得心包火相合溫和之氣充溢骨髓始於泄精時無非生氣倘命門有火興陽心包無火濟水則命門氣散安能鼓其餘火發揚於精管哉用溫精育子丹人參遠志柏子仁茯神二兩肉桂北味肉果一兩菟絲當歸巴戟炒棗仁棗皮蓯蓉故紙三兩鹿茸一對黃耆八兩砂仁五錢白朮五兩為末蜜為丸日酒送一兩完一料精溫方溫中有補雖助心包仍益命門二火同溫陽春遍體不能生子吾不信也精滑極至玉戶便泄欲強戰不得人謂天分弱誰知心腎兩虛乎久戰命門火旺也然作用雖出於命門火操權實在心宮火蓋命門火聽令於心心衰權反移心包故心火一動心包火即操柄心即謹守其精心包暗送門外至於望門泄精者不特心衰心包亦未盛也法補心火不可泄心包火蓋泄心包火心火益衰耳用濟火延嗣丹人參北味當歸三兩黃耆巴戟八兩黃連八錢肉桂柏子仁遠志金櫻子二兩白朮五兩龍骨牡蠣煅一兩棗皮芡實山藥四兩鹿茸一具為末蜜丸滾水下一兩不拘時服三月可久戰一年如換一人此心腎兩補不專尚大熱故可久服延年非惟健陽生子然忌房事三月始保長久否則不過期月之壯種子目前身肥必多痰涎多不生子此精中帶濕流入子宮仍出也精貴純濕氣雜之胎多不育飲食原化精不化痰何有濕氣入之不知無痰者飲食皆化精多痰者食雖化精濕多難化遂乘精氣入腎時亦同入矣正以遍身痰氣腎欲避濕而不能濕入腎精非純粹安得育麟須先化痰然痰生本於腎氣寒多痰由於胃氣弱胃為腎關內經年久訛腎為胃關門胃氣弱不能為腎閉其關門腎少真火力難爍乾溼氣水泛為痰且上浮不降必當治腎胃二經健胃痰可化補腎痰可消用宜男化育丹人參白朮山藥芡實熟地苡仁五錢半夏白芥子三錢茯苓一兩肉桂二錢訶黎勒五分益智一錢肉寇一枚服一月痰濕盡除交感亦健生子永壽此補腎三健胃七胃健腎更健胃強能分水濕何濕入腎乎又腎溫足以運用即有水濕入腎自能分泄尾閭則精咸純粹面生痿黃不能生子乃血少也或生子亦乾瘦久成兒癆人謂小兒不慎飲食或咎乳母汁薄人動云父精母血不知男子氣血全足精亦全足苟氣有餘血不足精自偏枯精偏枯雖幸成形烏能無偏盛之病先天無形之血能生後天有形之血若後天有形之血不能生先天無形之血故食母乳吞肥甘終不能生兒血以全活然父少血可不急補哉但血不能速生必補氣氣旺而血旺或疑血少補氣恐陽旺陰衰孰知血少由於氣衰補氣生血又何疑乎用當歸補血湯黃耆熟地五錢當歸一兩四物補血不補氣故不用若補血湯名補血其實補氣原方用黃耆一兩當歸五錢重補氣也今用當歸為君黃耆為臣又佐熟地滋陰是重補血氣自生血非血以助氣氣血兩旺根深本固矣懷抱素郁不生子人謂命門火不宣誰知心肝氣鬱乎火性炎上憂愁則火不揚歡愈則火大發木喜條達摧阻則木抑不伸悠揚則木直不屈境遇倫變心欲怡悅不能肝欲坦適不得勢必興致蕭索久則陽痿不振何以生子法舒心氣則火遂炎上順肝氣木遂條達自木火相通心腎相合可久戰消愁盡歡取樂用忘憂散白朮五錢茯神志肉巴戟白芥子二錢柴胡陳皮神麯五分鬱金一錢白芍一兩當歸麥冬丹皮三錢十劑郁解方解鬱有興陽種玉之味倘為丸久服未有不得子者陽物細小不得子人謂天定誰知人工亦可造作乎世為貴者多小賤者多大造物歉此必豐彼然賤者未常無小貴者未常無大是貴賤不可定大小蓋陽修偉因肝氣有餘陽細小肝氣不足以陰器筋余又屬宗筋之會肝氣旺而宗筋伸肝氣虛則宗筋縮肝氣寒則陰器縮肝氣熱則陰器伸故陽物大小全在肝經盛衰寒熱欲小者大非補肝不可然腎肝母心肝子不補腎則肝氣無所生不補心則肝氣有所耗皆不能助肝以伸筋助筋以壯勢故必三經同治然徒展陽不知用藥雖旺陽不能大用奪天丹龍骨二兩酒浸三日又醋浸三日火燒七次用前酒醋焠驢腎內外各一具酒煮三炷香將龍骨研末入驢腎中再煮三炷香後入人參當歸杜仲熟地棗皮三兩補骨脂菟絲茯苓二兩山藥北味炒附子柏子仁一兩耆術五兩砂仁五錢地龍十條鹿茸一具酒浸透切片又切小塊各細末將驢腎汁同搗汁干少加蜜同搗為丸早晚熱酒送下各五錢一月效但必忍房事兩月具大能久戰取女歡心射精尤遠含精甚易但宜敬畏為心倘恣欲耗精非惟無子且成癆瘵戒之
