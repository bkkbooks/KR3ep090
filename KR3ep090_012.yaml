body:
  text: 卷十二安胎小腹痛胎不安如下墜狀人謂帶脈無力誰知脾腎兩虧乎胞胎雖繫帶脈帶脈實關脾腎二經損則帶脈力微胞胎何能勝任然其所以虧非飲食過多即房勞大甚不補脾腎帶脈拘急胞胎所以下墜然胞胎何關乎帶脈胞胎系通心腎不通脾似不必補脾然脾後天腎先天脾非先天氣不化腎非後天氣不生補腎不補脾腎精必不能遽生故補脾正補腎胞胎原借先後天之氣安得不固用安奠二天湯參朮熟地一兩山藥棗皮五錢炙草一錢杜仲三錢枸杞扁豆二錢不必三劑胎動本脾腎雙虧正須參朮熟地始能挽回於頃刻世每少用參術故寡效胎至三四月口乾舌燥咽喉微痛無津潤致胎不安甚則血如經流人謂火動誰知水虛乎胎非男精不結亦非女精不成逐月養胎經絡雖分實不離腎故腎水足胎安腎水虧腎火必動胎乃不寧故補腎水足以安之但腎難遽生須補肺金則水有化源無根之火又何難制方中少加清熱胎氣易安用潤燥安胎湯熟地一兩棗皮麥冬五錢益母草阿膠二錢生地三錢黃芩一錢北味二分二劑安十劑不再動此補腎精雖兼補肺然補肺無非補腎故腎不燥火不爍胎而安吐泄致胎不安疼痛急不可緩人謂脾胃寒極誰知脾胃虛極乎脾胃氣虛則胞胎無力必崩墮況又加吐泄脾胃愈虛欲胞胎無恙得乎然胎猶不下者何脾胃雖損腎氣尚固也胞胎繫於腎連於心腎未損腎氣交心心氣通胞胎故胞胎欲墮而未墮且腎氣能固腎氣必生脾心氣能通心氣必援胃脾胃雖虛而未拖故胞胎雖動而未落可不急救脾胃乎然脾胃將絶只救脾胃土氣難生更助心腎火尤易接續用援土固胎湯人參山藥棗皮一兩白朮二兩肉桂二錢附子五分炙草一錢杜仲續斷枸杞菟絲三錢砂仁三粒二劑愈方救脾胃土十八救心腎火十二救火輕救土重者蓋土崩非重劑不援火息雖小劑可助熱藥恐太燥不比溫補可多用況胎動本土衰何必大用熱劑助火以傷胎氣素郁致胎動不安兩脅脹痛如子懸此肝氣之通也養胎系腎水然必肝血相助肝血最不可缺也肝舒則肝氣不閉肝血自不下藏灌注胞胎以助腎水今肝苦郁肝且閉塞不通子無血蔭必上以覓食故子懸乃氣使之升非子之自懸也宜開肝鬱補血燥自定用解懸湯歸芍一兩炒梔子茯苓三錢枳殼五分砂仁三粒人參一錢薄荷二錢白朮五錢三劑安去梔子再數劑妙此平肝開鬱郁開肝不剋土肝平木不動火況又健脾生胃使水穀生精分布各臟肝腎潤澤胞胎自無干澀跌僕損胎元疼痛人謂外傷誰知內傷乎凡胎氣固雖跌撲仍無恙惟氣血素虛故略動便動胎若作外治未必效且恐因治反墮必大補氣少加行動藥則瘀散胎安然補血宜多補氣宜少用救損湯歸身白朮五錢白芍蘇木三錢人參甘草乳香末沒藥末一錢生地一兩二劑安方妙去瘀不傷胎補氣血復無停滯更無通滑無胎之跌閃亦效治有胎更捷胎安腹不疼但常有血流人謂血虛胎漏誰知氣虛不能攝血乎血蔭胎然心中之血必得氣以包之氣虛下陷血乃隨氣而陷但氣虛下陷血未嘗虛何同陷不知氣虛血必旺血旺必熱血寒靜熱動動則躍躍欲出況氣虛安得不漏泄然幸氣虛倘氣旺血熱血必大崩宜補氣之不足泄火之有餘血自止用助氣補漏湯人參一兩甘草一錢白芍五錢黃芩生地三錢益母草續斷二錢再劑不漏用人參補陽氣黃芩泄陰火火泄則血中不熱無欲動之機氣補則血外能包無可漏之竅自氣攝血血歸經安有漏泄胎七八月忽兒啼腰隱痛人謂胎熱誰知氣虛乎兒在胎母呼亦呼母吸亦吸然至七八月母之氣必虛子不能隨母氣以呼吸則子氣必有急不及隨之勢子失母氣拂其意子作啼宜大補氣使母氣如子氣則子氣安啼亦息用止啼湯參耆麥冬一兩當歸五錢橘紅五分甘草天花粉一錢二劑止此用參耆歸冬補肺氣肺氣旺胞胎之氣亦旺胞胎氣旺子尚不能隨母氣吾不信也口渴出汗飲冷水煩躁發狂腰腹痛胎動欲墮此胃火熾炎熬干胞胎水故動而不安耳胃水穀之海多氣多血以養各臟腑蓋萬物皆生於土土氣厚物生土氣薄物死土氣之原土中有火也不知無火難生土多火又爍水土有火土不死土有水土始不燥使胃火過旺必爍腎水腎水乾土中無水何以分潤胞胎土爍極火熱炎蒸犯心神越子逼迫安得不下墮須急泄火而泄火須水劑水旺火自衰火衰胎自定用止焚定胎飲玄參二兩甘菊茯苓人參三錢青蒿五錢生地一兩知母花粉二錢白朮五錢不必四劑火盛若此非此大劑則火不息狂不止胎必不安然藥料雖多仍是補水有益無損不必顧忌痰多吐涎偶遇鬼神忽腹痛胎向上頂人謂子懸誰知中惡胎不寧乎凡邪氣最傷胎故孕婦宜謹蓋邪祟多於神宇潛蹤或幽陰巖洞遊耍況孕婦又多痰涎眼目易眩尤易相招似宜治痰然治痰必耗氣氣虛痰雖化胎必動搖尤須補氣以生血補血以活痰少加消痰則氣血不虧痰又易化用消惡安胎湯苓術五錢甘草乳香末沉香末蘇葉一錢歸芍一兩陳皮五分花粉人參三錢一劑痛定鬼去此大補氣血正足邪自消痰清胎自定胎形已成或未成必墮性甚急多怒人謂氣血衰不能固胎誰知肝火甚動而不靜乎肝藏血肝氣不藏血自難固蓋肝中相火靜則安動則熾又最易動難靜加大怒火更動矣火動莫遏則火勢飛揚不能生氣化胎反食氣傷精精傷胎又何養乎宜平肝火大利腰臍氣使氣生血血清其火也用利氣泄火湯白朮一兩參歸芡實三錢甘草一錢黃芩二錢白芍熟地五錢服二月胎安此補氣若不泄火則氣旺火不能平轉害氣矣加黃芩於補氣中益之歸芍熟地則血不燥氣益和氣和血必和氣自利況白朮最利腰臍氣哉小産行房顛狂至小産血崩不止人謂火動極誰知氣脫乎妊娠腎水蔭胎水本不足水不足火易沸騰加久戰火心大動至顛狂春興甚酣精必大泄精泄腎益干水乾火更熾水火兩病胎自墮胎墮火猶未息血隨火崩勢不可止當以止血為主然火動由水虧血崩本氣脫不急固氣則氣散不能速回血將何生不大補氣則精涸不能遽長火目愈熾用固氣填精湯參耆熟地一兩歸術五錢炒荊芥二錢三七根末三錢四劑愈方妙在不清火惟補氣補精救其匱乏奏效者以諸藥甘溫能除大熱也蓋此乃虛熱實熱可寒折虛熱須溫補故補氣自攝血補精自止血一跌撲至小産血流紫塊昏暈欲絶人謂瘀血作祟誰知血室傷損乎女子血室與胞胎連胞胎損血室亦損所謂唇齒之倚也然傷胞胎流血者其傷淺傷血室流血者其傷深傷淺病在腹傷深暈在心凡跌僕未小産胎不安者宜固胎不可輕去血已小産血大崩者宜散血不可重傷氣蓋胎已墮血既脫則血室空虛惟氣存耳倘又傷氣安得氣不脫故必補氣以生血新血生瘀可止用理氣止瘀湯參耆一兩當歸黑薑五錢紅花一錢丹皮茯苓三錢三劑全安方用參耆補氣氣旺血可攝當歸丹皮補血血生瘀難留紅花黑薑活血血活暈可除茯苓利水水利血易歸經耳口渴煩躁舌上生瘡唇腫裂大便乾結數日不通腹痛小産人謂大腸之火誰知血熱爍胎乎夫血養胎然血溫胎受利血熱胎受損兒在胎不啻探湯如何存活自外越下走以避火氣胎欲不墮得乎然血既蔭胎血自虛耗血虛宜生寒何反熱不知血即陰水所化血日蔭胎則取給甚急而且虛陰水不能速生以變血則陰虛火動陰中無非火氣則血亦無非火氣矣兩火相合焚逼兒胎故下墮宜清胞中火補腎中精或疑胎兒已墮何必再顧胎血不蔭胎何必大補水不知火動極以致墮胎則胎中純是火氣此乃虛火實火可泄虛火宜於補中清之則虛火易散真水可生倘用寒涼必寒氣逼人胃中生氣索然何以化精微生陰水必變癆瘵矣用四物湯加減熟地五錢白芍山藥三錢川芎梔子丹皮一錢當歸一兩棗皮二錢四劑全愈畏寒腹痛因落胎人謂下部大寒誰知氣虛寒犯遂不能攝胎而墮乎人非真火不生然氣衰則火不能旺人之坐胎受父母先天之火也先天火即先天之氣成之故胎成於氣氣旺胎牢氣衰胎弱胎弱日盛氣必日衰況外寒侵內火更微故腹痛胎落腹痛時即用參薑等則痛止胎安竟不敢用致胎墮僅存幾微之氣耳不急救氣又將何法用黃耆補血湯黃耆二兩當歸一兩肉桂五分三劑安倘認定是寒大用辛熱不補氣血則過於燥熱必至亡陽大怒忽腹痛墮胎墮後仍腹痛人謂肝經餘火未退也誰知血不歸經乎肝藏血大怒則血不能藏宜失血不宜墮胎不知肝性最急血門不閉血直搗胞胎胞胎系通心腎肝血來沖必截心腎之路胎氣一時遂絶胎故墮墮仍痛者因心腎未援欲續無計彼此痛傷肝氣欲歸心心不受欲歸腎腎亦不受故血未淨余痛無已徒引肝血不平肝氣則氣逆不易轉即血逆不易歸用引氣歸血湯歸芍五錢炒荊芥白朮丹皮麥冬三錢黑薑香附五分鬱金甘草一錢此引血即引氣氣歸肝中即血歸肝內氣血兩歸猶腹痛豫不信也鬼胎面黃瘦肌削腹大如斗常二三年不生鬼胎也或入神廟想雲雨遊山林念交感皆能召祟成胎幸不淫蕩見祟驚惶遇合愧恧祟不能久戀然淫氣妖氛已結於腹成胎先未覺後漸腹大人之氣血不行內外相包一如懷胎血臌而實非也須逐穢然懷胎久氣血必衰況非真妊邪氣更旺正不敵邪其虛弱之狀可用迅利藥乎用蕩鬼湯雷丸紅花牛膝丹皮三錢參歸大黃一兩枳殼厚朴一錢桃仁二十粒二劑泄盡惡物愈斷不可三劑用雷丸祛穢又大黃掃除佐紅花厚朴皆善行善攻自盡情逐下參歸補氣血則邪去正又不傷否則血崩氣脫倘自知鬼胎如室女寡婦邪雖盛真氣未漓可用紅黃霹靂散紅花半斤大黃五兩雷丸三錢亦能下胎然過傷氣血不若前方有益無損在人斟酌難産數日不能生人謂氣虛力弱不能送出誰知血虛膠滯胎中無血兒不易轉乎胎成由於腎精胎養半資臟腑血故血旺子易生血衰子難産故臨産必須補血雖血難驟生補氣正所以生血然徒補氣不兼補血則陽過旺反不足恐升而不降故宜氣血兼補氣血旺氣能推送血又足以濟則汪洋之勢易於轉頭又何致膠滯哉用送子丹耆歸麥冬一兩川芎三錢熟地五錢一劑生且無橫倒方補氣只黃耆余皆補血無論氣血兩平陰陽交易於生産血旺於氣胞胎無非血也如舟過淺水用力難推忽得春水舟能自行又遇順風有不揚帆而乎血水也氣風也無水風雖順何益故補氣必補血兒已到門不能生此危時也乃交骨不開也蓋産門上有二骨兩相鬥合未産骨合將産骨開女子兒門肉斜生皮亦橫長可寬緊可小大苟非交骨聯絡則兒門大開用手可探故交骨為兒門之關亦女子鎖鑰之鍵倘或女子此骨不閉腸且直下然交骨開合氣血主之也無血兒門自閉無氣兒門不開欲兒門開合必須交骨順滑非大補血交骨何易開合然閉易開難交骨不開因貪色過泄氣血大虧無以運行兒門則交骨黏滯不開故開交骨必於補氣血中用開交骨藥不必催子自迅下用降子散當歸柞木枝人參川芎五錢紅花一錢牛膝三錢一劑子下方用人參補氣歸芎補血紅花活血牛膝下降柞木開合故效苟單用柞木亦開骨然不補氣血必開而不合引風以入若兒未到門萬不可用柞木然此方亦無礙以補氣血也若單用柞木必俟兒已到門後始無虞生子手足先出此氣血甚衰也凡兒在胎正坐惟男向內女向外及生時兒必旋轉此造化之奇非人之強然先天后天並行不悖天機之動必得母子氣血以濟之故氣血足胎順氣血虧胎逆蓋氣血既虧母身自弱子又何能強每欲轉而無力故手足先見急以針刺子手足驚縮而入用轉天湯人參川芎一兩當歸二兩升麻四分牛膝三錢附子一分一劑轉二劑順生方用升麻又用牛膝附子蓋非提挈則頭不易轉既轉頭非下行身不速降二者並用非加附子則不能使氣血迅速而推生子已到門交骨不開子死母未亡服藥不效母必死今幸不死者正因子已死胞胎已墮子母已離子死母氣已收不致同子氣俱絶然子在兒門塞住仍宜推送法補血生水補氣生血倘徒用祛除降墮以下其子恐子未必下母氣光脫矣用救母丹當歸二兩人參川芎益母草赤石脂末一兩荊芥三錢一劑子下方用芎歸補血人參補氣氣血既旺上升下降氣推血送所有阻滯況益母草下死胎赤石脂末化瘀血自一湧齊出兒在門邊未死者兒頭必能伸縮已死者必不動即以手推不動如故若未死少拔其發必退入故易辨若死在腹中察産母面必無黑氣難産時母有黑氣現面者子母兩死面無黑氣是母無死氣非子死而何既死腹中子自下用療兒散人參川芎一兩當歸二兩牛膝五錢鬼臼三錢乳香末二錢一劑下原因氣血虛致兒難轉若再用催生藥耗氣血兒氣不能通達及閉悶死醫殺之也故難産惟補氣血全活無窮蓋補氣血子自下批面青舌赤母死子活唇青吐沫子母俱鱉又有雙胎一死一活其候難知臨時觀變總以舌驗子面驗母文守江數日胎不下服催生藥不效人謂交骨難開誰知氣結不行乎夫兒到門不能下者乃交骨不開宜用開交骨藥若未到門不産非交骨不開萬不可妄用藥開交骨恐門大開兒頭不轉原難驟生及早坐草母見兒不下心必恐恐則神怯怯則氣下不升氣不升上焦閉塞氣乃逆上氣既逆則上焦脹滿氣更難行氣阻於上下不利氣而催生則氣愈逆胎愈閉故但利氣不必催生胎自下用舒氣湯參歸紫蘇牛膝三錢川芎白芍五錢陳皮一錢柴胡八分蔥白七寸同煎一劑下氣逆由氣虛氣虛易恐懼補氣恐自定恐定氣不知何以順況蘇柴牛芍平肝疏肺佐人參芎歸實有補利之益批有令母坐小凳不跪者法亦妙文守江血暈甫産後目昏噁心欲吐心中無奈或神外越恍若天上行此氣欲脫血暈也蓋新産血室空只存微氣心血前已蔭始後復隨胎墮心無血養惟望氣以固之倘氣又虛心君無護殘血欲回救主又非正血不可歸經內庭變亂成血暈須大補氣血不宜治血暈或疑心為血暈更補血不更暈乎不知新血不生則舊血不散補血生新正活血逐舊然有形血難生無形氣易長補氣以生血不又易乎用解暈湯荊芥三錢參耆歸炮薑一兩四劑再不暈此解血暈聖方凡産後能服斷不退容顏倘貧量力用參余依分兩産下即昏暈不語此氣血雙脫也本不治然急用縫衣針刺眉心之穴得血即語以獨參湯人參一兩急煎灌之無不生者倘貧家之婦無力賣參用當歸補血湯黃耆二兩當歸一兩煎灌萬不可輕加附子蓋以無經不達反引藥走而不守不能專注胞胎不若參耆歸直救氣血之絶聚而不散蓋血舍空虛無血養心致血暈舌乃心苗心既無主舌安能出聲眉心上通腦下通舌系連心刺之則腦與舌俱通心中清氣上升瘀自降再用前方則氣血接續雖單用前方亦能生然刺眉心尤無失瘀衝心故昏暈不語解瘀血之沖真扼要爭奇世但知灸眉心然灸緩刺急緩難救絶急易回生産後三日發熱惡露不行敗血攻心狂呼叫甚欲奔走拿捉不定人謂邪熱在胃誰知血虛心無以養乎産後血盡隨胞胎外越五臟皆無血養只存心中些微之血以護心臟腑皆欲取給於心全賴心包攔截各臟腑氣不許入心故心安神定然心包一虛即不能障心各臟腑氣直入心中以分心血心包情極遂號召勤王反近狂悖有無可如何之象故似熱而非實熱宜大補心血使各臟腑分取以自養不必求於心則心安心包亦安用安心湯乾荷葉一片當歸二兩生蒲黃二錢川芎一兩生地丹皮五錢一劑安血亦下斷不可服兩劑方用芎歸以補血又用生地丹皮涼血似非産後所宜不知惡血攻心未免因虛熱相犯補中涼之則涼不為害況益荷葉則七竅相通能引邪外出於心轉佐蒲黃以分解惡血胞衣不下胞衣三日不下心煩意燥時暈人謂胞胎蒂未斷誰知血少乾枯黏連於腹乎世恐胞衣上衝然胎衣何能衝心但未下瘀血難行恐血暈須大補氣血使生血以逐衣衣自潤滑補氣以助血血生迅速尤易推送用送衣湯當歸二兩川芎五錢乳香末沒藥末一錢益母草一兩麝香五釐荊芥三錢水煎調服立下用芎歸補氣血荊芥引血歸經益母乳香等逐瘀下衣新血長舊血難存氣旺上升瘀自速降胞衣非依子即依母不隨下者以子不可依也故留腹有回顧其母胎之心母胎雖生子蒂間之氣原未絶故流連欲脫而未脫每有六七日不下竟不腐爛正以有生氣也可見胎衣在腹不能殺人補之自降或疑胞衣既有生氣今用補宜益牢何反降不知子未下補則益子子已下補則益母益子胞衣之氣連益母胞衣之氣脫氣連胞胎之氣通氣脫胞胎之氣閉通則兩合閉則兩開故用補衣反降衣五六日百計不下絶無煩燥昏暈人謂瘀血黏連誰知氣虛不能送乎瘀在必暈今無恙血已淨矣血淨宜清升濁降衣不下乃清氣下陷難升致濁氣上浮不降然濁氣上浮必須燥今安然者是清濁兩不升也然用補氣濁氣不上升乎不知清升濁降一定之理苟於補氣中仍分清濁則升清正所以降濁用補中湯人參三錢黃耆一兩歸術五錢升柴三分陳皮二分甘草一錢蘿蔔子五分一劑衣下此方補氣即提氣並非推送何能下衣不知濁氣不降由於清氣不升提氣則清升濁自降濁氣降腹中所存之物盡降正不必推送也況蘿蔔子能分理清濁不致格故神産後産後小腹痛甚至結塊按之益痛此兒枕痛前人謂兒枕頭之物夫兒枕之不痛豈兒生不枕反痛乎蓋此乃瘀血成團未散也此多是健婦血有餘非血不足似可破然血結瘀作祟活血瘀自除破血雖可消瘀必損氣血不若於補中逐穢則瘀去氣血又不傷用散結安枕湯當歸一兩川芎五錢山楂十粒桃仁七個丹皮荊芥二錢益母草三錢乳香末一錢酒調服不必二劑此逐瘀於補血消塊於生血不專攻痛痛自止若用玄胡蘇木蒲黃五靈脂化塊此殺人之醫不足論也産後小腹痛按即止人謂兒枕痛誰知血虛乎産後去血過多原能腹痛但痛如燥粳觸體乃虛痛非實痛産後虛尤宜補況補血多潤滑藥産後腸中乾燥正宜故補血不特腹痛安腸中亦甚便用腹寧湯當歸熟地一兩續斷二錢阿膠人參麥冬山藥三錢炙草一錢肉桂二分二劑愈多服更佳此補氣無太甚補血無太滯氣血生痛自止氣喘不急治立死人謂氣血虛誰知氣血兩脫乎氣血兩脫宜立亡何又喘此血已脫氣猶未脫血脫欲留氣又不能留血之脫故反喘如與賊戰既不能強又不安弱其急聲號召所可知也故聲呼而喘症雖危可救正在喘肺主氣喘若肺氣盛不知實肺氣衰然血難驟生只存些小之氣望肺相救甚急肺因血失氣虛無力難以提挈安保其不遽脫是救氣須提氣提氣須補氣用救脫活母丹人參二兩肉桂一錢當歸麥冬熟地一兩棗皮枸杞子五錢阿膠炒荊芥三錢四劑全愈用參接續元陽然不補血則血燥陽旺雖回陽不能制陽必旋得旋失即補血不急補腎肝精則本實不固陽將安續故又用地棗枸杞以補肝腎後益肺氣則肺旺升提有力又恐新産用補陰藥膩滯加肉桂補命門火非惟火氣有根易助人參生氣且運化地黃等以化精微然過於助陽倘血隨陽動瘀血下行非萬全計更加荊芥引血歸經則肺氣安喘尤速定惡寒身顫發熱作渴人謂産後傷寒誰知氣血兩虛正不能敵邪也凡正氣旺邪斷難入産母去血太多氣必大虛氣虛皮毛不固外邪易入並不必外風即一舉動風即入然入易出亦易凡外邪俱不必祛風況産母寒由內生熱因內虛治內外自解用十全大補湯參歸茯苓三錢黃耆一兩白朮熟地五錢甘草川芎肉桂一錢白芍二錢二劑愈此大補氣血不去散風邪蓋正足邪自除況原無邪氣故易效噁心欲嘔時吐人謂胃氣寒誰知腎冷乎夫胃為腎關胃氣寒則胃不能行於腎中腎氣寒腎亦不能行於胃內是腎胃原不可分而治也但産後失血血虧必致腎水涸水涸腎火必炎何腎寒而胃亦寒蓋新産水乃遽然涸去虛火尚不能生火既不生寒象自現法當補腎水然無水濟則火過熱必致陰虛火動須於水中補火腎中溫胃則腎無太熱胃有既濟用溫胃止嘔湯人參三錢橘紅五分白蔻一粒巴戟白朮一兩茯苓二錢炮薑一錢熟地棗皮五錢四劑愈此治胃多於治腎然治腎仍是治胃故胃氣升寒盡散不必用大熱藥以溫胃祛寒腸下人謂兒門不關誰知氣虛下陷乎此症似宜用升提然新産瘀血在腹忽升提並血上升衝心之害殆有甚焉只可用萆麻難猝得奈何蓋氣陷乃氣虛補氣腸自升舉但藥少則氣衰力薄須多用則陽旺力大用升腸湯參耆歸一兩白朮五錢川芎三錢升麻一分一劑腸升此純補氣絶不升腸即加升麻但引氣不引血蓋升麻少用氣升多用血升産後半月血崩昏暈見鬼人謂惡血衝心誰知房勞乎産後半月氣血新生即血路淨胞胎之傷如故定不可交合重傷門戶令血崩致昏暈見鬼是心腎兩傷不只損傷胞胎門戶已也明是犯色大戰致大泄精精泄神脫矣此症舍大補氣無二法用救敗求生湯人參三兩熟地一兩歸術二兩川芎棗皮山藥五錢附子一錢倘一劑效連服三劑減半再十劑更生否則不效此回陽於無何有之鄉陽回而氣回矣氣回可攝血歸神生精續命故暈崩止穩婆損傷尿胞淋瀝須臾難忍夫破傷破尚可完豈傷胞獨不可治乎或謂破在外可外治破在內外膏無可施力然瘡瘍尚可服藥長肉胞損無毒獨難補缺陷耶用完胞飲參歸白朮一兩川芎黃耆五錢桃仁十粒茯苓益母草三錢紅花白芨一錢以豬羊胞煎湯飢服十日愈夫胞胎宜補胞何反補氣血蓋生産致人以手傷胞其難産必矣難産因氣血虛産後又大去血不補氣血胞何以完今大補氣血如飢人得食精神驟長少有損傷何難完補故一月三捷産後肢腫寒熱往來喘嗽胸滿不利吐酸脅痛人謂敗血經絡滲四肢以致氣逆誰知腎肝兩虛陰不能入陽也産後氣血大虛自腎水不足腎火沸騰水不足則不能養肝肝木大燥木中無津火發於木腎火有黨子母兩焚將火焰直衝而上金受火刑力難制肝故咳嗽喘滿肝火既旺必克脾土土衰不能制水故浮腫然肝火乃假旺假旺者氣若盛而實衰故寒熱往來無定隨氣衰而為寒熱熱非真熱寒亦非真寒故氣逆於胸膈不舒脅肝部酸乃肝木之味吐酸脅痛皆肝虛腎不能榮也宜補血養肝更宜補精生血精足而血足血足氣亦順矣用轉氣湯參朮茯苓芡實棗皮三錢熟地一兩歸芍山藥五錢故紙一錢柴胡五分方多補精補血何名轉氣不知氣逆由氣虛氣虛者肝腎氣虛也今補腎肝精血即所以補腎肝氣氣虛則逆氣旺有不順乎是補氣即轉氣氣轉各症盡愈陰入於陽陰陽無格矣水道出肉線一條三四尺動則疼痛欲絶人謂胞胎下墜誰知帶脈虛脫乎夫帶脈束於任督任前督後兩脈有力則帶堅兩脈無力則帶墮産後亡血過多無血養任督帶脈崩墮力難升舉故隨溺下帶脈下垂每腰臍痛況下墮出産門其失關鍵更甚安得不疼痛欲絶大補任督之氣則帶脈自升用兩收湯白朮二兩人參山藥芡實熟地一兩川芎巴戟三錢白果十枚扁豆杜仲五錢棗皮四錢二劑全收蓋任督連腰臍補任督不補腰臍則任督無力帶脈何以升舉惟並補之任督得腰臍之助則兩脈氣旺何難收帶脈於頃刻陰內一物形如帕或有角或二岐垂下人謂産頽誰知肝痿乎肝痿何以成皆因産前勞役傷氣又觸怒産後肝不藏血去血太多故肝之脂膜隨血奔墮似子宮實非子宮若子宮狀如茄子到産門不出門外惟肝脂膜每出門至六七寸許或黏席乾落如掌大使子宮墮落立死安能生宜大補氣血少用升提則肝氣旺易升肝血旺而易養脂膜自收用收脂湯黃耆一兩參朮白芍五錢升麻一錢當歸三錢産後禁用白芍何頻用奏功嗟嗟病在肝不可不用況用於大補中在白芍亦忘其酸收矣且脂膜正藉酸收助升麻提氣也下乳産後絶無乳人謂乳管閉誰知氣血涸乎乳乃氣血所化然血化乳又不若氣化乳尤速新産血大虧生血不遑何能生乳今數日乳不下血少氣尤微氣旺乳旺氣衰絶乳亦衰絶者勢也苟不補氣但通乳無氣血何以生無血乳從何化宜補氣以生血不可利竅而通乳用生乳丹參耆一兩當歸二兩麥冬五錢豬蹄二個木通桔梗三分此大補氣血蓋産後氣血衰而無乳非乳房閉而斷乳者可比壯婦生産數日憂鬱遂兩乳脹滿痛乳汁不通人謂陽明火誰知肝氣鬱結乎陽明多氣血化乳原屬陽明然陽明土必得肝氣通則稼穡作甘始成乳汁未可全責陽明壯婦亡血雖多氣實未衰化乳在氣不在血宜有乳汁今數日乳脹滿痛足欲化乳不可得非氣不能化乳也乃肝氣不揚陽明土因之亦郁安能化乳宜抒肝氣則陽明氣血自通用通肝生乳湯歸芍白朮麥冬五錢熟地一兩通草柴胡一錢志肉一錢甘草二錢一劑通藥味太重若非少壯女雖因郁少乳須減半治之
