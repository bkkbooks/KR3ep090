body:
  text: 卷二中風入室向火邊熱邊寒遂致左頰出汗偶出戶為賊風所襲覺右頰拘急口喎於右人謂中風孰知向火火逼熱並一邊也惟和氣血佐解火則火平喎斜正用和血息火湯升麻秦艽甘草一錢黃耆麥冬三錢防風桂枝三分當歸玄參五錢白芷五分花粉二錢二劑愈方補血氣為先何輔佐多用陽明藥蓋陽明脈起於鼻交中循鼻外入上齒中是兩頰與齒正陽明部位升麻白芷陽明經藥用之引於齒頰秦艽能開口禁防風能散風邪桂皮實表固宮衛與黃耆玄參同用善通經絡活臟腑縱真有風邪何處存自應如桴鼓久痢後卒昏僕手撒眼瞪小便自遺汗出不止喉作曳鋸人謂中風孰知病在下多亡陰陰虛陽暴絶本不治然灸氣海陽氣得續亦有生者但陽回不用補氣陽氣隨回隨絶用獨參湯人參三兩附子三分煎灌而人不死氣海前與丹田相通乃生氣之原故灸之而陽回非助以人參則氣回不能生生不息兩手麻面亦麻木人謂中風將現誰知氣虛不能運血頭乃六陽之經面乃陽之外見氣旺則陽旺氣衰則陽衰旺則氣行於面面乃和衰則氣滯於血面乃木面木陽衰可知何能運動手指治宜補氣通陽之閉手面之麻木解方用助氣通陽湯人參當歸茯苓三錢白朮黃耆葳蕤五錢防風五分花粉麥冬烏藥二錢木香附子三分二劑手解四劑面解六劑不發此方大補氣氣旺血行又何麻木身猝倒目緊閉昏暈不識人人謂中風危症誰知乃心氣乏絶乎身中未有不痰盛者痰盛則直走心經心氣乏絶則痰涎壅住膻中不能開雖膻中為心君相痰來侵心膻中先受所以障心而使痰不入然膻中本衛心以障痰何反壅痰以害心不知心氣虛膻中亦虛膻中既虛僅可障痰以衛心力難祛痰以益心況痰氣過盛犯心甚急膻中堅閉夫膜膈使痰之不入心氣因之不通不能上通故目閉不識人治法急宜補君相火佐之祛痰心氣一通目自開人自識用四君子加減治之人參一兩白朮二兩茯苓三錢附子一錢竹瀝薑汁一合菖蒲三分一劑目開再劑識人此方用參術以救生氣之絶然非附子斷不能破圍直入非竹瀝薑汁則痰涎間隔然附子孤單又借菖蒲嚮導直達心宮素性好飲兩臂作痛服祛風治痰藥更麻木痰涎愈盛體軟筋弛腿膝拘疼口噤語澀頭目暈重口角流涎身如蟲行搔起白屑人謂中風已成抑知脾氣不足乎人生賴飲食以養飲食過多反傷脾氣脾氣傷有何益況酒散人真氣少飲則益多飲則損貪杯則臟腑無非糟粕之氣欲真氣無傷得乎故體軟筋弛脾虛不能運也痰涎加盛脾虛不能化也腿膝拘痛脾虛不能行也口噤語澀脾虛氣難接也頭目暈重脾虛氣難升也流涎脾虛不能攝起屑脾虛不能潤不補脾氣烏能愈用六君子加味治人參五錢白朮一兩甘草一錢半夏二錢陳皮五分附子三分茯苓三錢十劑愈六君補脾兼治痰然非附子不能走經絡通血脈或疑白朮太多不知白朮健脾又去濕多用始能利腰臍升陽氣陽氣不下陷脾得建其運化怒後吐痰胸滿作痛服四物二陳加芩連枳殼不應更加祛風反致半身不遂筋漸攣縮四肢痿軟日晡益甚內熱口乾形體倦怠人謂風中於腑誰知鬱怒未解肝氣未舒所致誤用風藥損氣傷血致似中風法須仍解鬱怒佐補血補氣益陰益精之味用舒怒益陰湯熟地白芍一兩當歸五錢茯苓麥冬丹皮三錢甘草陳皮五分柴胡人參一錢白朮二錢十劑筋縮愈再十劑肢不軟後用六味湯煎飲二月半身皆遂方即逍遙散加味用參地麥冬實有妙義蓋逍遙散為解鬱聖藥散而得補補始有功用白芍一兩以平肝肝氣平則木不剋土又健脾開胃輔佐相成反敗為功懷抱鬱結筋攣骨痛喉間似有結核不下服烏藥順氣等方口眼歪斜兩臂不伸痰涎愈甚內熱晡熱人謂偏枯之漸誰知肝木不舒乎木既不舒木中之火又安得舒自然木來剋土脾胃兩傷脾熱胃燥內自生風正不必外風入始見前症也法自必補脾胃然徒補脾胃肝來剋土脾胃仍不舒必須攄肝以扶脾胃始得方用舒木生土湯白芍熟地五錢茯苓白朮玄參三錢山藥遠志鬱金人參一錢生棗仁麥冬當歸二錢甘草五分此心脾胃肺肝腎藥也何以謂舒木生土湯不知心者不耗肝氣治腎所以生肝治肺使不克肝治脾胃使不仇肝群藥無非滋肝舒木木舒脾胃有不得其天者乎此名實有微意一時猝倒口吐痰涎發狂號叫坐立不定目不識人身中發斑數日後變成瘡癤此真中風蓋元氣未虛忽為風邪所中正盛邪又不弱兩相戰不肯負於是痰涎出狂叫起心中如焚坐立不安目不識人內熱既盛由內達外故斑發皮膚火毒難消於肌肉因變瘡癤如人家門戶既牢主伯亞族又健突來強盜劈門而入兩相格鬥大聲吒叱戰鬥既酣目裂眥決竟不知同舟人非敵國土矣因而火攻燒殺反成焦頭爛額法不必助正惟事祛邪用掃風湯荊芥五錢防風半夏茯苓三錢陳皮蘇葉一錢花粉錢半黃芩二錢一劑狂定二劑痰消三劑斑化瘡癤愈此症萬中生一人不知中風真症吾獨表之使知真中風如此類中風亦宜辨素多內熱一旦顛仆目不識人左手不仁人謂中風誰知腎水不足養肝肝木太燥木自生風顛仆若作風治立亡即作氣虛治陽旺陰愈消必補腎水以生肝木木得其養用六味湯加味治熟地白芍一兩棗皮當歸五錢山藥四錢茯苓丹皮澤瀉白芥子三錢柴胡一錢一劑識人四劑不仁愈十劑全愈六味丸治中風效者以其似中風也六味滋水歸芍平肝木柴胡白芥子疏通肝氣消兩脅之痰水足木自條達痰去氣自疏通內熱頓除體自適又何左手不仁人忽自倒不能言語口角流涎右手不仁肌膚頑人謂氣虛中風氣虛則有之中風則未也此乃心氣虛不能行氣於胃胃氣又虛胃自生熱蒸其津液結為痰涎壅塞隧道不能行氣於心即堵截其神氣出入之竅故神明瞀亂神明無主則舌縱難言廉泉穴開則口角流涎一身運動全藉氣以行今氣大虛不能行於四肢則手自不仁右氣所屬氣不行於肌膚則痛癢不知若作風治未有不死即於補氣中加祛邪藥或可苟延性命亦必成半體風症故半體之風皆錯治中風而成也宜六君加附子治之人參一兩白朮黃耆二兩半夏三錢茯苓五錢附子甘草陳皮一錢一劑聲出二劑痰涎收十劑盡愈參苓耆術補氣聖藥加附子遍達諸經豈獨心胃相通痰涎不壅塞乎批原本未載附子分兩據愚酌定文守江無故身倒肉跳心驚口不能言手不能動履痰聲如鼾惟目能動人謂因痰中風孰知此痰病也怪病多生於痰痰病多生於濕痰濕結而不散有見鬼猝倒者此特其一耳醫謂中風誤矣然不治痰而治風適招風生變即不治風而治痰亦不能消痰弭災必大補氣血用十全大補湯人參當歸茯苓白朮五錢黃耆熟地一兩白芍三錢甘草一錢川芎肉桂二錢一劑能言二劑驚跳止三劑鼾聲息十劑手動足行又草劑如無病人此症世以風治多僨事惟大補氣血斷不生變一時猝倒痰涎壅塞汗出如雨兩手足懈弛不收口不能言囊縮小便自遺人謂中風急症誰知陰陽兩脫症至危刻不可緩作風治下口立亡必三生飲救之人參二兩生附子一枚生南星五錢生半夏三錢一劑囊伸小便止再劑能言始議他藥此病甚暴非斬關奪門何能直入臟腑追散失之元陽故投於人參數兩始可奪命於頃刻惟關門既開再有濟急丹人參當歸熟地麥冬一兩白朮茯苓棗皮五錢半夏三錢二劑元氣日旺虛汗不流手足運動無癱瘓之憂如破城而守內無糧草士有飢色今關門大開搬運而入倉糧足兵馬飛騰賊自望風而遁倘仍用附子南星過於酷烈損傷元氣不又多乎妙在用歸地棗皮麥冬資陰蓋前此斬殺太甚臟腑枯焦一旦資財接濟真不啻恩膏之賜自然踴跌奮興手舞足蹈口眼喎斜身欲顛仆腹中時鳴如囊裹漿狀人謂中風內有水濕水濕之氣由於脾氣虛脾氣不能運化夫水水乃停積不化必湧上湧於頭作暈湧於口眼而為喎斜水在上則頭重足輕故身欲顛仆似中風實非中風方用分水止嗚湯人參五錢白朮茯苓一兩車前子半夏三錢肉桂一錢四劑腹中鳴止口眼平復此原無風故不必祛風單健脾氣土能制水又慮徒消膀胱恐水冷不化再補命門火以生脾土土有先天之氣益足以分後天之瀾大地回陽溪澗無非春氣則膀胱不寒尤能雪消冰解無阻隔或曰口眼喎斜實系風症安在水氣使然不知水寒成冰口眼處於頭面之間一邊經寒風而成喎斜似中風然非風在內風既在外不入腠理又何必祛風猝倒後漸致半身不遂人謂中風成偏枯中風萬中間生一二豈可因一時猝倒即作中風治此原無風邪既氣虛猝倒此時大補氣血少佐消痰焉有偏枯症惟過於祛風耗氣必右身不遂耗血必左身不遂猝倒時正氣不能主宰乃不補氣專耗氣欲氣之周遍於身得乎天下至誤者謂中風有經絡臟腑之分自此言出世遂信風初中絡不可引入經既中經不可引入腑既入腑不可引入臟諸般風藥雜然亂投臟腑經絡未嘗有風強用風藥成偏枯猶其幸也蓋臟腑無風元氣實尚不可用藥侵耗況贏弱搖搖靡定今不死成偏枯亦因補正中用祛風之劑猶存殘喘耳然已成偏枯可再用風藥乎用全身湯人參白朮二兩茯苓一兩半夏三錢附子三分神麯一錢四劑手足能舉八劑動履如故身臂皆輕猝倒後遍身不運手足不收人謂中風成癱瘓不知血虛氣不順手得血能握足得血能走今手足不收正血虛耳氣血本相兼使血虛氣順氣能生血尚供手足之用今氣不順氣血有反背之失欲血萌手足得乎故不獨手足不收一身且盡不通手足猶在四隅一身不通腹心之疾症名風痱實無風也用四物湯加味治熟地當歸一兩白芍五錢川芎人參半夏二錢黃耆三錢二劑知痛癢十劑能步履再十劑全愈若用風藥耗爍其血血乾氣亦不順氣既不順血益加虛必為廢人猝倒於地奄忽不知人人謂中風重症然此氣虛不接續耳既無口眼喎斜又無手足麻木若作風治必引風入室世謂中風必須填塞空竅使風不能入今用風藥以治無風症安得不開腠理腠理即開玄府大泄欲風不入得乎氣虛不能接續致猝倒奄忽不知人是風懿病內未有風作中風治誤也用六君子湯加人參治人參五錢白朮一兩甘草陳皮一錢半夏茯苓三錢一劑知人二劑全愈蓋不治風自能奏功一時猝倒狀似中風自汗不止懶言語人謂中風誰知亦是氣虛猝倒加自汗此虛極乃亡陽非中風也亡陽必用參附始有生機誤用風藥立亡用參耆歸附湯救之人參當歸一兩黃耆二兩附子三錢一劑汗止二劑言出四劑神氣復或曰猝倒後無五絶症只汗多語言懶似可緩治不知此症非輕緩凡初病易圖功久病難著力亡陽症元氣初脫此時大補氣血實有無窮挽回苟因循退縮坐失機宜日久百劑難效男子身未倒右手不仁言語蹇澀口流沫人謂半肢風然非外風本氣自病名中氣氣何有中因似中風又非中風故曰中氣乃氣虛非中風故不中左而中右蓋左血右屬氣女子右為血左為氣男子右手不仁非氣虛何惟極補氣隨效用至仁湯人參白朮黃耆一兩茯苓苡仁半夏三錢肉桂二錢甘草一錢一劑語清二劑沫止十劑不仁愈此補氣之妙也或疑氣虛補氣何加消痰豈氣旺不能攝水氣盛不能化水耶至加肉桂助火不更多事不知氣虛未有不脾胃寒脾胃既寒水穀難化不變精而變痰故氣虛者痰盛痰乘氣虛作祟上迷心旁及手足身欲僕手不仁口吐涎沫用參耆補氣復用苓術健土治濕痰無可藏之經更加半夏以仁逐已成之痰猶恐脾胃久寒入肉桂補命門火火自生土土旺氣自鬱蒸氣有根蒂臟腑無非生氣經絡皮肉何至不通身未顛仆左手半邊不仁言語蹇澀口流涎人謂半肢風誰知血虛血不養筋脈似中風耳中氣病速易效中血病緩難效中氣陽症中血陰症陽速陰遲耳用生血起廢湯葳蕤二兩熟地當歸一兩山藥四兩茯苓白芥子五錢一劑語清十劑沫止三十劑不仁愈後再加人參三錢黃耆五錢減當歸五錢再服二十劑不發或疑葳蕤過中和不若四物流動白芥子雖消膜膈痰起首口角流涎宜多用後可少減何始終用五錢不知血病生痰消痰始能補血況中血血虛極膜膈間皆痰非多用白芥子斷不能消白芥子消痰不耗氣且助補血藥生血故始終必需但力不及半夏貝母故必多用四物補血聖藥白芍非中血所宜川芎過於動故特用葳蕤生血又起廢同歸地用尤易奏功且葳蕤暫用難效久服易建功治緩病實宜況用二兩力更厚加以輔佐得宜故始終攸利頭面腫痛口渴心煩一旦猝中手足溺言語不清口眼歪斜人謂中風誰知中火火生木中每藉風力中火似即中風不解風火何由息抑知火所畏者水祛風息火火焰少戢火根未除滋水救火火光自消況火中內實無風用祛風藥毛竅盡開反通火路火路通風反得入風火互勢欲不變風症得乎法貴補水用滅火湯玄參三兩沙參二兩白芥子三錢茯苓熟地一兩棗皮麥冬五錢北味一錢十劑全愈玄參息浮遊之火群藥補水添精自然水足火衰倘少加風藥則拘攣其手足水轉助風反增火勢或曰不用風藥獨不可用涼藥不知實火可寒涼直攻虛火斷不可用況玄參微寒補中帶泄何必再用涼藥時猝中手足牽搐口眼喎斜語言如故神思清人謂陽虛中風陽虛猝倒必神昏今神思清乃陰虛之中耳陰虛非血虛蓋真陰腎水乾枯不能上滋於心痰來侵心一時猝中及痰散心清如故作中風固錯作中血亦非惟直補腎真陰精足腎自交心心液流行各臟腑諸症自痊用填陰湯熟地四兩棗皮北味牛膝三錢麥冬山藥一兩白芥子五錢故紙一錢附子一分水煎服十劑全愈棗藥熟地填精聖藥麥冬五味益肺仙丹單補腎水恐難速生故又補肺子母相資更易滋潤又恐陰不下降故用故紙牛膝下安腎宮則濁陰不致上干真陰自然相濟然陰藥太多未免過於膩滯加附子一分以行真陰氣非假以助火也水得火氣尤易生無恙覺手足麻木尚無口眼喎斜等症人謂風中於內三年後必暈僕勸預服搜風順氣藥以防猝中其論是所用方則非手足麻木乃氣虛非氣不順即氣不順非風作祟人苟中風來甚暴豈待三年哉然氣虛何以手足麻蓋氣虛即不能化痰痰聚胸中氣不通於手足宜補氣中佐消痰用釋麻湯人參半夏白芥子陳皮一錢當歸黃耆白朮三錢甘草五分柴胡八分附子一分服四劑手足不木倘仍麻木前方倍加再四劑必愈蓋手足麻木乃四餘輕病不必重治人疑重病風藥亂投反致誤事苟知虛而非風何難之有遍身麻木不顛仆狀似中風然風則有之中則非此症不可不治風又不可直治風不治風風不能出直治風損氣血風又欺氣血虛反客為主不肯去必補氣血中佐祛風祛痰氣血不傷風又易散用解縛湯黃耆葳蕤一兩當歸白芍人參白朮熟地五錢花粉秦艽三錢附子羌活一錢四劑麻木愈十劑全愈同一麻木何上條用藥少此獨多且重蓋手足麻木無風入體周身麻木風乘虛入腑故上條可輕治此條宜重治天稟厚素好飲酒一時怒激致口眼喎斜似中風身未僕且善飲食脈洪大有力非中風乃火盛肝傷耳此症西北人多南人少法不徒泄火又須養肝血用解焚湯酒蒸大黃白芥子炒梔仁二錢柴胡一錢歸芍一兩大黃泄酒毒梔子泄肝火但二味除祛未免迅厲用歸芍大補肝血蓋血足火自息尤妙加柴胡白芥子以舒肝葉風以消膜膈痰痰消肝氣益舒肝舒風自去若誤認中風妄加麻黃羌活等藥愈祛風愈動火或不滋肝反補氣陽旺氣盛轉來助火肝中血燥益足增怒勢必火亢自焚成猝中猝中後手足流注疼痛久則麻痹不仁難屈伸人謂中風以致風濕相搏關節不利不知先有水濕不治元氣衰反去祛風利濕以成中風既因虛成濕致中不治虛尚可治風濕乎然風濕既搏擊一身但補氣不祛風利濕亦非救濟之道用兩利湯白朮茯苓五錢薏仁白芍一兩人參當歸半夏一錢甘草防風五分肉桂三分四劑疼痛止十劑麻痹愈二十劑屈伸利方中補多於攻用防風散風不用苓瀉利水蓋因虛成風濕既祛風何可復利水況白朮薏仁亦利水藥於補水中行利水法則水無阻滯水濕去風難獨留故少用防風孤子之風無水難於作浪痹證兩足牽連作痛大便微溏夜不能寐臥則足縮不伸伸則愈痛人謂傷寒成痹誰知風寒濕同結大腸乎風入大腸日大便邪似易下即有濕氣亦可同散何以固結於中痛形兩足乎不知寒邪入腹留大腸又得風濕相搏不肯遽散因成痹法必去風寒濕使不留大腸痹病可愈使徒治大腸邪三氣轉難祛散又宜益大腸氣腸中氣旺轉輸倍速三氣易祛用逐痹丹人參一兩白朮茯苓五錢升麻神麯五分甘草苡仁一錢肉桂三分一劑濕去二劑風寒散此方治濕多治風寒反輕蓋水濕最難分消治其難易者更易況治濕不傷元氣大腸自傳送風寒隨濕同解嘔吐不寧胸膈飽悶吞酸作痛因而兩足亦痛人謂胃口寒誰知風寒濕結胃而成痹乎胃喜熱不喜寒胃口一寒邪因相犯風入胃不散濕停胃不行三者合痹成法祛三邪仍調胃氣胃氣健三者不攻自解用六君子加減治人參荊芥茯苓三錢白朮五錢生薑五片半夏一錢陳皮甘草肉桂五分十劑全愈此方開胃又喜分消加生薑荊芥尤善祛散風寒心下畏寒作痛惕惕善驚懶飲食以手按如水聲嘓嘓人謂水停心下誰知風寒濕結於心胞絡乎水犯心則痛風乘心則痛毋論風寒濕均能成病重則必死今只畏寒作痛正心胞絡障心心胞既能障心捍衛之勞心胞獨當其鋒心胞安得不痛法當急祛風寒濕三者使毋犯心胞心君自安然祛三邪不補心胞氣則心胞太弱故必補心胞兼治三邪用散痹湯巴戟白朮山藥蓮子五錢菟絲炒棗仁茯苓三錢柴胡半夏一錢遠志八分甘草三分十劑全愈此方單治心以心胞為心相臣治心正治心包小便艱澀如淋下身生痛時上升如疝氣人謂疝或謂淋孰知風寒濕入於小腸成痹小腸主泄水水出小腸何邪不去乃縮住不流風寒作祟也必散小腸風寒濕不難去然宜兼治膀胱膀胱利小腸無不利雖膀胱亦有痹症治小腸痹當以治膀胱者治之用攻痹湯車前子茯苓三錢苡仁一兩肉桂五分木通二錢白朮五錢王不留行一錢連數劑似淋不淋似疝不疝再數劑痛如失此方利濕不耗氣祛寒風自散又何用逐風以損臟腑身上下盡作痛有時止痰氣不清欲嗽不能咽喉氣悶胸膈飽脹二便艱澀人謂肺氣不行誰知風寒濕犯三焦乎三焦主氣氣流通於上中下風寒濕感一氣即不宣況三者摶結毋怪其清濁兩道閉塞因而作痛法宜急祛三者之邪然三焦不可徑治宜兼治腎肺脾胃腎氣旺下焦氣通肺氣肅上焦氣降脾胃氣健中焦氣始化理腎肺脾胃氣益散邪則三焦得令風寒濕不難去用理本湯人參肉桂豨蘞草一錢白朮芡實山藥五錢麥冬巴戟茯苓三錢桔梗貝母五分白芥子二錢防己三分四劑上中下氣通病盡解八劑諸症全愈此方扶肺腎脾胃氣輕於祛風寒濕者正理本也理本標在中況兼蕩邪所以能神胸背手足腰脊牽連疼痛不定頭重不舉痰唾稠黏口角流涎臥則喉中有聲人謂痹症宜控涎丹痹雖合風寒濕三邪而成然氣血不虛邪從何入即因氣血虛烏可徒治邪不補正控涎丹甘遂大戟無補氣血藥用治痹不能收功坐此弊也法宜補正助祛邪則百戰百勝名補正逐邪湯白朮苡仁五錢人參一錢桂枝三分茯苓一兩白芥子三錢十劑愈參朮茯苡健脾補氣又利濕雖三者合成痹濕為最多濕在經絡腸胃間最難分化逐其濕風寒自化故佐桂枝數分已足既用薏苓參術健脾利濕何慮痰為患哉然三者每藉痰為奧援用白芥子膜膈痰盡消各處之痰有不消乎痰消三氣無藪可藏或曰痹成氣血虛宜並補何方中補氣不益血不知氣旺自生血血有形之物補之恐難速生不若專補氣更捷肌肉熱極體上如鼠走唇口反裂久則縮入遍身皮毛盡發紅黑人謂熱痹風寒濕合而成痹未聞三者外更添熱痹此乃熱極生風似痹實非痹解陽明熱少散風則得矣不必更治濕至於寒邪尤不必顧蓋既熱不寒耳用化炎湯玄參一兩甘菊五錢麥冬羚羊角生地五錢炒荊芥升麻三錢二劑熱少減四劑盡愈用玄參升麻生地麥冬解陽明火更退肺金炎以肺主皮毛也然僅治肺與胃恐只散內熱不能散外熱又使升芥導出外不使內留以亂心君外既清涼內有不快乎羚羊角雖取散火毒亦藉其上引唇口使縮裂愈或謂陽明火毒盍用石膏知母不知火熱外現於唇口皮毛肌肉用大寒涼直攻必從下泄不能隨升芥外泄故用玄參甘菊於補中表火為得腳膝痠痛行步艱難按皮肉直涼至骨人謂冷痹痹曰冷正合風寒濕三者之旨此雖合三邪寒為甚蓋挾北方寒水之勢侵入骨髓乃至陰寒非至陽熱不能勝然至陽熱又恐過虐恐邪未及祛至陰之水先已熬干真水涸邪水必泛邪水盛寒風助之何以愈痹用真火湯白朮五錢巴戟一兩附子防風一錢牛膝茯苓石斛三錢萆薢二錢連服十劑症盡愈妙在用巴戟為君補火仍是補水之輔佐又彼此相宜不用肉桂當歸溫血分實有意蓋補氣則生精最速生精既速溫髓亦速若入血分藥則沾濡遲滯欲速不達萆薢原忌防風使相畏而相使更復相宜所以同群共濟肝氣常逆胸膈引痛睡臥多驚飲食不思吞酸作嘔筋脈攣急人謂肝痹是矣而所以成者亦血氣不足肝血不足濕乘之肝氣不足風乘之肝之血氣不足寒乘之三邪侵入肝經肝血氣益虧耗於是魂不藏於肝乃越出作驚肝病何能生心心無血養安能生胃胃氣不生自難消化飲食強食必至吞酸作嘔飲食養臟腑也既不消化不能變精以分布於筋脈則筋無所養安得不拘攣烏可徒三邪不顧肝經氣血用肝痹散人參三錢當歸一兩川芎茯苓五錢代赭石末二錢肉桂棗仁一錢羌活五分水煎調丹砂末五分服十劑全愈芎歸生血妙矣尤妙在加人參益氣以開血引代赭通肝氣佐芎歸氣血開通又加肉桂闢寒茯苓利濕羌活祛風邪自難留魂自不亂況棗仁丹砂末收驚特速下元虛寒復感寒濕腰腎重痛兩足無力人謂腎痹腎雖寒臟中原有火有火則水不寒風寒濕無從而入人過作強先天之水日日奔泄火亦隨流而去使生氣之原竟成藏冰之窟火不敢敵寒寒邪侵之寒既入以邪招邪風濕又至則痹症生法不必去邪惟在補正補正補腎火也火非水不長補火必須補水但補水恐增濕風寒有黨未能遽去然腎火乃真火也邪真不兩立故補真火實制邪火也況水中有火何濕不去最難治者水邪即去風寒不治自散用腎痹湯白朮一兩棗皮茯苓苡仁骨皮五錢杜仲三錢肉桂一錢附子防己五分石斛二錢二十劑全愈妙在補水少去濕多況並未補水於水中補火火無太炎於水中祛寒寒無太利寒濕既去風又安能獨留又有防己祛邪故風寒濕盡去咳嗽不寧胸膈窒塞吐痰不已上氣滿脹不能下通人謂肺痹亦知肺痹因於氣虛乎肺相傅之官治節出焉統轄一身之氣無經不達無臟不轉是肺乃氣主肺病則氣病氣病則肺病然則肺痹即氣痹治肺痹烏可舍氣不治但肺雖主氣藥不能直入必補脾胃以生肺氣然生肺者只脾胃克肺有心仇肺有肝耗肺有腎一處生不敵各處克此氣所以易衰邪所以易入且脾胃又能暗傷肺金飲食入胃必由脾胃轉入於肺今脾胃即受風寒濕濕亦隨脾胃氣輸肺肺乃受傷況多怒肝氣逆於肺多欲腎氣逆於肺肺氣受傷風寒濕填塞肺竅成痹用肺痹湯人參茯苓三錢白朮白芍五錢蘇葉二錢半夏陳皮一錢枳殼黃連肉桂三分神麯五分十劑諸症盡愈或謂人參是矣但多用恐助邪何用之咸宜不知肺氣因虛成痹人參畏實不畏虛況有蘇葉治風半夏消濕肉桂祛寒邪何能作祟苓術健脾開胃白芍平肝連桂交心腎肺氣安寧自然下降正不必陳皮之助心痛久患心疼時重時輕大約飢則重飽則輕人謂寒氣攻心誰知蟲傷胃脘乎蓋心寧靜之宮寒熱皆不能到倘寒犯心立死安能久痛凡痛久皆邪犯心包胃口但暫痛不常痛斷無飢重飽輕惟蟲飢則覓食頭上行無食充飢上竄口齧胃脘之皮症若心痛不殺蟲痛何能止用化蟲定痛丹生地二兩水煎汁二碗入白薇二錢煎汁一碗淘飯食之非吐物如蝦蟆即泄物如守宮大凡胃濕熱人多生蟲飲食倍常皆有蟲此方皆效蓋生地殺蟲於有形白薇殺蟲於無形合用最神蟲死痛除非藥能定一時心痛倏又不痛已而又痛日數十遍飲食無礙晝夜不停人謂蟲蟲痛非一日而成豈有無端一時心痛乎或謂火火必終日痛非時痛時止乃此氣虛微感寒濕邪衝心包作痛不沖即不痛心痛不一此即古云去來痛也痛無補法獨此必須補然徒用補不祛寒祛痰亦不能定痛用去來湯人參茯苓三錢二術五錢甘草川烏二錢半夏一錢一劑痛止再劑不發方用二術為君最有微意蓋痛雖由氣虛畢竟濕氣侵心包二術去濕又健脾胃以佐參苓補氣利濕濕去氣更旺川烏宜入心包祛逐寒邪半夏行中脘消敗濁痰甘草調停邪正以奏功於眉睫心痛極苦不欲生徹夜呼號涕泗滂沱人謂火邪犯心莫知其故蓋肝氣不舒鬱火犯心心屬火火極反致焚心往往自焚而死故心火太旺為心所惡又肝木助則心不能受必號呼求救自然涕淚交垂且肝木又系鬱火尤非心所喜故入心心不受然火勢太旺不能遏抑雖心宮謹閉心包掩護未易焚燒然肝火龍雷之火每從下衝上霹靂震天火光所至焚林燒木天地且為動蕩能遏止呼此肝火衝心所以直受其害法必泄肝火解木氣鬱少佐安心心痛自止用救痛安心湯白芍一兩炒梔子蒼朮三錢柴胡貫仲二錢甘草乳香沒藥一錢一劑止二劑愈柴芍解肝鬱梔子貫仲泄肝火乳香沒藥止痛甘草蒼朮和中消濕故二劑奏功真心痛法不救其痛不在胃脘間兩脅處恰在心窩中如蟲咬蛇鑽飲食不入手足冷面目青紅是也真心痛有二一寒邪犯心一火邪犯心寒犯心如直中陰經病立死死後手足盡紫黑甚則遍身青非藥能救以至急也倘家存藥餌用人參一二兩附子一二錢急救之否則必死若火犯心猶緩可覓遠物故不可不傳方但同是心痛寒熱何辨益寒邪舌必滑熱邪舌必燥辨是火邪用救真湯投之炒梔子三錢炙草菖蒲一錢白芍一兩廣木香二錢一劑全愈但須忍飢一日斷不再發慎之既是心痛宜用黃連治心火何以治肝不知肝為心母泄肝木則肝不助火心氣自平正善於治心火也倘直泄其心心必受傷雖暫效脾胃不能仰給心火則生氣遏抑必至中脘虛寒又變他症此黃連不用反用梔子心痛百藥不效得寒得熱皆痛謂熱不止於熱謂寒不止於寒蓋非心痛乃胃痛既胃痛何在心痛不止不知寒熱俱能作痛不可執諸痛皆火之言疑心痛盡是火非寒夫熱能作痛寒何以作痛耶因寒熱相擊痛生矣寒熱不並立同乘於心胃兩相攻戰勢均力敵治心胃受傷治胃心受損所以治寒治熱兩無效法宜兩治心痛自愈用雙治湯附子黃連甘草一錢白芍五錢一劑自愈用黃連清心火附子除胃寒妙在芍藥甘草為君使兩家和解入肝平木肝既平自不克胃反去生心調和心胃實有至理心痛難忍氣息奄奄服薑湯少安按之能忍日輕夜重痛甚時幾不欲生人謂寒邪痛蓋寒有不同凡心君寧靜由於腎氣通心心腎不交寒邪中之心遂不安而痛徒祛寒不補腎則腎火虛不能下熱於腎腎水虛不能上交於心此救須救腎補腎火以救心尤須補腎水以救腎用補水救火湯熟地一兩棗皮山藥三錢巴戟白朮五錢肉桂一錢北味五分二劑愈十劑不發此絶非治心痛用治心腎不交之心痛實奇蓋腎中水火不交邪直犯心補腎使水得火相生火得水相養陰陽既濟心腎之陰陽安得有乖故不必引其上下之相交腎自通心心自降腎又原無寒邪所以奏功脅痛兩脅作痛經年纍月時少止後又痛痛時發寒熱不思飲食人謂肝病尚未知所以成之故大約多因拂抑欲怒不敢不怒不能忍耐吞聲未得舒泄肝氣鬱膽氣亦郁不能取決於心心中作熱外反變寒寒熱交蒸肝血遂瘀停住兩脅作痛順境時肝氣少舒痛少愈若遇不平觸動怒氣前病興動更重法須解怒氣解怒要在乎肝用遣怒湯白芍二兩柴胡甘草木香末乳香末一錢白芥子生地三錢桃仁十粒枳殼三分十劑痛除平肝舍白芍實無第二味世人不敢多用孰知必多用而後效用至二兩力倍尋常遍舒肝氣況柴胡疏泄甘草調和桃仁芥子攻瘀乳香廣木止痛橫逆驟加大怒叫號罵詈致兩脅大痛聲啞人謂怒氣傷肝然人必素有火性肝脈必洪大無倫眼必紅口必大渴呼水舌必乾燥開裂急平肝泄火方舒暴怒倘不中病或稍遲必觸動其氣嘔血傾盆用平怒湯白芍三兩丹皮當歸一兩炒梔仁五錢炒黑荊芥花粉香附三錢甘草一錢三劑痛如失用白芍平肝甘草緩急肝氣平緩加當歸荊芥之散梔子丹皮涼泄然徒散火火為痰氣所結未能遽散又加香附通氣花粉消痰怒雖甚有不知而解或疑藥太重涼藥過多詎知人素有火加大怒五藏無非熱氣非大劑涼藥何以平怒解火跌僕後兩脅脹痛手不可按人謂瘀血用小柴胡加膽草青皮愈次年左脅復痛仍用前藥不效蓋瘀積不散久而成痛小柴胡半表裡藥能入肝舒木脅正肝部何以不效蓋能散活血不能散死血活血易於推動行氣瘀滯可通死血難於推移行氣沉積莫滌用抵當丸以水蛭虻下有形死血一劑必便黑血愈後用四物湯加減調理熟地白芍一兩丹皮三七根末三錢川芎一錢當歸五錢苟既下死血不用四物補血肝舍空虛又因虛成痛惟補血則死去新生肝氣快暢何至再痛又加三七根止血者蓋水蛭虻蟲過於下血死血行後新血隨之不其無益所以旋補旋止始奏萬全右脅大痛腫如杯覆手按益甚人謂肝火誰知脾火內伏瘀血成積不散血雖肝主肝克脾脾受肝克則脾亦隨肝作痛然無形之痛治肝乃止有形之痛治脾後消今作腫必有形之痛乃瘀血積脾中鬱而不舒乘肝隙外腫於右脅法須通脾中伏熱下其瘀血痛可立除用敗瘀止痛湯大黃當歸三錢桃仁十四粒白芍一兩柴胡甘草黃連一錢厚朴二錢水煎服一劑瘀下二劑痛除腫消此方妙在大黃黃連柴胡同用掃瘀去陳開鬱逐火然非多用白芍肝氣難平脾中之熱受制於肝甚不易散是病在脾治仍在肝也過房勞又惱怒因而氣府脹悶兩脅痛人謂恣欲傷腎惱怒傷肝宜兼治不知肝腎子腎足肝易平腎虧肝血燥肝惡急補血以制急不若補水以安急況肝血易生腎水難生所以肝不足輕補木得養腎水不足非大補水不能長況房勞後兩脅痛甚虧精更多填精益血湯熟地一兩山藥白芍五錢當歸沙參地骨皮白朮三錢柴胡一錢丹皮茯苓二錢十劑全愈方重補腎輕舒肝妙在治肝腎復通腰臍氣腰臍氣利兩脅有不同利者乎故精血生痛止頭痛頭痛連腦目赤紅如破裂此真頭痛一時暴發不治蓋邪入腦髓不得出也猶不比邪犯心與犯臟也苟得法亦有生者蓋真頭痛雖必死非即死症傳一奇方名救腦湯辛夷三錢川芎當歸一兩細辛一錢蔓荊子二錢一劑痛止細辛荊子頭痛藥得辛夷導引即入腦然三味皆耗氣同川芎用頭雖愈過於辛散故加當歸之補血補氣氣血周通邪自不能獨留於頭所以合用頭痛如破去來不定此飲酒後當風臥風邪乘酒氣之出入而中之酒氣散風邪遂留太陽經本上於頭頭為諸陽之首陽邪與陽戰故往來經絡間作痛痛既得之於酒似宜兼治然解酒藥轉耗氣愈不能效不若直治風邪奏功尤速用救破湯川芎一兩細辛白芷一錢一劑愈蓋川芎最止頭痛非細辛不能直上頭頂非白芷不能盡解邪氣遍達經絡如藁本等藥未嘗不止痛然大傷元氣終遜川芎散中有補頭痛個甚重遇勞遇熱皆發倘加色欲頭岑岑欲臥此少年過酒色加氣惱頭重藥不效蓋此症得之腎勢無水潤肝肝燥水中龍雷之火衝擊一身上升腦頂故頭痛且暈法宜大補腎水少益補火水足制火火歸腎宮火得水養不再升為頭痛用八味地黃湯加減治之熟地川芎一兩棗皮山藥五錢茯苓丹皮澤泄三錢肉桂一錢十劑全愈後去川芎加歸芍各五錢再十劑不發蓋六味補精肉桂引火川芎治頭痛合用奏功但頭痛在上焦補腎在下焦何治下而上愈且川芎陽藥入至陰中偏能取效不知腦髓腎水原相通補腎腎氣由河車直入腦未嘗相格川芎雖陽藥然補血走腦頂獨不可入腦內乎況肉桂助火火陽也同氣相合故同群共濟入於腦中又能出於腦外使宿疾寒邪盡行祛散寒既散腎火永藏下焦水火既濟何至再衝後去川芎者頭痛痊恐耗氣耳加歸芍腎肝同治尤善後半邊頭風或左或右大約多痛左百藥罔效此鬱氣不宣又加風邪襲少陽經致半邊頭痛時重時輕大約順適輕遇逆重遇拂抑事更加風寒則大痛不能出戶久後眼必縮小十年後必壞目急須解鬱解鬱解肝膽氣也風入少陽膽似宜解膽然膽肝為表裡治膽必須治肝況郁先傷肝後傷膽肝舒膽亦舒用散偏湯白芍五錢川芎一兩郁李仁柴胡甘草一錢白芥子三錢香附二錢白芷五分一劑即止痛不必多服川芎止頭痛然同白芍用尤生肝氣以生肝血肝血生膽汁亦生如是膽無乾燥郁李仁白芷自上助川芎散頭風況柴胡香附開鬱白芥子消痰甘草調和滯氣肝膽盡舒風於何藏故頭痛頓除後不可多用者頭痛久不獨肝膽虛臟腑陰陽盡虛若單治膽肝舒郁未免銷除其陰風雖出於骨髓外或勞或感風又入於骨髓中愈後須補氣血善後策也遇春頭痛晝夜不休昏悶惡風寒不喜飲食人謂風寒中傷不知內經云春氣者病在頭氣弱陽氣內虛不能隨春氣上升於頭故頭痛昏悶凡邪在頭發汗解表可愈今氣不能上升是無表邪若發汗虛虛清陽之氣益難上升氣不升則陽虛勢難外衛故惡風寒氣弱力難中消故不喜食法宜補陽則清升濁自降內無所怯外亦自固用升清固外湯耆術三錢人參當歸二錢白芍五錢炙草五分陳皮三分柴胡蔓荊子川芎花粉一錢二劑愈即補中益氣變方去升麻用柴胡者以柴胡入肝提木氣也木旺於春升木以應春氣則木不陷於肝清氣騰於頭況參耆歸芍補肝氣氣旺上榮亦氣旺自固又何頭痛頭痛雖盛暑必以帕矇頭頭痛少止苟去帕少受風寒痛即不可忍人謂風寒已入於腦誰知氣血兩虛不上榮於頭夫腦受風寒用藥上治甚難祛風散寒藥益傷血氣痛愈甚古有用生萊蔔取汁灌鼻者以鼻竅通腦中萊蔔善開竅分清濁故可愈頭風然不若佐生薑自然汁蓋萊蔔長於祛風短於祛寒二汁同用則薑得萊蔔祛風萊蔔得薑治寒生萊蔔汁十之七生薑汁十之三和勻令病人口含涼水仰臥以二汁匙挑灌鼻中至不能忍而止必眼淚口涎齊出痛立止後用四物湯加羌活甘草數劑調理斷不再發此巧法也腹痛腹痛欲死按之更甚此火痛也但火有胃脾大小腸膀胱腎胃火必汗多渴口中臭脾火走來走去無定處大腸火大便閉結肛門乾燥後重小腸火小便閉澀如淋膀胱火小便閉澀苦急腎火陽強不倒口不渴面赤水竅澀痛既辨明後因症治病今一方治火腹痛無不愈名導火湯玄參一兩生地五錢車前子三錢甘草一錢澤瀉二錢二劑皆愈火有餘水必不足玄參生地滋陰則陽火自降況前瀉滑利甘草調和尤能導火解紛辨知胃火加石膏脾火加知母大腸火加地榆小腸火加黃連膀胱火加滑石腎火加黃柏尤效人有終日腹痛手按之而寬快飲冷則痛劇此寒痛也不必分別臟腑皆命門火衰而寒邪留之也蓋命門為一身之主命門寒而五臟七腑皆寒矣故只宜溫其命門之火為主然命門之火不可獨補必須治兼脾胃火土相合而變化出焉然又不可止治其土蓋土之仇者肝木也命門助土而肝木乘之則脾胃之氣仍為肝制而不能發生必須制肝使木不剋土而後以火生之則脾胃之寒邪即去而陽氣升騰濁陰銷亡於烏有土木無戰克之憂而腸腹享安寧之樂矣方用制肝益火湯白芍三錢白朮五錢茯苓三錢甘草一錢肉桂一錢肉豆蔻一枚半夏一錢人參三錢水煎服一劑而痛減半再劑而痛盡除也方中雖六君子加減無非助其脾胃之陽氣然加入白芍則能平肝木之氣矣又有肉桂以溫命門之火則火自生土而肉豆蔻復自暖其脾胃則寒邪不戰而自走也腹痛得食則減飢則甚面黃體瘦日加困頓此蟲痛也蓋因飢食難化物不消渴飲寒冷不化久變蟲然蟲生於腸胃倘陰陽氣旺蟲驟生必隨滅惟陰陽氣衰不能運化蟲乃生不死初食物後漸飲血腹痛作安可單殺蟲不補氣血用衛生湯人參三錢白朮五錢白薇檳榔乾葛甘草一錢棐子使君子十枚一劑腹轉痛二劑痛除轉痛拂蟲意也切忌飲茶水一飲茶水蟲不盡殺禁半日蟲盡化水從二便出妙在參術為君升騰陽氣陽氣升蟲不自安必向上覓食所佐盡殺蟲藥也又安能不死倘飲茶水蟲得水翻波鼓浪死中得活蟲活根未除雖暫安久必蟲多腹痛至急脅覺脹滿口苦咋嘔吞酸欲泄又不可得此氣痛也寒熱藥俱不效蓋肝木氣鬱下克脾土土畏木克陽不敢升因下行而無可舒泄復轉行於上作嘔彼此牽扯痛無已時必疏肝氣升脾胃之陽則土不畏木痛自止用逍遙散加減最妙柴胡白朮甘草陳皮神麯一錢白芍五錢茯苓三錢當歸二錢二劑痛止逍遙散解鬱此痛又須緩圖不必用重劑可奏功全所以不更立方多食生冷燔炙或難化物積腹內作痛按之痛疼更甚此食積腸中閉結不出燥屎作痛也法宜逐積化滯非藥下之不可然下多亡陰又當先防人能食陽旺也能食不化陰衰也陽旺何物不消安有停住大腸必陰血不能潤大腸陽火焚爍遂致大腸熬干食物結為燥屎不下陰陽不通變成腹痛治宜滋陰佐祛逐則陰不傷食亦下用逐穢丹歸尾五錢大黃丹皮三錢甘草枳殼一錢一劑燥屎下腹痛頓除不必二劑用大黃枳殼逐穢丹皮歸尾補血生陰攻補兼施何患亡陰腹痛從右手指冷起漸上至頭如冷水淋灌由上而下腹大痛已而遍身大熱熱退痛止或食或不食或過於食皆痛初一年一發久一月一發後至旬日發用四物加解鬱四君加消積二陳湯加消痰破氣和中藥俱不應人謂有瘀血誰知陽氣極虛蓋四肢陽末頭為諸陽之會陽虛惡寒陰虛惡熱陰勝發寒陽勝發熱今指冷上至頭明是陽不敵陰失其健運痛乃大作後大熱者寒極變熱及寒熱兩停陰陽俱衰故熱止痛亦止法單補陽陰自衰況陽旺則氣旺氣旺血自生氣血兩旺又何爭戰作痛用獨參湯人參一兩加陳皮八分甘草一錢十劑痛止獨參湯補氣仲景曰血虛氣弱以人參補之故用止痛或曰四君補氣何以不效蓋四君有朮苓分人參之權不若獨參湯功專力大況加消積藥無積用消雖服人參止可救失腰痛腰重如帶三千文不能俯仰人謂腰痛腰痛不同此房勞行役又感風濕而成既房勞行役傷腎必須補腎無疑何愈補愈痛蓋腰臍之氣不通風濕入腎不得出耳法宜先利腰臍之氣祛風利濕後大補腎中水火自愈用輕腰湯白朮苡仁一兩茯苓五錢防己五分水煎服二劑腰輕方妙全在利濕不治腰一方兩治然忌多服以腎有補無泄防己多用必至內泄腎邪損傷正氣故腎中有邪瀉去腎邪而腰輕至邪盡過瀉腎水而腎病另用三聖湯桂仲一兩白朮五錢棗皮四錢水煎服此方補腎水火仍利腰臍腎中有可通之路則俯仰皆適矣動則腰痛自覺其中空虛無著乃腎虛腰痛也夫腎虛有水火不同經謂諸痛皆屬火獨腎虛腰痛非火腎中有火則腰不痛然治腎虛腰痛宜補腎火耳然火非水不生不補水火無水制痛亦不止必於水中補火水火既濟腎足痛自除用補虛利腰湯熟地一兩杜仲白朮五錢故紙一錢水煎連服四劑自愈故熟地補腎水白朮利腰臍熟地不至呆補杜仲故紙補火止腰痛得熟地則不至乾燥調劑相宜故效最捷腰痛日重夜輕小水難澀飲食如故人謂腎虛誰知膀胱水閉膀胱為腎府膀胱火盛則水不能化水反轉入腎中膀胱太陽經也水火雖犯於腎之陰病終在陽不在陰故不治膀胱而治腎用補精填水或添薪益火增腎氣之旺然陰旺陽亦旺腎熱膀胱亦熱膀胱之水不流膀胱之火愈熾必更犯腎宮而腰痛莫痊用寬腰湯車前子三錢苡仁白朮茯苓五錢肉桂一分水煎服一劑膀胱之水大泄二劑腰痛頓寬車前茯苓利膀胱水苡仁白朮利腰臍氣則膀胱與腎氣內外相通加肉桂一分引腎氣外歸於膀胱直達於小腸從陰外泄不返入腎宮則腰痛速愈豈偶然哉大病後腰痛如折久成傴僂者此濕入腎誤服補腎藥而成者夫腰痛本是腎虛補腎正宜何反受其損乎不知大病後腰痛如折者乃脾濕非腎虛也脾濕當去濕乃用熟地山藥等味濕而加濕正其所惡醫工不悟疑藥味輕益加分兩遂致腰臍河車之路竟成泛濫之鄉傴僂之狀成矣用起傴湯苡仁三兩白朮二兩黃耆一兩防風三分附子一分水煎日服一劑三月全愈此方利濕不耗氣水濕自消加防風附子於耆術中有鬼神不測之機相畏而相使建功實奇萬不可疑藥劑之大少減品味使廢人不得為全人也跌打閃折腰折莫起似傴僂狀人謂不可作腰痛治腰已折其痛自甚何不可作腰痛治或謂腰中有瘀血宜於補腎補血中加逐瘀和血為當不知皆非腎有補無泄加入逐瘀轉傷腎臟折腰內傷腎臟非外傷陰血活血藥不能入腎中必須專補腎惟藥小用不能成功用續腰湯熟地一斤白朮半斤數劑如舊熟地接骨不但補腎白朮善通腰臍氣氣通接續更易但必多用使入大黃白芍桃仁紅花等反敗事若加杜仲故紙胡桃等藥轉不能收功批氣通瘀自去日久血死恐難治然瘀死在腎中終是廢人文守江露宿感犯寒濕腰痛不能轉側人謂血凝少陽膽誰知邪入骨髓之內乎夫腰腎堂也至陰之絡霜露寒濕至陰邪也以至陰之邪入至陰之絡故搐急作痛但至陰之邪易入難散腎又有補無泄散邪必至損真用轉腰湯白朮一兩杜仲巴戟五錢羌活防己五分肉桂一錢蒼朮三錢桃仁五粒水煎服一劑輕再劑止用白朮為君利濕通腰臍氣杜仲相佐攻中有補腎氣無虧且益巴戟肉桂祛寒蒼朮防己消水羌活桃仁逐瘀行滯雖泄實補至陰之邪去至陰之真無傷矣
