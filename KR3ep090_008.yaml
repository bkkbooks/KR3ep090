body:
  text: 卷八瘧瘧先腰痛頭痛且重寒從背起先寒後熱熱止汗出不能即干遍身骨節疼痛小水赤短人謂脾寒誰知太陽膀胱瘧乎瘧即風邪風從太陽入瘧邪獨不從太陽入乎惟冬月風邪入太陽成傷寒何夏秋風邪入太陽成瘧蓋冬風至寒夏秋風至熱風不同病亦異雖無食無痰不能成瘧豈夏秋多痰食冬月獨無乎明是熱風作祟裹痰食不化行陰作寒行陽作熱也痰食遇寒則停住遇熱則流行何反裹痰食不化不知熱風最銷爍諸物明欺痰食易化包藏胸腹中脾胃正氣惡其包藏乃相爭奪於是寒熱酷烈因衰盛分勝負正不敵邪遂狼狽無津液養身骨節所以痠痛正既不敵邪邪更張反截其路小便不能遽出邪火入故短赤宜健脾胃散太陽邪消痰化食邪無恃自散用開邪湯茯苓白朮五錢前胡柴胡人參青皮枳殼山楂半夏一錢甘草五分豬苓二錢白蔻三錢三劑愈此健脾胃則土旺敢與邪爭健脾胃妙在利水化濕引邪直走膀胱膀胱太陽經也邪從太陽入仍從太陽出何其順也邪入本經尤易分消尤妙不專散太陽邪兼表少陽郁蓋少陽乃太陽去路早斷之則邪不得不趨太陽原路況消痰化食無不得宜則堂堂之師賊自驚遁發瘧時先熱頭痛鼻乾渴欲飲水目眴不得眠甚則煩燥畏火光厭喧譁人謂熱瘧誰知陽明胃瘧乎陽明胃多氣多血邪入陽明其勢自大胃容水穀宜足容邪邪入何反作祟蓋水穀正資盜賊糧也如賊居小處勢不能張賊不舒展也乃突圍而出入通都大邑足供其欲流毒必加倍後必貪心未厭放搶四郊橫掠旁郡陽明胃邪亦如之胃中水穀本充飢渴耽耽虎視索水救內炎水愈多渴愈甚渴甚多飲則水停心胃心氣為水遏不得下交腎則心腎兩開何能寐心不能下交於腎則腎畏火炎又何敢上交於心滋心液自心無所養煩躁生煩躁生火邪更熾傷火更畏火勢也畏火者喜靜喧譁動之極也安得不惡勢必急泄陽明胃熱邪然火邪居胃燥干津液胃氣必虛使不補正則正氣消亡邪益跳梁故須於補中以泄火邪則正不傷邪亦易解用平陽湯乾葛二錢人參貝母石膏三錢茯苓白朮麥冬五錢橘紅柴胡一錢四劑愈此參術助脾胃氣乾葛石膏泄陽明火邪貝母橘紅消陽明痰食麥冬滋肺柴胡舒膽茯苓泄太陽滯攻補兼施彼此相制邪自就撫瘧初發往來寒熱口苦耳聾胸脅脹悶作痛或嘔或不嘔此少陽膽瘧也風邪必不敢遽入於臟每伏於半表裹乘虛弱而後深入進與陰爭則退與陽爭則熱半表裡少陽地也瘧發必有寒熱寒熱往來適少陽所主口苦膽汁外泄耳聾膽氣不舒胸脅脹悶作痛膽血有滯或嘔或不嘔膽挾痰食上衝也治瘧法雖多大約不能外少陽況病原少陽烏可舍少陽別治但少陽瘧分偏陰偏陽偏陰多寒偏陽多熱有純熱無寒純寒無熱皆正少陽造其極補偏救弊總不可離少陽用和瘧湯柴胡三錢當歸一兩茯苓白朮生薑白芍五錢半夏山楂青皮一錢甘草五分三劑愈此無一味不入少陽經絡又無一味不入脾胃臟腑祛邪復補正解表隨固里真和解仙丹非特祛瘧神劑發瘧先寒作顫後變熱面色蒼白善太息甚者狀欲死或頭疼而渴人謂寒熱相間之瘧誰知厥陰肝經之瘧乎肝瘧由少陽膽入使肝木自旺則少陽之邪何敢深入今肝虛邪遂乘入肝氣本急邪入肝中反兩脅不脹滿肝太虛也蓋肝旺必怒不怒但太息者肝弱極不敢怒又惡邪侵力不能制無可如何之勢也甚如欲死者因力難制邪情願死殉氣逆不能發聲非真死也氣逆火升於上不易下降咽喉自存火氣作渴宜急補肝以祛邪不縱邪以伐肝用補肝祛瘧湯當歸白芍生首烏一兩鱉甲三錢茯苓五錢青皮柴胡甘草一錢半夏二錢二劑愈此不祛邪全補肝氣肝旺邪氣難留得柴胡引出少陽則邪有出路自然易解發瘧先寒後熱寒從腹中起善嘔嘔已乃衰熱過汗出乃已人謂感邪作瘧誰知邪盛太陰脾經乎脾濕土原易生痰痰生食本難化又風邪合自易成瘧各經瘧俱宜兼顧脾土豈脾自病反置不補乎惟脾濕土其性難溫補脾兼補命門火則土得溫和之氣痰濕自化痰濕化風邪無黨難於作慝欲久居於脾不可得矣用溫脾祛瘧湯白朮一兩茯苓山藥芡實五錢人參三錢肉桂炮薑橘皮半夏甘草一錢白蔻三粒三劑全愈瘧多本於脾寒此尤治脾寒聖藥凡脾胃虛寒得瘧無論一日二日皆神效發瘧寒熱俱盛腰痛脊強口渴寒從下起先腳冷由腿而臍由臍冷至手頸以上則不冷人謂寒瘧誰知少陰腎瘧乎此須補陰為主倘開手用祛邪藥必變四日兩發蓋此瘧原是內傷於陰邪乘陰虛遁入耳初起用補陰加散邪藥隨手奏效無如人但去邪不補正遂至陰愈虛邪益深然邪乘陰虛入仍補陰陰盛邪自退用退邪湯熟地生首烏一兩當歸鱉甲茯神山藥五錢白芥子人參三錢柴胡五分四劑愈此補腎真陰何以加人參柴胡舒少陽氣健脾胃土不知邪入腎經在治法勢必提出少陽半表裡而後風邪易散又恐柴胡入至陰提出至陽非人參則升提無力故用以健脾胃土有生氣陽足以升陰也況鱉甲首烏入陰攻邪邪何能久戀不去乎及陰越出於陽陽氣不虛豈容邪存在陰陽並攻邪自卻走四日兩頭髮瘧終年不愈但熱不寒雖有汗不渴每發於夜人謂陰虛極誰知陽衰極乎陰平陽祕則邪不能犯邪入每乘陰陽之虛瘧邪亦然然瘧必先入陽後入陰入陽發近入陰發遠入至陰其發更遠四日兩發者乃內經云間二日之瘧即邪入至陰也邪入至陰最難祛逐以陽氣衰微不敢與邪相戰邪安居至陰有無可如何之勢邪正不兩立正不容邪邪每欺正今邪居至陰竟安無事是邪正兩不相分竟忘其為邪也如強梁奸主婦初則相爭及主負創不敢入室反客為主鵲巢久居主婦必欲祛除力難制縛不得已偷安同夢忘其夫之在外倘主奮勇鄰朋相助與強梁戰婦必內應可連戰取勝此瘧實同必大補陽氣後益攻陰則邪出與陽角始成功倘謂陰虛用滋陰藥邪且樂得相資雖佐祛邪彼且緊閉至陰之藏不能入愈堅不出之念矣用升陰祛邪湯人參生首烏鱉甲熟地一兩茯苓棗皮五錢肉桂柴胡一錢白芥子三錢二劑寒熱交戰病反重四劑愈此陰陽兩補意重補陽陽旺敢與邪鬥初服陽與邪戰故病重兼補陰者助其陰邪不敢重回至陰內用柴胡提陰氣交陽則邪亦從而出一遇陽氣則彼此大斗又鱉甲首烏智勇絶倫邪自披靡而遁哀哭過傷痢後成瘧困倦甚人謂瘧母未消誰知陰陽兩虧陰陽正氣旺邪不能侵正衰邪不肯散是瘧之盛衰全視陰陽之衰旺下多亡血亡陰也悲哀傷氣傷陽也陰陽兩虧正虛極何能與邪爭聽瘧邪往來為日數間止邪盛則盛邪衰則衰邪反為主正反為客矣宜助正以祛邪不可攻邪以損正倘惟事攻邪則正愈虛汗必大出陰虛陽散而死用救衰湯人參黃耆一兩白朮二兩炙草一錢當歸五錢半夏三錢十劑愈此補正氣又加半夏消痰蓋瘧正藉痰而久居惟補正消痰則正自旺痰自消痰消正更旺方妙在半夏則補非呆補消非峻消瘧卯刻寒起至酉方熱至寅方休只蘇一時人謂風邪入營衛誰知寒氣入陽明乎足陽明與衝脈合宗筋會氣街房事後陽明與衝脈之氣皆奪所用其中必虛寒邪乘之而入舍於二經二經過脛會足跗上因邪相舍二經之陽日虧不能滲榮經絡故痁行不能止宜補二經虛兼散寒邪則陽氣自旺寒邪難居得汗可解然足跗道遠非多加藥餌不能到用解寒湯人參五錢白朮一兩附子三分蒼朮三錢川芎二錢柴胡五分二劑汗出愈用參術補氣芎柴蒼朮發汗附子引陽明衝脈宗筋氣街之所自氣無祕塞邪散無閉結瘧發於寅申巳亥日者人謂痰瘧亦有辨夫晝發為陰中之陽夜發為陽中之陰故晝發於巳退於申巳陽申陰也夜發於亥退於寅亥陰寅陽也以此辨之雖然陽病在氣虛陰病在血少然無痰無食終不成瘧消痰化食寧異且痰食不消結成瘧母要不離乎肝氣鬱結以克脾土疏肝健土則脾胃氣旺痰食自化是治肝以治瘧陰陽正不可異也用疏肝兩消湯當歸白芍茯神三錢陳皮半夏厚朴甘草白芥子一錢柴胡二錢白朮五錢氣虛加人參三錢血虛加熟地八錢八劑必大汗愈此陰陽兩治法妙在陰中引陽以出陰分陰又不傷陽中引陰以離陽分陽又無損兩相引陰陽正氣日盛自兩相制陰陽邪氣自消況氣虛加參助陽血虛加熟地滋陰又陰陽分治何瘧不除虛多言傷氣咳嗽吐痰久則氣祛肺中生熱短氣嗜臥不飲食骨脊拘急疼痛發酸夢遺精滑潮熱出汗腳膝無力人謂勞怯誰知先傷於氣乎傷氣傷肺也肺傷則金不生水腎無化源又何以分余潤養臟腑乎此肺所以生熱也肺熱清肅之令不行膀胱之不化脾胃俱失運化之權土虧金益弱金弱水益虛水難養肝木燥水不灌心火炎木燥侮金火炎克肺欲氣再旺得乎氣衰則不能攝精精涸不能收汗汗出不能生力故骨脊痠疼飲食懈怠欲臥不可得必先補肺兼補脾胃蓋脾胃肺母也用益肺丹人參白朮當歸山藥芡實三錢麥冬五錢北味三分柴胡荊芥五分二十劑諸症愈或疑損肺者益氣未聞損氣者益肺今何益肺氣旺乎不知傷氣傷肺也補肺兼補脾胃雖益肺實益氣也肺衰則氣衰肺旺則氣旺氣衰可不補肺哉補肺又何能捨脾胃哉失血後不節勞慎色內熱煩渴目生花見火耳蛙聒蟬鳴口舌糜爛食不知味鼻孔乾燥呼吸不利怠隋嗜臥又不安貼人謂癆瘵之漸誰知傷血乎肝主藏血失血肝不藏血也然肝何以不藏非大怒動血必大勞損血動與損各不同補養則一無如酒色財氣皆動血之謀耳目口鼻皆損血之竅養血無方補血缺藥失血往往難痊倘早用平肝止血藥何至瀕傷不救但因失血成損不急補血則已損者何以來復未損者何以不傷然徒補血血不驟生已敗之血損其內情欲損其外亦必死蓋補血須補氣養血宜益精使陰陽兩資於上下肝臟之血已損者能增未損者能固用緩中湯當歸白芍熟地人參一兩甘草炒荊芥一錢山藥麥冬五錢三七根末三錢黑薑炭五分三十劑愈此氣血同補然補氣少補精血藥多以失血畢竟陰虧多補陰少補陽則陽生陰不至太亢陰制陽不至太微自氣行血中以生血即血固於氣內以藏血尚有走失哉況荊芥引經三七薑炭止血自無不咸宜入房縱欲不知葆澀形體瘦削面色萎黃足軟膝細腿搖皮聚毛落不能任勞難起床席盜汗淋漓此因損精也陰精足者其人壽然世無精足之人故腎有補無瀉世無精足何不盡患病亦節與不節耳貪片刻歡損百年壽不可悲乎夫泄精緻死本自速其死然未致死醫宜救其生法不外填精然泄精既多不特傷腎且傷脾脾傷胃亦傷矣胃為腎關胃傷關門必閉補精藥安能直入腎宮是補腎須補胃脾胃又相表裡故填精藥宜合三經同治用開胃填精湯人參麥冬棗皮茯苓三錢白朮五錢熟地巴戟一兩北味一錢肉蔻一枚三十劑頓愈方雖難起死實可填精人亦加意用之乎行役勞苦不休致筋拳不伸縮不弛臥床呻吟身疼痛肢痠麻此非痿實傷筋也筋屬肝肝衰旺筋亦如之損筋損肝也補肝可緩乎然腎生肝水足肝旺水虛肝衰故筋衰補肝肝衰仍須補腎然補腎肝固受益能禁日取給乎更補心氣肝木不必生心肝得腎滋葉條達筋自潤矣用養筋湯白芍熟地麥冬一兩炒棗仁巴戟三錢十劑症盡痊此心肝腎三經同治凡三經病通治非獨治陽明筋症在人變通也久立腿痠立而行房足必無力久之面黃體瘦口臭肢熱盜汗骨蒸人謂瘵病誰知起於傷骨乎骨立全賴骨髓無髓則骨空何所恃以立乎是無髓而傷骨非傷骨即無髓然傷骨亦能耗髓況立行房骨與髓兩傷乎傷髓即能傷腎且欲立而不能況並傷骨又何能不痛哉且精足而後髓足髓涸者腎水先涸腎水涸則精少不能化髓故骨空欲補骨髓必先充腎精用充髓丹熟地棗皮一兩石斛沙參五錢骨皮牛膝茯苓三錢北味一錢此填補真陰使水足精滿髓充骨健倘用冷藥補胃或熱藥助陽欲熬津液必成癆瘵非醫之咎乎過喜大笑不止至唾干津燥口舌生瘡渴欲飲水久之形槁心頭出汗人謂陰虛火動誰知陽明火炎乎心屬火乃陽火腎屬水乃陰水陰水得陽火而爍干陽火須陰水以灌溉心火非腎水相交不能止炎上之性惟是腎水無時不交心心中無液則心必燥何心頭偏出汗不知喜主心心喜極反傷心蓋喜極則心氣大開津不上於唇口盡越於心頭之皮肉故腎津即化汗何能上濟於廉泉明是心氣截流斷塞也不必補腎水仍補心氣廉泉穴自通用通泉飲炒棗仁麥冬一兩天冬人參丹參三錢柏子仁三錢北味甘草遠志一錢當歸五錢三劑全愈此補心氣又生津液何必補腎以通源用心思慮太過精神恍惚語言倦怠忽忽若失腰腳沉重肢體困憊人謂祛成誰知心勞傷神乎心藏神神久安於心者心血旺也思慮無窮勞其心矣心勞則血沸沸則血漸耗耗則神無所養恍惚無定但神宜靜不宜動神動心更動心動血益虧血虧神愈動雖腎水資血不能滋肝木養液不能入寡弱之君勢將出亡將相輔佐無權望強健不得故腰膝肢體沉重困憊用定神湯人參黃耆一兩茯神白朮丹參生棗仁五錢當歸五錢遠志丹砂末柏子仁甘草一錢巴戟山藥三錢白芥子二錢十劑愈此脾胃肺肝同治蓋心為孤主非強臣戴護神必下堂今脾胃肺肝同治則扶助有力心神自旺勞傷自愈勞心經營太過心火沸騰先夜夢不安久驚悸健忘心神憔悴血不華色人謂心氣弱誰知心血虧乎心君宜靜不宜動靜則心火不炎腎水自來相濟若動則腎與心氣兩不相交火升水降膜不相關蓋腎水得心火溫則生腎得烈火熬則竭過勞火動烈火非溫火腎畏之不暇敢升以受火威逼乎水不升心愈燥且自焚虛損成不必外邪耗也五臟損至心而亡今心先損不治然各臟腑不損心有取給正有生機補各臟氣自虛者不虛損者不損宜補脾腎肺肝氣用衛主生氣湯人參三錢白朮麥冬北味炒棗仁白芍玄參一兩白芥子二錢二劑愈此五臟兼補藥也然覺獨補心倘補心不補各臟或補一二臟不兼補五臟反偏勝俱非善法任情房戰初則鼓勇而鬥不易泄精久則陽物不剛易於走泄後頻舉頻泄欲忍精獲歡不得骨軟筋麻食少畏寒此腎中水火兩損也久戰不泄命門火旺也腎中無火水不生無水火難養頻泄者水去火亦去矣過於泄精乃腎火不能藏也火不藏水始泄交感興不酣泄精必不多正腎火不大動也火動極水泄極泄極火無水養更易動易動加易泄則水火兩傷欲腎不損得乎必大補腎水不可遽補火蓋水涸補火火且炎上惟補水水足制火且水足火自生用大劑六味湯煎服二月後加桂附補命門火則水火既濟八味水中補火補陽兼補陰故補火無亢補水不寒動即大怒兩脅脹滿其氣不平雖欲忍氣頻耐頻忘頭疼面熱胸膈脹痛人謂肝氣旺誰知肝血損乎肝得血以藏之則性不急惟肝血不藏肝無血養肝氣不舒遂易怒蓋肝氣藏肝血必外越肝血藏肝氣必外疏肝氣泄肝血內生肝血泄肝氣內郁二者相反而相成也易怒者血欲藏不得藏氣欲泄不得泄宜補肝血使藏平肝氣使泄用加味逍遙散白芍一兩白朮陳皮當歸五錢甘草五分茯苓二錢柴胡半夏一錢炒梔子炒荊芥三錢十劑愈方善疏肝氣郁解氣血自和況清火血有寧靜引經血不返還重用歸芍生新輕用半柴解逆故兩收其功不食則飢食又飽悶吞酸溏泄面色痿黃吐痰不已人謂胃氣傷誰知脾氣損乎脾代胃行傳化胃氣全藉脾氣運動胃化其精微不特脾益各臟腑皆受益矣今脾氣傷不能代胃行傳化不特胃氣無生脾不得胃氣之化則脾亦損必脾胃兩損何能分津液以注臟腑必大健胃兼補脾蓋脾胃宜合不宜離離則脾病胃亦病合則胃健脾亦健用益脾湯人參扁豆神麯一錢山藥五錢芡實巴戟白朮三錢砂仁一粒半夏三分茯苓二錢肉蔻一枚服三月胃氣開六月脾壯有益無損此開胃藥多於補脾以脾損由胃虛故補胃自益其脾也終朝咳嗽吐痰微喘少動短氣不足以息人謂心火刑肺誰知肺氣自損乎肺主氣心火刑肺氣必損然形寒飲冷肺亦自損且臟腑雖各有氣然皆仰肺中清肅之氣分布今肺損自衛不足何能分布然雖不能分布臟腑之取給自若是肺氣愈耗且肺腎母腎水非肺氣不生肺不分布各臟忍見子渴死不救乎然杯水難救腎枯自然子病母氣亦盡矣宜大補肺兼補腎水用六味湯加麥冬五味大劑飲之久之腎旺肺亦旺蓋腎旺肺不必顧子也補腎以治肺此善於治肺又加麥味肺之受益無盡何損不愈貪用飲食甚至難化物及過寒之味胸膈飽悶已而疼痛後至起噯吞酸見美味生嗔供芬意憎人謂脾氣困誰知胃氣損乎脾胃雖相表裡然能入不能出者脾氣衰能出不能入者胃氣乏雖胃傷必損脾脾傷必損胃亦必別何經傷使損者多獲其益則胃易開脾易健脾虛腎火寒胃虛心火冷故補脾必補腎火補胃必補心今惡食乃不能食非不能受明是胃虛宜補心火胃氣自開用加味六君子湯人參炒乾姜二錢白朮炒棗仁茯苓三錢陳皮甘草五分半夏一錢附子一片二十劑愈此雖統治脾胃然棗仁薑附補心居重補脾居輕實偏治胃癆瘵恣欲傷精兩脛痠痛腰背拘急足弱遺精陰汗痿靡精神倦怠飲食減少耳如聽風雨聲人謂傳尸癆瘵誰知傷腎癆瘵初起乎夫婦正也何至傷腎怎耐無端圖歡竟至終身害病倘不知節便成癆成癆必失血因而吐痰咳嗽夜熱盜汗畏寒畏熱似瘧非瘧似飢非飢似痛非痛欲食不能食之不化如醉如癡失情失緒思色降精見色動意鬼交夢遺於是發寒發熱骨髓中生癆蟲矣宜補真陰開胃氣加殺蟲用救瘵湯熟地五錢白芍山藥骨皮麥冬二錢沙參三錢北味十粒白薇人參五分白芥子鱉甲茯苓一錢服一年愈然必斷色欲此補陰居多加人參以助胃氣則補陰無膩滯之憂即殺蟲亦非毒藥看之似平配全精良治初起癆神效又方傷腎致生癆蟲必先殺蟲後補腎蓋蟲不去補精僅供蟲用精旺蟲勢愈大與其補中殺蟲不若先殺後補今方雖殺蟲仍不損陰且開胃名祛祟丹鰻魚一條六兩山藥三兩芡實一兩水煮極爛少加青鹽連湯汁一日服完不必吃飯隔七日再食如是三次蟲盡死另服起瘵湯人參白芍沙參一錢茯苓麥冬三錢北味生棗仁棗皮巴戟二錢熟地五錢白芥子五分服二月精旺三月愈二方皆異人傳夜臥常驚或多恐怖心懸懸不安氣吸吸欲盡淫夢時作盜汗日出食不知味口內生瘡胸中煩熱無力思眠唇如朱塗顴如脂抹手足心熱液燥津干人謂腎經癆瘵誰知腎傳心心初受病乎心主寧靜邪不可侵邪侵神必外越腎癆生蟲豈蟲亦傳心邪犯心尚不救況蟲有形乎不知蟲雖有形蟲之氣無形腎氣無日不交心腎中蟲氣烏得不上交腎氣交心心受益蟲氣交心心受損何必蟲入心心始病法仍治腎然治腎而蟲在蟲氣仍在腎心仍受蟲害故救心必須滋腎尤須殺蟲用起瘵至神湯熟地麥冬一兩棗皮茯苓山藥鱉甲五錢芡實白朮三錢杜仲一錢百部二錢肉桂三分十劑蟲死服一月安二月愈此補腎安心惟鱉甲百部殺蟲鱉甲引百部入至陰內妙在補陰不傷髓蟲死腎無異氣心自受益又有麥冬茯術相扶自安奠宮中攸寧殿上咳嗽吐痰氣逆作喘臥更甚鼻口乾燥不聞香臭偶有聞覺芬鬱盡朽腐氣噁心欲吐肌膚枯燥時疼痛肺管內似蟲行干皮如麩片起人謂肺癆瘵誰知心癆傳肺乎肺嬌臟最噁心火克心正火刑肺尚有金實不鳴之症況尸蟲病氣移而刑肺乎然肺之傷者傷於心之火氣心受蟲氣傷自顧不遑何能分蟲氣克肺不知心嫌蟲氣侵不自受嫁禍於肺況肺腎母肺自能交腎腎之蟲氣獨不交肺乎心腎交侵倍重於腎之傳心矣消心中蟲氣不若消腎中蟲氣然心腎兩傷消蟲藥必先經胃蟲未殺胃氣先亡肺氣大傷化源非善也法宜健胃分布津液心腎有益胃無損蟲得而誅用健土殺蟲湯白朮五錢人參白薇前子二錢萬年青一片熟地麥冬一兩棗皮生棗仁三錢貝母一錢六劑漸止三月愈此補胃不助陽消蟲不損液腎足制心心不刑肺實妙法也目㿠㿠面無血色脅隱隱痛熱則吞酸寒則發嘔痰如鼻涕或清或黃臭難聞淚乾眥澀嘗欲合目睡臥不安多驚善怖人謂肝癆瘵誰知肺癆傳肝乎肺本克肝使肝旺肺何能克無如腎癆久不生肝肝弱可知肺乘肝弱將蟲氣交之肝欲拒無力遂順受蟲氣肝腎子腎見子受蟲氣惟恐肝氣不敵出其氣以生肝蟲氣即因生同入況蟲久居腎其齧殘於腎必多安肯久居不出乎蟲蝕肝血肝又何養仍須救腎生肝兼殺蟲用援瘵湯歸芍熟地一兩棗皮茯苓鱉甲五錢白薇二錢二十劑痊服三月全愈此肝腎兩治鱉甲白薇殺蟲不寒不熱無偏勝之虞能補能攻又兩全之道殺蟲於無形起死於將絶非此方歟痰色青黃消痰逐穢俱不入腎肝反傷脾胃況肝受蟲侵正欲移傳於脾幸脾胃土健倘再傷不引蟲入中州乎故大補腎肝其痰自化斷不敢用消痰逐穢再傷脾胃胸前飽悶食不消化吐痰不已時溏泄肚痛腹脹空則雷鳴唇舌焦乾毛髮乾聳面黃黑短氣難續便如黑汁痰似緑涕人謂脾癆瘵誰知肝癆傳脾乎癆傳脾本不救然胃氣一線未絶尚可接續於須臾胃絶萬無生理脾絶胃未絶尚有生機用二白散芡實山藥二斤萬年青四片各炒磨為細末白糖一斤滾水調服遇飢即用以愈為度二味健脾尤補腎故奏功萬年青殺蟲於無形入二味中蟲亦不知何以消藏但不可責近效加人參二兩助胃氣胃氣健脾氣尤易援陰虛火動夜熱如火五更身涼汗時有時無骨髓內炎飲食漸少痰如白沫人謂骨蒸癆瘵誰知腎水不能制火乎腎中水火必須兩平有補無泄斷無有餘之水火火有餘水不足也骨蒸正火旺水虧不必泄腎火但補腎水則水足制火腎既不熱骨髓內又何能熱哉用涼髓丹骨皮丹皮一兩麥冬五錢金叉石斛三錢牛膝茯苓二錢服一月愈地骨丹皮不特補腎水且涼骨髓與消骨外血骨中熱骨外安有不熱骨中髓熱必耗骨外血骨外血熱必爍骨中髓用二味髓血兩治矣髓血既無大熱腎中寧獨熱哉況石斛牛膝補腎真陰陰旺則陽平水勝則火退骨蒸癆瘵又何能成氣虛者氣息短促不足以息迥殊勞役氣急促者賴於言語飲食無味體倦人謂氣癆誰知陽虛下陷乎夫陽升陰降陽氣主升何反降由於內傷元氣也元氣藏關元中上通肺下通腎元氣不傷腎中真陽自升肺肺氣始旺得行清肅分布臟腑若元氣一傷不特真陽不能升且下陷至陰中致發熱此乃虛熱非實熱實宜泄虛宜補故必用甘溫以退虛熱然不用升發以提下陷之陽則陽沉於陰氣不能舉雖補氣無益然不於補中提氣則升提力弱終難於至陰中輕舉之用補中益氣湯參朮陳皮五錢耆歸三錢甘草五分升麻二分柴胡三分貝母一錢十劑愈此方乃東垣一生學問全注於此妙在用升柴於參當耆術內一從左旋升心肝腎氣一從右旋升肺脾胃命門氣非僅升上中二焦氣也陽升陰自降或疑陽氣未必盡陷反升陰氣干犯陽位為變非小不知陽氣不陷未有生病者陽陷人始病升陽而陰降陰亦何能犯陽哉血虛面無色澤肌肉焦枯大腸乾燥怔忡健忘飲食少思羸弱不堪夜熱無汗人謂血癆誰知肝燥生火乎肝屬木木中火盛每自焚然肝生火由於腎水不足木無水潤則木亦為火非失血吐於外即耗血燥於內肝燥肝火生夫木中有水則肝生心木中有火肝焚心故火在心中可取給於肝火在肝中不可取給於心者以肝自顧不暇耳宜先補腎水用滋肝飲玄參白芍一兩丹皮沙參當歸麥冬五錢甘菊茯苓三錢三十劑盡愈此補腎滋肝肝得水滋則肝火不發何致自焚成癆哉飲食太過以致食不能化胸中飽悶久成痞滿似塊瘕非塊瘕惡食每飯不飽面黃體瘦人謂因食成癆誰知脾衰不化乎夫食而思乃胃強已食難受乃脾弱食太過正胃強人恃胃強不論精粗生冷未免損胃胃與脾相表裡未有胃傷脾不傷者然腎氣旺胃雖傷脾不能傷腎火能生脾也故脾氣不足每補腎火而愈今食不消見食而惡是脾傷胃亦傷單補腎火僅生脾不生胃蓋腎火生脾心包生胃也宜兼補心包命門火用助火生土湯人參茯苓三錢耆朮巴戟五錢甘草肉桂一錢菖蒲神麯五分山楂十粒志肉八分二十劑愈此上補心包下補命門中補脾胃火生土健而食消倘補火不知命門心包之異故健脾脾不健開胃胃不開致癆不止抑鬱不伸致兩脅脹悶食減顏色沮喪肢瘦形凋畏寒熱此肝氣不宣下克脾胃也木喜飛揚一遇寒風憂愁便郁不伸上不生心乃下克脾胃脾胃弱飲食自少何能分臟腑醫見悠悠忽忽不飲食疑蟲作祟用消蟲逐穢藥肝不開脾胃反損愈困頓變癆疾而死用順適湯白芍一兩苓術三錢人參甘草五分白芥鬱金香附一錢當歸二錢陳皮三分川芎八分二十劑愈此入肝又入脾胃舒木宣土故奏功僧尼寡婦未字女久離妻欲男子不可得內火爍干陰水致血枯經斷朝熱夜熱盜汗鬼交飲食懈怠體倦肌削面黑人謂瘀血癆誰知乾血瘵乎女子欲火起於肝肝火木中火也火本從木出然肝火宜靜以肝藏血也肝火動則血不能藏火動則血泄再動再泄火動不能遽止故屢動屢泄血安得不枯似宜泄肝火然可暫泄以止炎不可頻泄以損肝用清欲湯當歸白芍葳蕤玄參熟地一兩柴胡錢半丹皮三錢骨皮五錢白芥子一錢十餘劑愈此補肝兼補腎水旺木榮木平火息尤妙補肝補腎仍有開鬱彼徒補肝血泄肝火尚隔一層濕熱積脾胃加食生冷不化久變寸白蟲或蛔蟲腹疼痛面黃肌瘦盜汗淋漓氣怯身弱人謂蟲瘵誰知蟲積不散乎蟲雖濕熱所化然濕熱積本脾胃虛堅土不生蟲以堅無水沃也土鬆則濕積濕積必熱生蟲乃育宜健脾胃仍佐殺蟲則拔本塞源矣用滅蟲湯白朮百部一錢檳榔炙草二錢使君子二十個人參神麯三錢楝樹根五錢陳皮五分黃連三分三劑蟲滅不必四劑此殺脾胃濕熱蟲非殺脾胃血肉蟲血肉蟲每靈濕熱蟲無知小治尚效況用治癆蟲法乎毋怪元氣回殺蟲捷批苦楝樹有種結子者有大毒不可用文守江貪飲致成酒積脾氣損傷五更作泄久之淹淹忽忽飲食少思多嘔吐盜汗淋漓人謂酒癆誰知脾腎虧乎酒從胃入宜傷胃不知酒雖入胃受之者脾脾濕土最惡濕酒性正濕乃移於腎腎雖水臟藏精不藏濕酒氣薰蒸腎受酒毒乃傳脾脾又不能受遂傳大腸而出大腸又惡酒濕不肯久留而遄發飲酒既多下泄必甚下多亡陰安得不病宜先戒酒後解酒毒仍健脾益腎救火土之衰用消酒散白朮棗皮苡仁一兩葛花二錢肉桂三分茯苓三錢三十劑愈此脾腎兩補分解酒濕但酒性大熱宜先解熱何但治濕且用肉桂助熱不知濕不行由命門火衰真火衰邪火自盛真火盛邪火自衰邪火衰邪水自流邪水流邪火益散小兒多食水果肥甘成疳身黃瘦毛豎膚焦形如猴狀如刺蝟人謂兒癆誰知脾胃虛乎小兒純陽不宜虛寒然先天腎無虧後天脾胃斷無損多食果物肥甘正傷傷脾胃脾胃一傷臟腑之氣不能行運後仍食果物肥甘欲不成疳得乎宜補脾胃調飲食傷隨手自效若用膽草蘆薈宣連胡連泄火半夏枳殼檳朴降痰山楂麥芽逐食梔子楝皮殺蟲反損真元無異下石用六君子加減人參二錢苓朮黃耆三錢甘草三分附子一分神麯五分十劑必愈此補脾胃氣病原傷脾胃脾胃一轉後天無損先天自可接續故癆瘵易愈批用奉屎甲三四個焙末同米煮粥食愈審是食疳後用前方調理如蟲疳用椒梅理中湯調理此疳中第一方也文守江感染尸蟲致成癆病症與所感病人無異世謂傳尸癆男自腎傳心而肺而肝而脾女自心而肺而肝而脾而腎五臟後傳六腑死此方士言也傳尸癆感病人之蟲而成蟲入何臟即於是臟見病傳脾而死不必五臟皆傳也彼五臟皆傳者乃自傷腎由腎傳心而肺而肝而脾耳以自傳為傳尸誤矣故治法不同然傳尸蟲雖不擇臟入必須補胃腎為主佐以殺蟲蓋胃氣不敗津液生腎氣不涸火氣伏且胃為腎關胃土能消腎水始足傳尸未有不腎水竭者故二經宜兼補用移尸滅怪湯人參棗皮一兩當歸二蠶砂末三錢乳香末一錢虻蟲十四個火鍛水蛭十四條各為末蜜丸每日百丸服完蟲滅跡古傳祛逐癆蟲藥多損胃腎故不效今用人參開胃棗皮滋腎妙在棗皮又殺蟲用虻蟲水蛭以蟲攻蟲易取勝尤恐有形之物不能深入尸蟲內又加當歸動之乳香開之引直入而殺之也復恐蟲蝕補藥散藥味二蠶沙乃蟲糞蟲見蟲糞必不食參歸棗皮得行其功傳染鬼蛀閣家皆尸蟲病此重於傳尸也蓋傳尸必人死後傳非若鬼蛀之重也此冤鬼相傳然初起亦尸蟲引也其症使人夢遺鬼交沉沉默默不知所苦無處不惡經年漸困至死乃至滅門葛稚川傳獺肝散救人然初起可救已深莫救余用三清丸蒼朮炒半斤人參白薇三兩䗪蟲阿膠鰻魚骨神麯三兩白芍骨皮鱉甲十兩棗皮白朮地栗粉一斤柏子仁不去油四兩沙參五兩貝母二兩肉桂一兩為細末蜜丸早晚各三錢服二月蟲盡死此補陽氣以制陰鬼不敢近滅尸氣以殺蟲則崇不敢藏有益無損倘見補劑懷疑聞毒藥動聽舍神聖之方從狼虎之味殺之不司更施他人使丁亡戶絶傳親害友陽憲陰誅何能逃罪桑中有誓或阻於勢或盡於緣思結心中魂馳夢內漸漸懶食亂言悠悠忽忽日思眠夜善嘆對良羞訴父兄生嫌色憔神喪畏寒熱骨似疼非疼腹如餒非餒人謂瘵成誰知相思惡症乎此症惟得遇情人則鬱開然情人難得醫豈無方大約先傷心後傷肝久傷脾胃宜統心肝脾胃治之多得生毋信相思症必不治正恃此相思為可救蓋思之不得必含怒生嗔必動肝火以克脾胃土然肝動生心心反不遽絶故其狀奄奄似癆瘵其實一線之延正藉肝火以生也用平肝解鬱補心安神益助脾健胃則肝舒火自發不必生脾胃土必氣更安相思漸衰倘加人事挽回何有不愈用遂情湯香附神麯柴胡三分白芍一兩荊芥人參白芥子五分麥冬茯神白朮棗仁三錢甘草一錢二十劑愈此補多於散貴調和不貴爭戰倘作癆瘵治反無生機夢遺用心過度心動不寧致夢遺口渴舌乾面紅顴赤目閉即遺夜或數次疲倦因頓人謂腎虛誰知心虛乎心喜靜不喜勞過勞則心動火起上炎火炎心氣不下交腎腎之關門大開矣勞心非勞腎何腎虛之速如此蓋腎必得心氣相通腎氣始藏精不泄今心動甚是心不能攝腎精焉得不走然心動精泄心未嘗不惡腎之不藏心力不暇攝腎腎未嘗不噁心之不攝欺心不暇察故乘假寐而外泄用靜心湯人參當歸三錢白朮茯神麥冬五錢炒棗仁山藥芡實一兩甘草五分北味十粒十劑不發此補心氣虛不泄心火蓋火動由於過勞是火亦虛火實宜泄虛宜補世認實火誤矣恣欲不厭致夢遺不止腰腳痿軟骨肉痠疼夜熱汗不幹人謂腎火作祟誰知腎水涸乎腎中水火兩平久戰不泄況安臥帷中吾身不動乎是夢遺實水火不得其平耳夫火衰水旺火盛水衰俱令遺較之火衰遺者輕火盛遺者重輕者略補火即痊重者非大補水不愈蓋火易接續水難滋益或疑久戰不泄乃腎火操權夢中不戰而遺得毋火衰乎不知火有權因水有力火得水能久戰失水不能久戰夢遺未有不夢御女善戰者非無水不能戰之明驗乎法不必泄火補水制火可也用旺水湯熟地山藥芡實一兩沙參茯苓五錢北味一錢骨皮三錢此純補精藥絶不用澀以愈澀愈遺也補精水足制火火不動精自止今更用通利藥以夢遺精竅開由於尿竅閉火閉其尿竅水走其精竅矣通尿竅正閉精竅也用澀藥則精竅未必閉尿竅反閉怒傷肝忽夢遺久不止增煩惱泄精更多兩脅多悶火易升頭目飲食倦怠躁脹人謂肝氣動誰知肝血燥乎肝火得血則藏火有血則火不發蓋肝火木中火缺水則木干少血則肝燥肝燥極木中之火不自養乃越出外往來心腎間遊魂無定而作夢夢多淫者肝木虛也肝木性慈仁好交女子女子柔順委婉兩性相同故遊魂外出遇女魂即交而夢宜補肝血少泄火則火不旺魂自歸何夢遺之有用潤木定魂湯當歸白芍一兩甘菊金櫻子三錢北味甘草五分茯苓白朮五錢炒梔子一錢六劑止十六劑不發此寓泄於補寓止於通反能歸魂於肝澀精於腎倘不補徒泄不泄單止肝無血養魂何能歸搖搖靡定夢且不斷遺何以止心氣素虛難久戰又思色心中怦怦遂夢遺陽痿不振易舉易泄先夢遺後不夢亦遺見妖婦心動聞淫聲色移往往走失不止面黃體瘦自汗夜熱人謂心腎兩虛誰知心包火大動乎心包相臣心氣旺則心包奉君令不敢上奪其權心氣衰則心包奉君令反行其政甚且正令不遵邪令恐後久之君弱臣強臟腑惟其所使心君亦以國柄任之無疑聲色自娛不知節用即君少悟威勢下移無可如何初或計出入久且聽自然費用不支國不匱乎宜補心衰泄心包火則夢遺可止自遺亦收用強心湯人參一兩茯神當歸巴戟山藥芡實玄參五錢麥冬三錢北味五分蓮子心三分服一月愈三月不發方補心七泄心包三蓋心包旺原因心氣衰但補其心心包自衰故少加玄參蓮子泄心包火但必多服始效積弱之勢由來者久漸移默奪何可責近效素縱欲又勞心後又交合夢遺不止口渴引水多飲又不爽臥不安枕易驚易懼舌生瘡腳心冷腰疼若空腳顫難立骨蒸潮熱神昏魂越人謂心腎虛誰知心腎火齊發乎心火必得腎水以相資腎火必得心火以相伏故心火寧靜腎火不能動腎火動正由心火衰火在心自居於衰腎火尚欲搖搖自動況衰而又動乎心腎兩動二火合豈能久存於中火性炎上自上騰坎在離上為既濟離在坎上為未濟火升水降必然之理況二火齊動乎火升極即水降極也心腎氣不開則玉關大開安得而止宜仍補心腎氣足關自閉用兩益止遺湯人參山藥芡實白朮生棗仁一兩熟地二兩黃連肉桂五分二劑止服二月全愈此交心腎聖劑心腎交二火自平況止遺必用澀藥內火煽動愈澀愈起勤書史四鼓不寢致夢遺久之玉莖著被即泄食少倦怠此腎火隨心火奔越也心火易動難靜心動一日全賴夜寢則心血歸肝腎水來滋惟過勞其心則心血耗損血不歸肝而火熾心火沸腎不敢交況腎又本來水虧其火更旺火以引火心火乘之入腎客於下焦以鼓其精房精不閉藏而外泄玉莖著物即遺似猶有厥氣客之不知精魄失依神無所託遇物即有倚附之意此正氣虛絶欲脫象也用絶夢湯人參茯神白朮兔絲子丹參當歸蓮子片炒棗仁沙參三錢麥冬芡實山藥五錢熟地玄參一兩北味一錢陳皮三分三十劑愈此安心補腎聖藥蓋合心腎兩救也人疑火盛極宜止火不知勞心乃虛火非實火實可泄虛可補故大補心腎虛火自安若執心火為實大用寒涼生機頓失夜脊心覺如火熱因夢遺人謂河車火燒誰知腎水涸乎河車之路即脊骨之椎脊骨乃腎水之路亦腎火之路水火既濟河車之路安水火相勝河車之路塞者無水灌注也無水相通火上炎成熱脊心安得清涼火上炎水自下流救在上之火炎必先沛在下之水涸水足火息黃河始可逆流用挽流湯熟地二兩山藥白朮玄參一兩澤瀉三錢北味二錢棗皮五錢二十劑愈夢遺症愈澀愈遺何此方純補水過於酸收不知河車之路最喜酸收否則水不逆流終日夢遺成順流之勢水順流火逆沖矣酸收之味妙用酸收於沋渥中則逆流而上可救中路之火焚火降水升何致下遺故脊熱除夢遺斷陰陽脫久戰樂極情濃大泄不止精脫繼血氣喘而臥人謂陽脫誰知陰脫乎世謂男脫精為陽脫女脫精為陰脫不知男女俱有陰陽脫夫脫症俱宜治陽蓋精脫精已盡亡是無陰只存陽氣耳惟急救陽使陽生陰苟陽氣一散不救況陰遲陽速徒補陰迂緩何濟於事故必救陽為先倘執補陰之說脫症陰已絶根又從何處補起是補陽可續陰補陰難引陽然精盡繼血似血亦宜止然止血不外澀藥內已無陰何能閉塞不若補氣之劑以助陽旺陰自能生陽引而陰陰亦易援陰得陽而生陰血得氣而生血陰陽交濟氣血交通自精生血閉用續陰救絶湯人參二兩白朮三兩附子一錢巴戟一兩四劑可不死此補陽氣聖藥人參回接續於無何有之鄉白朮利腰臍氣附子追散失之元陽尤妙巴戟補心腎陰仍是補陽藥則陽回陰亦回矣徒用朮附巴戟亦可奪命於須臾然無參為君主則附子之熱無以駕馭恐陽旺陰衰然能以補陰藥接續亦不致偏勝婦盡情浪戰致虛火沸騰陰精下脫死而復生頭目昏暈止存遊氣人謂陰脫誰知陽脫乎女子主靜不主動最難泄精以滿身純陰只存陽氣耳男子成仙者采女子之陽為仙母然採者多得者少是女子之陽最不易泄凡女子泄精必自動極始漏泄漏泄時樂有不可言者正泄陽氣也陽氣泄將一身骨髓真陽盡由胞胎之管噴出亦只泄氣非泄精但火動極則肝氣大開血不藏矣血不藏精亦不能固腎中真陰亦隨俱泄此時女子亦動極不能自止故愈動愈泄愈泄愈動至精盡一笑而亡然死而復生者陽脫未絶耳可不急救陰乎但救陰不能回陽必仍救陽用回陽救陰丹參耆三兩當歸一兩茯神五錢生棗仁三錢北味一錢二劑後又加熟地一兩棗皮五錢服一月復舊先用參以回陽於一時再用地棗善後蓋參能救脫回陽不能救涸填陰先補陽後補陰已脫之精生未脫之氣長庶免陽旺陰消小便時忽寒噤脫去雖無陰精泄然氣泄則精泄人謂中風此陰陽兩脫也膀胱氣化始能小便氣即腎中氣過於泄精則氣不旺氣衰精易泄精泄氣益微小便時脫去者必交感時泄精太多交感時即泄精脫者乃樂極情濃交感後小便時脫者必戰敗陽痿故泄精脫多可生小便時脫每難救彼有陰陽之根此逢陰陽之絶也倘脫去昏暈外勢入者尚可救急拽其龜頭不使縮入後用生人湯生棗仁五錢人參二兩附子三錢白朮四兩菖蒲一分二劑改用補陰回陽湯熟地二兩參朮棗皮一兩茯神三錢肉桂一錢白芥子二錢服二月愈前方回陽於無何有之鄉後方生陰於可續之際自陽回陰不驟絶陰生陽不太旺陰陽兩平安得不活或問龜頭縮何反可救蓋龜頭縮入明是寒極寒極者死猶有生機者陽氣未絶耳使陽已絶龜反不深入深入陰欲入陽之兆也故陽藥急救效大便時忽昏暈脫者目上視肢冷牙關不收不能言人謂中風不語誰知陰脫乎大便開合腎主之也腎水足便無燥結腎水衰便自滑利腎氣有虛實腎水即有盛衰腎水有虛衰大便即有燥滑然大便滑燥大腸受之病亦宜在大腸大腸病何能遽絶蓋大腸過燥則火爍水而陰絶過滑則水滅火陰亦絶大腸何能陰絶仍絶於腎耳腎絶大腸亦絶故腎脫大腸亦脫仍救腎絶而已用六味地黃湯熟地二兩棗皮山藥一兩茯苓八錢丹皮澤泄六錢服一月愈此非救脫方然腎水枯腎始絶滋腎水如大旱得甘霖溝洫間生意勃然是補水正救腎絶也腎不絶豈大腸得水反不能救脫乎但聞女人聲淫精流出不止雖非陰陽脫症然正其漸也夫陽吸乎陰則陰不離陰攝乎陽則陽不走久戰不泄不特腎火旺亦腎水旺然腎水衰腎火易動腎火衰腎水難靜且久戰非但腎中水火旺亦心中水火旺心火旺腎火不能奪權心水旺腎水不敢移柄惟心少水腎水始下竭心少水腎水始下移聞女聲淫精即出心中水火虛極也心虛極搖搖不能自主腎中水火隨心君之動而泄若流不止正陰陽將脫尤危症急大補心腎用交濟湯人參棗皮黃耆當歸五錢熟地麥冬一兩柏子仁三錢龍骨醋煅二錢黃連肉桂五分十劑止三十劑愈此心腎兩補少加澀藥使玉戶自閉不至經絡大開蓋心腎不交玉戶之關既易開心腎交玉戶之關反難開聞聲流精精原離腎宮故聞聲隨出亦關門大開耳故用澀於補淋小便流白濁如米泔如屋漏水或痛如刀割或澀如針刺溺溲短少大便後急人謂白淋誰知膀胱壅乎此症多因入房不得暢泄精臨泄時必由腰腎上趨夾脊透泥丸下喉嚨百節骨髓同趨陰器出倘少遏抑精即止中途欲還故宮不可得不得已走膀胱隨溺泄膀胱化水不化精且與腎相表裡尤不肯將腎精外泄故口閉塞精不得出膀胱因精在外不敢化水水不行水熾矣於是熬乾水液精變為濁遂下潤於膀胱膀胱仍不受乃自流陰器出宜泄膀胱火佐之利水則火隨水流精隨火散用散精湯白朮劉寄奴一兩前子五錢黃柏五分一劑愈此用白朮利腰臍氣車前利水黃柏泄膀胱火尤妙劉寄奴分清濁性速無留滯之虞小便流赤濁似血非血似溺非溺管中疼痛人謂血淋誰知氣虛血壅乎氣旺血行氣衰血閉今氣衰何血壅蓋氣虛人多不能忍精而戰不能忍必欲忍則精塞水竅氣衰不能推送以出水竅外積而內敗化膿血精化血無所歸仍流膀胱膀胱不能化血隨其自流相火又作祟故疼痛但精化血必不多何以日流不止不知精既化血血以引精何所底止宜急止血然止血必補氣蓋氣能化血也用斷血湯黃耆一兩當歸五錢三七根末茯苓丹皮三錢二劑愈方用黃耆補氣當歸補血氣血旺不難推送敗濁況所化精血久出所流仍舊血非敗血今用補氣藥新血生舊血自止況三七根又善止血更妙在丹皮清血中火茯苓分水中血自清濁不混壅血疏通世每以濕熱治何哉小便中溺沙石其色不一堅實如石投熱湯中不能即化溺時疼痛欲死用盡氣力始溺出後快此因入房又行路涉水或沐浴而成者人謂砂石淋誰知腎火煎熬乎腎火盛由於腎水衰入房必泄精精泄水虧矣水虧後火未能遽息加之行役勞筋骨火且大動此腎火乃虛火沐浴涉水外水乘腎氣虛直入遏火火不敢外散反閉守腎宮自熬腎水腎水乃至陰水猶海水海水得火可成鹽腎水得火必成石淋但腎原有水火何外水遏火反沸蓋外水淡腎水咸腎火喜咸畏淡一遇淡水腎火遂結不伸乃行氣於膀胱煎熬鹹水成石宜通腎氣利膀胱膀胱利腎火亦解腎火解砂石自化用化石湯熟地二兩茯苓棗皮玄參一兩苡仁澤泄麥冬五錢十劑全愈方妙在不治淋反補腎苡苓淡滲解鹹味麥冬玄參散火氣地黃棗皮滋腎水又取甘能化石咸能消石也又慮滯而不行留而不走益澤泄之咸咸以入咸且善走攻堅引群藥入腎中又能出腎外迅逐於膀胱之裡而破塊倘不補腎惟治膀胱氣不得出又烏能化水感濕成淋下身沉重溺管不痛流清水非白濁人謂氣虛誰知濕重成淋乎五淋此症最輕然最難愈以濕不止在膀胱經也濕從下受宜感足今足不腫變淋是濕不入皮膚入經絡且由經絡入臟腑矣然濕入臟腑治臟腑之濕經絡之濕宜盡散何難愈蓋濕必乘虛臟腑虛始入泄濕必損臟腑氣氣損不能行水濕何能泄濕難泄淋必不愈故治濕必利氣利氣始能治淋用禹治散茯苓白朮苡仁一兩前子三錢方利水不耗氣分水不生火勝五苓散蓋豬苓澤泄過於疏利肉桂大熱過於薰蒸此方不寒不熱能補能利服十劑凡濕症盡消不能淋病速愈春夏或風雨侵膚暑氣逼體上熱下濕交蒸鬱悶成淋絶無驚懼忍精之過此腎火虛感濕熱也腎寒火不足以衛身外邪乘腎虛直入幸腎水併力外護不深入客於腎外腎與膀胱相表裡腎外廓膀胱也濕熱入膀胱代腎火以行氣化之令然膀胱必得腎正氣始能化濕熱邪氣故熱不化水熱且助火而為淋急宜逐膀胱濕熱以清化源然濕熱雖去腎氣弱終不能通氣於膀胱愈淋症且有變症必於利濕熱更益腎氣用通腎祛邪散白朮一兩茯苓苡仁五錢瞿麥扁蓄一錢肉桂三分前子三錢此解濕熱又不損腎氣故腎氣反通轉分解濕熱淋愈腎受益有何變生交感雷驚忽人至不得泄變白濁溺管疼痛如針刺人謂精內敗誰知膽氣阻塞乎膽喜疏泄膽氣流通則十二經皆決於膽今膽受驚收攝過多十二經氣不能外泄精亦阻而不流畜於膀胱陰器聽膽氣一決膽氣不伸自顧不遑何能取決故為淋壅塞艱於出宜抒膽氣加導水則膽氣伸得決其一往之氣自水通精化用助膽導水湯竹茹前子蒼木木通苡仁三錢枳殼滑石一錢白菊五錢豬苓二錢四劑愈方雖導水居多仍是抒膽藥故膽氣開淋愈痢時小便閉塞溺管作痛變為淋人謂濕熱盛誰知清濁不分乎夫夏感濕飲涼水或過用茶瓜皆成痢是濕熱成痢又何疑但濕熱留腸胃宜從大便出今從小便出者是濕熱甚奔迫甚急大腸不及流乃走膀胱膀胱得濕熱則肺金清肅之令不行欲化溺不得遂變白濁而滲出故清濁不分言膀胱而非言二腸也不然水穀由小腸入大腸豈小腸受水大腸受谷乎正水入膀胱清濁之分全責其變化之奇今因濕熱不能化非膀胱病乎膀胱氣化而能出者火也濕熱非火乎何反變白濁不知膀胱寒溺頻出膀胱熱溺不能出白淋是熱仍出者以濕雜之也且膀胱得火化溺者乃真火非邪火真火化溺易出邪火爍溺難出濕熱正邪火法宜清膀胱邪火兼逐大腸濕熱痢止淋亦止用加減五苓散茯苓炒梔子三錢豬苓檳榔二錢澤泄白芍五錢白朮五分八劑愈此利水多治痢少何痢先愈淋反後愈蓋痢本濕熱所成利水則濕熱易解水不走大腸盡走膀胱膀胱反難滲水之速故少遲
