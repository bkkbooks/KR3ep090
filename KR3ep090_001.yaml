body:
  text: 卷一傷寒冬月傷寒發熱頭痛汗出口渴人謂太陽證誰知太陽已趨陽明若徒用乾葛湯治陽明則頭痛不能除若徒用麻黃湯治太陽則汗不能止口渴不能解勢必變症多端法宜正治陽明兼治少陽蓋邪入陽明留於太陽者不過餘邪治太陽反傷太陽矣故太陽不必治宜正治陽明蓋陽明多氣多血邪足恣其凶橫如賊入通都大邑其搶掠之勢較窮鄉僻壤自不同所得之物足以供其跳梁故邪入陽明挾其腑之氣血炎氛烈焰往往然也豈可以輕小之劑望其解散必須大劑涼藥始可祛除其橫暴用石膏一兩知母二錢麥冬二兩竹葉二百片茯苓人參三錢甘草柴胡梔子一錢一劑頭痛除二劑身熱退汗止口不渴此即白虎湯變方用石膏知母泄陽明火邪柴胡梔子斷少陽路徑妙在用麥冬至二兩以清補肺氣使火邪不上逼更妙用茯苓引火下趨膀胱從小便出太陽餘邪盡隨外泄至於人參甘草竹葉取其調和藏腑所謂攻補兼施也或懼前方太重則清肅湯亦可兼載以備選用石膏五錢麥冬一兩知母甘草人參柴胡梔子各一錢獨活半夏五分批集中未注煎法者俱系水煎服各卷仿此冬月傷寒發熱口苦頭痛不欲飲食腹中時痛人謂太陽症誰知是少陽症乎傷寒未有不從太陽入者由太陽入陽明由陽明入少陽者傳經次第也何以初入太陽即越陽明而入少陽人謂隔經之傳孰知不然蓋少陽乃膽經膽屬木木最惡金肺屬金主皮毛風邪之來肺金先受肺欺膽木之虛即移邪於少陽故太陽往往多兼少陽同病者此耳然此症乃二經同感非傳經之症治法似亦宜兼二經同治而又不然單治少陽太陽之病自愈方用柴胡二錢白芍五錢甘草陳皮一錢黃芩神麯一錢白朮茯苓三錢一劑熱止二劑腹不痛頭不疼口亦不苦此即逍遙散之變方何治傷寒如此之神不知病在半表裡逍遙解散實邪表裡之邪既解太陽膀胱之邪何能獨留況方中原有白朮茯苓三錢以利腰臍通膀胱之氣乎余所以止加神麯黃芩少解胃火和脾氣諸症所以盡除此用舒經湯亦佳薄荷白朮二錢白芍茯苓五錢甘草八分黃芩一錢桂枝三錢冬月傷寒發熱口渴譫語時發厥人謂熱深厥亦深疑厥陰症誰知太陰症乎夫太陰土與陽明胃相表裡表熱里亦熱此胃邪移於脾經也此症最危蓋人以脾胃為主脾胃盡為火邪所爍腎水有不熬干乎宜急救脾胃然救脾而胃火愈熾救胃而脾土立崩此中消息最難然終何以救必速救腎水之枯玄參三兩甘菊熟地一兩麥冬二兩芡實五錢名救枯丹用玄參以散脾胃浮游火甘菊以消胃邪麥冬以滋腎液熟地以生腎水庶幾滂沱大雨自天而降大地焦枯立時優渥何旱魃之慮哉又恐過於汪洋加芡實以健土又仍是腎經藥則脾腎相宜得其灌溉之功絶無侵凌之患此立方之所以神也故一劑譫定再劑渴除三劑厥止身涼此症用清土散亦效石膏麥冬生地各一兩甘草一錢銀花五錢白朮三錢冬月傷寒大汗而熱未解腹又痛不可按人謂邪發在外未盡內結腹中陽症變陰之候余以為不然傷寒汗大出邪必隨出宜無邪在中何又腹痛此乃陽氣盡亡陰亦盡泄腹中無陰相養有似邪之內結作痛此陰陽兩亡急症夫痛可按為虛不可按為實何以此不可按又謂虛不知陰陽兩亡正在將絶不按痛且難忍況按又傷腸胃安得不重增其苦所以不可按也此急症不可緩用急救陰陽湯人參白朮熟地二兩當歸甘草三錢黃耆三兩一劑腹痛止身熱解汗盡止方用參耆補氣使陽回於陰內歸地補血使陰攝於陽中朮草和脾胃而通腰臍使陰陽歸於氣海關元則亡者不亡絶者不絶倘認是陽症變陰純用溫熱加肉桂薑附雖能回陽於頃刻然內無陰氣陽回陰不能攝亦旋得而旋失用救亡湯亦效人參當歸熟地各一兩甘草二錢熟附一片批後方更穩冬月傷寒大汗熱解腹微痛腰不可俯仰人謂邪在腎經欲用稀蘞丸加防己不知此乃發汗亡陽陽虛陰不能濟也陰陽互為其根無陽陰不生無陰陽不化此症汗泄過多陽氣無幾陰又自顧不遑不敢引陽入室陽無所歸故行於腹孤陽無主而作痛腎中之陰因陽氣不歸孤陰無伴不敢上行於河車之路故腰不可俯仰用引陽湯杜仲甘草一錢山藥五錢茯苓二錢芡實人參三錢肉桂三分白朮五錢一劑腹痛止二劑腰痛輕三劑俯仰自適方妙在助陽氣不去助陰蓋陰之所以杜陽者欺陽衰也譬之夫婦好合豈忍永絶良人因夫不慎外侮相爭焦頭爛額狼狽逃回因羞變怒杜絶不許入房倘夫得良朋之益捆載而歸見金多有不變色者乎知必開門迎笑所以助陽兼助陰者此耳倘用豨蘞防己重損陰陽則夫貧婦貧彼此成仇終身反目濟陽湯亦可杜仲二錢山藥一兩甘草故紙一錢人參白朮五錢批加故紙甚當冬月傷寒大汗氣喘不能息面如硃紅口不能言呼水自救人為熱極欲用白虎解陽明火而不知此乃戴陽症上熱下寒若用白虎雖多加人參下喉即亡用八味地黃湯半斤煎湯恣其渴飲必熟睡半日醒來汗必止氣必不喘面必清白口不渴此原不必汗而汗必致大汗汗既大出陽邪盡泄陽盡散陰亦隨之上升欲盡從咽喉外越以皮毛出汗陰氣奔騰不得盡隨汗泄故直趨咽喉大路不可止抑陰既上升陽又外泄不能引陽回氣源源陽亦隨陰而上陰氣逼之不可下故氣喘不能息且陽在上火亦在上者勢也況陰盡上升則腎宮寒極下既無火上火不歸源故面赤上火不散口亦渴呼水自救者救咽喉熱非救腸胃熱實熱多成於胃火胃熱必號咷狂呼今雖喘形症尚寧口欲言而不得非虛熱而何此真上假熱下真寒八味湯妙在補水仍補火下喉火得水而解入胃水得火而寧調和上下灌溉肺腎實有妙用夫發汗亡陽本是傷氣何以治腎而能奏功不知亡陽症內無津液致內火沸騰大補真陰胃得之而息焰胃火息腎之關門閉矣腎關閉胃土氣自生胃氣生肺氣不因而得養乎肺氣生清肅之令行母呼子歸同氣相招勢必下引腎經自歸子舍腎氣既歸而腎中又有溫和春色以相熏汪洋春水以相育則火得水生水得火悅故奏功返火湯亦神熟地三兩肉桂三錢棗皮一兩冬月傷寒發厥面青手冷兩足又熱人謂直中陰寒宜理中湯不知此乃肝氣抑鬱不散風邪在半表裡若用理中必發狂死夫直中陰寒未有不從足先冷者今足既熱非直中肝經明矣邪既不在肝似不可徑治肝然邪雖不在肝經內未嘗不在肝經外邪在門外與主何與而現發厥面青手冷不知震鄰之恐猶而警惕豈賊在門外主人有不張惶者乎勢必執槍刀思禦侮此時而能登高號召勸諭高呼賊知內有防護外恐有應援自易解散倘用理中是以火攻殺賊賊未擒房舍先焚賊且乘火突入殺主而去法用小柴胡湯加減以散半表裡之邪肝氣自安外邪化為烏有柴胡二錢白芍五錢甘草黃芩半夏一錢當歸錢半一劑手溫再劑厥止身熱面青自愈冬月傷寒身熱汗自出惡寒不惡熱人謂陽明之症欲用石膏湯不知非陽明也汗出似陽明然陽明未有不惡熱者今不惡熱而惡寒此陽氣甚虛邪欲出不出內熱已解內寒未散必因誤汗所致用補中湯人參黃耆三錢白朮當歸二錢柴胡甘草陳皮一錢升麻四錢桂枝五分一劑汗止身涼寒亦不惡補中湯東垣用治內傷實有神功不見譏長沙張使君乎不知傷寒亦有內傷不可拘於傷寒不思治變症之方況症因誤汗而成汗已出邪存於經絡者必淺即畏寒寒邪亦不重是外感而兼內傷此方補正有祛邪故兼用成功況又加桂枝散寒乎倘作陽明症用白虎少投石膏鮮不變虛寒而死溫正湯亦可人參當歸五錢黃耆一兩柴胡神麯一錢甘草五分桂枝三分冬月傷寒身熱五六日不解譫語聲低口渴小便自利欲臥人謂陽明餘熱未解余謂不然夫譫語雖屬胃熱然聲必高拂意必怒今譫語低聲非胃熱既非胃熱何口渴欲飲水自救耶然口渴飲水水不能化痰上湧直奔膀胱小便自利其非胃熱又明矣陽明火盛多發狂今欲臥豈是胃熱但非胃熱何譫語口渴不解至五六日耶不知此乃心虛症心虛神不守舍而譫語火起心包而口渴心與小腸相表裡水入心心即移水於小腸而小便自利用清熱散茯苓五錢麥冬一兩丹皮二錢柴胡一錢甘草五分一劑譫止二劑渴除熱解用麥冬補心茯苓分消火熱柴胡丹皮甘草和解邪氣心氣足邪不能侵盡從小腸以泄中心寧靜津液自生故渴除腎氣上交於心精神自長不思臥倘疑胃熱而用白虎鮮不敗衄涼解湯亦可茯神三錢玄參一兩柴胡一錢甘草二分砂仁二錢麥冬五錢冬月傷寒五六日往來寒熱胸脅痞滿或嘔吐或渴或不渴或煩或不煩人謂少陽症宜小柴胡和之小柴胡少陽藥少陽居表裡之間邪入而並於陰則寒邪出而並於陽則熱故痰結於胸而苦滿欲吐不吐欲渴不渴煩悶生用之自易奏功然不可常用何也蓋少陽膽木最喜水其次喜風柴胡風藥得之解慍然日以風藥投之枝葉條達終必乾燥一旦大雨則鬱郁蔥蔥其扶疏青翠為何如耶故用柴胡湯後必須補水用濟生湯熟地玄參五錢麥冬白芍三錢棗皮一錢山藥茯苓二錢柴胡五分神麯三分竹葉一團一劑煩悶除再劑寒熱止三劑愈方多直補腎水直補其膽木之源則膽汁不枯足以禦侮況加柴胡仍散半表裡之邪安得不收功速乎倘疑傷寒後不宜純用補腎藥恐胃氣有傷難以消化不知少陽之症由太陽陽明傳來火燥水涸不但邪逼膽汁半致熬干五藏六府盡多火爍是各經無不喜盼霖雨非惟少陽膽木喜水也補水之藥又何有停隔哉和隔散亦妙柴胡一錢白芍一兩生地五錢玄參三錢麥冬茯苓二錢竹茹一團芥子一錢水煎冬月傷寒發熱至六七日晝則了了夜則譫語如見鬼狀按腹痛欲死人謂熱入血室然不止此雖因經水適來感寒而血結故成瘧狀然未傷寒前有食未化血包其食而為瘧母論理小柴故為正治然此湯止能解熱使熱散於血室中不能化食使食消於血塊內一方最神治熱入血室正相宜用兩消丹柴胡炒梔仁二錢丹皮白芍五錢鱉甲當歸三錢楂肉甘草一錢枳殼五分桃仁十粒一劑痛輕二劑鬼去譫語止腹安杳無寒熱此方既和表裡血室之熱自解妙在用鱉甲直攻血塊內以消宿食所謂直搗中堅虐母何有而作祟乎服吾藥實可作無鬼論清白散亦妙丹皮當歸茯苓三錢柴胡前胡青皮炒梔仁二錢白芍一兩白朮五錢人參半夏甘草一錢冬月傷寒項背強𠘧𠘧汗出惡風服桂枝加葛根湯不愈人謂太陽陽明合病舍前方無藥治不知太陽邪既入陽明自宜專治陽明不必又顧太陽況葛根湯仍用桂枝以祛太陽邪是太陽邪輕陽明邪重方用竹葉石膏湯以泄陽明火前症自愈但不必重用石膏石膏麥冬三錢知母八分半夏甘草二錢竹葉五十片一劑汗止再劑項背強𠘧𠘧盡去風亦不畏倘仍用前方病雖愈消爍津液必多豫更示方法使治傷寒者宜思變計而不可死於古人文內清胃湯亦佳玄參生地五錢知母二錢半夏一錢甘草五分冬月傷寒頭痛𠘧𠘧下利頭痛太陽症𠘧𠘧陽明症二經合病無疑似宜兩解然不可兩治以其下利耳陽明胃土今挾胃中水穀下奔其勢欲驅邪而盡入於陰經若不專治陽明急止其利則陽變為陰熱變為寒害不可言方用解合湯葛根二錢茯苓五錢桂枝三分一劑利止二劑頭痛𠘧𠘧愈蓋葛根乃太陽陽明聖藥況加桂枝足散太陽之邪茯苓不獨分消水勢得桂枝且能直趨膀胱夫膀胱太陽本宮得茯苓淡泄葛根亦隨之同行祛逐其邪盡從小便出小便利大便自止此不止利正所以止利不泄陽明正所以泄陽明兩解之巧無過於此葛根桂枝加人參大妙葛根三錢桂枝五分人參一錢冬月傷寒六七日後頭疼目痛寒熱不已此三陽合病法不可合三陽統治然治何經三陽之邪盡散邪之來者太陽邪之去者少陽欲去者使歸來者使去必須調胃氣胃氣一生陽明之邪自孤勢必太陽少陽之邪盡趨陽明以相援可因其衆而使散如賊散四方擒巢甚難誘其蟻會一城合圍守困一舉受縛用破合湯白芍石膏粉葛茯苓三錢柴胡陳皮甘草一錢方治陽明十七治太陽十一治少陽十二雖三經同治實專治陽明故一劑目愈再劑頭痛除三劑寒熱解皆胃氣得生故奏功速倘不治陽明惟治少陽損傷胃氣少陽且引二經之邪盡遁陰經反成變症和陽湯亦妙石膏五錢葛根白芍二錢麻黃三分柴胡甘草一錢花粉五分冬月傷寒五六日吐泄後又大汗氣喘不得臥發厥此因誤汗人謂壞症不可治大汗後宜身熱盡解今熱不退現此惡症誠壞症也欲於不可治中施治庶幾於不宜汗中救其失汗傷寒至吐泄後上下之邪必散熱未解者邪在中焦也理宜當時用柴胡湯和解自然熱退身涼無如誤汗何誤汗熱仍不退身仍不涼邪仍在中焦此時用前方則虛虛不死何待必大補中氣使汗出亡陽仍歸腠理少加柴胡以和解則轉敗為攻實有妙用救汗用救汗回陽湯人參三兩當歸二兩柴胡一錢白芍一兩陳皮五分甘草一錢冬麥五錢一劑汗收再劑喘定三劑厥不作去柴胡將此方減十之六漸漸調理此救壞症一法也人見人參多用未必不驚不知陽已盡亡非多用參何以能回恐參回陽不能回陰故又佐當歸助參奏功至於多用白芍麥冬恐參歸勇猛使調和藏府二經不相戰克陽回陰中陰攝陽內聽柴胡解紛有水乳之合也何必以多用參歸為慮哉救敗散亦妙當歸麥冬人參一兩白芍五錢柴胡甘草五分北五味五粒神麯三分冬月傷寒汗吐後加大下身熱如火發厥氣息奄奄欲死人謂壞症然亦有可救者其誤下也夫誤下必損胃氣未必不增風寒之勢必須救脾胃又不助邪乃為得方用援下回生丹人參茯苓五錢白朮一兩柴胡五分甘草赤石脂一錢水煎調服一劑泄止厥定再劑身熱解思飲食此時止可少與米湯漸加米粒若驟用飲食必變結胸斷難救同是壞症何前多用參此條少用蓋大汗亡陽勢甚急大下亡陰勢少緩亡陽者陽盡散亡陰者陰難盡亡陽遍身之陽皆泄非多用參不能挽回於頃刻亡陰脾胃之陰盡而後及於腎故少用參即救死於須臾方妙參術以固脾胃腎茯苓分消水濕柴胡甘草以調和於邪正之內赤石脂收澀其散亡之陰此又救壞症法也定亂湯亦神人參山藥一兩茯苓薏仁五錢甘草黃連五分陳皮神麯三分砂仁一粒冬月傷寒汗下後又加大吐吐後遂嘔逆飽悶胸中痞滿時時發厥昏暈欲死譫語見鬼且知人出入此亦壞症也然因誤吐以成於誤吐後思安吐之方舍轉氣救吐湯不可方用人參一兩旋覆花石脂末一錢茯神五錢一劑氣逆轉另用招魂湯麥冬人參茯苓山藥芡實三錢陳皮神麯三分柴胡一錢白芍五錢一劑身涼神魄寧前症盡愈汗下後身熱未解者邪在半表裡宜和解乃不用而妄吐邪隨氣湧氣升下降者汗下後元氣大虛又加大吐五藏反覆自然氣逆不能順氣既逆嘔吐何能遽止胸中無物而作虛滿虛痞神不守舍隨吐越出故陰陽人鬼盡見似宜追魄招魂為急何必先轉氣蓋氣不轉則神魄終不能回所以必先轉氣氣順而神歸也況轉氣仍佐定神之品安得不奏功如響至後反用招魂者非神魄用此招蓋氣虛極用藥順之苟非和平之劑調之未必不仍變為逆招魂湯健脾理胃土氣既生安魄定魂神自長處於心宮然則招魂湯亦養神湯也此又救壞症一法也救逆湯亦可人參二兩白芍茯苓各一兩故紙附子一錢麥冬五錢牛膝二錢冬月傷寒目不見人自利不止此亦壞症此乃誤汗下一誤再誤較前三條更重本不治內有生機者以胃未經吐胃氣且未傷扶胃氣以回陽助胃氣以生陰未必非可救方用漸生湯人參三錢白芍黃耆白朮五錢茯苓山藥芡實一兩甘草一錢砂仁三粒一劑目見二劑利止三劑身涼體輕方妙在緩調胃氣胃氣生臟府俱有生氣陰陽衰者生其陰陽夫衰與絶不同壞症乃陰陽絶非衰也衰易生絶難救不知一線未絶仍是生氣非壞極此正在欲絶未絶故用參苓耆術得以回春倘陰陽已絶安能續乎此又救壞症一法冬月傷寒誤吐誤汗誤下身熱未退死症俱現人謂必死法在不救吾再傳一方名追魂丹人參山藥生棗仁一兩茯神五錢附子一分甘草一錢一劑或大便或汗吐三症止一便有生機蓋陰陽未絶得一相接自能相生如星星之火引之可以焚山誤吐誤下誤汗陰陽未絶因其誤而亡耳陰陽之根自在故得一相引生意勃然服之大便止腎陰未絶吐止胃陽未絶汗止臟府之陰與陽未絶何不可生倘三不一應是陰陽已絶無方可救或問方中純回陰回陽之藥絶不顧邪者豈無邪可散乎使無邪宜熱盡退何又熱如故嗟乎經汗吐下後何邪在身熱未退者因陰陽之虛耳使早用補劑何至如此故只大補其陰陽陰陽回已無餘事若顧邪用解紛之藥又安能回陰陽冬月傷寒八九日腹痛下利便膿血喉痛心內時煩本少陰症治法不可純治少陰然舍少陰必生他症使治便膿用桃花湯則心煩不宜治喉痛用桔梗湯則腹痛不宜我謂二方未嘗不可選用酌定一方名草花湯甘草赤石脂二錢糯米一撮一劑腹痛除二劑喉痛止三劑利愈煩安蓋少陰症脾氣拂亂也故走下便膿血奔上傷咽喉今用甘草和緩之則少陰之火不上後以赤石脂固滑又糯米之甘以益中氣則中氣不下墜滑脫自止又何必用寒涼泄火而化膿血膿血即化中焦又何邪作崇使心中煩悶乎冬月傷寒一二日即自汗咽痛吐利交作人謂太陰病不知此乃少陰腎寒非太陰脾虛也蓋傷寒初起宜無汗今反汗出者無陽固外故邪不出而汗先出此證實以太陰似太陰亦有汗自出之條但太陰出汗因無陽自泄少陰出汗因陽虛自越夫少陰邪既不出腎經不能從皮毛分散勢必隨任督上奔咽喉咽喉之竅甚小如奔馬不能盡泄又下大腸下焦虛寒復不能傳送以達肛門又逆沖胃脘作吐用溫腎湯人參三錢熟地白朮一兩肉桂二錢一劑汗止吐瀉愈咽痛亦除此下部虛寒溫其經可也用參術回陽肉桂助命門火則虛火自歸經安於腎藏然肉桂辛熱雷火速甚有助熱之虞得熟地相制則水火既濟冬月傷寒五六日腹痛利不止厥逆無脈乾嘔人謂直中陰寒不知直中乃冬月一時得之身不熱腹痛嘔吐發厥者為真今身熱五六日後見前症乃少陰傳經非直中也雖傳經陰症可通以治直中辨症終不可不清此症自然用白通加豬膽汁湯本陰寒何以加人尿膽汁不知白通湯乃純大熱治以陰寒反相格而豈藉人尿膽汁為嚮導乎正陰盛格陽用以從治之為得也蓋違其性則背順其性則安此症往往脈伏不見服此脈暴出者大非佳兆緩出轉有生機何也此病是假熱藥是假寒取其相畏相制有調劑不取其相爭相逐竟致敗亡冬月傷寒四五日後腹痛小便利手足沉重而疼或咳嘔人謂少陰症宜真武湯是矣所以用此湯之故世尚未知四五日後腹中作痛此陰寒入腹犯腎也小便利膀胱腎氣尚通可消寒邪從小便出倘小便不利則膀胱內寒無腎火之象矣火微不能運動四肢手足所以沉重作疼火既不能下通膀胱引寒邪下出勢必上逆為咳為嘔真武湯補土藥土健水不泛濫仲景制此方火中補土土熱水亦溫消陰攝陽神功不可思議冬月傷寒四五日後手足逆冷惡寒身倦脈不至躁擾不寧人謂少陰陽絶不知陰亦將絶蓋惡寒身蜷脈更不至陽已去矣陽去不加躁擾陰猶未絶尚可回陽以攝之今躁擾不寧基趾已壞何以回陽然人陰陽未易遽絶一線未泯可援可救陰陽有根非後天有形之物實先天無形之氣補先天而後天自續用參附湯人參二兩附子二錢雖此方難必效然寧盡心不濟不可置方聽死況參能回陽於無何有之鄉附子奪神功於將離之際魂魄重歸陰陽再長原有奇功烏可先存必死之心冬月傷寒六七日經傳少陰而息高人謂太陽症未除作喘不知太陽之喘與少陰之息高狀似實殊太陽喘氣息粗盛邪盛也少陰息高氣息緩漫細小真氣虛不足以息若高非高也故太陽喘宜散邪少陰息高宜補正何也少陰腎火衰不能藏於氣海上奔欲散症至危宜朝宗湯人參麥冬熟地三兩棗皮山藥一兩故紙一錢胡桃一枚一劑息平再劑息定此補氣填精不治息自平者氣得補有所歸也如敗子田園消盡逃外豈不欲歸計無復之耳倘驟獲多金自然耀鄉里寧豈乞食戚黨或曰下寒火必上越此息高獨非腎氣虛寒乎何不用肉桂引火歸源嗟乎腎氣奔騰實本因腎火上衝所致然不用桂附亦有說腎火必得腎水以養不先補水遽助火火無水濟龍雷反上升轉不收息所以先補水不急補火況故紙亦補火更能引氣入氣海又何必用桂附之跳梁哉冬月傷寒太陽麻黃湯症元氣素薄尺脈遲緩不敢用前方人謂宜建中湯以國弱兵微宜守不宜戰建中能守而不能戰且賊盛圍城城中又有奸細安能盡祛而出症本太陽傷榮舍麻黃終非治法加人參一兩則麻黃湯散邪入參助正補攻兼施正不傷邪盡去或謂麻黃症不得已而用參可少用否不知元氣大虛非參不能勝任故必用一兩庶元氣無太弱之慮且能生陽於無有之鄉可以禦敵逐寇倘不多加人參則邪留胸中元氣未復安能背城一戰乎或曰無氣大虛直用參何以又用麻黃似麻黃斷不可少何不以麻黃為君嗟乎麻黃為君人參為佐使必僨事今人參一兩麻黃止一錢是以人參為君麻黃轉作佐使正正奇奇並而用之此兵道可通醫道冬月傷寒汗吐下後虛煩脈微八九日心下痞硬脅痛氣上衝咽喉眩冒經脈動揚必成痿症人謂太陽壞症然不止於太陽之壞傷寒經汗吐下後虛煩虛之至也況脈微非虛而何宜現各症痿症責在陽明豈未成痿前反置陽明不問乎治陽明火宜用人參石膏湯然汗下後石膏峻利恐胃難受方用青蒿防痿湯人參一兩青蒿五錢半夏乾葛一錢陳皮五分連服二劑胃氣無傷胃火自敗諸症漸愈痿症自可免蓋此症不獨胃火腎肝之火亦起青蒿去胃火且散腎肝火一舉三得然非用參之多則青蒿力微不能分治藏腑尤妙在佐之半夏陳皮否則痰未能全消而氣不能遽下痞硬脅痛烏能盡除然恐青蒿力微故佐乾葛以共泄陽明火則青蒿更能奏功況乾葛不甚散氣得人參以輔青蒿尤有同心之妙冬月傷寒譫語潮熱以承氣下不應脈反微澀是裡虛仲景謂難治不可更用承氣豈承氣固不可用乎既用承氣不大便是邪盛爍干津液故脈澀而弱非裡虛表盛明驗乎倘攻邪邪未去正益虛故難治此時不妨明言壞症有一法或可望生恐難必效病家請治則用人參大黃湯救之人參一兩大黃一錢一劑得大便氣不脫即生否則死矣苟大便氣不脫再用人參甘草三錢陳皮三分芍藥一錢煎服二劑可全生冬月傷寒發熱而厥厥後復熱厥少熱多病當愈厥後熱不除必便膿血厥多熱少寒多熱少病皆進也厥少熱多邪漸輕熱漸退傷寒厥深熱亦深何厥少熱反深此邪不能與正爭正反凌邪作祟譬賊入人家與主鬥賊弱逃遁主人愈加精神以壯威正氣旺邪勢自衰故病當愈至於厥後熱不除如賊首被獲餘黨未擒賊知勢敗必帶傷而戰賊既受傷主亦必損故熱勢雖消轉不盡散更堅無生之氣雖不敢突入經絡必至走竄腸門血汙狼藉成膿血法不必用大寒藥只用和解賊自化為良民何有餘邪成群以作祟用散群湯甘草二錢黃芩三錢當歸五錢白芍一兩枳殼一錢一劑未成膿血必無既成膿自止妙在歸芍活血加甘草黃芩和血涼血所以邪熱盡除非單用枳殼之攻散耳至於厥多熱少無非正氣之虛正虛則邪盛邪盛凌正正敢與戰安得不病進治法宜大補正氣少加祛邪自然熱變多寒變少用祛厥湯人參當歸五錢白朮一兩甘草二錢柴胡一錢附子一分一劑轉熱二劑厥定寒除熱深厥亦深似消熱即消厥何以反助熱不知此二症非熱盛而厥乃熱衰而厥熱衰正衰非邪衰吾以參助正氣非助邪熱也正旺則敢與邪爭作熱一戰而勝故寒熱盡除方加附子尤妙參術未免過於慈祥非附子將軍則仁而不勇難成迅掃之功加一分以助柴胡則無經不達寒邪聞風盡散所謂大勇濟其仁冬月傷寒四五日下利手足逆冷無脈人謂厥陰寒症急灸之手足不溫脈不還反作微喘人謂死症吾謂可救蓋因無脈耳人必死後無脈今未死乃脈伏不現非真無脈無脈固不可救伏有可救用灸亦救其無脈今灸之脈不還反作微喘者正生機也蓋脈欲應灸無如內寒極止藉艾火何能遽達是微喘脈欲出明矣急用參附湯助陽氣脈自出但宜多用人參二兩附子三錢一劑手足溫再劑脈漸出三劑利止附子斬關奪門人參回陽續陰然非多用寒邪勢盛不能陷陳突圍遇此症必信深見到用勇任大始濟倘徒施灸法或參附不多用皆無識也死臺號冤慎之冬月傷寒身熱一日即譫語人謂邪傳陽明誰知素有陽明胃火風入太陽胃火即沸騰矣兼治陽明泄胃熱亦無差然太陽邪熾不專治太陽則衛邪不能救營邪不能解先治陽明必引邪入門反助騰燒不若單治太陽使邪不深入陽明火不治自散用爭先湯桂枝三分麻黃甘草花粉一錢青蒿三錢一劑熱退譫止此桂技少麻黃多以寒輕熱重也青蒿為君者能退熱又散寒且入膀胱又走胃既解膀胱邪又解胃火不特不引邪入陽明且散邪出陽明加花粉以譫語必帶痰氣花粉消膈中痰復無增熱之慮入諸藥中通上達下消痰消邪又何譫語冬月傷寒身熱二日即如瘧人謂證傳少陽誰知少陽原有寒邪一遇傷寒因之並見小柴胡亦奏功但法非宜必重治陽明兼治少陽為是蓋陽明火邪未散雖見少陽症邪仍留陽明寒熱譫狂必因而起惟重治陽明則胃火自散使邪不走少陽少陽原存之寒邪孤立何能復煽陽明之焰陽明火息少陽之邪自解用破邪湯石膏玄參茯苓三錢柴胡半夏甘草陳皮一錢麥冬一兩一劑熱解瘧狀愈方妙在石膏玄參治陽明火尤妙在用麥冬滋肺燥恐肺燥不能制肝膽且肺燥必取給於胃則胃枯火愈熾今多用麥冬使肺潤不藉胃土肺氣得養自能制木少陽之邪何能附和胃火作祟況柴胡足舒少陽氣苓草二陳調和陽明少陽邪無黨援安得不破冬月傷寒身熱三日腹滿自利人謂陽傳於陰孰知腹滿自利少陽太陰皆有不辨陰陽鮮不誤事夫太陰自利寒極而痛少陽自利熱極而痛手按愈痛者少陽按不痛者太陰此仍須和解少陽邪不可誤認太陰用加減柴胡湯柴胡陳皮甘草一錢白芍五錢茯神梔子二錢當歸三錢枳殼大黃五分一劑腹滿除二劑利止此和解寓微攻分消兼輕補所以火邪易散正又不傷若大承氣過於推蕩大柴胡重於分消故定此方以治腹滿自利冬月傷寒身熱四日畏寒不已人謂太陰轉少陰誰知仍是太陰症太陰脾少陰腎似不同然脾乃濕土土中帶濕則土原有水象故脾寒即水寒所以不必邪傳於腎早有畏寒法不必治腎專治脾寒症自消用理中湯加減治白朮一兩人參茯苓三錢肉桂附子一錢一劑寒熱解方用桂附似仍治少陰腎然參術為君仍治脾況脾腎原可同治參術治脾亦治腎況得桂附無經不達安在獨留於脾冬月傷寒身熱五日即發厥人謂邪入厥陰誰知腎水乾燥不能潤肝厥本厥陰症邪未入於厥陰何發厥蓋肝血燥極必取給於腎腎水枯又受風邪肝無所養故發厥母病子亦病法但治腎厥症自定母安子亦安用子母兩快湯熟地麥冬玄參五錢當歸茯苓山藥二錢棗皮芡實三錢山藥二錢一劑厥定再劑身熱愈方純補腎惟當歸涕肝血治腎肝在其中所以不用芍藥者過於酸收不若單用補水水足制火為更勝耳故子母兩快湯不用白芍單用當歸也且當歸善助地棗生水生水滋肝即補腎腎制肝冬月傷寒身熱五六日汗不解仍有太陽症人謂邪反太陽誰知邪欲反不能反乎邪不能反太陽當無太陽症宜不治太陽然不治太陽轉多變蓋邪不能返窺門而入已過勢也太陽曾傳用藥引歸邪走原路反易散少用桂枝湯散之一劑邪盡除倘多用則焦頭爛額易勝祛除此用藥機權不可不知冬月傷寒至七日熱猶未解譫語不休人謂復傳陽明誰知邪欲走陽明陽明不受乎陽明已經前邪見邪則拒似乎難入然切膚之痛前已備經見邪再入太陽震鄰之恐號呼譫語非若前邪實作譫語者比治法不必專治陽明以截陽明之路散太陽之邪斷不復入陽明用桂枝湯一劑譫語自止何必用石膏湯重傷胃氣冬月傷寒至八日潮熱未解人謂邪再傳少陽誰知邪在陽明欲出未出乎陽明多氣多血氣血既多藏痰亦不少痰在胃膈自發潮熱不必假借少陽況邪又將出少陽前受陽明貽害未免寒心故現潮熱其實未入少陽法不須治少陽邪宜解陽明熱陽明熱解少陽邪自散用解胃湯青蒿麥冬五錢茯苓二錢甘草五分玄參三錢竹葉五十片一劑胃熱解再劑潮熱退不必三劑此方息陽明焰又解少陽氛倘徒治少陽陽明愈熾倘息陽明少陽又燥有偏勝必有獨干自然輕變為重邪傳無已今單治陽明已有少陽治法故收全功冬月傷寒九日利不已人謂邪入太陽陽變陰症誰知是陽辭陰症乎變陰辭陰何辨變陰陽傳於陰辭陰陽傳出於陰也入陰自利豈出陰亦自利不知陰陽不接多泄利不已但入陰自利腹必痛出陰自利腹不痛至九日利不已腹不痛者離陰自利也切戒太陰止利藥用之邪傳入陰危矣法仍治少陽解表裡則利止寒熱之邪亦散用小柴胡湯加減治之柴胡甘草一錢茯苓三錢陳皮五分一劑利止寒熱解此專治半表裡邪又分消水濕既不入陰又善治陽故取效獨捷冬月傷寒十日惡寒嘔吐人謂邪再傳少陰誰能知邪不欲入少陰乎不入少陰何惡寒嘔吐不知傳經再入太陰中州之氣已經刻削脾氣已虛必耗腎中火氣腎又曾經邪犯自顧不遑故邪入脾脾甘自受惡寒嘔吐不待傳少陰始見法單治太陰脾土嘔吐可止然不治腎腎火不生脾土惡寒終不愈寒不除嘔吐亦暫止用脾腎兩溫湯人參巴戟芡實山藥三錢白朮肉桂一錢丁香三分肉蔻一枚一劑寒止二劑嘔吐除方用參術補脾巴戟芡實山藥補腎肉桂丁香闢寒氣旺腎火以生脾土則土氣自溫冬月傷寒十一日熱反更盛發厥不寧一日三四見人謂邪再傳厥陰也誰知邪不能傳肝乎少陰寒水未入厥陰何以發厥見熱症然厥似熱非熱也內寒甚逼陽外見發厥故不待傳入厥陰先發厥此本死證仲景無方非無方也以灸法神奇示人以艾灸少陰者正不必治厥陰也雖灸之可湯藥又安不可用回生至神湯人參三兩肉桂三錢白朮二兩薑汁一合蔥十條用薑蔥汁同水煎服一劑厥止二劑身熱解方用參術雖多苟非薑蔥不能宣發邪伏腎中不得出惟參術得薑蔥導之出外不必走肝厥自安此治之巧也冬月傷寒十二日熱不退不見發厥人謂傷寒至厥陰不發厥熱自退誰知虛極欲厥不得乎熱深厥亦深者元氣足以致之此熱深不發厥元氣不足以充也傳經至十二日已入肝厥不應者非熱之不深乃元氣甚困焉可因不厥即厥疑陰之不熱治法補其肝氣輔以解熱則厥陰不燥木氣又舒邪不能留非惟熱解而見厥抑亦邪散而消厥用消厥散白芍當歸五錢丹皮黑荊芥三錢生地花粉二錢甘草人參炒梔子一錢一劑厥止再劑厥定此補肝涼血以治傳經傷寒世無其膽然肝燥內熱因虛厥伏非滋肝血則熱深者何能外見故必補虛而發厥隨可棄厥而散熱人可聞吾言而放膽冬月傷寒十二日後忽厥去如死狀但心中大熱四肢如冰至三四日體不腐人謂尸厥誰知邪火犯包絡堅閉其氣以護心乎傷寒未有傳心者傳心即死然邪傳心因包絡虛不能障心也若包絡無損邪雖直搗心宮膻中膜膈自足相拒然邪遍傳六經各各損傷包絡相臣出死禦敵號召勤王絶不一應惟堅閉宮門與君同殉各臟腑見君相號令不宣自然解體所以肢體先冷如死苟有將斬關奪門掃群妖救君相外藩響應自必歸誠治法惟助包絡加祛邪可回死為生用救心神丹人參一兩白芍一兩黃連半夏三錢菖蒲二錢茯苓五錢附子一分水煎以竹筒通喉中令人含藥送下無不受一劑氣蘇再劑心熱自解肢溫厥症多熱肢冷如冰正心熱如火也熱極反為寒顫顫極人死心實未死方以人參固生氣黃連清心中包絡火附子為先鋒菖蒲為嚮導引參連突入心中又得芍苓半夏平肝不助火利濕共消痰則聲援勢盛攻邪尤易或疑黃連清熱何用人參既用參何必許多孰知六經遍傳以攻心臟腑自虛用連不用參則有勇無謀必斬殺過甚反傷元氣主弱臣強雖救君不能衛君不幾虛用奇兵哉中寒嚴寒忽感陰冷直入腑肢體皆冷目青口嘔清水腹中雷鳴胸脅滿逆體寒發顫腹中有涼氣一股直衝而上猝不知人此寒氣直中七腑也中寒與傷寒大異蓋傷寒由表入里中寒由腑入臟雖入腑入臟同是直中治法終不同蓋入腑寒輕治入腑之寒烏可重於治臟哉惟腑有七中腑藥似宜別然陰寒中入必乘三焦之寒而先人溫三焦七腑之寒盡散然三焦所以寒又由胃氣虛徒溫三焦而不急補胃氣則氣虛不能接續烏能回陽於頃刻用救腑回陽湯人參五錢附子肉桂一錢巴戟一兩方用參扶胃桂附回陽更借巴戟補心腎火心腎火旺三焦火更旺且生胃氣回陽故用為君尤統三位健將掃蕩祛除所以一劑奏功陽回陰邪立散嚴冬忽感陰寒唇青身冷手足筋脈拘急吐瀉心腹痛囊縮指甲青腰艱俯仰此陰寒中臟中臟重於中腑寒入五藏似宜分治然不必分直溫命門火諸臟寒盡散蓋命門為十二經主主不亡心君無下殿肝木無遊魂肺金不為魄散脾土不崩解惟命門既寒陽為陰逼越出腎外五藏不能獨安各隨陽而俱遁故中臟不必治五臟溫命門寒邪可解雖然五臟苟虛大兵到處掃蕩群妖苟無糧草何以供命此命門宜溫五臟之氣亦當補用蕩陰救命湯人參一兩白朮熟地附子茯神三錢肉桂一錢棗皮二錢水煎服一劑陽回再劑全愈何神速蓋寒入五臟由命門陽外出一回其陽寒氣不留於臟方用參術為君似救心脾附桂棗皮腎亦救之肺肝獨缺何以斬關直入回陽頃刻不知五臟為寒邪所犯大約犯腎之後即犯脾犯心至犯肺肝無多故專固心腎脾肺肝已寓況參附並用無經不達有肝肺不入乎況補肝補肺皆收斂藥祛邪使出烏可留邪使入倘用收斂補肝肺反制參附之手不迅蕩陰此用藥不雜有祕義也或曰收斂既不可以補肝肺豈熟地棗皮又可補腎嗟呼此又不通之論也腎中水火原不相離附桂大熱回陽未免腎中乾燥與其回陽後補腎水以濟陽何如用火之時防微之為得所以少用熟地棗皮於附桂中以制火橫且火得水歸源水招火入宅冬月直中陰寒吐泄身發熱人謂傷寒傳經症不知寒直中少陰非傳經也直中陰寒原無身熱茲何以熱此正陽與陰戰邪旺正不安於弱以致爭鬥而成熱若傳經少陰症必數日後始吐瀉未有初感一日即身熱上吐下瀉者故乃直中非傳經也直中邪即入里傳經由表入里用人參附子茯苓湯人參一兩茯苓五錢附子一錢一劑吐瀉止身熱退何其速也此症原因陽氣弱陰氣盛故發熱助陽氣陽氣旺陰自衰又佐附子勇猛突圍破敵轉易成功且茯苓分消水氣胃土得安上下之間無非陽氣升降陰邪何能沖決直中陰寒腎獨受身顫手顫人謂寒入骨中誰知命門火冷不能外拒陰寒蓋命門十二官主人有此火則生無之則死火旺運用一身手足自溫火衰不能通達上下一身皆冷何能溫手足故命門火旺可拒寒邪惟火衰極陰寒內逼直入腎宮命門火畏寒邪盛幾乎不敢同居身顫難以自主手顫難以外衛法宜溫補命門火主不弱而後陽氣旺通達上下陰消寒散不致衝犯心宮用直中陰臟第一方治之附子丁香一錢肉桂白朮二錢一劑寒祛身手定方盡陽藥以治陰症固宜然急症何以少用分兩成功至神蓋因火欲外越一助火即回宮火既歸又有餘火相助則命門火旺毋論祛寒寒已望火遁矣少陰腎感中邪氣小腸作痛兩足厥逆人謂寒邪直入腎孰知入腎兼入小腸腑乎腎臟也臟重於腑何必辨其邪入小腸然辨症不清藥定寡效雖腎開竅於二陰又曰腎主大小便腎寒小腸亦寒治腎小腸亦愈終不知小腸與腎同感寒也蓋寒客小腸則腹痛脈不通脈既不通安得兩足不厥逆法不必治小腸仍治腎治腎者溫腎也溫腎即所以溫小腸用止逆湯附子一錢白朮三錢前子三分吳萸五分一劑痛除厥止方用附子祛寒吳萸通氣加白朮車前利腰臍消濕雖治小腸實溫腎宮命門熱小腸之氣化自行又焉有不通故不治痛痛除不轉逆逆定猝中陰寒身不能動人謂寒中脾誰知寒中腎乎中寒手足不能動已是危症況身不能動乎蓋手足冷不動猶四隅病身僵不動中州之患脾主四肢身不獨屬乎人非為不生者非心火乃腎火腎火旺脾土自運於無窮腎火衰脾難轉於不息故腎寒脾亦衰脾寒身自不能動法不可徒治脾必須溫腎火用直中陰臟第二方治之附子乾薑肉桂一錢熟地二錢一劑身動寒消方用桂附子姜直搗中堅迅掃寒邪命門火勃發寒邪自去然過用純陽未免太燥佐熟地使陽得陰而生水不至陽缺陰而耗水人有猝犯陰寒兩脅極痛至不可受如欲破裂人謂寒犯肝誰知寒犯腎脅乃肝位犯腎宜病在腎何在肝因腎寒又畏外寒之侵腎血逃肝子家受創深重不敢復出肝因腎水遁入見母受傷能無復仇乎自然奮不顧身怒極欲戰兩脅欲破正肝鬱難宣也法以火尉外寒少濟其急用宜寬湯救之人參一兩熟地二兩附子一錢柴胡五分甘草三分肉桂三錢一劑痛定人見用參附回陽未必疑用熟地滋陰必疑嗟乎腎遁入肝寒邪必乘勢逼肝肝氣一怯非上走於心必下走於腎走於心引邪上犯心君有下堂之禍走於腎引邪下侵相位有同殉之虞故用人參補心使心不畏邪熟地補腎使腎不畏邪肝瞻顧於子母兩無足慮自然併力禦寒又益助火舒木之品肝中之鬱火解故背城一戰而奏捷倘此藥不效是心腎兩絶肝獨存何能生
