body:
  text: 卷十三驚疳吐泄小兒大約因疳成吐吐成泄泄成驚故口內流涎疳兆也起首即治疳吐泄不作何有驚生疳失治胃氣傷矣小兒純陽原無損陰氣胃傷者傷陽氣也陽傷陰亦傷矣傷陰傷脾氣也後天以脾胃為主脾胃兩傷無氣養心驚症起驚虛症非有外風入然則吐泄驚俱脾胃虛寒疳乃脾胃實熱也不知小兒多食水果致口熱成疳口熱似陽旺然陽極變陰故疳久作吐正陽變陰之驗也可見驚疳吐泄俱虛症補脾胃四症俱愈世分驚為風疳為熱吐泄為寒孰是單補脾胃者用活兒丹人參神麯三分白朮巴戟白芍一錢甘草陳皮一分茯苓二錢柴胡二分當歸山楂五分二劑愈三劑不發方健脾開胃又平肝使肝無鬱滯自疏土氣則脾胃安吐泄止何至四肢無養角弓反張急慢驚風哉生疳兩牙床盡腫流涎咳嗽咽腫人謂脾熱誰知胃火上升乎胃火宜泄何不效以火過盛陽將變陰矣故降火藥以泄火火不降轉困者正壯火食氣也少火宜泄壯火宜補不補胃治火反泄火損胃安得不加困補胃少息火疳自愈用平疳湯茯苓三錢白朮桔梗一錢陳皮枳殼黃芩二分神麯五分麥冬玄參二錢人參蘇葉三分四劑愈不發此補胃以散火火自平者以火出土中也土健火藏土衰火現故補土火藏於下何至上升口頰乎況加解火藥則土引火自歸火亦隨土而自戢生疳後飲水即吐後不飲亦吐困極人謂熱吐誰知熱變寒乎疳本熱久則寒者以胃土之傷土衰則火旺火旺土益衰土益衰前火不能旺矣火土兩衰何得不寒況兒最喜生冷土衰加生冷即吐故止吐以健胃為主則胃強吐不再犯用六君加味治人參一錢白朮三錢茯苓二錢甘草一分半夏五分神麯二分陳皮三分白蔻一粒二劑全愈此健胃止嘔大人尚神況小几乎小兒嘔人每輕症不知胃氣一傷四肢失養必角弓反張乃因虛也今扶胃氣胃健受食既無嘔吐自有灌注何有驚風批一月內乳後輒嘔逆乃初生陰陽未平不必治亦不必畏文守江大吐後大泄吐止泄不止倦極人謂吐變泄其氣順誰知吐傷胃泄傷脾氣順宜吐止愈今吐止大泄乃胃傳於脾由腑入臟是由表入里較吐更甚蓋吐補胃可愈泄宜兼補脾雖脾胃有同治法補胃自必補脾但吐後作泄則補脾必須助胃用生脾助胃湯參術三錢甘草三分肉桂一錢茯苓五錢神麯五分附子一片二劑全愈倘不效不救此方治小兒泄效自如響彼不應乃陰陽兩絶非藥之咎吐泄目上視死亡頃刻狀如慢風人謂驚風誰知脾胃氣將絶乎若作慢風治用牛黃等丸下喉即死脾胃氣絶是陰陽氣欲脫也非急用人參救氣何能再活然價重此症又須多用無論近人無此膽即古人亦無此法故小兒多亡夫小兒脾胃虛寒何禁吐泄尤宜多用人參用安兒至寶湯參術五錢茯苓巴戟三錢附子麥芽蘿蔔子一錢枳殼檳榔三分前子扁豆二錢白蔻三粒三劑愈此方多用參附故奪命於將亡以參回陽於何有之鄉附子續陰於已絶之後群藥佐之陰陽自分積穢自除世但祛除不補中用攻故不效吐泄後角弓反張驚悸牽搐此肝克脾胃土土氣欲絶耳若用風藥定驚立亡蓋吐泄陰陽兩亡但有幾希之氣不補脾胃以續氣反散風損氣能不死乎且補脾胃土不補命門心包之火則土寒陽不能驟回陰不能速長宜補火生土補土止驚用續命湯參術一兩茯苓巴戟五錢肉桂半夏一錢生棗仁三錢志肉二錢菖蒲丁香白芍薑附三分柴胡五分甘草二分此方以十歲為準每歲減二分慢急驚風俱治可謂急為風慢為虛也世謂驚為風誤矣不作風治十活九作風治十人十死虛兼風治十死八以大虛絶不治風十人十活喻嘉言謂驚風二字勸醫絶口不道雖過於憤激然實有不得不大聲以救者但所立方尚兼風治猶未洞達底裡世人以急驚屬風慢驚屬虛此似是而非殺人之説也驚風二字殺人甚多小兒何嘗有風一作風治千人千死無如殺運未除此輩亂治豫治急慢驚以保赤定驚丹人參茯苓白芍三兩白朮八兩半夏柴胡山楂枳殼神麯甘草乾薑麥冬一兩炒荊芥檳榔菖蒲薄荷葉麥芽五錢木香三錢各為末蜜丸如龍眼核大凡急慢驚用一丸重則二丸但人參多多益善然無參亦免死便蟲便寸白蟲或蜉蛔及吐長短蟲人謂濕熱誰知脾胃傷乎小兒自喜生冷濕熱無疑然脾胃健濕熱易消脾胃衰濕熱難化不生津液而生蟲倘不補脾胃則脾氣不能消胃氣不能化蟲且安居又何以殺惟補脾胃則氣旺自能制蟲況佐殺蟲藥乎用治蟲丹苓朮白芍三錢甘草三分白薇二錢使君子二個黃連二分枳殼檳榔半夏五分百部一錢二劑蟲盡化水但服後忌飲一肘此殺蟲藥雖多然入健脾平肝內則正無傷蟲盡殺糞門拉長蟲不下又不進不痛癢人謂蟲口咬住誰知祟憑乎蟲口咬必痛今安然如故然蟲不咬宜隨下今半截在中非祟憑乎用外點方點虯湯水銀冰片樟腦白芷一錢硼砂一分雄黃輕粉薄荷三分各研以不見水銀星為度水調少許點蟲頭或身上少刻化水點點時須虔拜上天此余遊南嶽逢異人自號雷公狀甚異傳余活人録奇方最多此其一也痘將出痘身熱口渴眼如醉此時以表藥散之則火毒大解無如因循數日現點始用有形之解與無形之解不同故輕變重重變死夫見點當於補中帶表則正無傷傷火毒又散用至慈湯人參炒荊芥陳皮三分生草柴胡柴胡花粉一錢當歸三錢茯苓麥冬二錢玄參三錢二劑愈不必三劑若已出熱則重變輕死變生此用柴胡荊芥疏通表裡玄參去浮遊火生草解毒妙在人參補氣生津佐前藥使無壅閉以達至隱之火毒火毒非補不可此方以十歲為準如一歲十分用一每歲增加若十歲外宜加參余不必加遍身粒粒鮮紅明白佳兆也不必用藥只須助正自飽滿貫漿收靨亦速然呆補無疏通升上不降下非善法也用安幼湯當歸玄參熟地麥冬三錢丹皮荊芥一錢生草五分陳皮貝母三分生地二錢黃連一分不必二劑妙在補中帶散無外阻散中實補無內怯毒大泄不外阻世但知補故多留後患且呆補必變惡瘡人猶謂毒未淨用散火敗毒藥至不救哀哉痘紅盛煩渴大便乾燥小便短澀黃赤脈洪大不勻勻舌上生瘡此陽症也切忌溫熱然火毒大盛驟用寒涼心火不遽退熱不驟解反生變宜寒中化熱涼中化火則不違火性自得寒涼用全痘散火湯玄參炒荊芥三錢黃芩生草梔子一錢桔梗生地當歸二錢一劑愈方用芩梔清火玄參退浮熱妙在荊芥桔梗引火外出生地當歸滋腑臟燥則雨潤風吹必變火宅為清涼故解散又無違背痘空色清白發癢中塌寒顫咬牙腹虛脹吐泄脈沉微細弱此陰症也必大補氣血佐溫熱則瘡無冰凍倘用寒散則痘內陷立亡然色白虛也發癢又有實症身寒涼也發顫又有熱症腹脹虛寒也吐泄又多實熱症既非虛寒一用溫熱安得不死不知舌紅為熱白為寒舌紅帶白熱中寒舌白微紅寒中熱熱極大紅又燥寒極純白又滑舌白又滑陰症無疑用祛陰救痘丹人參荊芥一錢耆歸白朮三錢附子三分一劑色白即紅陽回陰寒之氣盡散此方補氣血氣旺陰難留血足陽自復然必附子奏功始神又恐附子直攻其內故加荊芥引之外散痘隱不見此氣虛不能推送也論理升桔羌防能外泄然不補則元氣太虛恐痘發他症又生用發痘散生耆二錢甘草五分當歸桔梗荊芥一錢防風二分二劑盡出不必再服方雖用桔梗荊防妙在耆歸屬於推送故火毒盡出痘已見點熱氣大盛粒過多人謂火毒太盛誰知血虛不能潤乎若發散不補血則火盛水乾痘難貫漿用養痘湯當歸二錢川芎麥冬一錢連翹五分花粉木通三分甘草二分二劑成漿妙在芎歸麥冬為君少用連翹木通花粉則血旺火不過炎熱消毒不內隱故速效又無後害痘出四五日大小不等根窠不紅澤色暗頂陷不起人謂火毒倒塌誰知血氣虛乎此必補氣血中佐化毒催漿用催痘湯人參三錢牛子川芎茯苓一錢耆歸二錢桔梗肉桂五分陳皮二分連翹三分二劑效妙在參耆歸之多發散化毒為佐故氣足不祛於中血足不陷於內自紅潤肥滿痘五六日毒宜化漿宜行乃不紅綻肥滿此氣血大虛切忌攻火敗毒宜補氣血用護痘萬全湯人參五錢黃耆川芎茯苓一錢當歸白朮二錢陳皮牛子三分花粉三分桔梗五分不必二劑妙在不消毒攻火但補氣血且補中有散更非呆補七八日宜漿足反瘡平漿淡食減此氣血不充也人脾胃氣弱則肝血不生血不生則脾胃更弱何能致漿足瘡突哉宜大補脾胃氣少佐補血氣血旺脾胃自健脾胃健痘自充用保痘湯人參荊芥一錢耆歸朮麥冬二錢陳皮五分如癢加白芷三分蟬蛻二分否則不加如色白而薄倍參耆一劑效此純補氣血補氣尤多以血得氣易生也氣足血旺自食增漿老結靨九日十日漿淡痂薄人謂痘毒內蘊誰知氣血虧乎然氣血雖虛痘毒未清不顧火毒但呆補則火毒內藏痘後必有回毒宜補中微散用全痘湯參術二錢牛子通草荊芥一錢茯神當歸銀花三錢陳皮三分甘草五分一劑愈何用參不用耆以黃耆過補氣不若參既補氣不增悶尤妙況牛子銀花補中泄毒得補益又獲散利十一二日潮熱不思食當靨不靨痂落無托此氣血虛毒多未化也用化痘仙丹銀花耆歸三錢白芍二錢人參荊芥牛子甘草一錢山楂五粒防風三分二劑全愈不必三劑妙在用牛子荊芥銀花於參歸耆芍中則胃氣不傷脾氣大旺肝血既潤復不剋土則毒解無留大凡痘不補則火毒不出但補亦不出今補中帶散故未出者能出既出者盡出痘已見形又出一層紅斑或似斑非斑或零星錯雜皆是夾疹人謂痘毒深後再發誰知痘出時又感風寒使內熱留中閉塞腠理激腑毒盡出乎宜臟腑並治然治臟不若先治腑蓋痘毒出臟毒深疹毒出腑毒淺淺之毒散深毒自難留故治痘須先治疹用分痘湯升麻生草荊芥一錢玄參麥冬生地三錢當歸青蒿二錢半夏五分一劑疹全散此退陽明火解肺熱妙在多用升麻引火向外發皮毛雖消疹實成痘何為治疹後再治痘哉痘症已全數日後復發熱出紅斑癢甚愈抓愈癢先如粟米漸大如紅雲一片人謂痘毒前未暢發誰知痘毒全無乃收痂後縱欲飲食又兼風熱而成乎此名蓋痘疹似痘非痘也宜散風熱不必顧痘毒然風熱解痘毒亦無不解用安痘湯玄參五錢當歸三錢連翹花粉一錢白芍丹皮荊芥甘菊二錢升麻五分二劑盡散此化毒不耗氣解熱不損血故風熱全消痘無變症痘五六日後色黑或炭灰色頂陷不起食入即吐此壞症也然小兒純陽陽氣易離陰氣難絶倘一陰可續則引陰接陽每重生用起死救兒湯參歸麥冬茯神三錢玄參銀花一兩白朮荊芥花粉二錢甘草一錢二劑愈此妙全在銀花玄參之多既解毒又散火又加參朮歸冬以助二味祛除故能轉敗成勝切勿驚重與用參多蓋藥不重則火毒難消參不多則陰陽難復前人稀痘或截痘法多解毒藥損元氣元氣虛毒即難解且毒成於火清火又用寒涼小兒一服寒涼脾胃匱乏火毒安能外泄豫用止痘丹生草一錢銀花三兩玄參一兩貝母五分苦參丹皮三錢黃芩二錢天赦日將水二碗煎至一碗不必再煎將此一碗汁又熬至三分用茯苓五錢為細末將汁調為丸如米大兒半歲蜜拌二日服完必下黑糞永不出痘疹發熱二三日肌膚隱發紅點人謂發斑傷寒誰知出疹發表熱毒外散偶犯風寒生冷皮膚閉塞毒氣壅住腠理乎其症皮膚片片皆紅紅或變白白或轉紅紅變紫氣喘腹滿甚而作痛毒氣入臟欲出不能存亡頃刻必須化斑不必治疹蓋疹與斑皆熱毒用消斑化疹湯玄參白芍五錢歸尾石膏骨皮丹皮青蒿麥冬三錢荊芥二錢木通升麻甘草一錢二劑消方用微寒以疹斑雖起大熱亦因臟腑乾燥內無水制而外現也今滋津液則水足制火又得引火解毒直走皮膚毒自外泄解散況玄參清浮遊火何必多用大黃撲滅其炎傷臟腑乎出疹大渴恣飲嘔逆不止變泄痢咳嗽小水不利陰囊浮腫脅痛筋軟膨脹人謂火熱不解誰知水蓄不消乎夫心火亢炎因而作渴飲水必入心心不受水傳脾為嘔吐泄利傳肺為咳嗽傳腎為便閉囊腫傳肝為脅痛筋軟膨脹夫水本剋火然水多則滯火反得水以滋沸騰疹消他症生宜惟分消水勢疹自消用分水消疹散茯苓前子木通白朮三錢豬苓二錢苡仁一兩桔梗一錢荊芥五分二劑愈方專治水只桔梗荊芥少提氣不特水氣因升提下行倍速且使疹亦從膀胱下泄但不用升麻以升麻提氣必使疹毒由皮毛出反牽利水之時不若此二味提氣不走皮膚反佐諸藥走膀胱水疹同治疹後牙根潰肉腐出血臭沖鼻此症因醫治疹不治浮火使熱積皮膚不用解散清涼致火毒入胃久不散因作祟此症仍須散火熱毒倘恣食肥甘濕熱動蟲必變為走馬疳穿腮落齒或面頰浮腫環口青黑唇崩鼻壞生瘡作癢多不救用救疹散毒湯玄參茯苓青蒿生地三錢甘草荊芥五分黃芩白薇乾葛一錢白果十個麥冬二錢陳皮三分三劑全愈此和解不大涼以疹愈勢雖盛火毒實輕毋以外證重即用劫奪苟輕用苦寒每輕變重重必死吃泥吃泥此肝旺也肝過旺必克脾胃土虛不能敵肝思土以救宜平肝補脾胃則土氣無虧自見土不吃用六君加減治人參一錢茯苓黃土三錢甘草陳皮黃芩五分半夏三分白朮白芍五錢四劑不思吃泥此方健脾胃加黃芩清火白芍平肝肝平火清土自得養尤妙加黃土投其所好益足展健運胎毒半歲或一二歲忽生大瘡此父母或感楊梅或受胎後感淫毒貽害小兒用銀花二兩生草黃藥錦地羅三錢人參花粉二錢二劑倘外口不愈另用蝸牛生草兒茶樟腦黃丹水粉枯礬三錢冰片輕粉一錢麝香三分地龍糞五錢為細末麻油調敷瘡口上數日斂輕者不必外治切勿自祕以受天譴
