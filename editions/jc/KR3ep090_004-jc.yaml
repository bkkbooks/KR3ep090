body:
  text: 卷四五郁心腹飽脹時腸鳴數聲欲大便甚則心疼兩脅填實或吐痰涎或嘔清水或泄利暴注以致兩足面浮腫身漸重大此初起亂治及後必作蠱脹治誰知土鬱乎土鬱脾胃氣鬱也內經將土鬱屬氣運不知原有土鬱之病不可徒咎歲氣不消息臟腑夫土氣喜升不喜降肝木來侮則土氣不升肺氣來竊則土氣反降不升且降土氣抑鬱不伸反剋水矣水受克不能直走長川大河自然氾濫溪澗遇淺則泄逢竅則鑽流何經即何經受病法宜疏通其土使脾胃氣升則鬱可解然實脾胃素虛則肝侮肺耗倘脾胃氣旺何患其成郁哉必須補脾胃後用奪法則土鬱易解用善奪湯茯苓一兩車前子白朮三錢柴胡半夏一錢白芍五錢陳皮三分四劑漸愈方利水不走氣舒郁兼補正何必開鬼門泄淨府始謂土鬱奪之哉咳嗽氣逆心脅脹滿痛引小腹身不能側舌乾嗌燥面陳色白喘不能臥吐痰稠密皮毛焦枯人謂肺燥不知肺氣之郁為心所逼而成然火旺由於水衰腎水不足不能為肺復仇肺金受虧抑鬱之病起如父母為外侵子難報怨父母斷不怪子之怯怨天尤人不能相遣是治肺郁可不泄肺乎然惟大補腎水水足心有取資必不犯肺是補腎水正泄肺金用善泄湯熟地玄參一兩棗皮五錢荊芥牛膝炒棗仁沙參三錢貝母一錢丹皮二錢二劑輕十劑全愈方補腎制心實滋水救肺肺得水泄而金安腎得金養而水壯子母同心外侮易制此金鬱泄之實有微旨遇寒心痛腰膝沉重關節不利於屈伸時厥逆痞堅腹滿面黃黑人謂寒邪侵犯誰知水鬱之症乎此症土勝木復之歲居多然脾胃氣過盛肝膽血太燥皆能成之何可舍此四種他治水鬱哉雖然水鬱成於水虛水有因水因火不同因水者真水虛真水虛邪水自旺真火者真火虛真火虛真水益衰水火二而一者也大約水中補火火足水自旺水旺郁不成用補火解鬱湯熟地巴戟一兩山藥杜仲苡仁五錢肉桂五分四劑自愈方中水火併補自然水火既濟正不必滋肝膽而調脾胃也少氣脅腹胸背面目四肢填脹憤懣時嘔逆咽喉腫痛口乾舌苦胃脘上下時痛或腹暴痛目赤頭暈心熱煩悶懊憹暴死汗濡皮毛痰多稠濁顴赤身生疿瘡人謂痰火作祟誰知火鬱乎火性炎上火鬱違其性矣五臟有虛實君相火不同郁乃虛火相火即龍雷火雷火不郁不發動過郁又不能發動若君火實火雖郁仍能動虛火自不可瀉相火自不可寒所當因其性而發之用發火湯柴胡甘草神麯遠志一錢茯神炒棗仁當歸三錢白朮白芥子二錢陳皮三分木香五分一劑郁解二劑盡愈方直入心包以解鬱又不直瀉火反補氣血消痰去滯火遂其性或疑龍雷之火在腎肝不在心包今治心包恐非其治不知心包火下通肝腎不解心包龍雷鬱火又何能解吾解心包正解龍雷鬱火苟徒解龍雷之火則龍雷上升心包阻抑劈木焚林禍必更大惟解心包則上火既運下火漸升下火亦可相安而不必升此法最巧醫當細審畏寒熱似風非風頭痛頰疼胃脘飽悶甚則心脅相連䐜脹膈咽不通吞酸吐食見食則喜食完作楚甚則耳鳴如沸昏眩欲僕目不識人人謂風邪誰知木鬱乎夫木屬肝膽肝膽氣鬱上不行心包下必克脾胃後天以脾胃為主木克則脾不能化胃不能受脾胃空虛津液枯槁何能布於臟腑且木喜水脾胃焦乾木無水養剋土益深則土不生肺肺必弱不能制肝木過燥愈作祟矣宜急舒肝膽氣然不滋肝膽血則血不能潤木鬱不解用開鬱至神湯人參白朮炒梔子一錢香附三錢茯苓當歸二錢白芍五錢陳皮甘草柴胡五分二劑盡解方妙無克削又立去滯結勝逍遙散或謂宜解散不宜補益不知境遇不常元氣或漓不可執郁難用補之見況入人參正無傷郁又解郁女子最多又難解倘癡臥不語人謂呆病將成誰知思結胸中氣鬱不舒乎此全恃藥固非不恃藥亦非大約思郁得喜可解使大怒亦解蓋脾主思恩太甚脾氣閉塞不開必見食則惡喜則心火發越火生胃胃氣大開脾不得閉怒屬肝木能剋土怒則氣旺氣旺必衝開脾氣脾氣一開易於消食食消必化精以養身又何畏於郁此症必動怒後引喜徐以藥治用解鬱開結湯白芍一兩當歸五錢玄參丹皮生棗仁白朮白芥子三錢甘草陳皮五分神麯茯神二錢薄荷一錢十劑愈即逍遙散之變方凡鬱怒未甚服即愈不必動怒引喜咳嗽驟感風寒忽咳嗽鼻塞不通嗽必重痰必先清後濁身必畏風寒此風寒入皮毛肺先受肺竅通鼻受邪鼻竅不通阻隔肺氣也肺竅不通人身之火不能流行經絡乃入肺以助風寒故初起咳嗽必先散風寒少佐散火忌重用寒涼抑火又忌酷熱助邪和解最妙如甘桔湯小柴胡是也然或謂小恙不急治久則肺虛難愈則宜補脾胃母與腎水子似宜分治餘一方既利子母復益咳嗽新久皆效用善散湯麥冬蘇葉二錢茯苓天冬玄參三錢甘草貝母一錢黃芩八分款冬五分方用二冬安肺氣茯草健脾胃玄參潤腎水蘇葉款冬解陰陽風邪加黃芩清火貝母消痰故奏功風寒已散痰氣未清仍咳嗽氣逆煩冤牽引腰腹俯仰不利皆謂須治痰然治痰而痰愈多咳愈急嗽愈重蓋治痰標也標在肺本在腎不治腎而治肺此痰不去咳嗽不愈也腎為痰本何也人生飲食原化精惟腎氣虛胃中飲食所化津液欲入腎而腎不受則上為痰腎氣既虛宜望胃中津液以自助何反不受不知腎虛因肺氣之虛腎見肺母困乏必欲救之忍背母而自益乎無如心見胃液生肺嗔子私養仇家轉來相奪則津不生肺反為痰涎外越然腎不能報母仇者水少也水多自制火大補腎水既克心火之餘更濟肺金不足心不奪而肺自安自然津液下潤化精不化痰用子母兩富湯加味治熟地麥冬二兩甘草柴胡一錢白芍五錢以熟地滋水麥冬安肺加柴芍甘草舒肝膽氣使不克脾胃土氣易升上救肺下救腎且邪易散有不測之妙也久嗽不愈補腎滋陰不效反飲食少思強食不化吐痰不已人謂肺尚留邪胃中不知脾胃虛寒不能生肺使邪留膈脘作嗽也肺母脾胃土也不補母以益金反泄子以損土邪即外散肺且受傷況留餘邪未散乎治不可僅散肺邪當急補肺氣尤當急補脾胃然補法在補心包火生胃土補命門火生脾土肺受土氣生自惡邪氣克用補母止嗽湯白朮茯苓麥冬五錢紫苑半夏蘇子甘草人參一錢陳皮三錢桔梗二錢肉桂五分二劑輕四劑全愈此補脾胃之聖藥加桂以補心包命門火又恐徒治脾胃置肺邪於不問又入補肺散邪之味子母兩得嗽安得不愈咳嗽長年不愈痰黃結塊凝滯喉間肺氣不清用盡氣力始吐出此乃老痰年老陽虛人最多然消痰清肺多不效蓋徒治痰不理氣也痰盛則氣閉氣行則痰消老年孤陽用事又氣閉不行痰結於膈膜間陽火熬煎遂成黃濁氣虛不送故必咳久始出用六君子湯加減速治之白朮五錢茯苓白芥子三錢陳皮人參柴胡五分白芍一兩甘草梔子一錢二劑痰色白四劑易出十劑咳嗽除補陽開鬱消痰祛火有資無克則老痰散咳嗽除倘徒用攻則陽氣傷痰難化何日清快乎陰氣素虛更氣惱偶犯風邪咳嗽用散風祛邪藥反甚此不治陰虛也然滋陰不平肝則木來侮金咳難已宜平肝又補水則水資木木氣更平用平補湯熟地麥冬白芍一兩甘草白朮人參五分柴胡炒黑荊芥一錢茯苓三錢花粉二錢百合五錢此大補肺腎脾胃先解肝鬱肝鬱解肺經風邪不祛自散人謂補腎肺平肝足矣何又補脾胃而用人參不知三經非脾胃之氣不行少加參術通之則津液易生三經尤能相益久咳不愈口吐白沫氣帶血腥人謂肺濕不知實肺金燥苟肺氣不燥則清肅之氣下行不特腎水足以上升交心亦且心火下降交腎不傳於肺矣何至傷燥惟肺先乏高源之水無留余之勢欲下澤常盈以供肺用不可得矣法宜專潤肺燥然潤肺燥腎火上衝肺且救子何能自潤用子母兩富湯治之熟地麥冬二兩四劑肺燥除腎火亦解如大雨滂沱高低原隰無非膏霖既解燥竭寧有咳嗽倘不治或治不補肺腎必甕乾杯罄毛瘁色弊筋急爪枯咳引胸背吊痛兩脅諸氣膹郁諸痿喘嘔嗌塞血泄危症俱見久病咳嗽吐痰色紅似嘔血實非盜汗淋漓腸鳴作泄午後發熱人謂腎經邪火太盛將欲腎邪歸腎經此症初因腎水乾枯腎經受邪傳心故發熱夜重未幾心傳肺故咳嗽汗泄未幾肺傳肝故脅痛而氣壅未幾肝傳脾故腸鳴而作泄邪不入腎肝尚有生機亟宜平肝滋腎邪不再傳則肝平不與肺仇腎滋不與心亢益之健脾使脾健不與腎耗肺之受益何如自然心不刑肺而生脾脾生肺更安用轉逆養肺湯白芍熟地棗皮五錢麥冬茯苓骨皮丹皮三錢玄參北味前子二錢牛膝貝母一錢故紙五分十劑氣轉二十劑痰白三十劑鳴泄止此非止泄藥蓋泄因陰虛補陰泄自止陰旺火不爍金金安則木平不剋土所以消痰化火炎之色止泄撤金敗之聲故腸鳴盜汗除咳嗽愈春夏不嗽遇秋涼即咳嗽甚至氣喘難臥人謂肌表疏泄誰知鬱熱難通乎氣血流通風邪不入惟氣血閉塞邪轉相侮蓋氣血閉則凝滯而變為熱矣熱欲出寒欲入閉極反予邪以可乘之機春夏寒難犯熱秋冬熱難拒寒春夏皮膚疏內熱易宣秋冬皮膚致內熱難發所以春夏不嗽秋冬嗽倘不治鬱熱惟發散徒虛其外愈不能當風寒徒耗其中轉增鬱熱法貴攻補兼施既舒內熱復疏外寒當歸五錢大黃甘草一錢花粉白朮三錢陳皮三分薄荷荊芥黃芩桔梗二錢神麯五分貝母二錢四劑秋冬斷無咳嗽妙在用大黃於祛火消痰中走而不寧通郁最速當歸走而不滯白朮利而不攻同隊逐群解紛開結喘偶感風寒忽喘氣急抬肩吐痰如湧喉如水雞此外感誤認內傷補氣則氣塞不能言痰結不可息法宜解表忌純補不忌清補用平喘仙丹麥冬五錢桔梗茯苓三錢甘草半夏二錢黃芩山豆根射干白薇一錢烏藥蘇葉八分一劑喘平二劑愈蓋風寒從風府直入肺盡祛其痰湧喉間勢若重較內傷喘大輕此方消肺邪不耗肺氣順肺氣不助火故全愈如強暴入門見卒健器鋒中多解紛有不急走而退乎痰氣上衝咽喉塞肺管作喘不能息息不粗無抬肩狀此氣虛非氣盛不可作有餘治人身陰陽原自相根陰陽中水火不可須臾離也惟腎水虛腎火無制越出腎宮關元之氣不能挽回直奔肺作喘然關元氣微雖力不勝任難回將絕之元陽而一線牽連尚可救援用定喘神奇丹人參四兩棗皮四錢牛膝五錢麥冬熟地二兩北味二錢二劑輕四劑大定妙在人參非四兩則不能下達氣海關元以生氣於無何有之鄉非牛膝不能下行且平胃腎虛火又直補下元之氣麥冬益肺非多用則自顧不暇何能生水救火喘則氣散非五味不收熟地益腎水大足自不泄肺氣非多加陰不能驟生火不可制又益棗皮贊襄自然水火既濟氣易還元七情氣鬱結滯痰涎或如破絮如梅核咯不出咽不下痞滿湧盛上氣喘急此內傷外感兼而成也治內傷邪不出治外感內不愈吾治肝膽內外皆愈蓋肝膽乃陰陽之會表裡之間也解其鬱喘可平用加味逍遙散白芍五錢白朮當歸茯苓三錢柴胡甘草蘇葉半夏厚朴一錢陳皮五分二劑痰氣清四劑喘愈病成於郁解鬱病自痊久咳忽大喘不止痰出如泉身汗如油此汗多亡陽吾謂可救以久嗽傷肺不傷腎也喘多傷腎久嗽未有不傷腎者以金不能生水腎氣自傷也然傷肺以致傷腎與竟傷腎不同蓋傷肺傷氣也傷腎傷精也故傷肺以致傷腎者終傷氣非傷精精有形氣無形無形者補氣可生精即補氣以定喘有形者必補精以生氣又必補精以回喘所以傷肺不比傷腎之難用生脈散麥冬一兩人參五錢北味二錢一劑喘定二劑汗止三劑痰少更加花粉當歸二錢白朮白芍五錢十劑全愈此方補氣聖藥補肺自生腎腎得水火不上沸龍雷自安腎臟不必又補腎以視傷腎動喘輕重不大殊哉故曰傷肺易不信然乎怔忡怔忡遇拂情聽逆言便覺心氣怦怦不能自主似煩非煩似暈非暈人謂心虛然心虛由肝虛肝虛肺必旺以心弱不能制肺也肺無火煉必制木太過肝更不能生心心氣益困故補心必補肝補肝尤宜制肺然肺嬌臟寒涼制肺必傷脾胃脾胃受寒不能運化水穀肝何所資腎又何益所以肺不宜制而宜養況肺愈養愈安愈制愈動用制忡湯人參白朮麥冬五錢白芍當歸棗仁一兩北味一錢貝母五分竹瀝十匙水煎調服十劑全愈妙全在不定心但補肝平木木平則火不易動補肺養金則木更靜木靜肝生血自潤心液不助心焰怔忡自愈怔忡日輕夜重欲思熟睡不可得人謂心虛極誰知腎氣乏乎人夜臥心氣下降腎宮腎不虛則開門延入彼此歡然惟腎太耗家貧客至束手無策客見如此自不久留徘徊岐路托足無門傍徨四顧又將何如法大補腎精腎精充足自然客至相投開宴暢飲用心腎兩交湯熟地一兩棗皮炒棗仁八錢人參當歸白芥子麥冬五錢肉桂黃連三分一劑熟睡十劑全愈此補腎仍補心似無專補不知腎足心虛主富客貧菲薄輕棄今心腎兩足素封之主見多金之客自相得益彰況益連桂介紹有不賦膠漆者吾不信也心常怦怦不安若官事未了人慾來捕之狀人謂心氣虛誰知膽氣祛乎少陽膽心母也母虛子亦虛又何疑乎惟膽氣虛何更作怔忡不知各臟皆取決於膽膽氣一虛各臟無所遵從心尤無主故怦怦不安似怔忡實非怔忡法徒補心則怔忡不能痊補各臟腑而不補膽氣內無剛斷之風外有紛紜之擾安望心之寧靜乎故必補膽氣後可去祛用堅膽湯白朮人參五錢茯神花粉生棗仁三錢白芍二兩鐵粉丹砂竹茹一錢二劑膽壯十劑怦怦如失此肝膽同治亦心膽共治肝膽相表裡治膽因治肝者兄旺弟不衰也心膽為母子補膽兼補心者子強母不弱也況鎮定之品以安神刻削之味以消痰宜取效之速也驚悸聞聲驚心怦怦半日後止人謂心有痰痰藥不效久不必聞聲亦驚且悸常若有人來捕者是驚悸相連而至雖是心虛驚悸實不同蓋驚輕悸重驚從外來動心悸從內生動心也若怔忡正悸之漸也若悸非驚之漸也故驚悸宜知輕重一遇怔忡宜防驚驚宜防悸然雖分輕重治虛則一用安定湯黃耆熟地一兩當歸生棗仁白朮茯神麥冬五錢遠志柏子仁玄參三錢半夏二錢甘草一錢一二劑輕十劑愈夫神魂不定而驚生神魂不安而悸起皆心肝血虛血虛則神無歸魂無主今大補心肝之血則心肝有以相養何有驚悸倘用藥驟效未幾仍然者此心肝大虛另用鎮神丹人參四兩當歸麥冬生棗仁茯苓生地三兩白朮五兩遠志二兩熟地八兩柏子仁白芥子醋淬龍骨一兩虎睛一對陳皮三錢各為末密丸滾水下早晚各五錢一料全愈龍能定驚虎能止悸入補心腎藥中使心腎交神魂自定先驚後悸亦有先悸後驚似不同不知實無異不過輕重之殊前已備言此又重申者蓋辨驚悸分中有合閤中有分耳驚有出於暫不出於常悸有成於暗不成於明者又不可不別暫驚輕於常驚明悸重於暗悸而驚悸仍伺則將分治乎抑合治乎知其閤中之分則分治效知其分中之合則合治亦效蓋驚出於暫吾治其常悸出於明吾治其暗吾一方合而治之名兩靜湯人參巴戟天一兩生棗仁二兩菖蒲一錢白芥子丹砂三錢四劑定方妙在生棗仁之多以安心尤妙在人參巴戟以通心腎則心氣通腎夜安腎氣通心日安又何慮常暫明暗哉虛煩遇事或多言煩心生常若胸中擾攘不思而念若紛紜不動而意若嘈雜此俗云虛煩乃陰陽偏勝火有餘水不足也或謂虛煩乃心熱加膽寒心熱則火動生煩膽寒則血少厭煩不知虛煩本心熱無膽寒夫膽喜熱惡寒世云膽寒則怯者正言膽之不寒也然膽寒則怯何敢犯火熱之心可見虛煩是心火熱非膽木寒矣古人用溫膽湯治虛煩而煩轉甚者正誤認膽寒也治宜補心兼清心之味則正寒益心而虛煩除用解煩益心湯人參當歸花粉二錢黃連白朮一錢生棗仁茯神三錢玄參五錢甘草三分枳殼五分一二劑煩除此純清心藥加消痰者有火必有痰也火化痰而煩益劇者痰火散而煩自釋矣況有補心之劑同群共濟哉年老虛煩不得寐大便不通常有熱氣自臍下直衝心便覺昏亂欲絕人謂火氣衝心誰知腎水大虧乎夫心液實腎精也心火畏腎水克為假喜腎水生乃真心得腎交心乃生心失腎通心乃死虛煩心死之漸惟腎既通心何以臍下之氣上衝而生煩得毋關元之氣非腎之氣不知腎之交心乃腎水非腎火老人孤陽無水熱氣上衝腎火衝心也火有餘實水不足大補腎水則水足制火火不上衝煩自止用六味地黃湯加味治熟地一兩棗皮炒棗仁麥冬白芍丹皮五錢山藥四錢北味一錢茯苓澤瀉甘菊柴胡五分二劑煩卻四劑大便通二十劑不發六味補水麥冬滋化源柴芍平肝肝平相火無黨不致引包絡火又得棗仁甘菊相制則心氣自舒復有腎水交通有潤無燥有不寧乎不寐晝夜不能寐人謂心熱火動不止誰知心腎不交乎蓋痛不交心日不寐心不交腎夜不寐日夜不能寐心腎兩不交耳所以不交者心過熱腎過寒也心屬火過熱則炎上而不交腎腎屬水過寒則沉下而不交心法使心不熱腎不寒自然寒中有熱熱中有寒兩相引兩相合用上下兩濟湯人參白朮五錢熟地一兩棗皮三錢肉桂黃連五分一劑即寐蓋黃連涼心肉桂溫腎同用交心腎於頃刻然無補藥輔之則熱者太燥寒者過涼得參朮棗皮熟地則交接無非歡愉然非多用則力薄恐不能久效憂愁後終日困倦至夜兩目不得閉人謂心腎不交誰知肝血太燥乎憂愁必氣鬱郁久肝氣不舒肝血必耗血耗上不能潤心下取給於腎腎水不禁不能供肝矣如是腎見肝親閉關而拒肝為腎子棄而不顧心為腎仇烏肯引火自焚所以堅閉不納也法須補肝血滋腎水自然水養木肝交心矣用潤燥交心湯白芍當歸熟地玄參一兩柴胡菖蒲三分二劑解四劑熟睡方用歸芍滋肝肝氣自平熟地滋腎水足濟肝肝血益旺又得玄參解心火柴胡菖蒲解肝鬱引諸藥直入心宮則腎肝自交夜不能寐畏鬼輾轉反側少睡即驚再睡恍如捉拿人謂心腎不交誰知膽氣怯少陽膽在半表裡心由少陽交腎腎亦由少陽交心膽氣虛心腎至不能相延為介紹心腎怒兩相攻擊膽愈虛驚易起益不能寐宜補少陽膽然補膽又不得不補厥陰肝蓋肝膽表裡補肝正補膽用肝膽兩益湯白芍炒棗仁一兩遠志五錢二劑熟睡三劑驚失白芍入肝膽遠志棗仁似入心不入膽不知二味入心亦入膽況同白芍用又何疑乎膽既旺又何懼心腎不投自然往來介紹稱魚水媒來夢矣神氣不安魂夢飛揚身在床神若遠離聞聲既驚通宵不能閉目人謂心氣虛誰知肝經受邪乎肝藏魂肝血足則魂藏虛則魂越遊魂多變亦由虛也否則魂藏肝中雖邪引不動故得寐今肝血既虧肝皆火氣魂將安寄一若離魂身與魂為兩矣然離魂魂離能見物不寐則不見物所以不能見物者陰中有陽非若離魂之純陰也法祛肝邪先補肝血血足邪自離夢自絕用引寐湯白芍一兩當歸麥冬五錢龍齒末火煅柏子仁二錢菟絲巴戟炒棗仁茯神三錢數劑自愈方補心肝用之甚奇者全在龍齒古謂治魂不寧宜虎睛治魂飛場宜龍齒取其入肝平木也夫龍能變化動象也不寐用龍齒不益助遊魂不定乎不知龍雖動而善藏動之極正藏之極用龍齒以引寐非取其動中之藏乎此古未言余不覺泄天地之奇心顫神懾如處孤壘四面受敵達旦不寐目無見耳無聞欲少閉睫不可得人謂心腎不交誰知膽虛風襲乎膽虛則怯邪乘而入既入膽中膽氣無主膽欲通心邪不許膽欲交腎邪又不許此目無見耳無聞也心腎因膽氣不通亦各守本宮不敢交接故欲閉睫不可得少陽膽屬木風木同象故風最易入風乘膽虛居而不出膽畏風威膽愈怯矣何啻臥薪嚐膽安得悠然來夢乎法必助膽氣佐祛風蕩邪風散膽壯庶可高枕而臥用祛邪益膽湯柴胡白芥子二錢郁李仁竹茹甘草一錢烏梅一個當歸一兩川芎沙參三錢麥冬五錢陳皮五分二劑顫懾止四劑耳聞目見亦熟睡方全不引心腎惟泄膽木風邪又得芎歸相助風邪外散膽汁不幹可以分給心腎自心腎交欲寐矣健忘老年健忘遠近事多不記憶此健忘之極人謂心血涸誰知腎水竭心火腎水似克實生心必藉腎以相通火必得水而相濟如只益心血不填腎精血雖驟生精仍長涸法須補心兼補腎使腎水不幹上達於心而生液然年老陰盡煎劑恐難勝務以丸藥繼之煎用生慧湯熟地一兩棗皮四錢遠志白芥子二錢生棗仁柏子仁去油五錢茯神人參三錢菖蒲五分月餘自愈此方心腎兼補上下相資若能日服一劑不但卻忘並延齡若苦難服用扶老丸人參白朮黃耆當歸玄參柏子仁麥冬三兩茯神二兩熟地八兩棗皮棗仁四兩龍齒三錢白芥子一兩菖蒲五錢各細末蜜糊丹砂為衣日夜滾水吞三錢久服愈此老少可服年老尤宜蓋補腎之味多於補心精足心液生心竅啟心神清何至昏昧善忘壯年善忘或大病後或酒色過度世謂尋常不知本實先拔久變異症而死者多矣此乃五臟俱傷不止心腎二經病法宜治心腎然徒治心腎胃弱不受補甚為可慮必須強胃胃強始能分布精液於心腎用生氣湯人參生棗仁棗皮二錢白朮半夏麥冬一錢茯苓芡實三錢遠志八分甘草神麯肉桂菖蒲三分木香一分熟地五錢三十劑全愈此方藥味多分兩少以病人久虛大劑恐有阻滯味少恐無調治所以圖功緩奏效遠尤妙在扶助胃氣仍補心腎又妙在五臟同補有益無損氣鬱不舒如有所失近事不記如老人善忘此肝氣滯非心腎虛肝氣最急鬱則不能急以致腎氣來滋至肝則止心氣來降至肝則回心腎間隔而遺忘法須通肝滯後心腎通何至近事失記然肝氣通必於補心腎中解肝氣鬱則鬱猶易解否則已郁雖開未郁必至重結用通郁湯白芍一兩茯神熟地玄參麥冬三錢人參白芥子二錢當歸白朮五錢柴胡一錢菖蒲五分四劑郁盡解善忘愈方善解鬱又無刻削乾燥直解肝鬱使肝血大旺既不取給於腎復能助心心肝腎一氣貫通尚失記哉隨說隨忘人謂祟恁誰知心腎兩開乎心腎交智慧生心腎離智慧失苟心火旺腎畏火炎不敢交心腎水虧心惡水竭不肯交腎如夫婦兩不相親況越陌之人無怪其善忘治須大補心腎使相離者相親自相忘者相憶用神交湯人參麥冬一兩巴戟山藥玄參兔絲一兩柏子仁芡實五錢丹參茯神三錢十劑愈一月不再忘方似重治心輕治腎不知夫婦必男求女易相親重治心正欲使心先交於腎妙在無一味非心腎同治藥使兩相交兩相親癲癇素髮癲喃喃不已叫罵歌唱痰如蜒蚰之涎人謂痰病然清痰化涎藥不效蓋此胃有微熱氣又甚衰故似癲非癲也法宜補胃氣微清胃火然胃氣衰由心火弱胃火盛由心火微又未可徒補胃氣清胃火用助心平胃湯人參生棗仁五錢茯神一兩貝母甘菊三錢神麯甘草菖蒲一錢肉桂三分二劑除此補胃氣以生心氣尤妙在助心火平胃火故心胃兩益不治癲自愈壯年痰氣盛猝仆倒作牛馬鳴世謂牛馬之癲其實虛寒之症痰入心包也心與心包屬火心喜寒心包喜溫所以寒入心包即拂其性況又痰氣侵乎夫痰臟腑無不入何犯包絡即至迷心不知包絡相臣痰氣侵心包絡先受包絡衛君惟恐有犯情願身當故痰一入即號召勤王呼諸臟腑相救作牛馬聲痛不擇聲也宜救心尤宜急救心包用濟難湯白朮人參五錢茯神柏子仁半夏三錢菖蒲五分遠志花粉南星附子神麯一錢二劑愈八劑不發救心包仍救心君相兩安況附子南星斬關奪門主聖臣良自指揮如意小兒易發癲癇雖由飲食失宜亦由母腹中受驚故遇可驚便跌僕吐涎作豬羊聲世謂豬羊之癲用祛痰搜風藥益甚小兒脾胃虛弱尚不識補何能悟先天虧大補命門膻中火所以益甚治宜補脾胃更補命門生脾膻中生胃不治痰痰自化用四君加減人參一錢茯苓三錢白朮二錢甘草一分附子一片半夏八分白薇三分一劑愈四君補脾胃脾胃健驚風自收況附子無經不達更補命門膻中火生脾胃土更易旺痰更易消又益半夏逐敗濁白薇收神魂安得動癲婦發癲不識羞見男如飴見女甚怒甚至赤身露體此肝火熾思男不可得鬱結成癲也肝火熾何成癲蓋婦女肝木旺肝火逼心則心君下殿然包絡外護何任威逼不知肝火乃虛火虛火與相火同類庇比匪忘聖明直燒宮殿然心君走出何但癲不死蓋腎水救援思男子不得因腎旺雖是腎火腎水實涸然肝火逼心有腎水資所以但癲不死治法泄肝木並補腎水兼舒鬱氣為得用散花丹柴胡花粉三錢炒梔子茯神五錢白芍熟地玄參二兩當歸生地一兩陳皮一錢三劑癲失方妙泄肝火不耗肝血疏肝鬱不散肝氣更妙補腎不救心焰水足木得所養火自息於木內火息神安魂自返肝中況消痰利水痰氣盡消化水同趨膀胱欲再花癲不可得也為賊所執至受刀始釋失心如癡人謂失神誰知膽落乎膽附肝因驚而膽落者非膽果落肝中蓋膽汁散不收如膽之落肝耳膽既墮落則膽汁盡為肝所收則肝強膽弱心不能取決於膽心即如失如癲癡法泄肝補膽則膽汁生癲癡愈用卻驚丹附子三分陳皮丹砂鐵粉遠志薄荷南星一錢白朮茯神半夏人參三錢當歸五錢花粉二錢各為細末密丸彈子大薑湯下一丸驚收三丸癲癡愈不必盡服此安神定志全在鐵粉即鐵落最抑肝邪又不損肝氣木畏金刑用鐵落取剋木也克肝未必不克膽然肝陰木膽陽木鐵落克陰不克陽故制肝不制膽所以伐肝邪即引諸藥直入膽生膽汁不獨取其化痰靜鎮耳思慮過度耗損心血或哭或笑裸體而走閉戶自言喃喃不已人謂花癲誰知失志之癲乎思慮傷脾脾氣損即不能散精於肺肺氣又傷清肅之令不行脾氣更傷脾心子脾病心必來援心見脾傷以至失志則心中無主欲救無從欲忘不得呼鄰不應忌仇來侵將為從井見人嚅囁背客絮叨遂癲非急清其心不可然心病由於脾補心以定志不若補脾以定志尤神用歸神湯人參茯神麥冬五錢白朮巴戟一兩半夏柏子仁不去油白芥子三錢陳皮甘草丹砂菖蒲一錢各為末先將紫河車一具洗淨煮熟不去血絲搗爛入藥末再搗為丸白滾水送下五錢違服數日自愈此心脾同治消痰不耗氣尤炒在紫河車為先後天之母神得紫河有依志即依神相守不特已失者回既回者尤永固狂熱極發狂登高呼棄衣走氣喘汗出如雨此陽明胃火登高棄衣者何蓋火炎上內火熾騰身自飛揚熱鬱胸中得呼則氣泄衣乃蔽體內熱盛得衣不啻如焚棄則快火盛刑金自大喘肺主皮毛不能外衛腠理開泄陰不攝陽逼汗外出汗出心無血養神將飛越安得不發狂用加味白虎湯救人參二兩石膏麥冬三兩知母茯苓半夏五錢甘草一錢竹葉三百片米一撮二劑愈不可三劑非白虎急救胃火則腎水立干身成黑炭然火燎原非杯水可救必得滂沱大雨始能撲滅發狂腹滿不得臥面赤身熱妄見妄言如見鬼此陽明胃火盛然胃火屬陽妄見妄言見鬼又陰症不知陽明火盛由心包火盛陽明屬陽心包屬陰二火齊發故腹滿不得臥倘只胃火雖口渴腹滿尚可臥唯心包助胃齊發遂至心神外越陰氣乘之妄見妄言如見鬼法宜泄胃不必泄心包火蓋胃心包子母盛子始旺然子衰母亦弱泄胃即泄心包用泄子湯玄參三兩甘菊一兩知母花粉三錢一二劑二火平狂愈論理可用白虎然過峻心包屬陰白虎泄陽畢竟有傷陰氣不若此既泄陽又無損陰或曰母盛子始旺泄心包火何必泄胃不知胃火最烈胃火熾腎水立干故必先救胃火胃火息心包火亦息倘先泄心包寒涼之藥必由胃而後入心包假道滅虢不反動胃火怒乎不若直泄胃火既制陽又制陰易喜易怒狂妄譫語心神散亂目有所見人疑胃火不知乃心火耳心熱發狂膻中之外衛謂何亦因心過酷熱包絡膻中何敢代君司令喜笑不節如君恣肆威權宰輔不敢輕諫左右無非便佞自然聲色娛心語言博趣偏喜偏笑所發無非亂政及令不行渙散景象有如鬼域人心發熱亦然然心熱發狂至神越宜立亡何能苟延歲月不知心熱不同胃熱胃熱發狂外熱犯心心熱乃內熱自亂故胃狂有遽亡心狂有苟延用清心丹黃連人參丹參三錢茯神生棗仁五錢麥冬一兩一二劑定不必用三劑黃連清心然徒用連則心燥連性亦燥恐燥以動燥所以又用二參麥冬潤以濟之火有餘自氣不足補氣以泄火則心君無傷可靜不可動矣身熱發狂言淫亂喜無非愉悅一拂言違事狂妄猝發見神鬼人謂心熱極誰知心包熱乎心包心君相也君靜胡相拂亂至此蓋君弱臣強心寒極不能自主耳如懦主寄權於相相植黨營私生殺予奪悉出其手奉令者立遷除違命者輒褫革甚則殺人如兒戲輕人如草菅顛倒是非違禮背法不必神怒鬼擊彼心若有所見心包熱狂正似法宜泄心包火然徒治心包心君內寒愈震主反有犯上必補心呼召外臣掃清君側用衛主湯人參玄參一兩茯苓麥冬生地五錢花粉丹皮三錢四劑症愈玄參生地丹皮清心包參苓麥補心心強心包之火自弱況玄參等清心包亦補心自撥亂反正或謂心君虛寒用參是矣然玄參丹皮生地雖涼心包獨不益心寒乎似宜加熱藥濟之嗟乎心寒用熱藥理也然用熱藥益心必由心包入恐心未得益轉助心包焰不若人參助心亦助心包是人參非心包所惡同玄參等共入自然擁衛心君指揮群藥掃蕩炎氛心氣自旺寒變為溫強橫折辱憤懣不平病心狂持刀逾屋披頭大叫人謂陽明胃火盛誰知陽明胃土衰乎陽明火盛必由心火太旺心火旺胃火盛是火生土心火衰胃火盛是土敗於火火生土胃安土敗火胃變雖所變似真火盛中已無根必土崩瓦解狂實熱余謂虛熱孰信不知臟腑實熱可涼折虛熱必溫引然胃虛熱又不可全用溫引於溫中佐微寒實善蓋陽明胃虛熱乃內傷非外感因憤生熱不同邪入生熱明甚以邪熱為實熱正熱為虛熱耳用平熱湯人參白芍五錢黃耆麥冬一兩甘草黃芩一錢青皮炒梔子柴胡五分竹瀝一合茯苓棗仁花粉三分四劑定服一月安此變化竹葉石膏湯以治陽明虛熱耳甘溫退大熱佐之甘寒使陽明火相順不相逆轉能健土於火宅消煙於余氛土有根火自息倘認實熱用竹葉石膏誤矣忍飢過勞忽發狂披髮裸體罔知羞惡人謂失心病誰知傷胃動火乎陽明胃火動多不可止世皆謂胃火宜泄不宜補然胃實可泄胃虛不可泄經云二陽之病發心脾二陽正胃也胃為水穀海能容物物入胃消胃亦得物養物養胃火靜胃失物火動至火動胃土將崩必求救於心脾心見胃火沸騰有切膚之痛自擾亂脾見胃火焚燒有震鄰之恐亦紛紜勢必失依安得不發狂法不必安心脾仍救胃氣狂自定雖然欲救胃氣不少殺胃火胃氣亦不能獨存用救焚療胃湯人參玄參一兩竹瀝一合陳皮三分神麯五分山藥百合五錢三劑愈人參救胃玄參殺胃火群藥調停心脾肺腎使肝不傷胃胃氣尤易轉胃轉心脾寧有擾亂呆終日悠悠忽忽不言語不飲食忽笑歌忽愁哭與美饌不受與糞大喜與衣不服與草木葉反喜人謂呆病不必治然其始起於肝鬱其成由於胃衰肝鬱則木剋土痰不化胃衰則土不制水痰不消於是痰積胸中盤踞心外使神明不清呆成宜開鬱逐痰健胃通氣則心地光明呆景盡散用洗心湯人參茯神生棗仁一兩半夏五錢陳皮神麯三錢甘草附子菖蒲一錢水煎半碗灌之必熟睡切不可驚醒反難愈此似祟憑實無即有祟補正邪自退蓋邪氣實因正虛入此補正絕不祛邪故奏功或謂正虛無邪何多用二陳不知正虛必生痰不祛痰則正氣難補補正因以祛邪是消痰仍補正或又謂呆成於郁不解鬱單補正攻痰何能奏功不知始雖成於郁郁久則盡亡之矣故但胃氣以生心氣不必又治肝氣以舒鬱氣也人有呆病終日閉戶獨居口中喃喃多不可解將自己衣服用針線密縫與之食時用時不用嘗數日不食而不呼飢見炭最喜食之謂是必死之症尚有可生之機也夫呆病而至於喜糞尚為可救豈呆病食炭反忍棄之乎喜糞乃胃氣之衰而食炭乃肝氣之燥凡飲食之類必入於胃而後化為糟粕是糞乃糟粕之餘也糟粕宜為胃之所不喜何以呆病而轉喜之乎不知胃病則氣降而不升於是不喜升而反喜降糟粕正胃中所降物也見糞而喜者喜其同類之物也然而呆病見糞則喜未嘗見糞則食也若至於食糞則不可治矣以其胃氣太降於至極耳夫炭乃木之燼也呆病成於郁郁病必傷肝木肝木火焚可傷心則木為心火所克肝中血盡燥而木為焦枯之木矣見炭喜食喜其同類食之思救肝之燥耳然生機正在食炭炭無滋味食如飴胃氣未絕也治胃氣祛痰涎呆可愈用轉呆丹人參當歸半夏生棗仁菖蒲茯神一兩白芍三兩柴胡八錢神麯柏子仁五錢花粉三錢附子一錢水十碗煎至一碗灌之倘不肯服以杖擊使怒後灌之必詈罵少頃倦臥切莫驚動自醒全愈驚醒只可半愈此大補心肝加祛痰開竅肝得滋潤自蘇心得補助自旺於是心氣清肝氣運祛逐痰涎隨十二經絡盡通何呆不愈若驚醒氣血不能盡通經絡不能盡轉故半愈然再服必全愈忽成呆全不起憂鬱狀與呆同人謂祟恁誰知起居失節胃氣傷痰迷乎胃土喜火生然火亦能害土火不來生則土無生氣火過來生土有死氣然土中之火本生土何反害土豈屬外來邪火非內存正火乎孰知邪火固害土正火未嘗不害土何也正火能養火且生土以消食正火相傷火即害土以成痰痰成復傷胃土則火且迷心輕成呆重發厥起居失節則胃中勞傷不生氣而生痰一時成呆乃痰迷心脘下尚未直入心包倘入心包人且立亡宜生胃氣佐消痰用起心救胃湯人參茯苓一兩白芥子神麯三錢菖蒲黃連甘草一錢半夏南星二錢枳殼五分三劑愈此救心正救胃蓋胃乃心子心氣旺胃氣自清設作呆病用附子斬關直入以火助火發狂死總之呆成於久不成於暫一時成呆非真也故久病宜於火中補胃消痰猝病宜於寒中補胃消痰不可不知呃逆忽呃逆不止人謂寒氣相感誰知氣逆寒入乎然氣逆非氣有餘乃不足也丹田氣足則氣守下焦順丹田氣不足則氣奔上焦逆症雖小徒散寒不補氣多成危症宜大補丹田氣少佐祛寒則氣旺可接續寒祛能升提呃逆自止用定呃湯人參三錢白朮茯苓五錢丁香陳皮五分沉香末牛膝一錢一劑愈參苓白朮補氣回陽丁香祛寒沉香牛膝降丹田以止逆逆氣既回呃聲自定痰氣不清忽呃逆人謂火逆作祟火逆口必渴今不渴呃逆仍是痰氣非火邪痰在胃口呃逆在丹田何能致此不知怪病多起於痰安得呃逆獨異此丹田氣欲升痰結胸中不使其氣直上也較虛呃甚輕消痰氣呃逆自除用二陳湯加減治入參陳皮五分半夏厚朴一錢甘草三分茯苓三錢一劑即愈二陳治痰加人參厚朴補中降氣自祛痰於上焦達氣於下焦口渴舌燥飲水後忽呃逆人謂水氣誰知火氣逆乎此胃火胃火太盛必大渴呼水今但渴不喜大飲乃胃氣虛胃火微旺故飲水雖快多則不能消火上衝呃逆宜補胃土降胃火則胃氣安胃火息呃逆自止用平呃散玄參白朮五錢甘菊茯苓麥冬三錢人參二錢甘草五分一劑即平此降火不耗氣倘輕用石膏雖取勝胃終有傷他症必生惱後肝血燥肺氣熱忽呃逆不止人謂火動誰知氣逆不舒乎肝性最急拂必下克脾土脾土氣閉則腰臍間不通奔咽喉作呃逆倘用降火降氣藥呃逆更甚必須散郁佐消痰潤肺用解呃丹茯神白芍三錢當歸白芥子二錢白朮蘇葉五分麥冬五錢柴胡一錢一劑即止此散郁神方不特治呃逆白朮利腰臍氣柴芍歸舒肝膽麥冬蘇葉潤肺茯神通心與膀胱氣白芥子宣膜膈氣故一身之氣流通何慮下焦氣不升咽喉呃逆時作時止人謂氣滯誰知氣虛乎氣旺順衰逆逆之至皆衰之極使氣衰不甚何至於逆惟衰極則氣弱不能轉呃逆生氣衰呃逆不比痰呃火呃補氣自止倘徒消痰降火則輕變重重必死況痰火之呃亦虛而致之不只寒呃之成於虛也然不補虛何以治呃用六君子湯加減治人參茯苓三錢白朮一兩陳皮一錢甘草三分半夏二錢柿蒂三枚連三劑呃自除此治胃聖藥胃氣弱諸氣自弱故補胃氣正補諸氣也氣旺尚有氣逆乎況柿蒂尤易轉呃胃多氣之腑氣逆從胃始氣順獨不從胃始乎故胃氣轉諸氣無不轉
