body:
  text: 卷十一帶門下流白物如涕唾不止自然而下者甚則臭穢白帶也夫帶病俱是濕病以帶名者因婦人有帶脈不能約束故也帶脈通於任督任督病帶脈亦病帶脈只婦人有之所以束胞胎之系婦人無帶脈則難以系胎故帶脈弱胎易墮損傷帶脈胎必不牢然帶脈損傷非獨跌閃挫氣已也行房過縱送飲酒出顛狂雖無疼痛其中暗耗則白物自下故帶病師尼寡婦嫁女多處子少況脾氣虛肝氣鬱濕氣侵火氣逼安得不成帶下白帶者濕盛火衰肝鬱脾虛則脾土受傷濕土之氣下陷是以脾精不守不能化為榮血變白滑物由陰門直下欲禁止不得宜大補脾胃氣少佐舒郁使風木不閉塞地中地氣自升於天上脾氣健濕氣自消方用完帶湯白朮山藥一兩甘草半夏一錢前子蒼朮三錢陳皮荊芥五分人參二錢白芍五錢柴胡六分六劑全愈此脾胃肝三經同治寓補於升寄消於散開提肝氣則肝血不燥何致下克脾土補益脾土則脾經不濕何難分消水氣至補脾兼補胃者脾胃表裡脾非胃氣強則脾弱不能旺然補胃正補脾耳帶下色紅似血非血赤帶也赤帶亦濕病濕亦現黃白色不現黃白現赤者火熱也火色赤故帶下亦赤但帶脈繫腰臍間近至陰地不宜有火豈路通命門腎火出乎不知帶脈不通腎而通肝憂思傷脾又鬱怒傷肝肝火內熾下克脾土脾土不能運化濕熱蘊結於帶脈肝火焚燒肝血不藏亦滲於帶脈內帶脈又因脾氣傷約束無力濕熱隨氣下陷同血而俱下觀其形象似血而非血其實血與濕俱不能兩分世以赤帶屬心火誤耳宜清肝火扶脾氣赤淋庶可愈方用清肝止淋湯歸芍黑豆一兩阿膠丹皮三錢生地五錢牛膝二錢黃柏香附一錢紅棗十枚十劑不發此補肝血不利脾濕者以赤帶火重濕輕也火旺由於血衰補血足以制火矣但水與血合成赤帶竟不能辨其是濕非濕則濕盡化為血矣故治血可也何必利濕方妙在純治血少加清火故獨奇倘利濕反引火下行轉難遽效或問前言助脾土今何補肝絕不補脾不知芍藥平肝肝舒自不克脾是補肝正所以扶脾又何必加參術哉帶下色黑甚如墨汁其氣最腥人謂下寒極誰知火熱極乎火色紅何成黑色不知火極似水假象也其症必然腹痛小便時必如刀觸陰門必發腫面必紅久則黃瘦飲食兼人口必大渴飲涼水少覺寬快此命門膀胱三焦火合胃火又旺四火同煎安得不成炭色不發狂者以腎水與肺金之氣涓涓不絕是以潤心濟胃耳故飲水下胃但成帶下火結於下不炎上惟以泄火為主火退濕熱自舒用利火湯白朮石膏五錢大黃茯苓前子王不留行劉寄奴黃連炒梔子三錢知母二錢六劑全愈此方迅利殊不知救焚少緩火勢延燒不盡不止今用黃連石膏知母梔子寒涼泄火入大黃中迅速掃除又得王不留行劉寄奴利濕甚急俱無停住之機佐朮苓車前速成功也帶下色黃宛如黃茶濃汁其氣帶腥人謂脾經濕熱誰知任脈濕熱乎夫任脈本不容水何濕氣入化黃帶不知帶脈橫生通於任任脈直上達唇齒唇齒間原有不斷之泉下灌於任脈使任脈無熱則口中津液盡化為精入腎惟熱存下焦則不化精化而化濕水白火紅今濕與熱合欲變紅不能化白不得煎熬成汁因變為黃黃土色真水火合成丹邪水火合成帶世以黃帶為脾濕熱單治脾此故難痊也方用退黃湯山藥芡實一兩黃柏二錢車前子一錢白果十枚四劑全愈此方白帶俱治但黃帶尤效蓋山藥芡實專補任虛又利水加白果引入任脈使捷效至用黃柏清腎火腎與任脈相通同群共濟解腎火即解任脈熱此症亦可用解帶利濕湯治之白果茯苓各一兩澤瀉車前子炒梔子各二錢水煎服帶下色青甚如綠豆汁稠黏不斷其氣亦腥人謂小腸濕熱誰知肝經濕熱乎肝屬木色青帶下流綠豆汁明是肝病但肝最喜水濕亦水似非肝所惡何竟成青帶不知肝喜水惡熱以所惡合所喜必違其性矣肝性既違肝氣必逆氣上升濕欲下降兩相牽制必停住中焦走帶脈從陰門出色青綠者正其乘肝氣也逆輕者熱必輕色青逆重者熱必重色綠似治青易治綠難然解肝火利膀胱水帶病自愈方用逍遙散加減茯苓白朮白芍五錢甘草五分陳皮柴胡一錢茵陳炒梔子三錢四劑愈逍遙散解鬱何取治青帶如神蓋肝經濕熱留者因肝氣逆逍遙散最解肝逆逆平濕熱難留況茵陳利濕梔子清熱肝氣清涼青綠又何來乎此方之奇也倘僅治青帶惟利濕清熱置肝氣於不問安有止帶之日哉血枯門婦年未七七先斷人謂血枯誰知心肝脾郁乎凡血枯必死此血閉也且經水乃天一之水出腎經至陰精有至陽之氣故色紅似血非血以經水為血千古之誤何不名血水古聖呼經水者以水出腎經名之也是經早斷必腎水衰涸何謂心肝脾氣鬱蓋腎水生雖不由三經而腎非肝氣相通腎氣不能開非心氣相交腎氣不能上非脾氣相養腎氣不能成一經郁則氣不入腎腎氣即閉塞不通況三經同郁乎腎水足尚格格難出況腎氣原虛何以媾精盈滿化經外泄此經閉似血枯耳必散三經郁大補腎仍補三經氣則精溢經自通用溢經湯熟地白朮一兩山藥當歸五錢生棗仁白芍沙參三錢丹皮二錢人參二錢柴胡杜仲一錢八劑經通一月人健受孕此心肝脾腎同治妙在補水以通之散郁以開之倘徒補則鬱不開生火徒散則氣益衰耗精或用攻堅並辛熱之品無益反害室女月經不來腹大如娠面乍赤乍白脈乍大乍小人謂血枯經閉誰知鬼憑乎心邪則鬼來或夢裡求親目中相狎或托戚屬貪歡或言仙子取樂久之精神僅供腹中邪邪旺正衰必經閉血枯欲導經邪據腹經難通欲生血邪飲精血難長因而癆瘵至死不悟悲乎宜先去邪後補正用蕩邪丹雷丸大黃三錢桃仁三十粒當歸丹皮五錢生草二錢一劑下穢物半桶再用調正湯二朮苡仁五錢茯苓三錢陳皮甘草貝母一錢四劑經漸行或疑鬼胎必傷血故血枯而後經閉今墮其胎何不補血反補胃氣蓋鬼氣中人正虛可知且血不驟生補氣自易生血二術補陽氣陽旺陰自難犯倘服補血藥則陰以招陰恐胎雖下鬼氣必再種不若補陽氣使鬼難侵生血亦速血崩血崩雙目黑暗昏暈於地人謂火盛動血然此乃虛火世治血崩每用止澀然虛火不補易於衝擊必隨止隨發終不能愈必須補中行止用固本止崩湯熟地白朮一兩參耆三錢當歸五錢黑薑末二錢十劑不發倘畏藥重減半必不能止方妙補血更補氣不但補氣且補火何也血崩至黑暗昏暈則血必盡去僅存氣一線耳若不急補氣則有形血不能速生無形氣必且盡散故補血先補氣然補氣不補血血不易生補血不補火血且凝滯不能隨氣速生況乾薑引血歸經補中有收故並用老婦血崩目暗昏地人以為老婦虛極因不慎房勞之故也誰知是多言傷氣且不節飲食之故乎夫老婦原宜節損飲食復加閉口始氣不傷而神旺無奈老婦聞喜事而心開稱譽不肯閉舌未免有不宜言而言者況原有宿疾安肯無言故一發而不可救夫老婦血衰因氣虛之極而不能生也況加之多言耗氣又安能助氣以生血乎氣益衰而血難長矣故衝任大開欲不崩而不可得者治法必止其血也誰知血愈止而愈多以氣衰不能攝血耳方用助氣斂血湯白朮二兩土炒黃耆四兩醋炒三七末三錢水煎服一劑血少止二劑血止四劑全愈此方補氣不補血以氣能止血也加之醋炒耆術專以酸能救血也加之三七者以其能斷血也然必多服始能愈者以老婦血虧氣衰不大補何以止其耗散之元陽使氣旺以生血乎然此方可以暫止老婦之血不能久旺老婦之氣也另用前方去三七而多加當歸用補血湯朝夕吞服並行為之得到老婦血崩症如前此不慎房幃也七七天癸絕宜閉關不戰即戰宜草草了事未必腎火大動倘如少年浪戰必血室大開崩決而下用當歸補血湯加味耆歸一兩三七末三錢桑葉十四片四劑不發設再犯色必重病補血湯氣血雙補三七根止血桑葉滋陰又收斂但年老陰精既虧此方雖神恐難永遠以補精藥尚少服此後加白朮五錢熟地一兩山藥四錢麥冬三錢北五味一錢服三月斷後受娠三月血崩胎墮人謂挫閃受傷誰知房事太過乎少婦行房者常何血崩氣衰耳氣衰不耐久戰久戰必泄精多則氣又衰不能攝血況久戰虛火內動精門不關血室亦不閉胎必不固內外齊動血又何能固自當補氣少佐止血用固氣湯參朮熟地五錢當歸杜仲三錢茯苓甘草棗皮二錢遠志一錢北味十粒十劑愈此固氣兼補血已去血速生將脫血盡攝凡因虛血崩皆效交感雖不如血崩然涓涓不止未免氣血兩傷久必血枯經閉此因前月水來貪歡交戰精沖血管也血管不可精傷受孕乃血管已淨初來血正旺彼欲出精射之則血退縮既不受孕以成胎勢必聚精而化血交感淫氣觸動舊日之積兩氣相感精欲出血隨出須通胞胎氣引精外出益以填精補氣血管之傷可再補用引精止血湯人參棗皮五錢白朮熟地一兩茯苓二錢前子炒黑荊芥三錢黃柏五分黑姜一錢十劑不發用參術補氣地棗補精精氣旺血管自流動加苓前利水水利血竅自利加黃柏直入血管引出夙精加荊芥引出敗血又益黑姜止血管之口此方實有調理曲折之妙故除舊疾然慎房事三月則破者不重損補者不再傷慎之甚郁作渴嘔吐吞酸血崩以火治或時效時不效蓋肝氣結也肝藏血氣結宜血結何反崩此肝性急氣結則更急急則血不藏法宜開鬱然開鬱不平肝則肝氣大開肝火更熾血何能止用平肝止血湯白芍二兩歸術一兩柴胡一錢三七根末丹皮生地三錢甘草荊芥二錢四劑愈妙在白芍平肝得柴胡而鬱盡解白朮利腰臍血不積住荊芥通經絡血有歸還丹皮涼骨髓熱生地清臟腑炎當歸補中止血自郁散血止跌僕升墜惡血下衝如血崩錯認血崩用止血適害之也手按必疼痛久之痿黃枯槁治須行血去瘀活血止疼血自止苟即用補澀瘀必內攻痛且不止新血不生舊血作祟用逐瘀止崩湯大黃龜板三錢生地一兩當歸五錢白芍二錢丹皮一錢枳殼五分桃仁十粒不必四劑方活血佐下泄故逐瘀止血或疑跌僕升墜由外傷內雖不比內傷重然既血崩內傷亦不輕何去瘀不顧氣不知本實未撥治標足矣何必顧本補內每戰即如血崩人謂胞胎有傷觸即動血誰知子宮血海因熱不固乎子宮在胞胎下而血海在胞胎上血海衝脈也衝脈寒血虧衝脈熱血沸血崩正衝脈熱然衝脈熱何必交戰始血來蓋脾健能攝血肝平能藏血也人未入房君相二火寂然不動雖衝脈熱血不外泄及戰子宮大開君相火齊動以鼓精房血海泛溢不可止遏肝欲藏血而不能脾欲攝血而不得故經水隨交感至若聲應之捷必絕色三月用滋陰降火藥涼血海則終身之病可半載愈用清海丸熟地桑葉白朮玄參一斤棗皮石斛八兩北味三兩麥冬沙參骨皮丹皮山藥十兩龍骨煅醋淬二兩為細末蜜丸滾水下早晚各五錢半年愈此補陰無浮動縮血無寒冷只用發灰白礬黃連五倍外治幽隱之處吾恐愈塞愈流調經經先期來其經多人謂血熱極誰知腎中水火旺乎火旺血熱水旺血多似勿藥有喜但過於有餘則子宮大熱恐爍干男精太過損之既濟道也然火不可任有餘水必不可使不足宜少清火不必泄水用清經散丹皮白芍熟地三錢骨皮五錢青蒿茯苓二錢黃柏五分二劑自平清火仍滋水火泄水不與俱泄則兩益經先期來甚少人亦謂血熱極誰知腎火旺水虛乎女子經最難調不細辨必鮮效先期者火氣衝多寡者水氣驗前來多火有餘此來少水不足倘俱謂有餘泄火不補水或水火兩泄必加病法不必泄火但補水水足火自消用兩地湯玄參生地一兩白芍麥冬五錢阿膠骨皮三錢四劑經調骨中熱由腎宮熱地骨生地俱涼骨中熱則腎氣自寒又不損胃氣況藥純補水水盛火安得不平經後期來甚多人謂血虛不知非也蓋後期來少血寒不足後期來多血寒有餘經水雖本於腎其流則臟腑之血皆歸故經來諸血盡來附益以徑開門啟不遑迅合血乘而出也血既出則成不足宜於補中溫之非後期俱不足也用溫經攝血湯白芍熟地一兩川芎白朮五錢肉桂柴胡五分續斷一錢北味三分二十劑調此大補腎肝脾之精血加肉桂去寒柴胡解鬱補中有散散不耗氣補中有泄泄不損陰故受補益收溫功凡經後來俱效誠調經攝血妙劑倘元氣虛加參一二錢經來斷續前後莫定人謂血虛誰知肝氣鬱結乎經出腎肝腎子肝鬱亦腎郁腎鬱氣自不宣前後或斷或續正腎氣或通或閉也然肝鬱腎不虛未必至此此子母關切子病母有顧復之情肝泄腎自有繾綣之誼肝氣或藏或閉則腎氣或去或留相因而至者又何疑開肝鬱即宣經水之流用定經湯歸芍菟絲子一兩熟地山藥五錢柴胡五分炒荊芥一錢茯苓三錢四劑期定此舒腎肝氣非通經藥補腎肝液不利水腎肝氣舒而經通腎肝津旺而水利故為妙數月一行經無先後多少之殊此乃無病氣血兩不虧損夫婦人有天生仙骨者經水以季為數不以月為盈虛女子經水不泄黃河便可逆流真氣內藏則坎中之陽不損倘加煉形之法一年之內便飛昇然世人見經水不來妄加藥餌然天仙骨之婦世不少嗜欲深者天分損也可不立方名助仙丹白朮山藥白芍三錢茯苓五錢甘草杜仲一錢陳皮五分菟絲子二錢四劑如舊不可再服此平補有妙理健脾益腎解鬱消痰不損天然之氣血便是調經之大益何用重劑助火熱藥通經婦五六十歲行經如紫黑塊或如紅血淋此血崩之漸也七七天癸絕又不服補陰濟陽藥何精滿化經乃肝不藏血脾不統血也非泄精動命門火氣鬱動龍雷炎二火發動血乃走似行經實非也此非大補肝脾血不驟止然補肝脾尤當兼補氣以止血用安老丹參耆熟地一兩歸朮棗皮五錢阿膠荊芥甘草木耳灰一錢香附五分十劑愈此補肝脾氣氣足自生血且能攝血尤妙大補腎水水足肝氣益舒肝舒脾氣得養肝藏血脾統血何虞崩哉經忽來忽斷時痛時止往來寒熱人謂血結不知肝氣不舒也肝木最惡寒風經來腠理大開適風吹則肝氣閉塞經水之門亦隨閉於是腠理經絡不宣氣行於陽則熱氣行於陰則寒此特寒之輕者倘寒甚則內熱益深熱入血室如見鬼狀此宜補肝血通郁散風隨效用加味四物湯熟地一兩川芎丹皮三錢歸芍白朮五錢甘草玄胡柴胡一錢此用四物滋肝腎柴芍丹皮揚風鬱甘草白朮玄胡利腰臍安腹痛入表裡通經絡用之得宜自奏功經前疼痛多紫黑塊人謂熱極誰知鬱極火不能化乎肝火鬱則不揚經欲行肝氣不應則抑其氣而痛然經滿則不能內藏肝火焚燒內逼經出火亦隨而怒泄紫黑者水火兩戰之象成塊者火煎成形之狀經失其為經正鬱火內奪其權也似宜大泄肝火然泄肝火不解肝鬱則標去本未除用宣郁調經湯歸芍丹皮五錢紫胡香附鬱金甘草黃芩一錢白芥子二錢炒梔子三錢四劑愈此補肝血又解肝鬱利肝氣又退肝火也經後小腹作痛人謂氣血虛誰知是腎氣涸乎經天一水也滿則溢空則虛何虛能作痛蓋腎水虛則不能生肝肝必下克脾土土木相爭氣逆故作痛須舒肝氣益補腎藥水足肝氣益定用後調湯阿膠荊芥歸芍棗皮三錢巴戟甘草一錢山藥五錢此平補肝腎既止逆氣尤止郁痛經後症最佳不只腹痛經前一二日忽腹痛吐血人謂火盛極誰知肝逆血不下行而上吐乎肝氣最急順則安逆則動血隨氣而俱行氣安則安氣動則動但經逆在腎不在肝何隨血妄行竟從口出不知少陰火急如奔馬得肝中龍雷合沖其勢更捷反經為血又至便正不必肝不藏血始吐也然各經吐血乃內傷逆經乃火氣內溢激之使出症不同逆則一似宜治逆以平肝不必益精以補腎然逆經而吐血雖不損血反復傾倒必傷腎氣血又上泄過多腎水亦虧須於補腎中行順氣用順經湯當歸熟地丹皮五錢白芍茯苓牛膝荊芥三錢沙參三錢十劑不再逆此補腎肝用引血歸經藥肝氣不逆腎氣自順腎氣順經又何能逆經將來三五日前臍下癘痛如刀刺寒熱交作下如黑豆汁既而經來因無娠人謂血熱誰知是下焦寒濕相爭乎寒濕邪氣也女子衝脈為血海任脈主胞胎乃血室皆喜正氣相通不喜邪氣相犯經由二經而出寒濕彌滿二經之外必相爭作癘痛邪盛正衰寒濕主濁下如黑豆汁者見北方寒水之象也宜利濕溫寒衝任無邪何至搏結作痛用溫寒化濕湯白朮一兩茯苓扁豆三錢巴戟山藥五錢白果十枚蓮子並心三十粒於經前十日服四劑邪去經調種子用白朮利腰臍巴戟白果通任脈山藥扁蓮衛衝脈故寒濕去經水調倘疑腹痛妄用寒涼則衝任寒冷血海變冰海血室成為冰室癘痛何日止哉經過多行後復行面色痿黃人倦無力人謂血熱誰知血虛不歸經乎血旺經多血衰經縮何血虛經反多不止血歸於經雖旺經不多血不歸經雖衰必過多世以過多為血旺者錯也倘果血旺一行宜止豈可再乎惟經多是虛故再行不勝其困血損精散骨髓空不能華於面宜大補引血歸經寧有經後再行用四物湯加味熟地一兩川芎二錢歸芍白朮五錢荊芥棗皮三錢續斷甘草一錢十劑後加參三錢再十劑愈四物補血加白朮荊芥行中有利棗皮續斷止中有補甘草調和故血足經歸而血淨先泄三日後行經此脾氣虛也脾統血虛則不能攝血且脾濕土虛則不實濕更甚經水將動脾氣先不能固脾血欲流注血海濕氣先乘故先泄水後行經宜先補脾氣蓋氣旺血自固濕亦自消用健固湯人參巴戟五錢茯苓苡仁三錢白朮一兩十劑不泄此補脾氣以固脾血則血攝氣中脾血日盛自運化其濕濕化何能作泄經前大便出血人謂血崩誰知經入大腸乎大腸與經路別何能入不知胞胎之系上通心下通腎心腎不交胞胎之血兩無可歸心腎氣不照攝聽其自走大便若單止便血則愈止愈多反擊動三焦氣拂亂不止蓋原因心腎不交今不補心腎使心腎氣按胞胎氣不散血自不亂行用歸經兩安湯人參棗皮三錢歸術白芍熟地麥冬五錢巴戟一錢荊芥二錢升麻四分三劑愈受娠此大補心肝腎不顧胞胎胞胎有所歸者以心腎氣合也心腎虛氣乃兩分心腎足氣乃兩合心腎不離胞胎之氣聽其靜攝血安有亂走然補心腎可也何兼補肝以肝腎子又心母補肝血則肝氣往來心腎自引心入腎引腎之心如介紹之歡受妊瘦怯久不孕育一交感臥病終朝人謂氣虛誰知血虛乎血藏於肝精涵於腎交感泄腎精與血虛何與不知肝氣不開則精不能泄及精泄肝氣益虛以腎為肝母母既泄精不能分潤以養肝肝燥無水且暗動以爍精腎愈虛況瘦人多火又泄精則水益少火益熾水難制火腰腎空虛故倦怠而臥此等女子偏易動火然此火出肝木乃雷火非真火交又易走泄陰虛火旺不能受胎即受胎逼干男精隨種隨消必補腎水平肝木水旺血亦旺血旺火亦滅用養陰種玉湯歸芍棗皮熟地山藥五錢茯苓丹皮杜仲二錢甘菊牛膝一錢服三月受孕再服三月身健此不特補血又補精精滿子宮易攝精血足子宮易容物禁房事三月自坐孕否則只可自健飲食少思胸膈飽悶倦怠思臥房事後呻吟不已人謂脾胃氣虛也誰知腎氣不足乎氣升上焦脾胃易於分消降下焦脾胃難於運化人生賴水穀以養脾胃之氣烏可降而不升但脾胃氣雖充脾胃中實生兩腎內腎無水氣則胃氣不能騰無火氣則脾氣不能化然補脾胃氣可不急補腎中水火乎但補腎不補脾胃則腎中水火之氣不能提於至陽之上用兼提湯參耆五錢白朮熟地一兩巴戟一兩棗皮三錢枸杞二錢柴胡五分服四受孕此補氣多補精少似以補脾胃為主不知脾胃健生精自易是補脾胃正補腎也脾胃旺又補精陰足陽升氣自騰於上焦況加升提乎陽不下降大地陽春隨遇皆生機安得不受孕下身非火不暖交感絕無溫熱氣人謂天分薄誰知胞胎寒乎寒地不生草木陰淵不長魚龍胞胎寒冷何能受孕雖男精熱射陰寒相逼雖茹亦吐夫胞胎居心腎間上繫於心下繫於腎胞胎寒乃心腎火微故必補心腎二火用溫胞散人參杜仲菟絲芡實山藥三錢白朮巴戟一兩故紙肉桂二錢附子三分服一月愈此補心即補腎溫腎即溫心心腎氣旺真火自生心腎火生胞胎之寒自散倘為丸朝夕吞服尤能攝精斷無伯道之嘆素恬飲食多則難受嘔泄胸飽悶脹人謂天分薄誰知脾胃虛寒乎夫胃非心不生脾非腎火不化心腎火衰脾胃即失生化之權不能傳化水穀以化精微如是自無津液以灌注胞胎欲胞胎溫暖以養胎氣得乎縱受胎帶脈之間斷然無力亦必墮烏可不補脾胃然無須補心腎火蓋母旺子不弱母熱子不寒也用溫土毓麟湯巴戟覆盆子一兩白朮山藥五錢人參三錢神麯一錢服一月種子此脾胃同補即脾胃同溫也能溫命門又溫心包故藥不多四經並治一用無不用也二火旺脾胃無寒冷自飲食多化氣血盛帶脈有力何不種子小腹自覺緊迫急而不舒斷難生子人所不識人謂邪氣在腹誰知帶脈太急乎帶脈繫腰臍間宜暖不宜急帶脈急由腰臍不利腰臍不利又由脾腎不足脾腎虛腰臍之氣閉腰臍氣閉帶脈拘急胞胎牽動男精射入胞胎胞胎雖茹亦必小產況又不節欲乎此帶脈急不能生子也是則寬帶脈在利腰臍氣利腰臍必大補脾腎帶脈可寬用寬帶湯白朮一兩巴戟熟地五錢故紙一錢蓯蓉人參麥冬杜仲歸芍三錢北味三分蓮肉不去心三十個四劑腹寬一月受胎此脾腎雙補又利腰臍氣帶脈自寬或北味白芍酸收何反寬帶脈不知血虛則縮而不伸氣虛則攣而不達芍藥酸以平肝則肝不克脾五味酸以生腎腎能益帶相礙實相成素郁不生子此肝氣鬱結也夫心脈流利且滑肝脈舒徐且和腎脈旺大鼓指始稱喜脈未有脈郁能生子者蓋三部脈郁肝脈亦必郁肝脈郁心腎之脈亦郁肝脈結心腎之脈亦結即心腎脈不鬱結肝脈獨鬱結便非喜脈蓋鬱則不喜喜則不郁也郁即不能成胎者以肝氣不舒必克脾土脾氣塞腰臍氣不利何能通任達帶乎帶脈氣閉胞胎口不開閉門不納矣必須開胞胎口開口舍開鬱無二法用開鬱種子湯香附丹皮茯苓三錢白芍一兩當歸白朮五錢陳皮五分天花粉一錢服一月鬱氣開喜氣盈腹自兩相和好結胞頃刻此脾肝鬱宣脾困腰臍氣利不必通任脈任自通不必達帶脈帶自達不必啟胞胎胞胎自啟肥胖痰涎多不受孕人謂氣虛誰知濕盛乎濕從下受者外邪也胖女之濕乃脾土內病然脾土病自不化水穀以養四肢宜瘦弱不知肥胖女氣虛肉盛肉盛則肥氣衰則胖外似旺內實虛內虛則氣衰氣衰不能行水濕停腸胃不化精而化涎脾濕土痰多愈濕脾不能受自浸潤胞胎久成水窟且肥胖女子內肉滿遮子宮難受精者勢也況又多水濕男即鼓勇深入射精直達子官滔滔若是隨入隨流法必泄水化痰然不急補脾胃則陽氣不旺濕痰未必去人且病安望茹而不吐乎用補中湯加味參耆當歸半夏三錢白朮甘草柴胡一錢陳皮五分升麻四分茯苓五錢二十劑效此提脾氣升上則水濕自下行助胃氣消下痰涎輕上化不必消克以損肌浚決以開竅陽氣旺自足攝精邪濕散自可受孕口乾舌燥骨蒸夜熱遍體火焦咳嗽吐沫斷難生子人謂陰火動誰知骨髓內熱乎寒地不能生物烈日亦必害苗骨髓與胞胎相關前人未言今發明之胞胎為五臟外一臟不列於五臟者以其不陰不陽上繫於心包而通心下繫於命門而通腎陰中有陽陽中有陰故善變化生男女然必陰陽兩平不偏不枯否則不能生人胞胎既通腎骨髓之所化也骨髓熱腎必熱腎熱胞胎亦熱況胞胎無骨髓之養何以生人骨髓熱骨中惟存火氣又何能成胎而作骨治須清骨髓熱然熱因水虛補腎真陰熱自除胞胎無乾燥珠露有涵濡用清骨湯骨皮一兩丹皮沙參麥冬玄參五錢北味五分石斛二錢白朮三錢服一月熱解三月受孕此補精涼髓不清胞胎胞胎無太熱矣今髓熱艱於育子本非胞胎不能受精故少調腎以殺火之有餘又是益水之不足正易種子腰痠背楚胸腹脹悶欲臥有疝瘕症人謂腰腎虛誰知任督困乎任脈行前督脈行後然皆從帶脈上下而行故任虛帶脈墮於前督虛帶脈墮於後必小產況任督間有疝瘕症則外多障礙胞胎縮入疝瘕內往往精不能施雖懷玉燕何益必去疝瘕補任督則提挈有力勝任無虞外無障內可容安得不受孕用升帶湯白朮一兩茯苓人參荸薺粉鱉甲炒三錢神麯二錢沙參五錢肉桂半夏一錢服一月任督旺二月疝瘕消此利腰臍正升補任督氣也任督升疝瘕難存況肉桂散寒荸薺消積鱉甲攻堅茯苓利濕有形自化於無形又至受精再墮乎小水澀腹脹腿虛浮不受孕此膀胱氣不化也膀胱與胞胎近膀胱病胞胎亦病水濕必走膀胱然必得腎氣相通膀胱之氣始能化水從陰器以泄不然則膀胱之氣化不化水濕必滲入胞胎汪洋之田何以生物欲分消胞胎之濕必須治腎中之火使達膀胱用化水種玉丹人參三錢白朮巴戟一兩肉桂一錢菟絲茯苓芡實前子二錢二十劑愈服二月易受胎此利膀胱水全在補腎氣然濡潤之品恐益助濕妙在補腎火非益腎水尤妙補火無燥烈利水非盪滌故膀胱氣化胞胎不至過濕惡阻妊娠噁心嘔吐思酸解渴憎食欲臥人謂惡阻誰知肝血太燥乎受孕本腎旺腎旺足以攝精至受精則腎水生胎不能分潤他臟肝腎子一旦腎母不養肝氣迫索腎水不應則肝氣益急火動氣乃逆噁心嘔吐生雖不至太甚傷氣則一氣傷則肝血愈耗世用四物湯治胎前症取生肝血也但生血不能生氣則脾胃衰微不勝頻嘔吾恐氣虛血不易生也宜於平肝補血中宜用健脾開胃以生陽氣則能生血尤益胎氣然氣逆用補氣旺不益逆乎不知惡阻其逆不甚此虛逆因邪逆助氣必逆增因虛逆補氣而逆轉盛況助氣於補血中則陰足制陽又何患逆用順肝益氣湯白芍白朮麥冬三錢當歸人參蘇子神麯一錢茯苓二錢熟地五錢砂仁一粒陳皮三分三劑愈此肝腎脾胃肺同調其實專主肝腎肝平則氣不逆腎旺則血易生凡胎不動少惡阻者服之無不安靜如故實勝四物蓋四物專治肝故也胎至五月倦怠飲食無味先腫足漸至遍身頭面俱腫人謂犯濕誰知脾肺氣虛乎妊娠不必拘按月養胎法總宜健脾補肺脾統血肺通氣胎非血不蔭非氣不生脾健血旺肺精氣旺苟肺衰則氣餒氣餒即不能運氣於皮膚脾虛則血少血少即不能運血於肢體氣血兩衰脾肺失令飲食難消精微不化必血氣下陷不能升濕邪即乘所虛之處聚而浮腫當補脾肺虛不必去濕用補中湯加減參術五錢耆當三錢陳皮升麻三分柴胡一錢茯苓一兩四劑愈十劑不再犯此方升提脾肺似益氣不益血不知升氣即升血況濕氣相犯未便補血補則氣助以利濕氣升用何法重用茯苓於補氣中雖利水仍健脾清肺利水藥多耗氣血但苓術補多於利故重用以分濕邪即補氣血
