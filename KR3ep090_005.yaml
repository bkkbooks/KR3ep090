body:
  text: 卷五關格關格者心欲食食至胃而吐已而再食再吐心思大小便不能出眼紅珠露兩脅脹滿氣逆求一通氣而不得世謂胃氣太盛不知乃肝氣過郁關格宜分上下一上格不得下一下關不得出今上不得入下又不得出是真關格危症也治原有吐法上吐則下氣可通然先已自吐吐必無益若用下導法上無飲食下胃大腸空虛止可出大腸糟粕硬屎不能通小腸膀胱氣導亦無益必須煎藥和解為得但須漸漸飲之初不受後自受用開門散白芍白朮當歸五錢茯苓柴胡牛膝車前子炒梔仁三錢花粉三錢蘇葉一錢陳皮一錢緩服一劑上關開二劑下格通此直走肝經以解鬱郁解關格自痊此扼要爭奇也倘用香燥耗氣適足堅關門動據格無故忽上不能食下不能出胸中脹急煩悶不安二便極窘迫人謂關格誰知少陽氣不通乎少陽膽木喜舒泄因寒襲木不條達氣乃閉於是上克胃下克脾脾胃畏木刑不生肺並生大腸肺金因脾胃不生失清肅之令膀胱小腸無稟遵齊氣閉此原可用吐一吐而少陽之氣升其次用和和其半表裡膽郁自通較之吐必傷五臟氣和則不傷用和解湯柴胡甘草薄荷一錢白芍茯神當歸三錢枳殼五分丹皮二錢緩服三劑開關改用薄荷枳殼丹皮者取直入肝經尤易開鬱也然解鬱正所以開關耳吐逆不得食又不得二便此五志厥陽火太盛不能榮陰遏抑心包頭上有汗乃心液外亡自焚於中此關格最危症人謂氣不通用麝片必耗真氣反致歸陰法宜調營衛不偏陰偏陽不治關格惟求中焦握樞而運漸透於上下之間自能榮氣先通衛氣不閉因勢導之勢無扦格用和中啓關湯麥冬白芍五錢人參甘草五分柏子仁三錢滑石敲碎黃連一錢桂枝三分花粉錢半一劑吐止二劑下通此解散中焦火更舒肝氣肝氣平火熱自滅最妙在黃連桂枝安心交腎和腎交心心腎交營衛陰陽各相和好上下二焦安能堅閉此和解善於開關上吐下結氣逆食不能入溺不能出腹疼手按少止脈澀而伏人謂寒極陰陽易位宜吐不吐則死然上部無脈下部有脈宜吐以食填太陰耳今澀而伏非無脈食物吐出非食填太陰吐必重傷脾胃堅閉塞胃氣不開與二腸膀胱所以閉者腎氣衰也胃為腎關門腎氣不上胃關必不開腎主二便膀胱氣化亦腎氣化也腎氣不通於三經便溲必結是則上下開闔權衡全在腎大補腎中水火關格自愈用水火兩補湯熟地麥冬一兩山藥四錢茯神白朮五錢車前子牛膝三錢人參二錢北味五分肉桂一錢連服二劑吐止結開六劑全愈此補腎中水火又通腎氣氣足上自達胃下自達膀胱二腸若用香燥救胃則胃氣益傷用攻利救膀胱二腸則膀胱二腸愈損忽關格二便閉結渴飲涼水少頃吐又飲又吐面赤唇焦粒米不下脈沉伏人謂脈絶誰知格陽不宣腎經寒邪太盛乎少陰腎喜溫不喜寒腎寒則陽無附常欲上騰況寒邪直入腎中逼陽上升乎使寒少輕陽雖浮不至格拒之甚惟寒盛則峻絶太過陽欲杜陰而不能陰且格陽而愈勝於是陽逆衝上焦咽喉難於容物作吐夫陽宜陰折熱宜寒折陽熱在上似宜陰寒藥折然陽熱在上下正陰寒蓋上假熱下真寒非真熱假寒藥斷不能順性開關用白通湯方藥大熱得人尿豬膽亂之則下咽覺寒入腹正熱陽可回陰可散自然脈通關啓後以大劑八味湯投之永不發中滿飲食後覺胸中倒飽人謂多食不能消用香砂枳實等消導暫快已又飽又用前藥重加消導久成中滿腹漸高大臍漸突出肢體浮脹人謂臌脹用牽牛甘遂等逐水內原無水正氣益虛脹滿更急又疑前藥不勝復加大黃巴豆等仍未愈又疑風邪固結經絡用龍膽茵陳荊防然開鬼門泄淨府各執已見不悟皆操刀下石徒也中滿由脾土衰脾衰又由腎氣寒倘早用溫補何至如此用溫土湯人參蘿蔔子一錢白朮茯苓苡仁穀芽三錢芡實山藥五錢肉桂三分二劑減數劑除此方但補脾不消導以耗氣蓋中滿必因氣虛不補脾胃脹從何消況蘿蔔子輔參術消脹不助參術添邪又茯苓山藥薏仁芡實益陰利水水流正氣不耗自然下澤疏通上游無阻第恐水寒冰凍溪澗斷流益肉桂水中生火則土氣溫和尤無壅塞何惟事消導成不救飲食未見思既見厭強進飽塞上脘脹悶人謂胃氣虛成中滿然此心包火衰也心包胃母心包不足何生胃故欲能食須補胃欲胃強補心包火用生胃進食湯人參白朮山藥茯苓三錢炒棗仁五錢遠志八分神麯良薑枳殼五分蘿蔔子黑姜一錢此治胃無非治心包不治中滿中滿自除此補火勝於補土鬱結久兩脅飽滿食下喉即脹不消人謂臌脹之漸誰知氣滯用逐水必更甚用消食只快一時法同宜開鬱然氣鬱久必虛使僅解鬱終難化食脹何以消用快膈湯人參一錢茯神五錢白芍苡仁三錢白芥子二錢蘿蔔子神麯柴胡五分檳榔枳殼厚朴三分三四劑愈此解鬱無刻削消脹無壅塞攻補兼施收功自易患中滿飲食知味但多食則飽悶不消人謂脾虛誰知腎虛乎腎虛腎火虛也腹中苦飽乃虛飽非實飽若作水腫治速亡蓋脾土製水本在腎火土得火而堅土堅後能容物能容物即能容水腎火虛土失堅剛之氣則不能容物即不能容水乃失其天度之流轉矣故腹飽作滿即水臌之漸世不知補腎火生脾反泄水傷脾無異決水護土土不崩哉是治腎虛中滿宜急補命門火然腎火生於腎水中但補火不補水則孤陽不長無陰生陽即無水生火或疑土虧無以制水今補腎水不增波哉然腎水真水也邪水欺火侮土真水助火生土實不同故腎虛中滿必補火生土尤必補水生火用金匱腎氣丸茯苓六兩附子一枚牛膝肉桂丹皮一兩澤泄棗皮二兩車前子兩半山藥四兩熟地三兩蜜丸早晚各一兩滾水下初腹少脹久服脹除滿消此於水中補腎火利水健脾之味多於補陰補火者雖偏補火實重救脾補火正補脾也故補陰宜輕補脾宜重反胃食入胃即吐此肝木克胃土用逍遙散加吳萸黃連隨愈然人謂胃病用香砂消導傷胃氣愈吐又用下藥不應復用寒涼降火不獨胃傷脾亦傷又改辛熱救寒不應始悟用和解解鬱散邪然已成噎膈胃為腎關門腎水足咽喉間無非津液可以推送水穀腎水不足力難潤灌胃中又何能分濟咽喉且腎水不足不能下注大腸大腸無津相養久必瘦小腸細小飲食入胃勢難推送下既不行積而上浮不特上不能容而吐亦下不能受亦吐必大補腎水用濟難催挽湯熟地當歸二兩山藥玄參一兩車前子一錢牛膝三錢十劑必大順此純補精血水足胃有津大腸有液自然上下相通無阻滯朝食暮吐或暮食朝吐或一日三日盡吐出者雖同是腎虛然食入即吐腎無水食久始吐腎無火此食久始出非腎寒而何腎寒何成反胃蓋脾胃必得腎火土始有溫熱氣能發生消化飲食倘土冷水寒結成冰凍則下流壅積必返上越宜急補腎火使一陽來復大地回春冰泮土松沮洳之類順流而下又何上衝嗌口然但補火則焚林竭澤必成焦枯必濟以水水火既濟上下流通何有反胃用兩生湯肉桂二錢附子一錢熟地二兩棗皮一兩四劑止十劑愈此水火兩生脾胃得火無寒冷得水無干澀自上可潤肺不阻於咽喉下可溫臍不結於腸腹或謂下寒多腹痛腎寒正下寒宜少腹作痛何食久而吐無腹痛症不知寒氣結於下焦則腹痛今上吐寒氣盡從口趨出又何寒結之有時吐時不吐吐則盡情吐出人謂反胃不知實郁此婦人多男子少郁必傷肝肝氣傷即克脾胃肝最急其剋土未有不急者土不能受遂越出木怒土不受於是挾鬱氣捲土齊來盡祛而出故盡吐出其時不吐者木鬱少平耳法不必止吐惟平肝肝平郁舒吐自止用逍遙散柴胡白朮一錢白芍五錢茯神當歸三錢陳皮三分甘草一分二劑愈仍以濟難催挽湯一半調理蓋解鬱後其木必枯隨補水木始滋息自然枝葉榮敷榮何至拂性作吐胃中嘈雜腹微疼痰涎上湧嘔吐人謂反胃不知乃蟲也人水濕留脾胃肝旺又克則土虛生熱此熱乃肝火虛火也土得真火消食得虛火生蟲蟲得肝木之氣性最急飢覓食飽跳梁挾水穀上吐其不吐蟲者蓋蟲最靈居土則安入金則死在胃翻騰不越胃遊樂恐出胃為肺金殺也法必殺蟲佐瀉肝然瀉肝殺蟲不免寒涼克削肝未泄脾胃先傷蟲又何能盡殺必於補脾胃中行斬殺庶賊除地方不擾用健土殺蟲湯人參茯苓白芍一兩炒梔子白微三錢水煎加黑驢尿一半調飢服不再劑蟲盡死驢屬金肝蟲畏金故取尿用有單用驢尿者然殺蟲不健土肝木仍旺後心再生此補土平木況梔子白薇同驢尿用又拔本塞原食後必吐數口卻不盡出膈上時作聲面如平人人謂脾胃中氣塞誰知膈上痰血結不散膈在胃上與肝連凡怒則膈痛血不行也血不行停於中則成死血血死存膈上必礙氣道難於升降阻住津液成痰痰聚成飲與血相搏作聲又加食犯勢必吐而少快至已入胃胃原無病自受之此所以必吐而不盡也法但去膈上痰血吐病自愈用瓜蒂散加味治瓜蒂七枚蘿蔔子半夏花粉甘草三錢韭汁一合枳殼人參一錢一劑大吐痰血愈不必二劑方本吐藥得蘿葡子枳殼消食半夏花粉蕩痰韭汁逐血或恐過於祛除未免因吐傷氣又加人參甘草使胃無損則積滯易掃何有再吐此食後輒吐似反胃故同論膨脹兩足跗上先腫漸至腹按如泥小便不利人謂水腫誰知土氣鬱乎人生脾胃氣健則能制水水自灌注經絡不相礙惟脾胃虛則土不能轉輸水精於上胃中之水積而不流浸淫表裡皮毛然脾胃虛由腎虛上無升騰之氣土乃郁不伸力不制水水反來侮脾胃愈虛夫腎司開合陽太盛則水道大開陰太盛水道常閉陽為腎火陰為腎寒也腎寒脾胃亦寒水畏熱不畏寒此寒土所以難制水也法烏可舍腎火而他求蓄水之土然水勢滔天補火以生土不如放水以全土故補腎火可治久病水臌泄脾腎中水實益初起水脹下身脹上未脹正初起泄水最宜用泄水至神湯大麥須白朮二兩茯苓一兩赤小豆三錢一劑腹必雷鳴泄水如注再劑水盡不必三劑牽牛甘遂非不可用但人脾胃腎三經多虛恐藥力之迅故另立此方補中瀉水正無傷水盡去方中苓術健脾胃又通脾胃氣則土鬱解況大麥消無形水赤小豆消有形濕合用化水直出膀胱由尾閭盡泄水腫久肢體俱脹面目亦浮口不渴皮毛出水按膚如泥此真水臌乃土氣鬱塞甚致水濕不化耳土剋水何反致水侮蓋土虛則崩泥帶水而流日積月纍下焦阻滯水乃上浮脾胃原能藏水水多泛濫散經絡積皮膚經絡皮膚既滿勢必流出於外不用下奪何以泄滔天水用決水湯車前子一兩茯苓二兩王不留行五錢肉桂三分赤小豆三錢一劑小便如注二劑消論理雞屎醴亦效然逐水從大便出此逐水從小便出從大便勢逆從小便勢順逆效速氣傷順效緩氣固此方利水從小便出利其膀胱也凡水必膀胱氣化而後由陰器以出土氣不宣則膀胱之口閉用王不留行以開口加肉桂引車前茯苓赤豆直入膀胱而利導之茯苓車前利水不耗氣且茯苓健土水決土不崩此奪法之善也臍突手掌無紋此方尚救但禁食鹽一月倘不禁復脹不治氣喘作脹腹腫小便不利大便溏漸身腫人謂水腫誰知肺脾腎三經虛乎胃水穀海臟腑大源但胃能容水不能行水恃脾散水以行肺肺通水以入膀胱膀胱化水以達小腸惟脾虛則不能散胃之水精於肺病在中肺虛不能通胃之水道於膀胱病在上腎虛不能司胃之關時其輸泄病在下三經既虛胃中積水走皮膚經絡無所底止法宜補三經氣胃自旺腫脹消用消脹丹白朮三錢茯苓山藥一兩麥冬熟地芡實五錢蘇子一錢一劑喘定再劑脹消十劑小便利二十劑盡愈用苓術健脾麥冬蘇子益肺熟地山藥芡實滋腎三經旺水從膀胱出小腸矣腰腳腫小便不利或腹腫脹喘急痰盛不可臥此肺腎俱虛非臌脹也水症多脾胃虛茲肺腎虛何成水脹不知肺虛盜脾胃氣腎虛不生脾胃氣二經虛脾胃更虛土虛肺之氣化不行肺虛腎之關門不開水乃泛濫如水腫法似宜補肺兼補腎然不若補腎之為得蓋肺生腎水不生腎火也脾胃必得腎火以生水氣必得腎火以化況補腎肺不來生肺金自安用金匱腎氣丸茯苓澤瀉十兩附子一枚牛膝車前子三兩官桂丹皮棗皮二兩熟地四兩山藥六兩為末密丸早晚各一兩滾水下一料全愈二料不發此方經後人改分兩多不效畏苓澤耳不知水勢滔天既不用掃蕩決水乃畏利導不用消水乎故必多用苓瀉車前則水從膀胱下然腎關不開胃之積水又何以下故用附桂回陽助火蒸動腎氣以開關群藥始能利水然又恐利水未免損陰佐熟地丹皮山藥利中有補陽得陰生火不亢土自升誠神方倘妄增藥味更改輕重斷難收功大病初起致傷脾胃氣衰中滿成氣臌服補土消滿湯數劑人參陳皮神麯三分白朮山藥五錢茯苓芡實三錢蘿蔔子蘇子五分山楂五粒甘草一分神效四肢脹腹腫如鼓面目浮皮膚流水按不如泥但陷下成孔手起如故飲食知味糞溏溺閉澀氣喘不能臥人謂水臌不知腎水衰也真水足邪水不橫真水衰邪水乃溢況真水衰虛火必盛三焦火與衝脈屬火者性皆上炎無不逆沖水從火泛上走於肺喘嗽不寧臥主腎腎氣既逆又安得臥至不得臥則肺氣不得夜歸腎腎水空無非火氣則肺氣不敢久留於腎仍歸肺宮母因子虛清肅之令不行於膀胱水入膀胱之口膀胱不受乃散於經絡隨臟腑之虛者入而注之不走小腸而走肢膚故毛孔出水法必補腎水制腎火尤宜補肺金生腎水腎水不能速生助肺氣則皮毛閉塞腎氣下行水趨膀胱不走腠理用六味地黃湯加味治熟地茯苓二兩棗皮山藥澤瀉麥冬一兩丹皮六錢北味三錢十劑全愈戒酒色一年戒鹽三月否必發此屬腎水虛故補水不補火腎虛以致火動肺虛以致水流補水火自靜補金水自通實有至理單腹脹滿四肢不浮數年不死人謂水臌水臌不過兩年必皮膚流水死今數年皮膚又不流水乃蟲結於血中血裹子蟲內似臌而非蓋飲食內有惡蟲之子食入腹而生蟲或食難化物久變蟲形血裹不化久之血塊漸大蟲遂多所用食物止足供蟲食即水穀所化之血亦只為蟲外郭不能灌注臟腑最忌小便不利胃口不開蓋小便利腎氣通膀胱胃口開心氣行脾胃二臟有根用殺蟲下血可無恐用逐穢消脹湯白朮大黃當歸蘿蔔子一兩雷丸白薇紅花三錢甘草一錢丹皮五錢一劑腹作雷鳴少頃下惡物皆蟲狀再劑大泄惡物盡後以人參白芥子一錢茯苓五錢苡仁一兩山藥二兩陳皮五分白朮二錢調理前方恐少損元氣繼此方則脾胃固不致亡陰凡水臌蟲臌起時以面辨之而淡黃中有紅點紅紋者蟲臌更於食先腹先作疼即以前方減半一劑愈但新久必忌鹽一月不然再發難治先腫上身後腫下身久之盡腫氣喘咳嗽不得臥小腹光亮人謂水臌已成誰知水臌假症乎濕從下受不聞從上受凡脾旺能散精於肺通調水道下輸膀胱水精四布五經並行何至水氣上侵惟脾虛飲食不化精化水此邪水非真水真水不生腎涸無非火氣同任沖屬火者逆而上出水從火溢上積肺於而咳奔越於肺而喘喘嗽自難臥散聚於經絡初成跗腫故先上腫後下腫似宜補腎然火盛由於水衰水衰實先於土衰補土其可緩乎但補脾以健土必至旺火以燥腎故脾腎兼補始得用二天同補丹山藥芡實一兩茯苓百合五錢白朮二兩肉桂三分訶子一錢十劑全愈方皆脾腎二經藥健脾不虧腎滋水不損脾兩相分消兩相資益實鬼神不測妙法厥症日間發熱忽厥去手足冰冷語言惶惑痰迷心竅頭暈眼花此陽厥也陽厥乃陰血不歸陽氣中內熱如焚外反現假寒象故肢冷此症傷寒中最多但傷寒傳經必熱至五六日發厥此一日身熱即厥不可用傷寒法然厥雖不同內熱深實同厥乃逆也逆肝氣發厥熱深厥亦深熱輕厥亦輕故宜單治熱但發厥陽離乎陰無陰則陽無所制離陰則陽無所依陽在裡陰在表自熱居中寒現外法宜內瀉火內熱自出內熱除外寒自散然火有餘乃水不足瀉火佐補水則陰陽和合寧至離陽而厥逆用安厥湯人參茯苓花粉炒梔子三錢玄參白芍一兩白薇甘草一錢麥冬生地五錢柴胡五分二劑愈凡日間發熱俱神效此和合陰陽助陽不助火生陰不生寒祛邪不損正解鬱自化痰故神夜間發熱忽厥逆昏暈暴亡惟手足溫和喉中痰響不能出聲此陰厥也陽厥乃陽氣虛不能入陰血中致祟憑厥逆直中陰寒症多厥逆但彼乃陰寒猝中此陰熱暴亡陰寒手足筋脈多青灌水必吐身不熱陰熱手足筋脈多紅飲水不吐身不涼故參附可治陰寒用治陰熱立死法宜補陰以助陽使真陰足邪陰自散陽旺虛火自消庶痰涎化昏暈除厥逆定矣方用補陰助陽湯玄參一兩麥冬一兩熟地一兩人參二錢白芥子五錢柴胡一錢白芍一兩當歸一兩白朮一兩茯苓五錢菖蒲一錢水煎服一劑而昏迷蘇再劑痰涎化三劑而厥逆回則可生也否則不可救矣此方補陰之藥多於補陽陰水足而陰火可散陰火散而陽氣可回陰陽合而昏迷宜蘇矣倘服之而不效是陰陽早已相脫不能再續也非前藥之故耳或曰陽氣虛而離陰是宜單補陽以入陰今補陰以合陽恐非治法不知陽氣虛而不能入於陰血之中者以陰血之大燥火盛而虛陽不敢入於陰耳非陰血過多之謂也苟補陽過勝則陽旺而陰益消亡此所以必須補陰以合陽而萬不可補陽以勝陰也況方中未嘗無補陽之藥補陰居其七補陽居其三陰陽始無偏勝而厥逆可援也人有日間發厥而夜間又厥夜間既厥而日間又復再厥身熱如火痰涎作聲此乃陰陽相併之厥也熱多則厥多用泄火之藥則熱除而厥亦除然厥有晝夜熱亦有陰陽宜於瀉陽中補陰抑陰內補陽庶陽火得陰而消陰火得陽而化提陽出於陰日間無昏暈升陰入於陽夜間無迷眩用旋轉陰陽湯人參柴胡一錢白朮茯苓當歸麥冬花粉三錢白芍生地五錢附子一枚炒梔子二錢一劑安不必再劑此陰陽雙補痰火兩瀉補泄兼施不治厥自定倘補陰不補陽泄陽不抑陰則陰陽偏勝痰火必相爭變必非常大怒復加拂抑忽大叫而厥吐痰如湧不識人人謂痰盛誰知肝氣逆得痰而厥乎肝性急易怒怒則氣不易泄肝性更急肝過急則肝血必燥必求救於脾胃然血不能以聚生脾胃出水谷未遑變血勢必變為痰肝喜血不喜痰痰欲入肝肝不受痰阻肝外以封肝竅肝乃損則氣燥急可知既無津液灌注必多炎氛沸騰痰閉上火起下必衝擊成厥法宜去痰厥乃定然去痰必平肝解開鬱用解鬱湯香附當歸五錢花粉茯苓三錢麥芽炒梔子二錢黃連五分甘草一錢三劑全愈此清熱不燥導痰不峻解肝鬱實神怒輒飲酒不醉不休忽厥昏不知人稍蘇猶呼酒號叫數次復昏暈人謂太醉誰知膽火動乎肝膽相表裡肝逆膽亦逆肝火動膽火亦動酒先入膽化為水然酒性大熱過飲熱性不及分消必留於膽中況怒傷肝肝火無所發泄必分入膽膽得酒又得肝火熱更加熱肝膽心母母熱必呼子解氛肝膽熱必移熱於心心不可受熱也乃變厥法宜瀉肝熱解酒熱用逍遙散加味柴胡一錢白芍一兩苓術五錢當歸葛花二錢甘草二分陳皮五分炒梔子白芥子三錢三劑全愈用逍遙散治濕鬱梔子泄火加葛花解酒白芥子消痰酒性生濕濕易生痰去濕痰無黨去痰火無勢欲再厥得乎故多用苓術以助柴芍者此耳午候吐酸水一二碗至未心前痛至申痛甚厥去至戌始蘇每日如是人謂陰分熱誰知太陽膀胱有瘀血不散乎膀胱水得氣化乃出水不出自是氣不化今小便不閉是氣未嘗不能化氣本無形氣化宜無不化瘀血結住不散血有形無形易散有形難化耳未申時正氣行膀胱氣行於血中血不能行於氣內故作痛發厥似宜大行氣氣行血亦行然瘀血有形必用有形物治用逐血丹歸尾一兩大黃花粉紅花厚朴丹皮三錢桃仁二十粒枳殼五分水蛭一錢火煅燒黑二劑瘀血淨妙在用水蛭入大黃厚朴中逐有形血塊則病如掃痛厥去不然痛厥雖止血塊終不能逐不可輕棄此物遺病終身如人將冷水澆背陡然一驚手足厥冷遂不知人已而發熱漸蘇日三四次人謂祟憑誰知氣虛極乎夫氣衛身氣盛則體壯若氣衰則體祛外寒侵乃內氣微氣既微原不必外邪襲常覺陰寒逼體如冷水澆背正顯內氣微也氣微自生內寒何崇來憑然厥症多熱肢冷吾恐心中之熱然內熱極反生寒顫與氣虛極亦生寒顫正同苟不辨明殺人頃刻大約內熱外寒脈必數有力舌乾燥氣虛外寒者脈必微無力舌必滑潤故現氣虛症須大補氣不可益大寒用蘇氣湯人參一兩陳皮一錢枳殼三分菖蒲五分數劑愈方重用人參補氣陳皮枳殼寬中消痰則蘇氣更神益菖蒲引三味直入心中則氣不散於心外春溫春傷風頭痛鼻塞身熱人謂太陽傷寒誰知傷風欲入太陽乎春傷風在皮毛入肺鼻肺竅故不利風入肺不散則金氣不揚失其清肅之令必移邪入太陽膀胱恐邪入堅閉其口水道失行於是水不下通火上炎頭自痛絶異傳經太陽傷寒法宜散肺風杜入膀胱路身熱自退用舒肺湯桔梗茯苓三錢甘草花粉一錢蘇葉五分桂枝三分二劑全愈此專入肺散風邪有風必生痰有痰必有火妙用花粉消痰又解火桂枝茯苓開膀胱口引邪直走膀胱下泄因肺欲移邪隨機順用也春傷風身熱咳嗽吐痰惡熱口渴人謂傷寒傳經入陽明誰知傷風陽明火刑肺乎陽明胃土本生肺何反刑肺肺嬌臟性雖不畏風體未嘗不畏風風入肺必變為寒胃肺母見肺子寒以熱濟然胃本無熱胃熱心火生也心胃母心知胃生肺乃出其火相助然助胃土必至克肺金借兵討賊反致養兵殘民胃熱肺亦熱故咳嗽口渴宜瀉心安胃自肺得養風邪自散用平邪湯黃連三分甘草蘇梗紫菀葛根一錢石膏貝母茯神三錢麥冬五錢三劑愈不必四劑此泄心十三泄胃火十六蓋心火克肺輕胃火刑肺重輕泄心火則心不助胃以刑金重泄胃火則胃不刑金以傷肺肺氣回肺邪自去春傷風發寒熱口苦脅脹滿或吞酸吐酸人謂少陽傷寒誰知少陽春溫乎少陽膽木喜風何又傷風蓋同氣易入也但傷寒亦傷風何冬謂傷寒春即謂春溫不知冬之風寒春之風溫寒傷深溫傷淺傷深者邪至少陽有入里之懼傷淺者邪入少陽有出表之喜故同入少陽傷風傷寒實異然治少陽傷風又不大異舒半表裡邪風自散但傷寒邪入少陽有入里症宜大柴胡承氣下之若傷風入少陽以小柴胡和之有餘用加減小柴胡湯柴胡錢半茯苓三錢黃芩甘草花粉一錢陳皮五分二劑全愈妙在多用茯苓使邪從膀胱出更勝原方少陽居半表裡宜和解使邪從表而入者仍從表而出又恐表不能上散用茯苓引入膀胱從下出佐柴胡以散邪春傷風身熱嘔吐不止人謂太陰傷寒誰知太陰傷風乎太陰脾土風傷太陰則土中有風風在地中則土必震動而水濫故嘔吐非陰寒入脾土令人嘔吐者可比此太陰傷風宜散風安土用奠土湯白朮五錢茯苓三錢人參柴胡葛根半夏一錢甘草一分神麯五分三劑全愈方祛邪於補脾內脾健風自息春傷風汗出胃乾燥渴欲飲水人謂太陽傷寒誰知春溫火邪入膀胱乎膀胱肺子肺受風邪久則變熱肺乃求救於膀胱邪即乘其求救而下行膀胱思欲救母乃不肯下泄上與風火相鬥邪見膀胱正氣盛乃不入膀胱而入胃於是胃熱與邪爭故出汗汗出胃液自干故口渴思水以救內焚法不必散風邪泄火焰速利膀胱使邪從小便出胃液自生用五苓散白朮一錢茯苓澤泄豬苓三錢肉桂一分二劑愈五苓利水藥也何能止渴生津祛風散火蓋五苓專利膀胱水膀胱太陽經也傷風已經出汗宜邪盡除乃口渴思水明是邪熱不從皮毛外出欲趨膀胱五苓利膀胱水火亦流矣火從水去胃火已消胃自生津自上潤於肺肺得胃液皮毛自閉邪又從何而入傷風頭痛發熱盜汗微出見風則畏人謂太陽傷寒誰知乃春溫傷風非傷寒頭痛屬太陽然風能入腦亦作頭痛未可謂身熱頭痛便是太陽症風從皮毛入肺主皮毛肺通鼻鼻通腦風入肺自能引風入腦作頭痛倘肺氣甚旺則腠理自密皮毛不疏風何從入惟肺氣虛故風易襲邪正相鬥故發熱肺氣虛安能敵邪所以盜汗微出此明是傷風勿作傷寒輕治況傷寒惡寒傷風惡風今畏風不畏寒烏可不急散其風然邪之所湊其氣必虛補肺氣表風邪自愈用益金散風湯人參五分甘草紫蘇荊子花粉一錢北味三粒麥冬桔梗三錢三劑全愈方散重於補何名益金不知肺為邪傷其氣甚衰若大補重藥必難受不若於散表中略補益則邪既出正又內養斯為善矣傷風頭痛發熱身疼骨節俱酸惡風無汗人謂傷寒傷寒則不惡風此內傷脾腎風邪乘虛入肺經絡不相流通故身熱但內傷脾腎與肺無涉何肺即有外邪不知脾肺母腎肺子母虛子亦虛子虛母亦虛理也腎脾氣虛肺安得不虛肺虛不能外衛故風邪易入邪入肺益虛何能下潤腎宮旁灌百骸自骨節痠痛腰安得不重但肺氣既虛腠理不閉邪易入汗亦宜易出何無汗不知邪欺肺氣虛又窺脾腎不足邪久內踞反恐肺竅大疏代守毛孔不使外風另入故畏風外邪且不能入何汗之能出法宜散肺邪仍補脾腎脾旺肺金有生腎足肺金不燥自上達腦頭痛除下達膀胱腰重去中和中焦支節痠疼盡愈用黃紫丹白朮當歸麥冬五錢茯苓三錢羌活紫蘇甘草黃芩人參貝母一錢細辛五分此補多於散何純補脾不補腎人生後天以脾胃為主脾健胃氣自開胃開腎水自潤況參術原入腎白朮尤利腰臍腰臍利一身氣無不利況肺脾胃子母健子有不健乎又黃羌蘇貝祛風散火消痰泄水自汗出熱解邪從外越春傷風身熱十餘日熱結在裡往來寒熱人謂邪在太陽將入里不知春傷風與冬傷寒不同冬月寒入太陽久則變寒春之風入太陽久則變熱寒則遷動不常必至傳經入臟熱則靜守不移惟固結在腑然入臟在腑雖異寒熱則無不同寒在臟則陰與陽戰發熱熱在腑則陽與陰戰發寒隨臟腑衰旺分寒熱往來此症最難辨亦辨之時令而已冬月熱結在裡者宜攻春月熱結在裡者宜散散熱寒自除寒除熱亦止用散結至神湯厚朴甘草柴胡一錢白芍五分當歸炒梔子三錢枳殼五分桂枝三分一劑全愈方多平肝藥何絶不去舒肺邪蓋肺氣為邪所襲則肝木必欺肺金之病而自旺旺則木中生火以助邪熱刑肺倘不泄肝而徒去瀉肺邪則肺愈虛熱又何能遽解惟瀉肝火則內結既衰益桂枝數分但去散太陽風不助厥陰火此熱結所以頓解傷風八九日風濕相摶身體煩疼不能轉側不嘔不渴人謂傷寒風濕在太陽經誰知傷風亦能使風濕相摶乎夫濕從下受膀胱先受之風從上受肺先受之膀胱受濕無風則不能起浪肺受風無濕則不能生風傷風而致風濕相摶因下原感濕上又犯風兩相合而兩相成遂四體煩疼煩疼風也恐非水濕蓋濕主重著煩痛身不能轉側非重著乎以此分別風濕同病實確且風症必渴濕症必嘔今風濕兩病風作渴水濟之濕欲嘔風止之故不嘔吐宜雙解風濕用雙解風濕湯茯苓苡仁一兩柴胡二錢防風甘草一錢防風柴胡祛風苓苡利濕甘草和解自風濕解諸病盡痊春月傷風八九日寒熱如瘧熱多寒少不嘔吐人謂傷寒如瘧症誰知春月傷風亦有此症風邪入表裡多作寒熱不獨傷寒然也傷風輕於傷寒至八九日邪宜散何尚如瘧瘧多成於風傷風正犯風邪安在無如瘧症但無痰無食俱不成瘧是則傷風如瘧亦胸膈胃脘中有痰食不化八九日正欲去痰與食留之耳熱多寒少非內傷重外感輕之明驗乎既痰食在中宜多嘔吐何如瘧反不嘔吐不知內既多熱自能燥濕痰得火制自不外吐矣然內熱極外反現假寒故寒熱如瘧但不可作真瘧治用破假湯人參別甲三錢白朮白芍五錢陳皮石膏半夏一錢神麯甘草五分柴胡二錢山查十粒四劑全痊此補正寓祛邪正無虧邪自退舍春傷風汗多微發熱惡寒人謂傳經邪入陽明誰知傷風春濕亦有邪入胃中乎邪到陽明必多汗而渴今汗多不渴是火邪猶未盛邪未盛故微發熱然傷寒邪入胃火熾傷風邪入胃火微旺何也蓋傷寒寒也傷風風也寒邪入胃胃惡寒變為熱風邪入胃胃喜風變為溫蓋熱本胃熱不過風以煽之也風煽其火則火必外泄不留胃中所以熱而多汗口反不渴不同傷寒傳經入胃之邪然何以辨以傷寒惡寒傷風惡風切不可誤認傷風為傷寒耳蓋惡風即傷風耳法宜散風火自解用薰解湯石膏三錢乾葛二錢甘草荊芥一錢茯苓麥冬五錢二劑愈乾葛荊芥本發汗何用反止汗不知傷風多汗風煽也荊葛散風風息火亦息況石膏泄胃火火盡汗又何出又麥冬滋肺茯苓利水甘草和中又安得出汗春傷風口苦喉干腹滿微喘發熱惡寒人謂傷寒邪入陽明誰知傷風邪入陽明乎傷風本輕於傷寒何傷風竟同傷寒不知邪入陽明重病不同此乃病輕未嘗不同口苦不過胃不和咽乾胃少液腹滿不過胃有食微喘胃少逆發熱惡寒不過胃之陰陽微爭耳法宜和胃不必泄火解熱不傷氣用和解養胃湯玄參一兩甘菊麥冬花粉三錢甘草蘇子一錢二劑愈不必三劑方解陽明火不傷胃氣故和胃辟邪春傷風口燥但欲漱水不欲咽人謂陽明火逼熱犯肺必衄血不知此冬傷寒邪入陽明病春傷風無之然傷風何終無衄血蓋風性動而變不比寒性靜而凝故傷寒在胃熱逼於口舌咽喉者陰陽拂亂衄血成傷風逼熱於上雖漱水不欲咽下然以風吹熱即散安致衄法泄陽明火口燥自除用石膏散石膏三錢葛根甘草一錢玄參銀花麥冬五錢二劑愈不必三劑此泄胃火不散胃中寒然玄參麥冬金銀花上補水下又濟水得甘草實和陰陽於頃刻春傷風脈浮發熱口渴鼻燥能食人謂陽明火熱必衄血不知傷寒不衄邪不能出傷風正不必衄何也蓋傷寒入胃邪熱大熾非水穀不能止炎上之火既能食脈仍浮是火仍不下行必上行故必衄若傷風脈原浮非火必欲上行故雖口渴鼻燥能食則火可止遏火下行不上行豈致衄法但宜瀉胃火用寧火丹玄參二兩甘草一錢生地三錢青蒿五錢三劑愈妙在玄參生地解胃熱仍是補藥青蒿甘草同用尤解胃熱使火下行不上行且青蒿更平肝火脈浮風象肝平木氣自安何有脈浮春傷風自汗醫又發汗小便自利人謂傷寒出汗致津液內竭誰知傷寒邪入陽明火焚其內致汗出正陰不能攝陽陽外泄醫又發汗陽泄陰亦泄矣安得津液不內竭若傷風自汗出乃肺金虛非胃火盛復發汗則肺氣益耗金寒水冷小便自利斷不可用治傷寒法但補肺虛固腠理則汗止病亦愈用六君子湯加減治人參白芍三錢白朮一錢陳皮三分甘草北味五分黃耆麥冬五錢一劑汗止津液自生此補胃健脾使土旺生金肺氣自安肺安腠理自密春傷風下血譫語頭汗出人謂陽明火大盛必發狂誰知熱入血室似狂非狂乎雖傷寒邪入陽明熱入血室有下血譫語發狂然此乃熱自入傷風下血譫語亦熱入血室乃風邪熱而入也症雖同輕重實殊蓋熱自入者內外無非熱風祛入者內熱外無熱既熱有輕重何頭汗無異蓋血室部位在下焦脈實走頭上故熱入於血室其氣實欲從頭巔由上而下泄然下熱未除各腑之氣不來相應所以頭有汗至頸而止故傷風寒內熱同頭汗出亦同法散風寒引熱外出自愈用導熱湯歸芍丹皮三錢柴胡二錢黃芩甘草花粉一錢二劑愈此即小柴胡變方但小柴胡純泄少陽火此兼補肝膽血血足木不燥不來克脾胃土則胃得養胃火自平引火歸經即導火外泄傷風潮熱大便微鞭人謂傷寒邪入陽明又將趨大腸誰知肺金乾燥乎大腸與肺為表裡肺燥大腸亦燥不必邪傳大腸始有燥屎風傷肺金最易煽干肺氣不同寒傷肺經之清冷故風邪入肺大腸最易燥結然邪隔大腸甚遠非大腸中有邪火結成燥屎必須下能以傷風潮熱大便微鞭系金燥非火盛也似宜潤肺也然大便升合腎主之腎水足大腸自潤用金水兩潤湯熟地麥冬一兩柴胡甘草一錢丹皮三錢四劑愈此熟地補水水足水不耗肺則肺金不燥又麥冬補肺則金水兩潤自大腸潤灌挽輸有水可以順流既無阻滯何有候潮候汐餘熱猶存春傷風譫語潮熱脈滑人謂陽明胃熱乃傷寒傳經病誰知春溫亦有胃熱乎春令發生胃本宜熱加春風薰蒸胃中自然之熱原不可遏忽逢違逆阻抑不能直達湮鬱之氣故譫語發熱對疑發熱宜矣何只潮熱不知胃中有痰則發大熱譫語聲重胃中無痰只潮熱譫語聲低脈滑為痰風寒本同傷風尤為徵驗用消痰平胃散玄參青蒿一兩半夏茯神車前子三錢麥冬三兩二劑愈不必三劑妙在青蒿能散陰熱尤解胃火玄參麥冬更消上焦炎火去痰無黨又得半夏茯神車前利水濕濕去痰涎自消火勢自滅欲再鬱蒸潮熱迷我心胡能春傷風日晡發熱不惡寒獨語見鬼人謂陽明症欲發狂誰知春溫過熱乎但此症在傷寒乃實邪在春溫乃虛邪實邪從太陽來邪正熾不可遏必發狂若虛邪從少陰來雖旺將衰斷不發狂蓋實乃陽邪虛乃陰邪陽邪見鬼者火逼心君外出神不守心宮陰邪如見鬼者火引肝魂外遊魄不守肺宅故實邪宜泄火安心虛邪宜清心養肺用清火養肺湯荊芥黃芩二錢麥冬五錢玄參一兩花粉茯神三錢甘草蘇葉一錢三劑愈方全清肺何能安胃不知胃火乃肺所移清肺金邪必來救肺矣又玄參為君乘其未入肺半途擊之邪尤易定茯神安心又利水邪不敢上逼下趨膀胱何能入肝入肺引我魂魄傷風發潮熱大便溏小便利胸膈滿人謂傷寒邪入陽明不知乃春溫熱留陽明風傷肺從皮毛入宜從皮毛出何發熱反留胃不去胃肺母母見子被邪侮必來救邪見母來復舍子尋母使母貧邪自舍母尋子胃水穀之海較肺富厚不啻十倍邪何利於子輕舍其母自利胃母富棄肺子貧故不去胃恐邪留未免供給不周邪視供給豐缺分寒熱盛衰故潮熱此陰陽不正二便何能平故小便利大便溏陰陽既不正則轉運失職胸膈何能快宜祛胃邪陰陽自正用加減柴胡湯黃芩柴胡知母甘草一錢茯苓五錢枳殼神麯五分蘿蔔子三錢三劑愈妙在蘿蔔子茯苓同用最能分陰陽之清濁清濁分寒熱自解何有膈滿春傷風四五日身熱惡風頸項強脅滿肢溫口渴人謂三陽病誰知春溫似傷寒而非乎傷寒三陽合病何以春溫絶不異蓋春溫風傷少陽也少陽在半表裡三陽之表俱可兼犯故三陽症俱現不比傷寒邪由太陽入陽明由陽明入少陽由少陽入厥陰三陽病俱在故治春溫病只單治少陽不必連三陽同治用加味逍遙散柴胡當歸二錢白朮甘草陳皮炒梔子仁一錢茯苓白芍三錢羌活五分二劑愈不必三劑論理泄少陽膽邪足矣何並和肝氣然膽之受邪因肝氣大郁春溫病每從肝膽入邪治肝膽表裡之邪無不盡散經水適來傷風發熱惡寒胸脅脹滿譫語人謂傷寒結胸誰知熱入血室乎此症男女皆有之但男子乃熱祛熱而入也女則血欲出熱閉之也熱閉其血血化為熱矣似男女症不同然熱則同故治亦不大異用導熱湯此方最舒肝膽氣閉經水於血室中正肝膽病也肝藏血非少陽膽氣之宣揚則血不外出此湯舒肝膽氣則已閉之血肝不能藏血泄熱何能獨留故二劑效傷風身熱後肢體骨節皆痛肢寒甚人謂傷寒由三陽傳少陰誰知腎水素虛因傷風后爍肺金肺傷不生腎腎水更枯何能灌注一身自肢體骨節皆痛水枯宜火動何四肢反寒不知水火原相根水旺火亦旺水衰火亦衰水初涸火隨水伏不敢沸騰故內熱外現寒象法不可見外寒妄用溫熱宜急補腎中水以安腎火則水足制水火既濟何有肢體骨節手足生寒乎用六味地黃湯熟地一兩棗皮山藥五錢茯苓四錢丹皮澤泄三錢四劑全愈此症風邪已散再用祛風肺氣益虛更耗腎水水虧火旺反致生變此方直填腎水使水火既濟傷風后下利咽痛胸滿心煩人謂傷寒邪入少陰陰寒上犯心肺下犯大腸誰知傷風后身涼則邪盡散又何陰邪之留乎然下利者乃大腸之陰虛自利非邪逼也咽痛陰水既干虛火自越咽喉細小不能遽泄乃作痛胸滿心煩者腎水不能濟心腎火反致上焚包絡胸安得不滿胸既不虛心亦不能安故煩此症切勿認傷寒治宜補水以濟心復補金以生腎水水足腎氣生自上交心制火下通大腸利水用加味地黃湯熟地茯苓山藥麥冬五錢棗皮澤泄丹皮三錢北味一錢肉桂五分三劑盡愈腎陰虛用地黃湯滋腎加麥味益腎化源何又加肉桂補命門火非仍治少陰寒邪乎不知水非火不生肉桂不過助水衰非祛寒之盛且大腸自利得壯火而瀉少火而止方雖減地黃增苓泄亦足利水固腸然無命門火相通終難速效春傷風二三日咽痛甚人謂寒逼少陰火誰知火逼少陰之寒乎蓋傷寒咽痛乃下寒實邪逐火外出傷風咽痛乃下熱虛火逼寒上行正不可混治蓋傷寒咽痛必散邪以逐火傷風咽痛必補正以祛寒方用補喉湯熟地二兩棗皮茯苓一兩肉桂一錢牛膝二錢一劑頓愈蓋地棗滋陰聖藥加肉桂牛膝則引火歸源自易易矣況茯苓去濕利水則水流火亦下行何至上逼而成痛故一劑效春傷風身熱下利六七日咳嘔心煩不得眠人謂邪入少陰成下利致嘔逆心煩不眠誰知春溫正多如此但此症在傷寒宜利水春溫不可徒利水傷風至六七日邪自散今不散留連作利脾衰可知今咳且嘔不特脾衰胃亦衰脾胃氣衰肺氣先絶肺衰腎亦衰矣況下利重傷腎陰力難潤心心無水養自煩躁勢必氣下降取救於腎腎又涸心氣至腎而返心腎不交安得來夢宜健脾胃益心腎不必顧風邪用正治湯人參二錢熟地白朮炒棗仁五錢麥冬三錢茯苓一兩竹茹一錢此方心腎脾胃肺兼治尤妙茯苓為君能調和五者又利水身熱自止咳嘔煩不眠俱可漸次奏功春傷風手足逆冷脈緊心下滿而煩飢不能食人謂傷寒之症邪入厥陰結胸中脈浮屬風緊屬寒脈緊傷寒謂春月得之必是傷風非傷寒誰信然實有見蓋風最入肝春風尤與肝木相應故木遇風便迎入但木性喜溫風不欲寒風春多溫風寒風亦間有之偶遇寒風肝氣少不順脈即現緊象第於緊中細觀之必前緊後澀緊寒象澀逆象寒風入肝手足必逆冷肝氣拂抑心又何能安泰乎心不舒不能生脾胃肝又不舒必克脾胃所以飢不能食也寒入厥陰由三陽而至風入厥陰乃獨從厥陰自入也故傷寒邪入肝深傷風邪入肝淺入深者恐再傳入淺喜易出但解肝中寒木中之邪木中之風自散寒去風走飲食可進煩滿逆冷亦盡除用加味逍遙散柴胡二錢白芍五錢當歸茯神三錢白朮五分甘草肉桂一錢陳皮三分一劑全愈逍遙散原解肝氣得肉桂則直入肝掃蕩寒風陽和既回大地皆陽春矣有何鬱氣上走心下克脾胃脾胃氣升草木敷榮斷不遏抑摧殘認作傷寒用瓜蒂散必致臟腑反覆春傷風忽厥心下悸人謂傷寒書言有不治厥則水漬入胃不知傷寒之悸恐邪下行不可止傷風之悸又慮邪上衝不可定蓋寒屬陰陰則走下風屬陽陽則升上故同發厥同心悸傷寒宜先治厥後定悸傷風宜先定悸後治厥用定悸湯歸芍一兩茯神生棗仁五錢半夏炒梔仁三錢甘草一錢菖蒲丹砂末五分二劑愈方單治悸治厥已寓蓋病本心膽虛補肝膽氣旺補肝心亦旺又恐補肝助木中火加梔子以補為瀉而後以瀉為補肝平厥自定總之傷寒為外感傷風為內傷治外感者斷不可以治內傷春溫滿身疼痛夜發熱日涼人謂傷寒少陽症誰知腎肝陰氣大虛氣行陽分病輕氣行陰分病重耳陰陽互為其根陰病陽亦病何春溫陰虛陽獨不虛乎不知肝腎中原有陽氣陰虛陽中陰虛非陰中陰虛也故陽能攝陰陰不能攝陽自夜涼宜補肝腎之陰則陰與陽平內外兩旺佐攻風邪風邪自散用補夜湯熟地一兩當歸鱉甲生首烏丹皮骨皮貝母三錢白芍茯苓麥冬五錢柴胡一錢此補陰轉陽聖藥用攻於補亦寓撫於剿如賊執主婦苟室中空虛賊必愈怒箠楚焚燒更甚今補陰如金玉投房中賊必棄主婦取資財又佐祛邪如外人來救賊自驚惶況家人莊客精健賊思飽揚而去自不戰亟走春溫日發熱口乾舌燥夜身涼神思安閒似虐非虐人謂傷寒如虐誰知傷風邪留陽分乎邪之所湊其氣必虛氣正陰陽之氣也風邪即陽邪陽邪乘陽氣虛尤易入以陽氣不敵耳宜於補陽中用攻邪則陽旺邪自退用助氣走邪湯柴胡厚朴二錢當歸花粉三錢耆朮麥冬五錢人參黃芩一錢枳殼五分查肉十粒二劑即愈此補正以祛邪如白晝賊入明欺主弱倘主退縮潛遁必罄竊而去今用參歸耆術補陽主氣自旺號召家人捨命相拒鄰佑聞之執耒負鋤以戰賊去惟恐不速春感冒風寒咳嗽面白流清涕人謂感外邪肺先受之誰知脾肺氣虛外邪乘乎肺主皮毛邪從皮毛入必先傷肺然肺不自傷邪實無可乘是邪入乃肺召也祛邪可不亟補肺乎惟補肺必先補氣肺主氣氣旺則肺旺邪自衰然不升提則氣陷不升故補氣祛邪不若提氣祛邪更勝用補中益氣湯加味人參二錢耆歸白朮麥冬三錢陳皮七分甘草五分柴胡花粉一錢升麻四錢黃芩八分二劑全愈補中湯治內傷神劑春月傷風亦內傷用參芘歸術補氣用升柴提氣且升柴升中帶散內傷兼外感尤宜故服之肺自旺邪自散春感冒風寒身熱發譫人謂陽明內熱誰知肺熱逼胃乎肺胃子子為賊執用火燒劫其母痛切正不必賊入室而後魂驚魄散始為呼籲春日風邪中人原不走太陽膀胱經每直入皮毛走肺肺得風邪則肺氣大傷肺傷則寒變熱與傷寒由衛入營寒變為熱者無異其實經絡迥殊人見其寒變熱無殊竟以冬寒法治春溫反致傷命苟知春溫與冬寒不同雖見發熱譫語知治肺不治胃則胃氣無傷肺邪易散用宜春湯枳殼陳皮五分桔梗玄參三錢甘草紫菀竹茹一錢麥冬五錢花粉黃芩二錢二劑愈方散肺邪火不犯陽明胃氣肺氣安胃火亦靜如賊釋其子之火攻不特其子安寧其母不啻如解己厄何必更護母以移別室故治肺不必治胃春溫頭痛身熱口渴呼飲四肢發斑似狂非狂似躁非躁彼此傳染人謂傷寒疫症誰知傷風時症乎夫氣運原不盡拘一時天氣不正感寒冒風便變熱肺氣不宣胃氣不升火鬱於皮毛腠理流於頭作痛走於膚成斑倘用傷寒法治必生變以所感實春溫氣非冬寒傳經邪傳經邪無定春溫邪有定何有定反多變遷正時氣亂之也蓋時氣與疫氣正同但疫氣熱中帶殺時氣熱中存生時氣多死皆治不得法醫殺之也惟時氣既不殺人何沿門傳染以時氣與疫氣均不正氣臟腑聞正氣陰陽生聞邪氣陰陽亂然人臟腑堅固雖聞邪氣不能入可見春溫傳染正臟腑虛也宜補臟腑少佐解火祛邪則正氣生邪氣自退用遠邪湯人參柴胡生草黃芩一錢蒼朮茯苓荊芥三錢蘇葉五分玄參一兩白芍五錢花粉二錢四劑全愈此祛邪不傷正治不正時氣最效不只治春溫也
