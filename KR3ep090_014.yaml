body:
  text: 卷十四背癰背間先發紅瘰漸紅腫此發背也古云外大如豆內大如拳外大如拳內大如盤然癰疽必須辨陰陽有先陰變陽有先陽變陰者前後俱陽俱陰者陽症雖重實輕陰症似輕反重先陰後陽生先陽後陰死何以辨之陽症形高突色純紅初起必疼潰爛多膿收口身輕爽陰症形平陷色帶黑初起必癢潰爛多血收口身沉重至變陽變陰以此消息倘紅腫高突乃陽症乘毒初發肉未化急以散毒藥治隨手而解發背至橫決皆因循失治以致陽症變陰救癰如救火宜急撲滅否必沿燒屋廬不盡不止毋謂陽症可輕緩治用急消湯忍冬藤二兩紫花地丁一兩茜草生甘草花粉桔梗三錢甘菊花貝母二錢黃柏一錢不必四劑此陽毒初起最神無迅烈之虞有和解之妙倘孟浪用毒藥毒幸散真氣耗損變成別症醫之咎也批一切大腫毒不論部位陰陽已潰未潰腫毒通治方最神此方前已附奇效醫述茲不注文守江背心發瘰癢甚已而背重如山陷隱發紅暈如盤此陰症初起形象尤非前陽癰比此冤孽病必胡言亂語將平日欺心事盡情發揚此症本不治然轉陰變陽醫之事也此症雖祟憑然必正氣大虛邪乃得入必須大補氣血佐散郁解毒則正旺自散用變陽湯參耆二兩銀花半斤附子一錢炒荊芥三錢柴胡二錢白芍一兩生劃花粉五錢水十餘碗煎至二碗服三劑愈蓋陽毒可攻陰毒須補方用參耆補氣氣旺則幽陰之毒不敢入心肺銀花性補善解陰毒得參耆功益大然非附子則不能直入陰毒中又出陰毒外又益甘草以解餘毒然毒結於背以氣血之壅也壅極鬱極也故加柴芍荊芥花粉消痰通滯開鬱引經自氣宣血活瘀散毒消背癰潰爛洞見肺腑瘡口黑陷不能臥口渴思飲人謂陽症敗壞誰知陰虛不能變陽乎背癰雖分陰陽至潰後惟宜補不消毒至見肺腑前此失補毒過沿燒好肉盡化為瘀而成腐肉腐必洞見底裡倘胃氣健能食猶可救若惡食必無生者然能用參耆歸地亦有生者不可棄而不救用轉敗湯人參熟地麥冬二兩生耆當歸棗皮一兩肉桂遠志茯苓三錢白朮銀花四兩北味一錢一劑或胃開或少能飯可救惟杳無應驗是胃將絶或服之飽悶少頃安者亦有生機此補氣血更補肺腎陰蓋陰生則陽長後以銀花解餘毒則毒散血生血生肉長肉長皮合倘但解毒不補氣血陰陽陰毒不能變陽哀哉背癰愈口不收百藥敷之不效人謂餘毒未淨誰知陰不能濟陽乎癰疽初起毒盛變膿毒衰膿盡毒化瘡口不收乃陰氣虛非毒氣旺世用敗毒藥是虛虛也欲肌肉長得乎然但用陽藥補陽不補陰亦不效蓋獨陰不生獨陽不長膿血已淨陰必大虛但補陽則陽旺陰虛雖陽欲濟陰陰不能濟陽補陽陰愈虛瘡口愈難合宜大補陰使陰精盛自灌注瘡口不必用生肌藥肉自生矣用生膚散麥冬當歸一兩熟地忍冬二兩棗皮三兩參術五錢肉桂三錢六劑愈此補陰多補陽少使陰勝陽然補陽仍補陰者蓋以能入陰中以交於陽內也用忍冬藤取其領諸藥至瘡口非用解餘毒也背癰愈肉長口平忽開裂流水此不謹色怒也瘡癰忌色其次忌怒犯惱怒新肉開裂犯色新肉流水然此論小瘡耳若背癰犯怒不過多病犯色多致死瘡口開裂色必變紫黑流水處肉必敗壞必須藥補氣血不可仍治其毒倘前毒未淨斷不收口復腐敗者實新肉不堅自求決裂也況發背新愈精神氣血空虛故犯色遂變出非常然一木焉能支廈又必須大劑救之用定變回生湯人參四兩黃耆三兩歸朮麥冬忍冬藤茯苓二兩北味二錢肉桂三錢棗皮五錢四劑平復若再犯即再服此方必死此救瘡瘍壞症仙丹人疑泄精決裂何反置熟地不用蓋熟地補陰最緩症犯實急故多用氣血藥非熟地不可用也數劑後宜減分兩多加熟地以善後夏月發背癰瘡口不起脈大無力發熱作渴自汗盜汗用參耆加肢逆冷大便不實喘促嘔吐人謂火毒太盛誰知大虛補不足以濟乎瘡口不起本陰症脈大又似陽然無力非陰而何發熱作渴乃水不濟火故隨飲隨汗即陰症似陽用參耆何反逆冷吐嘔正以未用附子不能斬關入陳祛蕩陰邪也用助陽消毒湯人參八兩黃耆一斤當歸白朮四兩陳皮一兩附子五錢水煎膏作二劑服頓退數劑瘡起而潰分兩減半數劑愈此時此症非大補必立亡大約陽癰用消毒陰癰萬不可用舍癰從症實善法也背癰潰後或發熱或惡寒或痛或膿多或流清水自汗盜汗膿成不潰潰不收人謂毒未淨誰知血氣大虛乎凡氣血盛陰陽平何能生毒惟臟腑內損毒始藏久必外泄乃癰發毒自不留然臟腑本虛又加膿血則更虛其外口未斂似有餘氣血未生實不足不可偏補一臟致偏勝然用大補湯每不效非方不佳用不得法也蓋背癰非細小之劑所能補余定一方請正同人參歸一兩黃耆熟地二兩白芍白朮茯苓五錢肉桂二錢川芎生草三錢自效夫癰未潰先化毒已潰亟補虛縱有餘毒不必敗也蓋敗毒非寒涼即消耗消耗損真寒涼傷胃真損則邪氣盛胃傷則穀氣全無何能生肌肉惟大補湯助真益胃故收全效且不特治已潰凡未潰皆效惜人未知肺癰胸膈作痛咳嗽時更痛手按痛處尤氣急此肺熱成癰耳肺嬌臟藥不能到故難治肝熱害肺已成癰似宜泄火救肺肺藥難入然脾肺母肝肺仇心肺敵三經未不嘗受藥補脾土能生金平肝木不侮金清心火則不刑金三經皆益肺無損肺氣得養後解肺邪何癰不散用全肺湯玄參三兩生草五錢銀花五兩花粉茯苓白芍三錢麥冬二兩二劑消肺癰須內消不可令出毒內消不外脾肝心三經或曰腎肺子何不可治腎以消乎然肺癰雖成於火爍實肺氣自虛補腎雖使腎不耗肺然肺腎相通補腎恐肺氣下降火毒轉不遽散不若治三經使肺得養自化毒不遺夫腎之妙也胸膈痛咳嗽吐痰更覺疼甚按痛處難忍咽喉間先聞腥臭隨吐膿血此肺癰已破也肺癰未破易消已破難治以膿血難淨也蓋肺生癰因肺火不散然肺火來因肺氣虛不補肺以散火未成何以消已成何以散既潰又何以愈是肺虛不可不補然胃肺母補胃氣肺氣自旺今癰破多吐膿血肺氣尤虛雖毒尚存必於補氣中行攻散則毒易化正氣無傷用完肺散人參一兩玄參銀花二兩蒲公英五錢花粉生草桔梗三錢黃芩一錢六劑愈此補胃氣即瀉胃火胃氣旺肺氣自衰胃火衰肺火自不旺故敗毒又生肉雖諸藥亦入肺不單走胃然入胃十八入肺十二仍治胃益肺或問肺癰已破病入里似不宜升提肺氣喻嘉言謂宜引胃入腸今仍用桔梗開提肺氣恐不可為訓嗟乎所用皆治胃藥入胃有不引入腸乎然肺氣困頓清肅之令不行用桔梗清肺上氣通下行更速久嗽後肺管損皮膚黃瘦咽嗌音啞自汗盜汗眠臥不得稠痰腥穢毛悴色憔嗽時必忍氣須臾輕輕吐痰否則膈上大痛不已氣息奄奄全無振興人謂肺癰誰知肺痿生瘡乎此症本難治肺癰生於火毒治宜速肺痿生於勞傷治宜緩火毒宜補中用瀉勞傷宜補中帶清瀉與清不同補則同但瀉中用補可用大補清中用補可用小劑忽亡勿助雖有若無始奏功用養肺去痿湯銀花麥冬三錢款冬貝母白薇三分生草紫菀百部五分生地百合二錢天冬一錢三十劑漸愈六十劑全愈方不寒不熱養肺氣於將絶保肺葉於將痿倘求速效必至傾危宜忍耐全生勿欲速送死多食燔熬烹炙煎炒美醞香醪乘興酣飲至咽乾舌燥吐痰唾血喘息膈痛不得臥人謂肺火熾誰知肺癰已成乎肺五臟華益喜清氣薰蒸最惡燥氣炎逼今飲皆辛熱則臟之中全是火腎水無源腎益加燥勢必取資肺金而肺已病不益虛更燥乎況各經紛逼火烈金刑肺干生癰必至之勢宜化毒益養肺降火兼補火庶已成可痊未成可散用枝桑清肺丹桑葉五錢紫菀生草二錢犀角屑五分款冬一錢百合人參阿膠貝母三錢杏仁七粒銀花熟地一兩水煎調犀角末服數劑效此肺腎同治全不降火蓋火因飲而旺乃虛火非實火故補火金堅虛火息補中帶散補非呆補火毒易解肝癰素多怒易動氣忽脅滿發寒熱久脅痛手按痛不可忍人謂肝火盛誰知肝葉生癰乎人但知肺癰不知肝亦生癰且靈素未言但古今氣運不同癰毒亦異況肝生癰未嘗無理惱怒肝葉開張肝氣即逆大怒肝葉空脹未易平時時惱怒肝不得安且怒必動火怒愈多火愈盛火盛爍干肝血則肝氣大燥肝無血養更易怒能不鬱結成癰乎凡肝癰者痛必在左左脅皮必紅紫舌必青以此辨之必不差宜平肝瀉火去毒若因循至潰不救用化肝消毒湯歸芍三兩炒梔子銀花五錢生草三錢三劑減七八劑愈方用歸芍滋肝則肝血驟生又甘草緩急梔子清火銀花解毒安得不效但火毒盛肝血大虧非大劑亦徒然倘執肝火旺非肝癰單用歸芍治脅痛定不效左脅疼痛非常按更甚此肝癰也肝不只怒生癰憂鬱亦生但惱怒痛急憂鬱痛緩初起用大劑逍遙散治立止因失速治肝鬱不宣血亦因而結血結不通遂成癰勢似緩然肝氣急癰成毒發甚驟世有脅痛數日死者正癰也非脅痛即能死可不急治乎用宣郁化毒湯柴胡香附薄荷二錢歸芍銀花一兩陳皮枳殼一錢花粉生草三錢四劑全愈後用四物大劑調治肝癰不可見脅痛世常有吾特言急治何至成癰大腸癰腹痛甚手不可按右足屈不伸人謂火盛存食誰知大腸生癰乎凡腹痛足不能伸者腸內生癰大腸生癰足尤不能伸但大腸癰無不成於火火盛不散鬱結成癰然火有餘本水不足水衰火旺無制乃養毒不解法宜壯水以制火則毒自化用清腸飲金銀花三兩當歸二兩地榆麥冬玄參一兩生草三錢苡仁五錢黃芩二錢四劑毒盡方純潤腸又活血解毒雖瀉火實滋陰故相濟相成倘不益陰潤腸惟攻毒降火則大腸先損何勝火毒之凌爍大腸癰右足不伸飲食不思腹痛甚便膿血肛門如刀割此已潰也能食生不能食死然亦有因火毒熾不能食者凡瘡以胃氣為主無胃氣毒無論陰陽多不救故治癰以扶胃氣為第一治法加敗膿祛毒正無傷火毒又散今癰破不思食則胃氣盡降大危症不補胃但治癰必死用開胃救亡湯參朮玄參山藥苡仁一兩金銀花二兩生草三錢山羊血末一錢水煎調服四劑全愈方救胃敗毒祛膿在其中妙在金銀花治毒仍滋陰又得參術助力散毒尤神山羊血止血消濁且通氣引藥直入癰中解散之合用則調和撫綏有人攻剿有人自胃氣大開化精微轉輸大腸倘胃氣未傷尤效勿疑畏以枉人命大腸生癰小腹痛甚淋漓不已精神衰少飲食無味面痿黃肢軟自汗盜汗不能臥人謂火盛生癰誰知水衰不潤乎大腸傳導全藉腎水灌注今醉飽房勞過傷精力致火動水涸又加生冷致氣血乖違濕動痰生腸胃痞塞運化不通氣血凝滯成癰然先本腎水不足潰後復流其水是因虛復虛若作火毒治必變死症必大補腎水並補脾胃氣則脾胃化精生水更易枯涸得滂沱自淹貫重蘇不治癰癰已化氣血足肌肉生用加味六味地黃湯熟地二兩山藥棗皮八錢丹皮六錢茯苓三錢澤瀉一錢人參麥冬一兩黃耆五錢數劑頓愈用六味補水人參耆麥冬補脾胃土土旺自生金肺與大腸相表裡且又為腎母自子母相需表裡相顧故神小腸癰門腹痛口渴左足屈不伸按痛處更不可忍夫大腸癰屈右足小腸癰屈左足此小腸生癰也但大腸泄火從糟粕出小腸泄火必從溺出用泄毒至神湯金銀花三兩生草車前子劉寄奴澤瀉三錢茯苓苡仁一兩肉桂一分不必四劑方俱利水只銀花消毒何獨神蓋小腸毒必內消內消舍銀花無二味以他藥損正小腸斷不可損故以銀花為君但不能直入小腸用苡苓前瀉引入小腸又加肉桂一分得其氣味引入膀胱從溲化又恐火毒盛不能迅逐更加劉寄奴速祛甘草和調既無留滯復無峻烈自火毒從溺出腹痛呼號痛卻在左腹按之不可忍醫謂食積大腸誰知小腸外生癰乎凡癰生腸內在大腸屈右足在小腸屈左足癰生腸外皆不屈足但小腸痛左大腸痛右況食積時痛時止不若癰痛不移不止故痛在左明是小腸生癰癰生腸內尚可潰生腸外必不可使潰以腸外無可出之路小腸尤甚必早治用內化丹金銀花四兩當歸二兩車前子五錢生草三錢茯苓苡仁一兩四劑愈此即前方之變方也但前方於利水中行敗毒此於利水中補血以敗毒蓋癰破利水則毒隨水出未破不補血則水泄血虛難於消化然須早治否則癰雖愈瘀留腸外必終身腹痛腹痛驟甚小水流血左足不伸人謂小腸生癰誰知小腸火盛乎生癰必由於微未有一旦驟生癰久膿生膿淨血出豈有不潰不膿先出血者然左足不伸者何蓋小腸細大腸寬寬可容邪細難容邪理也受火熬煎腸中逼迫腸不能舒左足應之暫屈不伸但不若生癰之長屈不伸也切不可因足不伸誤作癰妄用解毒宜於初痛足屈察小便無血乃生癰若小便有血乃火痛斷不差宜泄火邪不必化毒痛止足伸用小柴胡湯加味治柴胡甘草人參半夏一錢黃芩三錢茯苓五錢二劑愈小柴胡湯非治小腸藥何效捷因小腸火盛起於肝膽之郁也木鬱火生不犯心而犯小腸火炎上反下熾拂火性矣此小腸受之作痛也小便流血者何蓋火逼小腸之血血恐火爍故越出於小腸走膀胱反違水道不行而流血小柴胡舒肝膽氣則火自炎上又茯苓清水氣水流血自歸無名腫毒頭面無故生小瘡癢甚次日頭重如山又次日面目青紫症至危不速救數日必身發青黑死若青不至心胸尚可救此素服房中熱藥熱極變毒也凡久戰不泄雖氣主之實火主之氣旺非火濟不足鼓興久戰補氣斷不能捨參耆用熱藥助火非參多不足以駕其猛烈然人參價高方士乃少減人參多加熱藥以壯其火金石火煅藥亂用以助命門火命門火腎火也非真陰水不養且腎火壯則外勢剛強自多御女戎何傷無如愈戰愈酣火熾水乾即不頻泄其精水且不足制火熱毒自結腸胃況久戰未有不盡情大泄者泄多火更旺陽易舉再戰或服藥以助勢不知藥益多火益烈戰愈頻水愈爍乎久之水涸火炎陽雖舉不能久戰必忍精勉強以鬥精不化而變毒結於陰部成癰結於陽部成毒頭面正陽之部位較陰部更可畏必多用化毒藥用回生至聖丹生草五錢金銀花八兩玄參蒲公英三兩花粉三錢川芎一兩不必三劑此化毒不耗氣敗毒不損精此毒因水虧極瀉毒藥多損陰陽惟金銀花攻補兼妙故用為君惟少用則味單力薄多用味重力厚又玄參去火甘草瀉毒蒲公英清熱花粉消毒川芎散結相助成功無名腫毒生於思慮不到處其勢凶惡有死之關皆可名之不必分上中下也前言頭面前後左右四肢尚未言不知得其法皆通治大約生無名腫毒者多起於淫欲無度加氣惱憂鬱火乘有隙之處蘊藏結毒故一發莫救故此毒盡陰症宜解陰毒然解陰毒藥多爍真陰因虛結毒復解毒虧陰故此症每不救宜補陰中行散郁佐解毒微助行經多收奇效用黑虎湯玄參一斤柴胡三錢甘草一兩三味煎湯十碗為主生於頭面加川芎二兩附子三分前後左右加當歸二兩甘菊一兩附子三分生四肢加附子五分白朮二兩茯苓一兩俱再煎汁取三碗二日服完未潰即消已潰即散不必二劑玄參最退浮遊火得甘即解迅速之威輔柴胡能抒其抑鬱且有藥引至結毒處大為祛除妙在玄參一斤力更大且妙是補中帶散解陰毒不傷氣切勿疑藥料之重不敢用若些小症與非陰症瘡毒不必用此重劑又宜知對口對口忽生小瘡先癢後痛隨潰爛夫生於對口猶輕生於偏旁者尤重蓋頸項腎督部位屬陰多陰疽非陽疽陽疽高突紅腫疼痛陰癰色黑黯不甚重身沉重困倦欲臥呻吟無力瘡不突起或現無數小瘡口不能從何處覓頭然陰陽二症皆可內消正不必分陰陽惟已潰不審陰陽用藥則禍生頃刻內消用三星湯銀花二兩蒲公英一兩生草三錢二劑全消陽症已破亦效陰症大潰用七聖湯參朮生耆當歸一兩銀花二兩白芥子三錢肉桂一錢六劑愈方治各處毒低陷不能收口者皆神效不只對口陰症以陽症可涼瀉陰症必溫補也腦疽癰疽於腦頂始名腦疽若對口偏口俱非真腦疽腦疽九死一生此腎火沸騰腦為髓海原通腎腎無火髓不能化精多火不特不化精隨火升降且化毒生癰蓋腎化精必得腦中之氣以相化今腦中無非腎火勢必氣化為火火炎上不及下降即於腦中髓海自發其毒較腦氣下流為毒者更甚故每更形改音瘡紫黑煩躁隨飲隨渴甚至腦骨腐脫倘飲食知味猶可救用五聖湯銀花八兩玄參麥冬三兩黃耆四兩人參二兩四劑漸愈改用十全大補湯四兩服四劑又飲八味湯恣飲可全愈此疽得於房術居多丹石燥烈或洗或嚼噙於口藏於臍阻精久戰真陰枯爍髓涸火發遂潰頂門多致不救囊癰陰囊左右生癰名便毒生囊下穀道前名囊癰較之便毒易治囊癰最難療以囊下為懸癰蓋他處皮肉橫生直生俱易合口懸癰橫中有直直中有橫不易收口此少年貪酒色花街柳巷忍精耐飢而鬥或已泄重交或將敗再鼓或與毒婦瘡妓合多生此症所謂欲泄不泄化為膿血也宜大補虛佐消毒用逐邪至神丹銀花四兩蒲公英當歸二兩人參生草一兩大黃五錢花粉二錢三劑已未潰俱愈此方未免過於霸道且大虛又用大黃祛邪似乎非宜不知毒勢盛乘初起正未甚衰大補泄火為得乎倘因循畏縮及流膿血正必蕭索用參耆數斤尚難復原何若早用於解毒中正無傷毒易化因勢利導飲燒酒入房精不得泄至夜半寒熱煩渴小便淋赤痰涎湧盛次日陰囊腫脹痛又次日囊腐玉莖貼囊者亦腐人謂酒毒誰知肝火得酒濕肆虐乎濕何至腐火酒大熱過飲醉死身心腐爛火酒乃氣酒過熱自焚人原有火以火引火安得不延燒飲火酒入房宜是命門火然肝屬木肝木生火理也入房借火酒力火勢必猛火動無根何能久乎精泄火可解今阻抑火無可泄於是入肝將依母自歸也然相火內火可附肝為家火酒外火反得木焚體囊與玉莖乃筋之會入房火聚陰器故囊腫而莖亦腐宜解酒毒益補氣血則濕熱解腐肉長用救腐湯參朮白芍一兩耆歸二兩茯苓苡仁五錢黃柏澤瀉葛根炒梔子三錢八劑全愈酒毒成於拂抑平肝泄火利濕解毒何又用參耆歸術大凡氣血盛者酣飲無礙服火酒而腐勢亦氣血衰力不能勝酒故兩火合遂焚身外腐不急補氣血酒毒雖消腐難速愈臂癰兩臂忽生瘡成癰疽亦陰癰也雖輕於頭面對口肩背然痛者陽症易治用三星湯見對口立消癢者陰症難治必大補氣血佐消痰化毒始效陰主靜兩手至動至動生陰症此反常不可畏乎況動變為靜又陽趨陰非生近於死乎欲陽返陰易欲陰還陽難誰謂臂癰可小視哉仍宜慎重用消癰還陽丹人參生草花粉三錢白朮生耆一兩銀花二兩肉桂乳香末一錢當歸五錢三劑全消此與七賢湯同義各異七賢治已潰以生肉為先此方治未潰以護肌為主故七賢無乳香花粉以二味攻中有擁衛耳乳癰乳癰先痛後腫發寒熱成癰此症男女俱有蓋女人生子食乳後貪睡兒以口氣吹之使乳內氣閉不通遂至痛此時以解散藥治隨愈倘因循則癰成若男子乃胃火盛不上騰於口舌中壅於乳房乃生此症此陽症不比他癰有陰有陽故但分初起多實邪久潰為正虛然邪有餘仍正不足補中散邪萬全道也正不必分先宜攻後宜補用和乳湯貝母花粉三錢當歸蒲公英一兩生草二錢穿山甲土炒一片為末水煎一劑愈方用貝母花粉消胃中壅痰痰壅乳房氣不通痰化胃火失勢以公英山甲解熱毒利關竅自散又恐藥大迅逐加當歸生草補正和解正無傷邪又退何至壅毒不行乳癰已收不慎房帷復潰爛變乳岩現無數小口如管非管如漏非漏似蜂窩肉向外生經年不愈服敗毒藥狼狽瘡口更腐此氣血大虧也凡乳房肉向外筋束於乳頭故傷乳即傷筋須急散遲則筋弛難長況泄精以傷元氣乎當泄精後即用藥補精填髓尚不如此既因循成岩復見岩敗毒不虛虛乎必大補氣血以生精不必再消毒用化岩湯參耆歸忍冬藤一兩白朮二兩茜根白芥子二錢茯苓三錢八劑愈再二劑不發此全補氣血不消毒實為有見雖忍冬消毒性亦補況同入補藥中但失精變岩何不補精而補氣血蓋精不可以速生不若補氣血轉易生精且乳房屬陽明胃既生癰未必能多氣血補之則陽明之經旺自生津液濾注乳房何必復補精以牽制參耆乎左乳結核如桃不痛不赤身體形漸瘦人謂痰氣鬱結誰知肝氣不舒乳屬陽明余何謂肝病然陽明胃土見肝木鬱惟恐來克於是胃亦伏而不揚況乳近脅正肝部位與肝遠尚退畏舒與肝為鄰何敢恣肆而吐氣氣不舒腫滿之形成氣不敢舒畏懼之色現不痛不赤正顯其畏懼也不必治陽明胃治肝腫自消用逍遙散加味治柴胡二錢白芍五錢當朮茯神瓜蔞半夏三錢陳皮五分甘草川芎人參一錢十劑消去瓜蔞再十劑不發方最解肝滯肝氣解胃氣不解自舒況瓜蔞半夏專治胸中積痰痰去腫尤易消産後忽兩乳細小下垂過小腹甚痛人謂乳懸誰知胃血燥乎胃水穀之海多氣多血産後亡血過多則胃空虛飲食不能遽進即進各臟腑取給甚急則胃氣困胃困胃血益燥何以解各臟腑之紛爭子又索母乳內外取資胃無以應乳房胃外廓乳頭胃門戶胃苦內之紛爭欲出不可得外不免兒口吮咂細小下垂乃逃遁難藏入地無門之狀危症也急補胃氣益補血之味胃氣升胃不燥內足分給臟腑何至痛而倒懸哉用解懸湯人參川芎二兩當歸四兩荊芥益母草三錢麥冬炮薑一錢八劑愈用人參生胃氣芎歸生血荊芥益母草分解各臟腑使歸其經絡用麥冬炮薑因胃燥未免火動炎燒産後不便大用寒涼故用麥冬微涼少解火勢肚癰小腹生癰斷無陽症以屬陰部位也陰生陰毒似至重然純陰無陽一用陽藥立效人多用陰藥消毒反成難救然余謂陽藥補氣溫火味也蓋陰地結陰毒乃虛寒故也寒因虛不行毒因寒相結用熱藥祛寒自能寒散毒用闢寒救腹丹白朮銀花三兩茯苓肉桂三錢附子一錢當歸二兩蛇床子五錢一劑消已潰四劑亦愈方用白朮為君利腰臍氣也腰臍氣利下腹部位盡利後用銀花蛇床子祛毒則毒易消然寒極恐難入又加附桂斬關而進也一片乾燥藥未免耗血故用當歸陽中之陰少制其橫則陰寒盡散又無陽旺故奏功又免患多骨癰腿旁長強穴間疼痛高腫成癰久之肉中生骨取出又生人謂多骨癰誰知濕熱毒之所化乎此症因多食生果濕熱所成治早一二劑解散因循失治與不得法遂至濕壅添熱熱盛化骨日久遷延臥床不起或謂初起未嘗有骨可內散生骨後必須取出藥焉可解散不知多骨乃無形所化似骨非骨非肉中真生骨也真骨難化似骨可化宜利濕清熱佐補氣血骨自消用五神湯茯苓前子紫花地丁一兩銀花三兩牛膝五錢五劑全愈方用車前茯苓利濕紫花地丁清熱銀花牛膝補中散毒故神惡疽四肢或頭面生疽頭黑皮紫疼痛異常此陽症之毒也蓋陽毒勢驟不急散毒則養成大橫如賊初起烏合易出久則巢穴日大非朝夕可破人多輕視不急治誰知小可變大乎然癰潰於內疽腫在外潰內難外治腫外易內消雖毒盡由內發疽病尤宜內治用消疸散生地連翹地榆花粉三錢忍冬藤夏枯草當歸一兩白芷生草二錢未潰二劑消已潰四劑愈凡疽以此方投神效蓋補血散毒血活毒難留涼血清火血寒火易散疽陽毒故咸宜疔瘡疔瘡一時疼痛非常亦陽毒世以黃豆令病人嚼之不知腥臭便是疔以此辨不錯瘡頭必發黃泡中有紫黑色更細看泡中必有紅白一線通出於泡內外疔生足上紅線由足入臍疔生手上紅線由手走入心疔生瘡面紅線由唇面至喉急於線盡處用針刺出毒血免攻心若見白線不必治總以消毒瀉火為主用拔疔散紫花地丁甘菊一兩三劑全愈不必外治挑開疔頭若已潰加當歸二兩亦不必四劑
