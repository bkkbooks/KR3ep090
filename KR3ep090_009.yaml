body:
  text: 卷九大便閉結大便閉結口乾舌燥咽喉腫痛頭目昏暈面紅煩躁人謂火盛閉結誰知腎水涸乎腎為肺子大腸亦金與肺表裡均生水然金得清氣則生水得濁氣不獨不生水反欲得水以相養大腸得氣之濁無水則不能潤然大腸開合固腎水潤亦腎火生也然腎火必得腎水以相濟得腎水大腸洞開無腎水則大腸固結故腎虛而大腸不通不可徒泄大腸愈損真陰此症老人最多正以陽旺陰衰火有餘水不足耳法但補腎水水足濟火大腸自潤用濡腸飲熟地二兩當歸從蓉一兩空心服數劑自通用熟地補腎當歸生血潤腸從蓉性動以通便妙是補陰非亡陰老人尤宜少年腎虛亦利大便閉結小腹作痛胸中噯氣畏寒冷喜飲熱湯人謂火衰閉結誰知腎火微乎夫大腸屬金金宜畏火何無火金反閉耶不知金中有火則金不死然頑金須火煅故大腸必得火始能開合大腸者傳道之官有火則轉輸無礙無火則陰幽之氣閉塞其輸挽之途如大溪巨壑霜雪堆積結成冰凍堅厚莫開倘得太陽一照立時消化非大腸有火則通無火則閉之明驗乎然火在大腸大腸有火熱之虞火在腎中大腸無大寒之懼腎中無火則大腸何以傳化水穀法須補腎火不必通大腸結用溫腸開閉湯巴戟白朮熟地一兩棗皮五錢附子二錢水煎服方用巴戟熟地棗皮補腎妙在至陰中仍有至陽之氣又妙在白朮利腰臍附子直通其腎迅達膀胱則火氣熏蒸陽回黍谷雪消冰解何有固結大便閉結煩躁不安口渴舌裂目赤突汗出不止人謂火盛誰知胃火沸騰乎夫陽明胃火一發必至爍干腎水大便不通正其驗也似宜急息其火然火性炎上杯水安能救之必致火烈難犯必得滂沱大雨傾盆倒甕淋漓洗濯則燭天燎原庶幾盡息用竹葉石膏湯石膏麥冬一兩知母三錢甘草一錢茯苓二錢人參五錢竹葉一百片黏米一撮二劑便通改用清肅湯玄參一兩麥冬五錢白芥子甘菊丹皮二錢竹葉三十片生地三錢陳皮五分十劑永無閉結前用白虎以火勢太盛不得已也但石膏辛散性猛烈頻用多用損耗真陰真陰一耗則前火雖消後火又起況火有餘水之不足與其泄火以損其陰何若補水以制陽故後湯補水以息陽火之餘焰大便閉結胸中飽悶兩脅疼痛嘔酸作吐不思飲食人謂火作祟抑知肝火之故乎夫肝木易生火火旺宜生脾胃土又生金何至大腸無津液而成閉結不知肝火半是雷火雷火最爍水試看陰雨一聞雷震雲收雨散正爍水之明徵也故肝火不動則已動則引心包火沸騰引陽明火震動水有不涸者乎水涸大腸安得不閉結故欲開大腸必先泄肝火肝火泄肝氣自平木不剋土脾胃津液自輸於大腸有水則搬運有路自無阻滯用散火湯歸芍一兩黑梔三錢柴胡三分大黃一錢地榆二錢二劑必不再結此方泄肝火又舒肝鬱蓋肝木不郁肝火必不旺解鬱正所以散火肝火散各經火自散豈獨留大腸火固結不散乎況地榆專解大腸火毋怪其無不通也大便閉結口乾唇裂食不消腹痛難忍按益痛小水短澀人謂大腸火閉誰知脾火作祟哉夫脾乃濕土得火則燥宜為脾喜何反成閉結不知土太柔則崩太剛則燥崩成廢土燥成焦土然土焦非陽明火上燒必命門火下逼二火合攻脾之津液涸矣脾之津液涸則水穀僅足供脾之用何能分潤大腸大腸無津液之潤必縮小安得不閉結法必須急救脾土之焦又必須泄陽明命門火脾土得養自易生陰陰生津液自潤又何必通大腸哉用救土通腸湯玄參二兩當歸生地一兩知母厚朴一錢升麻五分大麻子三十粒二劑便必通減麻子知母再四劑脾火盡散大便不再結此方玄參生地補脾陰又泄命門脾胃火當歸潤腸知母厚朴下行解熱升麻提脾氣陽升陰自降於大腸大麻子最入大腸引火下行不使陰氣上升正助升麻提陽氣也津液無干澀又何患大腸之不通哉大便閉結舌下無津胸前出汗肢冷煩悶發躁大眥紅赤人謂火閉抑知心火燒焚乎心與小腸相表裡未聞與大腸有妨礙然大腸實與肺為表裡心火刑肺必刑大腸矣蓋大腸屬金心火盛肺不能受自分火與大腸大腸最畏心火火盛爍金可立而待肺生水肺與大腸相表裡豈無津液以救大腸無如肺受心刑親子如腎尚不能分潤又安有餘波及兄弟救大腸乎此大腸所以不通也法宜急泄心火但徒泄火無甘霖之降僅望肺金露氣恐不足以濟大旱必大雨霖霖旱魃頓除河渠盡通何憂陸地之蕩舟用掃氛湯黃連三錢玄參三兩沙參當歸麥冬丹皮一兩瓜萎二錢一劑火降便通不必再劑方用黃連解心熱然不益玄參連雖寒性燥火解大腸燥如故浮遊火莫除故益之而潤以去燥不啻炎夏忽雨既去火炎又沾沋渥加沙參以生陰當歸生血麥冬涼肺丹皮涼腎無非截斷火氣不助心焰又加瓜萎使火存於心中者盡下降而消滅火滅水生大腸之炎頓掃故一劑奏功大便閉塞咳嗽不寧吐白沫咽乾腳冷人謂三焦火旺誰知肺火旺乎肺與大腸兄弟兄強弟不能弱肺火旺非強乎強金遇火煉之成器何肺火旺肺不受竟傳入大腸乎不知肺嬌臟可微火熏蒸不可猛火鍛鍊故遇火即移熱於大腸然肺為清肅之宮無自焚之理何以火起於肺蓋肺主皮毛氣少虛風寒襲之肺中正氣與邪戰寒變熱而風變氛肺因生火自爍肺津肺與大腸既為唇齒肺涸大腸亦竭似宜速解肺火然肺不禁重治以輕清下降少抑其火庶心胃二火不來助炎則肺火散陰液生大腸自通用抑火湯山豆根二錢黃芩三錢麥冬當歸一兩天冬五錢升麻五分六劑全愈此方抑肺火不傷肺氣肺得養津液流通又何至大腸閉結哉大便閉結飲食無礙且無火症亦無後重有至一月不便者人謂腎中無津誰知氣虛不能推送乎夫大腸無津固不能潤無氣亦不能行此氣乃脾胃中陽氣陰主降陽主升陽通於陰則陰能降陰通於陽則陽能升陽氣衰則不能通陰陰與陽隔則水穀入腸各消化不相統會故留中不下且陽速陰遲陽氣衰陰行難速遁入陰分陽不相通聽陰氣自行安得不濡滯耶法不可滋陰以降急當助陽以升用升陽降濁湯參耆朮歸麥冬五錢柴胡三分荊芥五分肉桂一錢附子一分一劑便通此方純補陽分麥冬當歸少益其陰則陽勝陰始偏旺又得桂附直入至陰引柴胡荊芥以升陽陽升陰立降安能阻塞哉大便不通手按痛甚欲死心煩燥坐臥不寧似有火然小水又清長人謂有硬屎留腸中誰知蓄血不散乎蓄血傷寒症多有之今不感風寒何以有蓄血症不知氣血宜流通一身一有抑塞遂遏皮膚而為癰留腸胃而成痛摶結成塊阻住傳化隔斷糟粕大腸因而不通法宜通大腸佐之逐穢用抵當湯治之水蛭三錢剪碎如米粒大炒黑虻蟲二錢各為末桃仁十四粒研碎大黃五錢一劑大便通頓失痛楚蓋大黃泄下勢最猛得水蛭虻蟲桃仁相佐其破堅逐穢更神此症不速通利必發狂此通血之不可緩也何以辨為蓄血之病全在看小水利與不利耳蓋蓄血小水必利以血不能入膀胱故膀胱之氣能行能化無害其水道耳故見小便利大便結用抵當湯萬無差失小便不通小便點滴莫出又急悶欲死煩躁口渴索飲飲後愈急人謂小腸熱極誰知心火亢極乎夫心與小腸為表裡心熱小腸亦熱小腸熱極而癃閉熱在心而癃閉也雖然心火炎上小腸在下何能受熱即移熱於小腸熱宜不甚何癃閉如此不知小腸開合全責心腎以通之今心火亢熱則清氣不交於小腸惟烈火之相逼小腸有陽無陰何能傳化小腸不能傳化膀胱又何肯代小腸以傳化況心腎之氣既不入於小腸亦何能入於膀胱以傳化水穀哉此膀胱所以緊閉不可泄也法宜泄心火兼利膀胱則心腎之氣通小便亦通用涼心利水湯麥冬一兩茯神五錢蓮子心一錢前子三錢二劑水如注四劑全愈此補心即涼心也心無太亢小腸又寧有大幹況有滲味通水則心氣自交腎腎交膀胱氣化易於出水尚有不通之苦哉小水不通睛突出面紅耳熱口渴引飲煩躁不寧人謂上焦火盛誰知膀胱火旺乎膀胱與腎為表裡膀胱必得腎氣通後能化水是膀胱火即命門火膀胱無火不能化水何火盛而反閉結不知膀胱得正火則水易消得邪火水難通利是膀胱火不盡生於命門中矣蓋膀胱太陽經太陽最易入邪一入邪寒鬱為熱熱結膀胱邪將散也邪既將散火隨溺泄何反成閉結因邪將出境恐截去路故作威示強住於膀胱耳法不必泄腎火但利膀胱則邪去如掃用導水散王不留行五錢澤瀉白朮三錢一劑通不必二劑此逐水至神小便點滴不通小腹作脹然不痛上焦無煩躁胸中無悶亂口不渴舌不幹人謂膀胱水閉誰知命門火寒乎膀胱決瀆之官氣化而能出氣化者腎氣也即命門火也命門火旺膀胱水通命門火衰膀胱水閉或曰小水頻數由於命門火衰火衰宜小水大利何反閉塞不知命門火必得腎水以相養腎水衰火乃旺火旺者水無力以制也無水之火火雖旺而實衰無火之水水欲通而反塞命門火衰小水勤衰之極者勤之極勤之極者閉之極也人見其閉疑膀胱火反用寒劑愈損命門火膀胱之氣愈微又何能化水乎改投利水藥轉利轉虛無異向乞人而求食法必須助命門火又恐陽旺陰消必於水中補火用八味湯熟地一兩棗皮山藥茯苓五錢丹皮澤瀉三錢肉桂二錢附子一錢一劑如注八味湯水中補火火無太炎火中通水水無竭澤即久閉至於胞轉此方無不奏功況閉結哉小便不通睛突出腹脹如鼓膝以上堅硬皮欲裂飲食且不下獨口不渴服甘淡滲泄藥不效人謂陽盛極誰知陰虧極乎夫陰陽互為其根甘淡滲泄皆陽藥病在無陰用陽藥宜乎陰得陽生然無陰者無陰中之至陰也必得陽中至陽而後化小便閉膀胱病也膀胱為津液之府必氣化乃能出是氣即陽中至陽也原藏至陰中至陽無至陰之氣則孤陽無陰何以化水補至陰陽自化也用純陰化陽湯熟地一兩玄參三兩肉桂二分前子三錢一劑小便如泉再劑如失此方勝滋腎丸以知柏苦寒不若此方用微寒以化水論者謂病危急不宜用補以通腎且熟地濕滯增其閉澀誰知腎有補無泄用知柏泄腎不虛虛乎何若用熟地純陰又得玄參既能生陰又降火攻補兼施至陽得之不啻如魚得水化亢炎為清涼安得不崩決而出哉或謂既用玄參熟地滋陰則至陽可化何又用肉桂車前然藥是純陰必得至陽之品引入至陽又有引水之味同群共濟所以既入陽中又能出於陽外況肉桂止用氣以入陽不用味以助陽實有妙用小便閉中滿作脹口甚渴投利水劑不應人謂膀胱火旺誰知肺氣乾燥乎夫膀胱州都之官津液藏焉氣化則能出上焦氣化由於肺氣不熱肺熱則金燥不生水利水藥盜耗肺氣故愈行水愈不得水法宜益肺助秋令水自生用生肺散人參一兩麥冬二兩北味黃芩一錢二劑水通此方補肺生金即生水何又加黃芩不慮其伐金傷肺乎不知天令至秋白露降是天得寒以生水肺熱不用清寒何能益肺而生水此黃芩必宜加也飲食失節傷胃氣遂至小水不通人謂肺虛誰知胃氣下陷乎夫膀胱必得氣化而始出氣升者即氣化之驗也氣盛則清升濁降氣衰則不升降胃者多氣之府群氣皆統所以胃氣一虛衆氣皆不能舉故脾胃虛九竅皆不通豈獨小水閉哉法宜提至陽之衰氣而提氣必從胃始用補中益氣湯人參甘草柴胡一錢黃耆白朮三錢當歸二錢陳皮三分升麻五分一劑水通二劑全愈方用參耆補胃升柴從化原之下提之則清升濁降何至閉結內傷多食肥甘積胸中久不化少遇風邪便覺氣塞不通人謂傷風外感誰知傷食因而外感乎凡胃強則土生金肺氣必旺外邪不能從皮毛而深入惟胃虛則肺亦虛邪始乘虛而襲然則胃可不強乎胃必假飲食之助惟是胃氣開食易消胃氣閉食難化食消胃強難化則胃弱人多食本欲助胃誰知反損胃乎胃氣一虛必肺虛皮毛不能衛外無怪風寒易襲也法烏可獨治外感用護內湯白朮茯苓三錢麥芽甘草柴胡半夏一錢山楂五粒枳殼三分神麯八分肉桂二分二劑愈此消食神劑又逐外邪不傷胃氣真治內傷感邪之良法飢飽勞役損津液口渴舌乾又感風邪頭痛發熱人謂外感誰知內傷於陰乎夫人血足津液自潤是津液乃血所化傷血津液自少血少皮膚無養毛竅空虛風易入然風入皮膚不能驟進經絡以陰虛陽未衰也陽與邪戰而發熱故頭痛法不必補陽但補陰血少佐祛風則陰陽和既無偏勝邪何能久留用養陰辟邪丹當歸白芍五錢柴胡甘草花粉一錢荊子五分茯苓川芎三錢一劑邪解二劑愈原因津虧而邪入此方補血養陰津自生邪自出況川芎蔓荊能祛頭風柴胡炙草更擅解紛花粉茯苓消痰利濕引邪從膀胱出陰虛感邪莫良此方倘用攻於補陽之中則陽旺陰消邪轉熾矣飢飽勞役又感寒致腹痛畏寒身熱人謂外感誰知陽氣內傷乎凡人陽壯犯寒無傷惟飢飽損脾胃勞役困形骸則臟腑經絡無非虛冷此邪所以易入雖有外邪俱作正虛治況腹痛畏寒尤虛冷之驗外熱內寒又何疑乎用加味六君子湯人參肉桂甘草柴胡一錢半夏陳皮五分茯苓三錢白朮五錢一劑痛止熱解方用六君助陽加柴胡祛邪肉桂蕩寒倘疑身熱為外邪盛純用祛風利濕損傷陽氣不啻下石矣懷抱素郁忽感風寒身熱咳嗽吐痰不已人謂外感誰知肝氣不舒乎肝木喜條達憂鬱則肝氣澀正喜外風吹散內郁可舒無如內郁生火風火相合熱乃熾故感風寒所以作熱以肆風火之威肝反凌肺肺不甘兩相戰鬥肺懼火刑呼救腎子咳嗽生矣肺為火刑胃來援津液上升又為肝中風火所耗變為痰涎法宜急散肝風然風散火存火猶引風非救本之道也宜舒肝鬱則火息風尤易散用逍遙散加味治柴胡半夏甘草白朮炒梔子一錢當歸白芍三錢陳皮五分茯苓二錢三劑愈此方解鬱祛風郁解風自難留加半夏消痰梔子退火更能相助為理故奏功如響忍飢腹空虛遇天氣時寒時熱至胸膈悶塞如結胸人謂邪侵誰知內傷胃氣乎胃為水穀之海多氣多血然必受水穀氣血始旺故水穀多受胃強少受胃弱今忍飢則胃無水穀胃火沸騰乃遏抑不舒則胃氣消天時不正自易相感乘虛入胃胃氣盛邪自難入既入亦難留今邪欺胃虛反賓作主盤踞胃中因現悶塞法須助胃則邪自退用加味四君子湯白朮五錢茯苓人參三錢甘草柴胡一錢枳殼五分二劑愈論理感寒熱自宜用熱藥祛寒用寒藥祛熱然皆無益於胃胃虛寒熱相戰必以胃為戰場胃何以堪故惟健胃為主佐之和解酒客忽感寒不可以風人謂傷風誰知內傷於酒乎酒醉常不畏風風何以入不知酒能散氣氣散則陽虛陽虛則腠理營衛無不空虛邪所以易入故酒客皆氣虛氣虛邪入助其氣邪自出用補中益氣湯人參二錢耆歸三錢白朮五錢甘草升麻三分陳皮五分柴胡一錢一劑氣旺不畏風二劑全愈提陽於至陰中正補陽氣也陽非提則不能旺此方治內傷兼外感實有神功以治傷酒後感風寒尤宜使專用祛風逐邪散盡真陰風邪轉不能出可不慎哉人色徒感冒外邪傷風咳嗽睡臥不寧人謂感風誰知內傷腎乎腎肺子泄腎過多必取給於母腎虛肺亦必虛肺氣不能充於毛孔邪即入倘用散風之劑則肺氣益虛腎又取資內外盜肺氣安得不困肺不旺前邪不出後邪復入輾轉感冒肺氣大傷不特不生腎且反耗腎遂至變勞瘵宜補肺更宜補腎使腎不盜母氣肺自得子援子母兩旺外邪自遁用金水兩滋湯麥冬熟地一兩天冬茯苓白朮三錢桔梗甘草紫苑一錢山藥五錢肉桂三分白芥子二錢十劑全愈腎虛感邪最難愈以散邪藥不能直入腎經詎知腎虛感邪邪不遽入腎仍在肺散肺邪仍補腎水腎得益肺又無損正善於散邪日恐懼遂至感冒風邪畏寒作顫人謂感風誰知內傷心膽乎夫過恐則膽氣寒過懼則心氣喪膽寒則精移心喪則精耗精移精耗心膽愈虛邪乃易中凡邪必至少陽正膽怯之狀也倘再用祛風則耗損膽氣膽耗心氣更耗二經氣耗邪肯輕出於表裡外乎法宜急救膽氣膽不寒心亦不喪協力同心祛除外邪自易易耳用加減小柴胡湯柴胡甘草一錢白芍一兩茯神五錢麥冬三錢陳皮五分三劑邪盡散方用柴胡和膽中之邪佐白芍麥冬茯神補膽弱即補心虛也二經得補恐懼不畏又何懼於外邪乎盡情喜笑遂至感寒畏風口乾舌苦人謂外感誰知內傷心包乎心包膻中也臣使之官喜樂出焉宜喜宜樂何至相傷大笑不止則津干液燥在所不免心包護心心包乾燥必盜心氣以自肥則心氣虛無邪易入矣法宜急補心心旺心包亦旺蓋國富家自不貧自協力御外何至四郊多壘用衛心湯人參二錢白朮五錢茯苓三錢甘草菖蒲蘇葉半夏桔梗丹參一錢三劑愈此心與膻中均補不可分治況原因樂而得憂因喜而得愁者乎故邪易散終日思慮復加憂愁面黃體瘦感冒風邪人謂外感誰知內傷脾腎乎夫後天脾胃先天腎最不宜病然最易病者天下無不思不愁之人過於思慮則胃氣不升脾氣不降食積不化何能生津液以灌五臟甚矣思慮傷人憂愁更甚思傷脾憂傷腎腎傷則水不滋肝肝無水養仍克脾胃憂思相合脾腎兩傷外邪尤易深入欺先後天虛也二天皆虛元氣弱為何如法可散邪不扶正哉用脾腎兩益丹人參白朮巴戟一兩茯苓五錢柴胡甘草一錢肉桂五分棗皮三錢二劑風散十劑全愈方補土有補水補水有散邪有益無傷實神方也動多氣惱遂至感觸風邪身熱胸脅脹人謂外感誰知肝經內傷肝性急氣惱則肝葉開張氣愈急急則氣不能順而逆作逆則氣不舒而脹生氣既不舒血亦不暢氣既不順血亦不能藏木鬱欲泄木乃生火火鬱欲宣火乃生風內外風動內外火焚風邪易入外風外火不可徒祛於外也用風火兩消湯白芍一兩炒梔子三錢柴胡花粉前子二錢甘草一錢丹皮五錢二劑愈此方治肝經之內火內風然外火外風亦可兼治倘不用白芍為君單用柴梔雖風火亦能兩平肝中氣血虛未能驟補風火散後肝木仍燥怒氣終不能解何如多加白芍既能補肝又能泄風泄火之兩得勤於功名勞瘁飢餓不辭遂至感風邪咳嗽身熱人謂外感誰知內傷於肺乎夫肺主氣誦讀傷氣則肺虛肺虛則腠理亦虛邪即隨入肺虛不能敵邪呼腎子以相救腎因肺虛無力上灌肺氣往來於肺腎之間故咳嗽法急補肺氣然肺為邪侮補肺則邪更旺必兼補胃以生肺則邪不能奪然補胃不散邪肺畏邪侵不敢受胃益惟於胃中散邪則邪畏土旺聽肺氣自生肺氣生邪乃遁矣用助功湯人參二錢茯苓三錢麥冬五錢甘草桔梗半夏一錢黃芩五分三劑全愈此肺胃同治助胃即助肺泄肺火即泄胃火祛肺邪即祛胃邪邪入肺必入陽明肺邪散寧遁入陽明乎終日高談口乾舌渴精神困倦因冒風寒頭痛鼻塞氣喘人謂外感誰知氣血內傷乎多言傷氣未言傷血不知血生於氣氣傷血亦傷多言津液盡耗津液亦陰血之餘氣屬肺血屬肝氣血傷即肺肝兩傷多言損氣血競至肺肝兩傷邪入最易為可慨也邪既乘肺肝虛深入二經使氣逆於下而上不通又何以治乎仍治肺肝之虛佐以散邪用兩治湯白芍當歸麥冬五錢麥冬五錢人參甘草花粉一錢桔梗二錢蘇葉八分此方入肝肺補氣血消痰火各各分治二劑奏功終日貪臥致風邪襲之身痛背疼發熱惡寒人謂外感誰知脾氣內傷乎夫脾主四肢四肢倦怠欲睡脾不能運動也略睡亦足養脾氣然過於睡臥則脾氣不醒轉足傷氣因氣虛而思睡復因睡而傷氣則虛虛安得不招外風乎然治風必損脾脾虛招風又用祛風藥損脾邪且欺脾虛不出不用補脾變證蜂起用補中益氣湯加味治人參三錢黃耆白朮五錢當歸二錢陳皮五分甘草柴胡半夏神麯一錢升麻三分三劑愈此方益脾聖藥況睡臥既久脾氣下陷正宜提之久睡脾氣不醒半夏神麯最醒脾故加之日夜呼盧鬥貝筋酸背痛足重腹飢致冒風邪遍身痛發寒熱人謂外感誰知氣血內傷乎凡人氣血易損況呼盧則液干鬥貝則神瘁損傷氣血尤甚顏枯貌瘦非明徵乎無如世人日日同場共角耗散氣血敗壞臟腑倘昧內傷惟治外感正益虛邪益旺非癆瘵必怯弱必須大補氣血少加和解則正足邪自遁用大補湯加減治之人參當歸茯苓白朮白芍熟地三錢黃耆五錢川芎甘草柴胡一錢陳皮五分數劑全愈此方氣血兼補但原方有肉桂呼盧鬥貝未免火有餘水不足故易以柴胡補中和之邪尤易散勇徒或赤身不顧流血不知致風入皮膚發寒熱頭疼脅痛人謂外感誰知筋骨內傷乎筋屬肝骨屬腎肝足筋舒腎滿骨健是筋骨必得髓血之充世人知耗髓血無過泄精至鬥毆耗髓血未必盡知蓋鬥毆必怒怒時肝葉開發血多不藏而血耗肝血耗必取給於腎腎水供肝木火內焚又易乾燥腎資肝不足又何能分潤於骨髓血髓兩無筋安能舒骨安能健人至筋骨兩虛風邪易入可不急治其虛乎用四物湯加味治之熟地一兩當歸白芍五錢川芎柴胡白芥子一錢牛膝三錢丹皮金叉石斛二錢四物補血亦補髓邪因虛入補髓血邪自出故少加柴胡風邪隨散彼不補髓血者尚昧於治內傷也終日捕魚時發熱畏寒人謂風濕外感誰知肺氣閉塞乎肺主氣氣旺則周流一身皮毛外衛邪不能傷倘肺虛氣尚停住身入水中遏抑皮毛虛氣難舒濕且中之夫濕外受今從皮毛入使氣閉塞不通故畏寒然不發熱畏寒惡冷亦不驟見惟肺虛皮毛不能外衛水冷金寒肺與濕相戰則身熱生矣此熱乃肺虛不能敵邪非風邪入之而發熱也法補肺兼利水正旺邪自易散用利肺湯紫蘇甘草桔梗半夏一錢人參二錢白朮三錢茯苓五錢神麯五分附子一分三劑全愈此補肺不見利水水自從膀胱出因內傷致邪故不必治外感憂思不已加飲食失節脾胃有傷面黑環唇尤甚如飢然見食則惡氣短促人謂內傷誰知陰陽相逆乎夫心肺居上焦行營衛而光澤於外腎肝居下焦養筋而強壯於內脾胃居中焦運化精微以灌注四臟是四臟所仰望者脾胃也脾胃傷四臟無所取資脾胃病四臟俱病矣今憂思不已則脾胃氣結飲食不節則脾胃氣損勢必宜顯者反隱不彰宜隱者反形不晦陰氣上溢於陽中黑色授著於面矣口者脾胃出入之路唇為口之門戶脾氣通於口而華於唇今水侮土故黑色著於唇非陰陽相反而成逆乎不惟陽明胃脈衰而面焦已也是脾胃陰陽之氣虛烏可不急救中州土用和順湯升麻炮薑五分防風白芷甘草三分黃耆白芍茯神三錢白朮五錢人參二錢午前服連十劑黑色盡除再十劑全愈此補中益氣之變也凡陽氣下陷用此方提之倘陰氣上浮陽中則此方以升散陰氣皆奏功甚速怔忡善忘口淡舌燥多汗四肢疲軟發熱小便白濁脈虛大而數人謂內傷誰知思慮過度乎君火心火也相火膻中火也膻中手厥陰經性屬陰主熱古以厥陽名以其火不可遏也越人云憂愁思慮則傷心心氣傷心血自耗每欲寄權於心包心包欺心弱即奪權自恣法宜以水濟火然火勢熾用寒涼心氣益虛激動焦焚之害不如補心氣大滋腎水則心火寧心包火自安用坎離兩補湯人參生地麥冬山藥五錢熟地一兩菟絲子炒棗仁茯苓白朮三錢丹皮二錢北味一錢桑葉十四片十劑愈此心腎雙補水上濟心火無亢炎自有滋潤譬君王明聖權臣何敢竊柄勢必奉職恐後共助太平矣勞倦中暑服香薷飲反虛火炎上面赤身熱六脈疾數無力人謂暑未消誰知內傷中氣乎人正氣足暑邪不能犯今暑氣侵皆氣虛招之也然內虛發熱不治虛安能祛暑況夏月伏陰在內重寒相合反激虛火上炎此陰盛隔陽法宜補陽以退陰然陰盛陽微驟用陽藥入至陰必扦格不入必熱因寒用用順陰湯人參茯苓白扁豆三錢白朮五錢附子青蒿二錢乾薑一錢冷服必出微汗而愈方用薑附未免太熱與陰氣不相合乃益青蒿之寒散投其所喜又冷服使上熱得寒不至相激及至中焦寒除熱性發反相宜素虛忽感風遍身淫淫循行如蟲或從左腳腿起漸上至頭下行右腳自覺身癢有聲人謂奇病誰知內傷氣不足乎氣行則血行氣止則血止氣血周流何至生病惟其不行皮毛間淫癢生矣蓋氣血本不可止不可止而止非氣血虛乃氣血之衰也氣血大衰皮毛焦氣血少衰皮毛脫氣血衰又少有微邪則皮毛如蟲行因氣血虛身欲自汗邪又留而不去兩相爭鬥拂抑其經絡皮膚作癢不啻如蟲之行非真有蟲也傷寒汗多亡陽亦有如蟲行病傷寒本外感至亡陽變為內傷矣今非傷寒亦見蟲行症非內傷而何宜大補氣血氣血行自愈用補中益氣湯參耆一兩歸術五錢陳皮升麻五分甘草柴胡一錢玄參三錢桑葉二十片十劑全愈此方原大補氣血多用參耆更補氣氣旺血亦自旺自能流行身癢多屬火加玄參退浮遊之火汗多發癢桑葉止汗癢自止色白神怯秋間發熱熱熾頭痛吐泄食少兩目喜閉不開喉啞昏昧不省粥食有礙手常按住陰囊人謂傷風重病誰知勞倦傷脾乎夫氣本陽和身勞則陽和之氣變為邪熱不必風襲而身始熱諸陽皆會於頭陽虛則清氣不升邪熱乘之作頭痛不必外風犯之而作頭痛清濁拂亂安得不吐泄人身之脈皆屬於目眼眶脾之所主脾傷何以養目目無所養欲不閉得乎脾絡連舌本散布舌下脾傷則舌絡失養此言語所以難也咽喉雖通於肺然脾虛肺氣先絶肺虛咽喉難司出入心之神明亦昏瞀不知人陰囊屬肝脾虛肝欲侵頻按其囊者惟恐肝旺土虧極反現風木之象也大健其脾風木自消用補中益氣湯參歸茯苓三錢耆術五錢陳皮甘草五分柴胡一錢升麻熟附三分十劑全愈病本內傷此方自中病情然參耆歸術非附子其功不大只用三分無太熱之虞日日向火致汗出不止久則元氣大虛口渴引飲一旦發熱人謂感風誰知肺受火傷乎肺本屬金最畏火外火雖不比內火然肺氣暗損何禁二火之逼自然虛者益虛肺不得養矣金生水肺病何以生腎腎水不生腎日索母乳母病不應子亦病矣子母兩病勢必皮膚不充風邪易入不必從膀胱而進不必治風但補肺滋腎則肺得養內不藏邪風仍從皮毛而出用安肺湯麥冬玄參五錢桔梗紫蘇款冬二錢生地白芍天冬三錢黃芩熟地茯苓棗皮三錢紫苑一錢貝母五分二劑愈此肺腎同治何名安肺蓋子母一氣安子勝於安母子母安自同力御邪故安腎正所以安肺也倘不顧肺但祛邪因傷益傷有不變勞怯哉疝氣感寒濕睪丸作痛遇冷即發痛難忍人謂濕氣入睪丸誰知濕入腎經乎濕侵腎宜病腰何以痛睪丸不知睪丸屬腎腎氣不至睪丸則外勢不振所以不至睪丸者以腎得濕則寒寒在腎即寒在睪丸腎熱則氣通於睪丸外腎寒則氣結於腰腎中如是腎氣不通宜睪丸不應何腎寒而睪丸作痛不知疝氣雖成於腎寒亦成於睪丸濕乎當泄精後久坐寒濕內外兩感睪丸獨受法宜溫腎寒消睪丸之濕病如掃用救丸湯肉桂二錢白朮二兩茯苓苡仁一兩橘核一錢三劑痛除十劑不發此少陰腎病腎中寒極腎氣不通腎中濕重腎氣更滯去其寒濕腎氣自行於睪丸內況肉桂橘核尤入睪丸自手到功成感濕熱亦睪丸作痛遇熱而發然痛不甚人謂熱氣入睪丸誰知熱氣入腎乎腎最惡熱腎中虛火自旺有強陽不倒之虞況邪火侵安得恬然無恙故熱以濟熱睪丸作痛烏能免哉但火最急痛宜不久何經年不愈即暫愈遇熱即發蓋因熱又得濕耳熱性急濕性遲濕熱交攻熱欲散而濕留濕欲潤熱燥一睪丸之內陰陽乖異求不痛得乎法去濕熱疝氣自除用利丸湯茯苓苡仁一兩沙參二兩十劑斷根方以苓苡消濕沙參化腎熱且沙參又善治疝故成功睪丸痛氣上衝肝兩脅脹滿按之益疼人謂陰寒在腹誰知厥陰氣受寒乎蓋睪丸不獨通腎且通肝陰器宗筋之聚也筋屬肝睪丸非筋何亦通肝不知睪丸可升可降膜聯陰器故肝病筋亦病筋病睪丸亦病或謂睪丸通肝肝病亦與睪丸相關今睪丸痛上衝於肝又以睪丸克肝恐睪丸非肝所屬不知睪丸痛上衝肝正顯同氣也氣同病亦同非睪丸沖肝實肝氣衝睪丸用引丸湯白芍二兩小茴三錢橘核柴胡一錢沙參五錢四劑全愈此方平肝肝氣不沖睪丸又小茴橘核沙參散邪則兩丸安奠膀胱癃閉小水不利睪丸連小腸疼人謂小腸氣誰知膀胱熱結乎膀胱化水膀胱寒熱水俱不化熱結於膀胱必散經絡水入睪丸有囊大如斗者是必消水然消水不解熱則膀胱之火直趨睪丸症更甚用散丸湯茯苓杜若根枝沙參一兩連二劑水如注囊小方奇在杜若性寒善發汗且直入睪丸散邪用助茯苓沙參利濕又泄熱故特神但服後即用當歸補血湯數劑自無太虛之患睪丸初痛後不疼痛名木腎乃寒極氣不通也初起必感寒濕因入房又感寒濕則濕入睪丸中寒結睪丸外遂不疼痛此非附桂不能直入睪丸以通氣然不散邪用附桂只興陽且散邪藥多散睪丸之邪則少故多不效然得法正易易耳用化木湯白朮二兩附桂柴胡一錢杜若根枝一兩服後即擁被臥少頃必發汗必兩腎外汗出如水而後止一劑即愈蓋白朮利腰臍氣杜若發睪丸邪附桂通達內外柴胡解肝濕故一劑奏功杜若根乃田間蘭菊花是也狐疝日間縮小而痛夜伸出而安且強陽善戰真狐疝症若不能久戰假狐疝也假狐乃寒濕用前救丸湯即愈真狐乃神道星月下行房祟憑也疝不同治亦異大約狐疝淫氣未散結睪丸內狐最淫善戰夜間媚人蓋狐屬陰狐疝日縮入不可戰戰則疼痛欲死此祟禁也凡祟屬陰夜亦陰人之陽氣入陰中陰與祟陰同氣相得祟不禁反善戰至精泄陽氣奔出純陰無陽又復痛矣然祟必乘虛入不補虛何以逐祟用逐狐湯人參一兩白朮茯苓五錢肉桂三分橘核白薇甘草一錢荊芥三錢半夏二錢連四劑全愈此方純助陽陽旺陰自消或謂夜伸善戰正陽旺今助陽必增妖氛何以助陽祟滅不知祟遏抑陽氣不能出至夜善戰正陽郁甚借交合而聚於陰門乃假象非陽真旺也吾助陽則陽氣勃勃陰祟何敢遏抑乎又益舒郁逐邪消痰解祟祟自去奔豚感寒如一裹氣從心下直奔陰囊名奔豚言如豕奔突勢驟莫遏痛難忍人謂外寒誰知心包命門火衰乎夫二火一在心一在腎上下相通寒邪莫犯二經火衰寒邪得中然寒氣入內宜先犯心何反下趨腎囊蓋腎虛寒脾又濕寒濕同氣相親故急趨而下甚便此症如風雨來每不及防似疝非疝耳不可作疝治補心腎溫命門心包火去脾濕自愈用安豚丹參朮巴戟五錢肉桂志肉甘草一錢山藥一兩蛇床子茯苓三錢附子五分三劑愈方先補心腎後用附桂熱藥始足駕馭其猛烈轉易祛除然邪急藥猛急以治急未免太剛加甘草緩急相濟小水甚勤睪丸縮入遇寒更痛人謂命門寒誰知膀胱寒結乎夫膀胱化水命門火化之也似必命門寒膀胱始寒膀胱寒結獨非命門寒結乎孰知膀胱亦能自寒成於坐寒濕地寒濕襲入膀胱不能散雖有命門火不能化蓋命門火止能化內濕不能化外濕外濕留於膀胱必與命門真火相戰邪盛正衰安得不痛法宜用溫熱直入膀胱祛寒濕則睪丸展舒痛自止用闢寒丹肉桂橘核三錢苓術五錢甘草一錢荔枝核三個搗碎二劑安四劑全愈妙在肉桂為君既溫命火復祛膀胱寒苓術又利水橘核荔核更定睪丸痛非桂相引亦不能直入而散寒結陰痿交感忽陰痿百計不振人謂命門火衰誰知心氣不足乎凡房戰能久乃命門火充陰痿自是命門火衰何謂心氣不足不知心火動腎火隨之苟心火衰命門火何能振故能久戰否必心中搖搖只興一時不能久戰故治陰痿必上補心下補腎心腎兩旺後補命門火用起陰湯人參黃耆五錢白朮巴戟熟地一兩北味一錢肉桂志肉柏子仁一錢棗皮三錢八劑陽旺苟服三月如另換一人方妙大補心腎不甚溫命門火火氣自旺世不識補心以生火則心衰虛火焚心不補腎以生火則水虧火旺損腎反燒乾陰血必致陽旺陰虛不可救吾道原有救陽之方惟恐持為愈愈故先聖不言無如紳士求方士金石之方反致殺人故偶論陰痿並傳此方與其修合金石以致喪亡不若此方為得精薄冷雖交接或半途而廢或臨門即泄人謂命門火衰誰知脾胃陽氣不旺乎夫脾胃土土生於火脾胃不旺似必命門火衰不知命門先天火也脾胃後天土也後天土本生於先天火然先天火不旺則後天土無生補先天火正所以行後天土脾胃雖為後天其中未嘗無先天之氣命門火寒脾胃何能生哉命門不生脾胃則後天氣衰欲氣旺而固精厚不薄得乎法須補先天火更補後天土則土旺火不衰庶氣溫而精厚用火土兩濟湯人參白朮巴戟一兩棗皮一兩菟絲一兩山藥五錢肉桂一錢十劑精厚再十劑精溫服三月不再弱此方健脾胃仍補命門在火無亢炎在土無寒濕濕去精純寒去精暖何至怯弱年少事未遂鬱悶至陽痿人謂命門火衰誰知心火閉塞乎夫腎作強之官技巧出焉藏精與志志意不遂則陽氣不舒陽氣即腎中真火腎火必受命於心心火動腎火應之心火鬱腎火雖旺不能動似弱實非弱法不可助命門火以命門火旺於下則鬱勃之氣不宣變癰疽而不救宜宣心郁使志意舒泄陽氣開陰痿立起用宣志湯茯苓生棗仁山藥五錢甘草菖蒲一錢志肉柴胡人參一錢白朮三錢當歸巴戟三錢四劑愈不多劑此症原因火閉而悶其氣非因火寒而絶燼故一升火而騰不必大補火世多誤治可慨也天稟最薄易寒冷遇嚴冬雖重裘不溫交感數合望門而流人謂偏陰誰知命門火太微乎夫命門火衰世謂天限誰知人力可勝蓋命門雖是先天火凡火引之可以焚天況先天火乎然一陽生於二陰與補他火實各別用扶命生火丹人參肉桂杜仲六兩巴戟棗皮白朮一斤熟地黃耆二斤附子鹿茸二個龍骨醋淬一兩生棗仁三兩北味四兩蓯蓉半斤各為末蜜丸早晚各五錢服三月此方填精補火何又加氣分藥不知氣旺精始生使但補火不補氣則無根之火只光一時惟氣旺則精自旺火有根生生不已況氣乃無形以補無形之火更為相宜中年陽不舉即或振興已而衰敗絶無情欲人謂操持有定誰知心包火衰乎夫心火動心包火即充力以濟心包火衰有使之動而不動者且心包與命門火正相通命門寒心包熱者有之未有心包寒命門獨熱者所以心包火微有扶不起者此故耳法宜溫心包不必溫命門用救心包湯人參巴戟一兩肉桂當歸三錢炒棗仁黃耆五錢遠志柏子仁菟叢子二錢茯神良薑附子一錢十劑興生二十劑陽不倒方專治心包虛寒不止振舉其陽然實統治心者何故蓋補心則心包強自能久戰痰證腸胃間瀝瀝有聲飲水更甚吐痰如湧人謂痰飲之病誰知胃氣虛乎夫胃水穀之海遊溢精氣上輸脾肺下輸膀胱水精四布倘胃虛僅消穀不能消水水入胃下流於腸故瀝瀝有聲初猶不覺久而水之精華變為混濁遂成痰飲而上湧矣然痰由於胃虛痰之成由於水盛治痰不必先消水消水必先健胃但胃衰由於心包弱胃非心包火不生補胃須補心包火用散痰湯白朮三錢茯苓苡仁山藥五錢肉桂陳皮五分半夏人參一錢即二陳之變也二陳助胃消痰未若此方助心包以健胃又妙在肉桂不特助心包火且引苓術直入膀胱分消水濕苡仁山藥又燥脾以泄下流之水有不愈哉水流脅下咳唾引痛吐痰甚多不敢用力人謂懸飲誰知胃祛乎夫飲宜入腸今入脅胃之逆何如乎不知胃氣不怯則胃不逆胃旺水怯胃怯水旺水旺極胃怯極也胃逆極水逆極也欲水順必使胃旺然胃怯易旺水逆難順但水無有不下導水勢提胃氣自然祛者不祛逆者不逆用弱痰湯人參荊芥一錢茯苓五錢苡仁一兩陳皮五錢花粉三錢枳殼三分白芥子二錢此方上消痰於膜膈下逐水於腸胃助氣則氣旺水降不敢懸瀑泉於半天倘徒消痰不補胃則氣降水升泛濫莫止痰流四肢汗不出身重吐痰不已人謂溢飲誰知胃氣壅乎夫天一生水充周流灌一有瘀蓄不走通衢大道反橫流支河旁溢平地凡水必入胃胃通水又何積惟胃滯水不走膀胱乃由胃越四肢四肢無泄水之路必化汗而出然水能化汗由於胃氣行今胃陰何能化汗身重者水濕之徵也四肢水不能出自上湧吐痰矣法須引其勢而導之由高山平川而入江海庶水害可除胃即人身之高山也開胃壅膀胱小腸自通然胃由於肝克宣肝鬱補胃虛胃壅可開用啓閉湯柴胡五分朮芍三錢茯苓五錢豬苓厚朴澤泄半夏一錢四劑痰消八劑身輕此即四苓之變方加柴胡舒肝厚朴行氣半夏消痰自氣行水行氣化痰化何致胃壅痰涎流溢四肢咳逆倚息短氣其形如腫吐痰不已胸膈飽悶人謂支飲誰知胃逆乎胃為水穀之海順則水化為精逆則水化為痰然逆淺痰入胸逆深痰入膈夫胃逆致痰入胸膈逆亦甚矣蓋胃為腎關腎虛氣衝於胃則胃失其啓闔之權關門不閉反隨腎氣上衝腎挾胃中痰挾之入肺肺得水侵故現水腫狀咳逆倚息生症似氣有餘實氣不足故短氣不可接續也法轉胃氣逆而痰可降補腎虛而胃可順用轉胃湯山藥苡仁人參麥冬一兩白朮五錢牛膝蘇子白芥子三錢附子一分陳皮三分四劑愈方名轉胃實轉腎逆腎逆而後胃逆腎轉正轉胃也此非大劑則胃氣必不通於腎中腎氣必不歸腎內倘但治痰耗損胃氣腎氣益逆終日吐痰少用茶水則心下堅築短氣惡水人謂水在心誰知火鬱於心乎夫心最惡水以水寒克心火耳然心氣不虛水之入胃正足養心水亦不敢直犯惟心虛則火先畏水水即乘其畏以相攻火又恐水之入心欲出其火以相煅水乃益堅火欲出而不得火自鬱於內而氣不宣故築動短氣非氣之真短也火與水戰火正水之仇也傷水惡水又何疑乎不可徒利水必先消痰消痰必損胃胃氣損心愈虛水與痰終難去必補心以生胃散郁以利水則火旺水不能侵自不停於心下而變痰濕用勝水湯茯苓白朮半夏一兩車前子人參三錢遠志菖蒲柴胡一錢甘草三分陳皮五分四劑愈即六君之變也補心散郁心氣旺火自通火氣通胃氣自旺土旺自制水何畏水攻心哉口吐涎沫渴欲飲水然飲又不多仍化為痰而吐出人謂水在肺誰知肺氣熱乎夫肺主氣行營衛布津液周流一身惟水入之塞其氣道氣凝不通液聚不達變涎沫清肅之令失金乃生火以自焚故引外水以救火然內火終非外水可息外水亦非內火可消故不化精液仍變痰涎而上吐法須清肺熱不取給外水則水不入肺涎沫解然金失清肅之令實因心火克肺肺因火侵原思水相救水乘而入故欲解肺熱必須清心炎用解炎湯黃連神麯五分花粉二錢黃芩桔梗一錢麥冬一兩茯苓五錢甘草陳皮三分二劑愈不必三劑方清心肺熱則上焦火不留滯然痰氣過升亦非所宜加茯苓下行膀胱則火隨水走其勢自順既消痰又降火何至肺氣壅塞乎且不損肺氣所以痰易消火易降也少氣身重日吐清水清痰人謂水在脾誰知脾氣寒乎脾為濕土最惡水喜火火衰則水旺水衰則火旺而脾無火則為寒土土寒則水不能化於土中土且凍於水內即有微火僅化水不能化津但變痰不能變液且火衰止可化上焦水不能解下焦凍此清痰清水所以上吐不下行也水不行則濕流四體乃重必須利水消痰以燥脾土然徒利徒消究亦無益蓋脾衰由於腎火弱不補腎火則釜底無火無以長生是必補脾又必補腎火而土自燥土燥濕自除用燥土湯茯苓白朮一兩肉桂半夏二錢人參三錢故紙益智仁一錢山藥芡實五錢砂仁三粒此方燥脾七燥腎三似重補脾輕補腎不知脾喜燥腎惡燥使燥腎太多則腎先損何以益脾惟此則腎無過燥之虞脾轉受燥之樂此用藥之妙也痰氣流行脅下支滿發嚏輕聲吐痰不敢重咯人謂水氣在肝誰知鬱氣在肝乎夫肝藏血不藏水宜水之所不到然肝不鬱則已鬱則血不藏血不藏而豫水以隙水即乘隙以入肝肝終不藏水乃緊閉肝藏水乃留伏肝外不散肝因郁拈水又因水愈郁肝氣之逆何如乎脅下正肝部肝氣鬱即無水侵且有脹急之症況水停脅下安得不支滿發嚏而痛者以火鬱未宣得嚏則火欲出而不得故吊動而痛法須舒肝鬱佐消痰利水隨手奏功用開痰飲柴胡半夏甘草炒梔仁陳皮薄荷一錢枳殼三錢蒼朮二錢茯苓五錢不必五劑方專解肝鬱郁舒火散木不剋土肝無鬱火自不上引痰涎之閉寧有水停脅下增人痛滿哉水泛為痰涎如清水入水即化人謂腎中痰誰知腎寒精變為痰乎心肝脾肺痰可於補中用攻獨治腎痰須純補不可少間攻痰蓋腎痰乃純陰之水陰火非陽火不能攝陽火水中火也陰水泛而火微陽水旺而火伏大補腎火痰自降矣用八味地黃湯熟地茯苓一兩山藥棗皮五錢澤瀉丹皮三錢肉桂二錢附子一錢一劑痰消治腎痰未有勝於此方者倘執方以概治痰症又斷不可蓋痰非腎泛則痰為外邪惟腎水上泛實效如響然必茯苓與熟地分兩同重則腎水歸源三焦之濕氣盡化萬勿執仲景原方謂茯苓不可多用故表之吐痰純是白沫咳嗽不已日輕夜重人謂肺火痰誰知腎熱火沸為痰乎此陰虛火動大約成於癆瘵居多古謂吐白血也其痰如蟹涎不已必變如緑涕即癆瘵成不可救也然癆瘵吐白沫是腎絶候也亦有未成癆瘵陰火初動開手成此痰與癆瘵已成若天壤何可不救然一味治痰不治腎中之陰不至成癆瘵不止夫火沸為痰成於腎火太旺火旺水乃沸不知火旺極由於水衰極腎有補無泄補水鎮陽不可用瀉陽以救陰倘輕用知柏毋論火不息痰不消且擊動其火以變癆瘵法補水逐痰痰消於烏有用定沸湯熟地二兩棗皮麥冬茯苓山藥玄參一兩北味二錢白芥子三錢二劑火沸之痰不知去矣連服十劑不可見二劑效止服蓋火沸之痰實本陰虛非多服補陰之藥則陰不能大長火不能急散幸人勿輕棄偶感風鼻塞咳嗽吐痰黃稠人謂痰塞胸膈法宜吐誰知風邪閉於肺乎古有謂用吐而效者以肺氣閉塞得吐則發越而氣可開謂吐有發越之義也然必大滿大實始可用如瓜蒂散湧出其痰若鼻塞咳嗽吐痰黃濁非大滿大實可比何必輕用吐法不宜吐而吐必損胃氣胃傷肺亦傷肺胃兩傷舊疾去新痰復生吐必一而再再而三至三吐必不可救矣毋論虛不可吐即實亦不可輕吐以吐必須守戒五臟反復而氣未復一犯戒變症蜂起況肺邪閉塞之痰亦易表散蓋肺閉塞於風邪非閉塞於痰散邪肺氣通肺通痰自化王道平平吐乃霸道不可常用慎勿謂吐神於表散而盡用吐也用散痰湯桔梗茯苓三錢紫蘇半夏二錢麥冬五錢黃芩甘草陳皮一錢四劑全愈方名散痰實散肺邪痰因邪結邪散痰將安結痰涎化肺氣無傷不勝於吐法損脾胃乎是表散之功足尚也寒氣入胃結成寒痰日嘔吐人謂寒痰在胃誰知胃氣之虛寒結為痰乎凡人胃氣旺水穀化為精原無痰之在胃惟胃虛僅消穀不能消水水積為痰然胃所以虛者火衰也火無火生不能制水故水不變精而變痰然胃自寒水且變痰況外邪又侵乎內外寒合自然痰涎日多下不化必上湧而吐祛寒可緩乎惟祛胃寒必補心火火旺土堅何痰不化用六君子湯加味治人參茯苓三錢白朮五錢二陳一錢甘草三分肉桂二錢六君補脾胃之聖藥胃病治脾脾胃相表裡脾健胃更健肉桂上補心火下尤補腎火心火旺而胃溫腎火旺而脾熱脾胃兩熱寒痰立消熱氣入胃火鬱成痰痰色黃穢敗濁不堪人謂熱痰作祟誰知胃火未消乎胃火盛由胃土衰胃土衰外熱犯之必相宜何反化為痰蓋胃衰水不化精以潤土土氣大幹必索外水以相救水多火勝不能相化胃郁不伸胃火亦摶結不發痰何能消必變為黃穢敗濁矣然法不必治痰補胃虛少加散火抒郁則胃復強消痰更易用疏土湯白朮茯苓五錢乾葛柴胡陳皮五分人參一錢甘草三分花粉三錢竹葉三十片甘菊二錢四劑全愈此補胃重瀉火輕以火鬱之痰原未嘗大旺故補胃而火可散散火鬱自解況加柴胡乾葛郁開痰豁必至之勢感雨露或地濕致變痰或為痰飲支節痠痛背心疼臍下有悸人謂濕痰成病誰知脾氣之濕以助濕乎夫脾最惡濕必得腎火燥之則汙泥始成膏壤而後水入脾中散精無留伏惟腎火衰不能生脾而脾愈濕土濕自成痰又加天地水氣兩相感召則濕以添濕痰更添痰遂成滔天之勢法補腎火生土而補火仍於補脾藥中用之則火無亢炎土自健順用五苓散治之白朮茯苓一兩豬苓半夏三錢澤瀉肉桂二錢四劑全愈五苓利水神藥肉桂即溫命門火更能引濕痰化水盡趨膀胱尚恐舊痰去新痰又生故加半夏消之助苓術醒脾尤易奏功土生火中火旺土內一方兩得脾腎兼補五苓是也豈僅利水哉陰虛枯稿肺困乏嗌塞喉干咯痰動嗽人謂肺虛誰知肺燥乎夫夏傷熱秋必病燥是燥必成於熱肺金最畏火炎夏火盛即宜發燥何待火退金旺反燥乎不知金畏火刑出肺中之液僅敵火氣之炎逮火令既過金無所畏不足之氣形轉難濟肺氣之乏必求外水止渴然外水入胃不入肺且肺氣燥肺難自顧何能下生腎水腎日降取給肺且益燥咳嗽吐痰生法宜補土生金然健脾助胃藥多燥烈肺津未生反增其火必須潤肺中大補腎水水足金養子富母自不貧且肺氣每夜藏於腎前因腎涸難迎不速之客肺見主貧半途必返腎見肺金之燥出其涸竭之水以濟夫水不足火自旺肺不敢受於是不變津而變痰此痰本不欲上升無如上焦火旺津液干又取給於痰暫救嗌燥故咯而上升逮痰升二火斗而嗽又生矣用潤燥飲麥冬熟地一兩蘇子甘草天冬人參一錢白芥子二錢桔梗三錢棗皮五錢北味五分十劑全愈用二冬潤肺熟地棗皮補腎人參五味益氣氣旺尤易生津又恐過於補腎而不走肺又加升提使益肺多於益腎然參以助燥更入蘇子甘草調和上焦同白芥子以消膜膈痰又不動火以增燥何有咳痰之患小兒痰氣壅阻竅隧不開手足冷逆如風症人謂慢脾風誰知脾虛痰盛乎小兒以脾健為主脾不旺水穀盡變為痰痰盛經絡痰結竅隧閉塞氣即不能展舒手足者脾所屬也脾既不能舒何能運動乎手足故逆冷非外風中也風性動且急使真有風暴急莫當安有微緩舒徐無奈世人巧名慢脾風制牛黃犀角蛇蠍等藥至殺兒如草惜哉使用健脾少佐祛痰則無兒不活用健脾開涎散人參花粉五分茯苓白朮苡仁二錢陳皮乾薑二分砂仁一粒三劑全愈此方健脾消痰與六君同然六君用半夏未免耗氣此方專利脾濕又通氣溫中更勝六君倘用之治小兒痰何致小兒夜泣於九泉老痰結成黏塊凝滯喉間咽不下吐不出人謂肺氣不清誰知肝氣甚郁乎此必成黃穢色蓋留於膜膈之上也老人虛人最多非舒發肝氣斷難消然徒舒肝氣不大補肝血則脅間之燥不能除膜膈之痰不能化然肝血腎所滋也補肝必須補腎但補腎不兼消痰則所輸之水適足以資盜糧用潤燥破痰湯白芍一兩香附一錢青黛五分花粉白芥子二錢玄參五錢茯苓山藥三錢四劑老痰盡消此肝腎兩補既無助燥又鮮增濕肝氣宣肝血養則肝火不聚於胸中自老痰不凝於脅內但老痰最難速效須多服不可責近功痰在膈上大滿大實氣塞不伸藥祛不下人謂邪在上誰知邪在下乎夫上病宜療下何古人用上治吐法而能愈乎此一時權宜也世遵張子和一見滿實便用吐誰知儘可不吐哉凡滿實下之自愈但下不同耳下乃祛入胃中非祛入腸中痰涎上壅原胃火盛瀉胃火自見胃氣之不足胃無滿實膈中無滿實又何能重滿重實哉必痰氣盡消盡落胃中矣何必湧痰上吐損傷胃氣使五臟反覆哉用降痰舒膈湯石膏花粉三錢厚朴枳殼半夏一錢茯苓五錢益智仁五分二劑愈此瀉胃降痰實有神功方雖性烈然勝吐實多世欲用吐者姑先用此湯不效再用吐藥其益無窮勿哂醫學平庸用藥膽祛耳遍身大小塊纍纍不一人謂痰塊誰知氣不行痰因結之不散乎怪病多生於痰身中長塊亦怪病之一也然痰之生本於濕塊之結成於火故無濕不能生痰無痰不能生塊然苟氣旺濕又何留濕苟不留火又何起是消塊不必去火惟在消痰亦不必消痰又在亟補氣治本源也用二陳湯加味治之人參茯苓半夏白芥子三錢陳皮二錢白朮五錢薑炒黃連五分三十劑全消此消痰聖藥亦消塊神方性喜食酸多食青梅得痰飲日間胸膈如刀刺至晚痛止膝胢大痛人謂胃寒誰知痰飲隨氣升降作痛乎痰在上宜吐在中宜消在下宜降胸膈痰在上焦也必當用吐但吐痰必傷氣無論大吐臟腑反覆胃氣之亡必多況多食酸則肝必旺木旺不畏金金又不旺則木定肆橫逆以傷中州土雖久痰頓失新痰必生法宜於吐中仍行胃平肝之法使痰去正不虧用參蘆白芍白芥子一兩瓜蒂七枚竹瀝二合一劑大吐痰去痛如失後用二陳調理不再劑前方名倒痰湯用參蘆扶胃白芍平肝白芥子竹瀝共入於瓜蒂中吐痰即用消痰之藥使余痰盡化舊痰去新痰不生得治痰之益又絶傷氣之憂偶食難化物忽動驚因而食減形體憔悴面黃瘦畏寒作熱數載不愈人謂勞瘵誰知痰裹其食不化乎夫傷食必手按而痛況痰裹食其痛尤甚宜易知何經年而人未知且食至歲月之久何以久留於腹不知食因驚而留於腹存兩脅旁外有肋骨護之手按痛外不能及也食因痰裹痰不消食亦不化故留中數載仍為舊物兩脅乃肝部痰食積於中自生如瘧之狀發寒熱狀如勞察其驚氣未除也驚氣未解痰食又如故病又何能愈哉法宜開驚降痰食數載之病一朝去矣用釋驚湯白芍一兩當歸五錢青木香大黃白芥子茯苓三錢麥芽枳實枳殼一錢甘草五分山楂十粒一劑痰食盡下不必再劑此方消痰降食專走兩脅開驚氣故神
