body:
  text: 卷七痙痓感濕熱忽又傷風口噤不能言項背𠘧𠘧腳攣急角弓反張人謂太陽傷寒誰知太陽之痙病乎夫痙病有三陽三陰亦能傳經與傷寒無異但傷寒單傷於風痙病則合濕熱而成似乎傷寒可單治風痙病兼治濕熱夫邪之所湊其氣必虛一邪相犯已是正氣之虧況三邪同犯乎補正祛邪治痙無難速愈或謂一邪相犯尚須祛邪況三邪並犯則邪氣瀰漫非用祛邪藥安能濟不知一邪其力專眾邪犯其勢散力專宜攻勢散可補於補中行攻法又何不濟無如其症同於傷寒不散邪驟補所以殺人耳苟知可補又分症治實易易也如此症見太陽徵不可徑治太陽邪而宜補太陽氣太陽正氣旺風濕熱不治自散方用五苓散加減白朮茯苓一兩澤瀉三錢豬苓一錢羌活五分桂枝三分三劑諸症痊五苓散利膀胱水此症三邪中至難去者濕耳先利其濕則火隨水泄風邪無黨故少用羌活桂枝祛風則風自解雖然五苓散非單利濕藥朮苓原健脾胃今加之為君則補重利輕所以健功速倘少少用之則攻多於補不能奏效感濕熱又感風頸項強直一目或左右視手足搐搦人謂少陽傷寒誰知少陽痙病乎少陽居半表裡其勢將欲入肝而意欲留陽明故三邪同感而目所以左右視以審量於二者之間手足搐搦者風性動濕性靜兩相違背風欲動濕挽之濕欲靜風激之熱又從中衝擊此搐搦之所以起也搐搦不已又風引上行於頸項不利而濕氣留中遂至強直不搖法須和少陽正氣少用散邪易於解紛用小柴胡加減治柴胡黃芩甘草一錢當歸三錢白芍茯苓五錢二劑全愈小柴胡和少陽聖藥又加入歸芍補肝氣使肝旺邪不敢遁於肝加茯苓五錢健胃利濕則邪不敢回於胃茯苓且同柴芩以祛風熱引之而共之於膀胱濕尤易下安不速愈感濕熱復感風邪手足牽引肉瞤胸脹低頭視下肘膝相構人謂陽明傷寒誰知陽明痙症乎陽明胃土風入必變為熱況又原感熱氣以熱濟熱宜發汗亡陽何以肉瞤胸脹不發狂手足牽引而不出汗反低頭視下不登高呼肘膝相構不棄衣而走正以濕邪混也蓋陽明火最惡燥今濕氣雖侮胃中陰不益胃中燥即發汗不至亡陽發狂妄用風藥散表遂致汗出不止仲景曾用大承氣湯下邪然脾旺者尚不致傷損脾氣否則下之亡陰恐有外虞然風濕既同入胃將何以解法宜治胃不傷胃方用全陰救胃湯玄參茯苓五錢桃仁葛根人參麥冬一錢二劑全愈方妙在資胃中陰不損胃中氣玄參去熱葛根去風茯苓去濕三邪去又得人參生胃麥冬生肺何又用桃仁不知桃仁最動三邪併入胃未免彼此觀望況補多攻少邪得補流連亦未可知加入桃仁性急補既不滯攻亦不緩始濟感濕熱復感風邪發熱腹痛肌肉顫動四支堅急人謂太陰傷寒誰知太陰痙症乎太陰脾乃濕土濕土何禁濕邪再犯濕入於脾最難分消濕邪去濕根尚在再感濕仍如前病矣況又加熱以助炎蒸加風以生波浪自中州反亂四境騷然堅急成顫動見倘用安土之品則土旺無氾濫水乾無鬱勃風邪即欲作祟平成既奏亦可解慍無如人動言下詎識下多亡陰無陰灌注臟腑胸腹手足又何所資以養勢必堅急顫動更甚甚有亡陰而死者可不慎乎方用安土散白朮一兩茯苓苡仁五錢石斛前子三錢赤小豆通草一錢柴胡五分此方利水為君仍健脾蓋土旺自制水況又利之乎此原濕邪難治單去攻濕風與熱自易吹散所謂攻邪必攻堅也譬如大敵在前滿山遍野俱是賊黨倘止從旁掠陣賊拔全營俱來盡加死鬥必至敗衄不若竟攻中堅突圍直入擒賊巨魁則余氛不戰自遁痙病之重治濕邪亦正此意感濕熱又感風邪遂成癇瘛身卷足彎不能俯仰人謂少陰傷寒誰知少陰痙病乎足少陰腎宜熱不宜寒宜濕不宜燥何以痙病有濕熱反癇瘛踡彎不能俯仰不知腎最惡風腎喜熱者喜真火生非喜邪火喜真水養非喜邪水蓋邪火助燥邪水增濕二邪入腎腎已有尻以代踵脊以代頭之病況又益風安能無癇瘛卷彎又何以俯仰哉法仍須治濕熱少佐祛風用助腎辟邪丹茯苓薏仁五錢防己豨薟一錢玄參三錢方用防己治腎中風苡苓去腎中濕玄參希薟治腎中熱風熱濕三者均治何病不去腎有補無泄今去三邪得非泄腎藥乎然苡苓利濕不損陰防己雖去風不傷氣玄參豨薟雖去火不滅光非泄腎仍是補腎倘單泄不補烏能奏功感濕熱又感風邪厥逆下利舌卷囊縮背曲肩垂項似拔腰似折手足俱冷腹脹大人謂厥陰傷寒誰知厥陰痙症乎風濕熱三者合而成痙邪傳厥陰乃肝木之經其勢更急誤發其汗必致動濕濕雖陰類然是外受陰邪非肝中真血所動之陽奔於濕中為濕所役必至亡陽蓋脫出之陽勢本急疾親上飛騰不啻龍之出谷其體輕矯而不可止遏今為濕所滯留則如蛇行匍匐盡力奔越究難飛騰此痙皆誤汗而成法不可拘於散邪仍須補正補正奈何亦救其亡陽亟使回陽耳雖然陽之所以亡者由於陰虛不能攝陽故補陽必須補陰補厥陰之陰仍從少陰腎經以補也方用回陰散痙湯巴戟山藥白芍五錢茯苓白朮一兩防風五分炒梔子甘草一錢當歸三錢此補肝血佐去風濕去火之味自是正治何又益巴戟乃正補少陰也蓋厥陰木非少陰水不生何必補腎火詎知汗發亡陽陽氣盡泄腎中已無真火單用寒涼祛熱則脾胃不勝其寒巴戟溫腎不大熱腎溫陽回肝清陰足陰陽和正氣固三邪不攻自破況原有攻乎此有益無損千古未明特表之小兒頭搖手勁目上視身體發顫或吐不瀉或瀉不吐人謂驚風抽掣誰知是風熱濕三者合之以成痙乎小兒純陽宜無虛然多食瓜果濕留於胃濕久變熱熱極生風此風起於內也人見小兒頭搖手勁不論虛實投抱龍丸不效改牛黃丸又不效乃用金石腦麝香竄開竅鎮驚無不立亡嗟嗟驚風二字殺兒不啻百萬無有闢其非者南昌喻嘉言頗知其失大聲告誡無如一時不可轉移且嘉言有論無方世亦不識治法鐸暢論之且傳方小兒易於成勁者因骨脆皮薄不耐風邪故風邪一入腠理便入臟腑況小兒喜歡飲食又喜寒不喜熱以致損傷脾胃成吐泄上吐下泄則陰陽兩虧平日所受之濕盡行越出濕出熱留臟腑無陰相養遂變成風象以惑人但治風不治正必十人十死蓋其中實無風妄用風藥倍耗其損傷之氣安得不速死法但補脾胃止吐泄則十人十生用救兒回生湯人參二錢白朮三錢茯苓車前子一錢砂仁三粒炒黑乾薑五分山楂五粒厚朴神麯三分蘿蔔子半夏五分以十歲為準五歲減半三劑全愈此方補中有利非一味呆補者比調和於脾胃則陰陽既濟自無變動或曰補之是矣少加祛風散熱未為不可不知當夏令少加黃連數分以解暑若冬令非惟忌用寒涼且當增入辛熱蓋小兒吐泄後熱必變寒況時令嚴寒乎若風藥四時俱不可亂用不得已可少加柴胡二三分小兒吐瀉後口噤不出聲手腳攣急人謂驚風搐搦誰知脾胃寒虛之痙病乎小兒純陽先天腎氣自固無如小兒喜餐生冷未有不傷後天者後天既傷先天亦損先後天一齊損傷自變症紛紜吐泄後無津液以潤腸胃腸胃既乏又有何氣以運動四肢故手足攣急搐搦脾胃虧損肝木必來相侮脾胃苦無津液以供肝木取資則肝木大燥燥極生火火極生風肺金見肝木克脾胃必欲制肝以報土母之仇無奈母為肝傷則土弱金不能強力難制肝反為肝凌肺金畏肝中風火惟恐逼干肺氣鉗口結舌不敢出聲可不急治肝以救脾胃乎方用活兒湯白芍白朮三錢茯苓五錢人參二錢梔子麥芽半夏神麯五分枳殼三分甘草一分三劑全愈此平肝以扶脾胃土脾胃氣生肺氣自旺足以制肝又何風火之不息哉或謂肺弱不能制肝自宜補肺不知補肺必用潤劑不又助脾胃濕乎痙病正苦濕故重用茯苓所以平肝安肺不可潤肺害脾胃小兒偶感風邪發熱身顫手背反張人謂驚風角弓反張誰知痙病中之寒邪乎蓋小兒氣血未旺不耐傷寒壯熱故一時昏沉非因風動驚也故治小兒傷寒斷不可與大人例動用風藥祛風蓋因虛入風治虛風自出況只犯寒而不犯風又何可祛風倘施祛風則風門大開內風無可散勢必損傷正氣正氣一傷則營衛無所蔽腠理不密勾引外風深入內藏遂不救宜補正氣少加散邪寒易解臟腑不傷手到奏功方用護子湯人參一錢茯苓三錢白朮二錢柴胡五分桂枝二分不必再劑亦何神乎蓋小兒初傷風寒必先從太陽入今用桂枝柴胡解太陽少陽之邪則邪不敢遁入於陽明況人參固脾胃邪尤不敢入中宮又加白朮利腰臍茯苓通膀胱則邪從外入者必散既無外邪柴胡舒肝氣桂枝暖脾胃土正有益無損無如人不知此等治法妄捏驚風施發散鎮墜以至殺兒醫不悟病家未知萬兒啼號於夜臺深可痛也新產後忽然手足攣搐口眼喎斜頭搖項強甚則角弓反張人謂產後驚風誰知亡血過多成痙乎產後舊血已虧新血未長原不必戶外賊風即舉動時風自內生覺兩股間陽寒逼人少不慎風入矣然風因虛而入補虛風即出然從血以補乎擬從氣以補乎亡血不能速生氣祛實宜急補補氣血尤易生風又何存乎故血舍驅風尚非正治矧純用鎮驚非下之石耶用救產止痙湯人參五錢當歸一兩川芎三錢炒荊芥一錢三劑全愈此即佛手散變方加人參則氣更旺氣旺邪不敢敵況荊芥引血歸經邪何獨留且荊芥原能祛邪不損正故用之出奇倘不補氣血惟事祛風則血舍更空風且直入立殺其婦慎哉忽手足牽掣口眼歪張人謂中風誰知痙病驟發乎中風身必顛覆吐痰痙病狀似中風身不顛覆口中喉內無痰涎有水雞之聲蓋中風無風風從內起痙病則風從外入者居多風自外入風自成威不必借重內痰之助所以但有牽制歪張絕無洶湧秘塞若風從內起者火動生風有痰以助故中風無邪無外邪也痙病無邪無內邪也無外邪者不可治風無內邪者不可不治風然單治外不治內則外風雖去內風必生是以祛風必風必須補正方用補中益氣湯人參陳皮甘草一錢黃耆白朮當歸柴胡三錢升麻四分三劑不再發補中蓋氣湯非祛風之劑乃用治痙何反易奏功蓋氣虛則風易入補氣則正旺足以祛邪方中用柴胡少用於補藥中則能提氣以衛正多用於補藥中則能益氣以祛邪故用三錢而風難再留何必更借重他藥哉人但知多用參歸耆術以補正絕不知柴胡多用於參歸耆術中尤易祛邪余所以特表之汗症大病後日常遍身出汗人謂內熱發汗誰知陽虛外泄腠理不能自閉也大病後氣血大虧氣不能入血中必至逼氣於膚外使肺金清肅之令行氣雖欲越出腠理未疏何能外泄惟大病後必損肺肺無自主之權又安能禁其氣之不泄哉氣既不固汗氣所化也汗隨氣泄氣泄而魄汗淋漓遂致遍身出汗有不散盡真氣乎似與亡陽症同然亡陽症身喪頃刻何自汗不至遽殞蓋亡陽乃熱邪驅自汗乃陰虛促也陽病暴陰病緩陽暴難於救援陰緩易於調劑自當以補氣補氣兼以補陰則陰能攝陽汗自止矣方用攝陽湯人參黃耆熟地一兩白芍麥冬五錢北味一錢棗皮三錢十劑全愈此用參耆大補其氣氣足則肺金有養皮毛自固又益麥味則肺不特足以衛外兼可以分潤腎水猶恐汗出太多必損耗真陰更加熟地棗皮益精使肺金不必來生腎水則肺氣更旺皮毛益固尤妙增白芍收斂肝氣則肝木自平使肺金無仇相逼則肺氣安自能行清肅之令清肅令行下輸於膀胱則上下氣舒心中生液不來克肺則肺金有權安肯聽汗自出此攝陽之妙法也倘貧窮無力買參前方倍加黃耆二兩增防風五分功同但必須多服數十劑夢遺後身體狼狽加太勞或行房太甚遂盜汗淋漓人謂腎氣虛誰知心氣熱乎心腎兩相交者也心喜寒不喜熱腎喜熱不喜寒似相違然相違未常不相合夢遺自精水不足加行役勞其筋行房損其骨則內陰大虧又何能上濟心心無腎水濟則心熱增心熱腎水更耗久則腎畏心之取資堅閉腎宮心欲交腎腎畏心炎不納勢必仍返於心無奈心無液養煩燥生然心君雖無寧靜之氣未嘗無專主之權徒然煩燥相火尚不敢顯背君主越出軀殼乘君假寐乃竊資重潛移故盜汗與自汗實不同自汗心不得自主盜汗心尚能操意此汗必出在胸間者尤甚汗本熱越出軀殼外則變為寒正因相火熱乃虛火非實火況乘心君之未知而遁出非明目張膽者比熱出為寒正顯其陰象也況心原無液何以得汗亦竊腎之餘津私自潛移耳泄心熱仍宜補腎水腎水足心火自清心火寧心汗自止方用防盜止汗湯麥冬五錢生棗仁熟地一兩棗皮人參丹參茯神三錢黃連肉桂五分二劑全愈此心腎雙補心腎兩足自離而復合尤妙黃連清心肉桂溫腎二味同用能交心腎於頃刻心腎交則心君清明相自畏主何敢竊國帑偷用哉倘不補心腎惟事止汗汗不能止必輕變重重變危矣夜汗初少後漸多日久每夜出大汗至五更止人謂陽虛盜汗誰知陰虛出汗乎陰虛乃腎虛腎藏真陰宜秘藏何故發汗蓋腎中火動也腎水非火不養腎火妄動何能生水何反泄水即水泄宜從下出何走皮毛旁出不知腎火能生水者真火也真火喜靜不喜動水靜則真火生水水動則真火泄水生水火秘藏泄水火奔越故腎中火動仍腎水自動腎水動者由縱欲耗精精泄過多則勞精勞精則水動水動火亦動火動水不足以濟則火且挾水騰出於本宮不從下走乃隨火性遊行於經絡腠理遇毛竅而泄初則偶爾遊行久則夜夜出汗陰氣愈虛愈虛愈汗毛竅竟成轉輸大道矣然汗既宜無分晝夜何獨夜汗得未陰虛陽未虛乎陰陽兩相投者也未有陰虛陽不虛者況汗亦陽液安在見其非虛不知陰陽各有道路行於陽分則陰不敢奪陽權行於陰分則陽不敢奪陰柄夜間出汗實陰走於陰途至五更則陰不敢入陽界故汗遇陽氣而自轉非陰虛而陽不虛宜大補其陰加陽分藥提陰出於陽分庶陰遇陽而止方用補陰止汗湯熟地一兩棗皮五錢人參二錢沙參白朮三錢地骨皮一兩北味一錢桑葉十片十劑不再出此方熟地棗皮補精地骨沙參補陰更消骨髓中虛熱五味桑葉止汗神劑參術健脾天胃補氣藥也多用補陰則水足制火少用補陽則陽易提陰陰陽水火既無偏勝自無走泄又何必用澀精之牡蠣斂汗之瞿麥哉每飯頭頂至面與頸脖間大汗淋漓身又無恙人謂陽氣旺誰知胃氣盛乎胃氣即陽氣胃旺則陽旺不知陽旺者合三陽言也胃旺者單言胃經胃屬土無水穀之入則氣安靜即飢餓其火暗起亦不過在胸膈間不能上至頭頂惟水穀填於陽明則胃中之火借水穀以助勢遂化汗上升越出於頭面上下此汗明是胃火然胃火盛宜發汗亡陽何但出汗上身下身乾燥蓋胃火盛由於心包火旺心包主火以生土非助火以害土胃得火生以出汗不同於邪火之自焚故止出汗上焦不亡陽下焦宜泄胃火不可損胃氣使胃平汗自止用收汗丹玄參生地三錢五味三分桑葉十片白芍五錢蘇子荊芥白芥子一錢服一月愈此妙在不泄胃火反去滋陰蓋陽盛者陰衰補陰則陰旺自足攝陽不必止汗汗自止況桑葉荊芥引經止汗白芥蘇子消痰定氣抑陽歸陰化汗為精又何疑乎然必久服始效者以調胃藥和緩不宜急遽人有心頭有汗一身手足無汗人謂心熱誰知思慮過度則心火炎燒逼干其液液干宜無汗何心頭反出汗不知此汗非汗乃心液內不能存外走出耳或疑心液無多安得盡化為汗不知心為君主之官心熱則臟腑之液群來相資因內熱甚不養心為液反越心為汗汗既出多無有盡期臟腑液何能相繼勢必心愈熱汗不可止及至汗不可止而心中乾燥煩躁不眠生治不可緩宜補血養心泄火生液汗自止方用滋心湯人參白朮玄參丹皮丹參三錢桑葉十四片黃連甘草五分生地麥冬棗皮五錢沙參柏子仁二錢熟地一兩十劑不發此方名滋心多滋腎蓋心液必得腎精上溉液乃生故欲補心必須補腎精補腎少加清心則心火安液不外越汗又安有外泄五癉谷癉胸中易飢多用飲食又發煩頭眩小便難澀身黃如金人謂胃中濕熱盛成癉誰知脾胃虛熱乎脾陰土用則陽胃陽土用則陰脾胃和同則剛柔濟通調水道易於分消安有濕熱存留惟七情內傷胃無陰以和陽則熱聚消穀脾無陽以和陰則寒聚積水兩相搏激故昏眩煩悶所食水穀不變精華清氣反蒸腐敗濁氣濁氣下降者也濁氣下流於膀胱膀胱受胃熱氣化不行小便閉塞水即走於陰器熱散走於皮膚故身黃宜升胃中清氣以分利膀胱則清升濁易降水利熱易消用分濁散茯苓一兩梔子前子豬苓三錢茵陳一錢十劑全愈方用茯苓為君利水不傷胃氣後佐以去熱消濕則胃無火亢自脾無水鬱倘不早治水濕流入於腎必至腹滿成蠱不治酒癉心時懊熱不能食常嘔吐胸腹滿然清言了了人謂酒濕作疸然作疸由於內傷飢飽勞役也善飲由於膽氣旺蓋膽雖不能容酒實能滲酒酒經膽滲則化為水入膀胱下泄惟飢飽勞役則五臟損臟損腑亦損臟腑俱損寧膽氣獨旺膽氣衰人縱飲膽獨不能滲必更傷膽氣膽不滲酒必留脾胃間脾胃已損酒又不能受傳之膀胱膀胱亦不似前之健水入又不能消下既不泄必返上吐吐既逆泄又難中州又不可久留於濕熱氣蘊沖膈心懊憹由是遍漬肢體盡發黃夫懊憹心神昏亂可知何又清言了了不知酒氣熏蒸於一時則懊憹懊憹則欲痛不痛之狀非心神妄亂不寧也宜解酒毒兼壯其膽膽氣旺酒自消酒消水氣自泄水泄黃亦自解用旺膽消酒湯柞木枝梔子桑皮白茯苓三錢白芍一兩竹葉百片澤瀉二錢八劑全愈妙用柞木枝消酒毒於無形則拔本塞源膽氣不可不旺助膽舍梔芍無他味余藥不過分消濕熱輔君成功若用吐下皆操刀之醫也女勞疸腎氣虛損肢痠痛夜夢驚恐精神困倦飲食無味舉動乏力心腹脹滿腳膝痿陽痿股內濕癢水道澀痛時有餘瀝小腹滿身黃額黑人謂黃疸誰知因女色成乎入房能久戰相火旺也火衰強戰泄精必多火隨水散熱變為寒人身水火原不可少水衰不能制火則火動火衰不能利水則水留火得真水成液今留邪水反害火成癉故女勞疸仍是濕熱結精竅間非血瘀閉骨髓內倘用抵當湯峻攻瘀血或礬石散蕩滌微陰必立亡宜補腎氣又不可助火利膀胱水又不可亡陰當緩圖難近效用減黃丹白茯苓山藥芡實苡仁五錢人參菟絲三錢白朮前子生棗仁一錢三十劑愈五十劑可無憂此恣欲失腎成癉必更好色苟堅忍房事信服前湯無不生方妙在固本救傷並不驅邪泄瘀腎日足黃日減或疑女勞疸因腎無火何不補火但補陰利濕不知疸雖成於無火今病久陰耗補火恐又爍陰反害之矣肺疸鼻塞不通面黃口淡咽乾小水不利人謂黃疸誰知疸實由於肺氣虛乎肺氣旺清肅下行膀胱濕熱盡從下泄則小水大行濕故去熱亦難留惟肺氣虛濕熱相侵鬱蒸胸膈肺不勝邪肺乃燥肺燥乃失清肅之令水濕遂乘燥而入燥濕合而成熱濕熱相留欲分入膀胱膀胱不受欲走毛竅腠理未疏乃變黃色於皮膚法宜宣通肺氣健脾胃或疑腠理密濕邪存皮膚內今健土復宣肺氣倘毛竅大開濕人汗泄未必不變為水臌不知肺氣閉於上水氣始塞於下使肺氣上通水且下降況重補脾胃以生肺乎此治肺疸必宣揚肺氣也用揚肺利濕湯桔梗桑皮茵陳三錢花粉豬苓二錢白朮茯苓五錢黃芩五分十劑諸症愈此開腠理生津液則肺潤合之茯苓茵陳花粉則土氣大旺金氣揚清肅行膀胱壅熱立通小水利黃烏得不愈心疸煩渴引飲水停心下作水聲胸前時多汗出皮膚盡黃惟目白人謂黃疸誰知心中虛熱而成乎夫心喜燥不喜濕然過燥又非所宜然心終不宜濕以濕濟燥不過權宜一時久則必致害心水陰物陰居陽地彼此眷戀不肯遽趨以入小腸心又因水制力難分消以入膀胱乃停心下作澎湃聲膻中相臣見水犯心必出火以救戰於胸間水得火炎化熱為汗時出胸前而出余水乃欲趨無路遏抑於皮膚髮黃肝開竅於目心肝子心病肝亦病然肝見心為邪逼必出力相援邪見肝旺不敢犯界故目不黃宜補肝氣以生心泄水濕以逐熱則黃疸自散用泄肝利濕湯白芍一兩茯苓白朮五錢茵陳炒梔子三錢木通遠志一錢十劑愈此補肝正補心泄水正泄熱故效捷倘徒治黃不辨臟氣生克妄用膽草等必變寒黃難治肝疸兩目盡黃肢體盡現黃色但不如目甚氣逆肢冷腰以上汗出不止腰下無汗此肝氣鬱濕熱團結不散也肝木非水不長乃腎中真水非外來邪水邪水漬水必生病蓋肝藏血不藏水外來水多肝閉不受必移水於脾胃然水先經脾胃來脾胃必不受勢必移於膀胱膀胱因肝木之濕熱不敢引入以致自焚於是復返入肝肝不能容乃鬱勃發汗汗難盡出而發黃夫腰下正腎部位肝之濕熱欲下走腎宮腎氣惡肝邪犯母故杜絕不許入故無汗而發黃宜開肝氣鬱佐之分濕散熱則黃疸自愈用利肝分水飲膽草二錢茵陳豬苓前子白蒺藜三錢茯苓一錢柴胡一錢甘菊五錢十劑病止二十劑全愈此開鬱於分濕中補肝於散熱內既逐邪又顧正脾疸身黃如秋葵汗沾衣服皆成黃色涕唾亦黃不欲聞人言小便不利此乃脾陰之黃也夫脾不惡熱實惡濕脾濕土又加水濕濕以濟濕脾中陽氣盡消無陽則陰不能化土成純陰陰土何能制水水存脾中寒土不能分消聽水流行於經絡皮膚也凡臟腑水下輸膀胱乃氣化也今脾純陰則無氣以達膀胱故水不入然水寒宜清今變黃寒極似土也寒極宜見水象水黑色今見黃者如水寒畜於陰濁之池其色必黃也不欲聞人言者何脾寒極心寒可知心寒則膽怯聞人言惕然驚矣宜大補脾溫命門火佐以利水則陰變陽黃病愈方用補火散邪湯白朮三兩附子半夏茵陳三錢人參二兩白茯苓一兩八劑愈方用參術補脾苓茵利水附子溫火真火生邪火自散元陽回陰氣自消陰陽和協水火相安有何黃病腎疸身體面目俱黃小便不利不思飲食不臥此乃腎寒也腎藏真火最惡邪水凡水得腎氣皆化故腎與膀胱為表裡腎旺膀胱亦旺然腎所以旺者腎火旺也火旺而水流火衰而水積水積多成水臌難治水積少成黃癉易治黃疸不可單治癉須補腎中火佐以健脾祛濕用濟水湯白朮三兩肉桂三錢山藥苡仁一兩茵陳一錢芡實五錢八劑愈白朮健脾兼利腰臍氣健脾正以健腎況芡茯山藥補腎又兼利濕肉桂溫命門火則腎中不寒元陽自透於膀胱況苡仁直走膀胱離照當空冰山雪海盡行消化何黃不散或問黃病俱濕熱未聞有濕寒此論得毋過奇乎嗟乎黃病有陰黃症脾寒能作黃腎寒獨不能作黃乎況腎寒發黃別有至理黃土色黃極必變黑則純陰無陽必死今但發黃是陰已逼陽外出只存一線之陽在皮膚欲離未離也故補陽而陽可續倘致皮黑方雖佳不救心驚膽顫面目俱黃小水不利皮膚瘦削此膽怯濕乘也少陽膽甲木木最喜水濕亦水入膽何反成疸然水泛木浮水過多則滔天浴日木根不實反苦於水矣少陽膽何禁汪洋之侵蝕乎故膽怯膽怯水邪愈勝膽不能防直入於膽中矣水入膽膽汁反越出黃病成法宜泄水濕則膽氣壯木得養然木為水侵久矣泄水能去水不能固木根木必生於土水多土崩何能生木故又宜培土用兩宜湯茯苓苡仁五錢白朮一兩柴胡郁李仁五分膽草茵陳一錢此利濕無非利膽氣又無非健脾氣水多遇土自歸膀胱從小便出小便點滴不出小腹膨脹足腫身黃此膀胱濕熱結而成癉也膀胱經氣化則能出水無熱氣無消氣俱膀胱閉而不行所以寒則水凍不能化熱又水沸不能化黃癉無不成於濕熱是膀胱黃癉乃熱病非寒也熱結宜解熱寒結宜祛寒癉成於濕熱宜解熱明甚然祛寒必用熱藥溫命門解熱必用涼藥益肺氣蓋肺氣寒肅自行膀胱膀胱不能閉結用清肺通水湯白朮一錢茯苓五錢麥冬桑皮三錢前子三錢澤泄黃芩蘇子二錢四劑癉愈此與揚肺利濕湯大同小異然彼提肺氣此清肺氣二方皆解濕利與通微異利只開水道通則大開河路瀉飢渴思飲食下腹便覺飽悶必大泄後快晝夜數次面黃瘦肢肉減削人謂胃氣虛誰知脾氣困乎能消不能食者胃氣虛由於心包冷能食不能消者脾氣困由於命門寒今思飲食食後反飽悶是胃能納脾不能受也然何以大泄後快脾濕土既無溫暖之氣水穀又濕濕以助濕惟恐久留害土情願速傳為快如黃河至中州既無高山峻嶺又少深池大澤土松水泛易於沖決波濤洶湧連泥帶水一泄千里日積月累非斷岸摧崩即長堤遷徙脾中州土大泄之狀正同法宜治脾並治腎中火用奠土湯白朮茯苓一兩砂仁五分山藥一兩半夏故紙一錢人參五錢蘿蔔子二錢附子三分方用參苓白朮健脾附子故紙助命門火山藥補腎砂仁半夏醒脾蘿葡子又分清濁一二劑效多用亦無妨自能回陽於既危生陰於將絕日間不泄至亥子必痛泄一二次重則五六次此腎與命門虛寒也其初亦因脾胃虛寒作泄起久泄亡陰脾傳腎苟腎火不衰脾即傳腎久之腎仍傳脾自愈惟命門火衰不能蒸腐水穀脾傳腎遂不能返亥子時腎北水主事水寒火不能溫水乃大泄此即內經大瘕泄也用止水藥反不能濟必須補水使陰亡者速生尤須兼補火陽旺始能攝陰用填坎湯棗皮茯苓芡實一兩巴戟五錢肉桂車前子三錢北味人參三錢白朮二兩十劑不發此脾腎兼補又妙分水止泄濕自解況肉桂溫命門火膀胱易於化水寧復走大腸而作泄腹大痛手不可按忽大泄飲食下喉即完穀泄出勢如奔馬不可止抑頃刻泄數十次一晝夜約至百次人謂火泄誰知肝木挾邪大泄乎症因夏日貪涼向風坐臥暑熱不宣藏於脾胃至秋涼風透入克肝肝木之風鬱而不宣乃克脾胃脾胃之熱遂與戰走石揚沙將腹中水穀盡驅直下必欲不留一絲始快故腹痛甚急脾胃欲止風不肯止脾胃欲閉熱不肯閉下焦關門大開上焦關門難合故食下喉不及傳化而即泄必急救脾胃氣後可因勢利導然非大劑速救鮮不立亡用逆挽湯人參大黃一兩茯苓二兩黃連梔子甘草三錢方用人參固脾胃氣則氣不驟脫此泄乃火留於腸胃非大黃迅逐火不遽散水不盡流然非梔子黃連則火邪甚熾盤澗曲溪未能遽涸三味並用則大小河渠盡行啟泄然分消無法又恐壅抑阻滯益茯苓分清濁兼健脾開胃土氣既堅自無沖決更慮過於迅逐邪去雖速未免大傷腸陰故佐甘草調和於遲速之間使參易於生氣正剿撫並用無死鬥之虞口渴飲水忽大泄一晝夜至數百次完穀直下無留人謂火泄誰知水不足制火乎胃為腎關胃火必得腎水相制腎水虧胃火必旺胃火既旺內養無資必索外水以濟然外水可少止上焦炎不能助下焦水故外水入腎不受腎與膀胱相表裡腎不受膀胱亦不納水無從出直趨大腸而作泄但胃火既盛渴飲涼水宜發汗今何作泄蓋腎水不能制胃火胃火反欺腎弱挾外水侮腎不泄汗而泄水迨後不特水驟崩火且驟降關門不閉上下盡開直進直出不啻崩湍峽泉建瓴而下似宜急則治標然徒止泄不急救陰則亡陰立盡何能制火以存胃氣用生陰止泄湯棗皮白芍山藥二兩車前子茯苓白朮苡仁一兩肉桂三分甘草五錢三劑全愈方純補腎補胃不止泄然止已存於補陰中蓋陽火得陰止倘作胃虛有火治亦能止然下多亡陰何能驟復何若此方止泄陰陽兩不相傷素好飲逞醉入房過於泄精久則脾氣大傷變水泄一感風寒大泄不止如溏如積人謂酒濕損脾誰知酒濕傷腎乎脾濕土最惡濕酒最濕幸酒性大熱脾喜熱濕熱合則脾不甚傷無如人借酒之熱助命門火以博久戰究之熱不可長恃精不能堅守興闌精泄火息濕留腎宮夫臟腑皆賴腎火以化腎中有濕火化而濕隨長年相伴不肯離歲月既深火日衰濕日盛腎不能久留仍傳於脾前酒濕未去新酒濕又來於是濕盛熱亦盛脾不受熱益專受濕害故作泄必大補脾腎後傷者不傷後解濕熱則泄者不泄用解酲止泄湯白朮棗皮茯苓一兩柞木枝白芍五錢黃連三分附子一分此脾腎兼補用柞木枝黃連解酒毒苓術消水濕芍藥斂耗脫之陰又用附子一分引群藥入腎掃蕩濕熱非助命門虛陽也但必多服蓋酒濕之泄甚難建功以濕熱入腎最難出十劑或改為丸日三服三月全愈忽作泄腹痛不可止面青唇黑幾不欲生肛邊如刀割大泄傾盆人謂火泄誰知受毒作泄乎此毒或食瓜果飲涼水斟隔夜茶飲露天酒或遊神廟陰寒之地或探古洞幽暗之方或貪臥濕地加餐樹間牛馬自死禽獸難化皆受毒發泄雖受毒腹中泄發腸外非必死症然腹疼欲死烏可不救宜於解毒中輔泄毒因勢利導用化毒神丹生草丹皮蒲公英五錢大黃當歸一兩雷丸三錢不必二劑生草蒲公英解毒合雷丸大黃則祛毒無太剛掃毒無過滯又得當歸丹皮逐毒不傷腸陰驅除於至急消弭於暴亡實有至理非孟浪也面黃體瘦善食易飢不食則痛一旦連蟲大泄如團如結血裹膿包人謂蟲泄夫蟲原因濕生賴水穀養善食易飢乃蟲食易消也不食痛者蟲無食養食人腸胃也久之蟲又生蟲聚居於腸胃索飲食不散然蟲生腸胃飲食供蟲且不足何能生津液以養臟腑自臟腑氣衰胃氣亦漸弱胃弱脾亦必弱胃弱食必減不能入脾弱食難化不能出久之脾胃大寒蟲無可藏偶得熱湯乘機下遁而大泄似宜因蟲之遁而盡逐則腸胃無餘蟲然過下必損腸胃必攻補兼施正氣得養蟲亦盡除用掃蟲湯人參五錢白朮一兩大黃白薇百部三錢黃芩二錢甘草一錢烏梅一個不必二劑服後用四君子調理而安此湯名掃蟲實補脾胃氣生蟲既多其傷脾胃必久似宜補不宜攻然蟲大出不用攻徒補則脾胃氣回蟲亦回反留後患故因其自出即用祛蟲藥蟲不敢貪補而流連況攻中仍補泄蟲不耗氣安得不收全功臟腑不調久泄不愈人謂洞泄誰知肝乘脾土濕氣下行乎肝屬木最能剋土然土旺木不能克木平土不受克惟肝旺土又衰則木來剋土土之濕氣難安人脾土易衰肝木易旺此木旺非謂腎水生乃謂大怒則肝葉張過於謀慮不決則失於剛斷躁妄生皆使肝旺旺則肝氣不泄必乘脾脾濕土畏肝氣克不上升而下降遂成泄宜平肝利水則泄可止古有用上湧法效者有用下泄法效者皆非善也用平泄湯白芍白朮二兩茯苓一兩三劑愈方用白芍平肝苓術健脾利濕肝平不刑土脾得養不畏木克況濕去則土燥無波可興何以作泄必上湧下泄損陰氣哉魅侵忽大泄人謂飲食傷誰知陰氣侵傷於脾乎太陰脾本陰藏然陰中有陽則脾土運行易於變化無過濕之虞是太陰濕土全藉腎中至陽之氣也鬼本至陰相接久陽氣皆為至陰所盜陰中無陽何以消化水穀乎況鬼又邪氣邪盛由於正氣衰正不敵邪則陰氣更盛陰盛陽微泄何能止必補陽以去濕助正以消陰用消陰止泄湯蒼朮五錢白朮乾薑山藥一兩附子三分十劑不特泄止精神亦健此用蒼朮祛邪白朮燥濕薑附生陽足矣何又入山藥陰不知人為魅侵不惟陽氣消陰氣亦必耗加山藥補真陰非補邪陰也況孤陽長補真陰正速生陽氣耳陽得陰薑附無太勝之虞反能助二術以生至陽況山藥健脾利水豈真純陰無陽哉痢夏秋腹痛作泄變痢如魚凍久則紅白相間此肝來克脾也蓋夏秋寒熱必雜肝遇涼風木氣不舒上不能宣必至下克脾土脾胃受三夏之暑熱欺肝木凋凌乃與肝相爭肝激成怒乃相助成惡忘其自損母氣也紅白間者肝不藏血色紅腎不藏精色白也惟肝血無多腎精有限何能綢繆不斷如水傾如泉湧耶不知六腑畏肝橫五臟助腎困交相成也法急平肝木少佐祛穢則肝氣不降腎氣頓收不必止痢脾胃土自安何有再痢用平肝止痢湯白芍一兩當歸五錢梔子車前子二錢枳殼甘草一錢三劑全愈妙在全不治痢但平肝痢自止蓋痢始於肝成於腎平肝則肝氣平腎氣亦平脾胃又烏有不平今但知治脾胃故不遽止夏秋先泄後痢腹疼痛後重極急欲痢又不痢口渴飲水小便艱澀少腹作脹人謂火邪重誰知濕熱甚乎蓋夏傷於熱飲水必多熱雖解於一時濕每留於脾胃迨秋風襲皮毛熱秘臟腑於是熱欲外泄而不能勢必與濕合然濕熱相合必相爭疼痛生相爭必相背相背必相離熱欲下出濕欲相留彼此牽掣於大腸後重現熱欲出不得出則熱必上焚必求水以解上中二焦枯然濕留下焦水得水而快意而火則忌水乃盤踞邀截之路使水不能傳膀胱水火戰鬥仍從大腸而出此少腹所以脹也宜分解濕熱俾濁者趨大腸清者入小腸不必用澀藥止痢用分解濕熱湯車前子一兩厚朴滑石末三錢黃連甘草枳殼檳榔一錢三劑全愈用車前子利水黃連清熱厚朴分清濁余皆止穢去滯調和於邪正以解紛配合攸宜安有不效一濕熱作痢大渴引飲飲後不甚快心中懊憹小便不利紅白相間似膿血非膿血人謂飲食太多誰知火熱未解乎濕熱極始成痢但有濕輕熱重亦有熱輕濕重此乃濕熱兩重單消水則熱存水難降單清火則水在火難除必兩泄之濕熱俱不能存然泄熱必傷陽泄濕必傷陰不顧陰陽虛實其不損陰陽者幾希宜於補陰中佐泄熱泄濕則陰不虧陽亦無害夫泄之既能損陰陽則補陰自宜補陽今僅補陰即不傷陽乎不知陰陽互為其根泄熱藥仍走大腸雖損陽仍損其陰也今補陰則陰不傷又何害乎陽故補陰不必補陽也用滋陰止痢丹當歸白芍一兩大黃蘿蔔子三錢車前子五錢檳榔二錢三劑頓愈方奇在大黃蘿葡子並用逐瘀穢分清濁甚神又妙用於歸芍內補以行攻有益無損濕熱極腹痛作痢上吐不得入下瀉不得止至勺水難入胸中悶亂人謂禁口痢誰知胃中濕熱之毒乎夫痢宜下行下利宜也何上吐不能入此乃胃火得濕而蘊結不宣一旦作痢本欲下行乃投飲食火反上熾不降致胃中閉塞成禁然胃火盛由於心火旺心火最惡濕一得濕火鬱不通乃停胃口胃火見心火助愈增薰蒸二火合則熱勢固結不散濕見火留胃口亦遲迴瞻望停腸胃作壁上之觀胸中不啻鉅鹿之戰安得不悶亂必開鬱火之門門不易開必引火以開門為捷用引胃湯人參一錢黃連三錢吳萸菖蒲三分為細末滾水調於茯苓末中大約茯苓約五錢一匙每一匙調稀糊咽徐咽至不吐即將前藥服完上下俱開門後用靖亂湯廣木香五分茯苓三錢白芍一兩車前子五錢黃連甘草枳殼木通一錢二劑愈前湯以心喜燥連雖寒性正燥以燥投燥原非所惡況吳萸性熱而燥以火入火同性豈有扦格妙在入人參菖蒲中蓋胃火邪火心火正火居邪正間非得正人君子則邪火不能散於頃刻非得導引則心火不能返故宮況胃氣閉正胃虛人參補胃氣胃虛逢補如飢者得食安有糧米扣關不為延接乎關開將士奪門而入邪自驚走苟無大兵相繼敵且死鬥不去又得後湯利水逐穢平肝是前鋒斬關後隊蕩寇安得不成功濕作熱痢數日後腹不疼痛如膿血陣陣自下肢冷元氣欲絕人謂痢疾火症誰知火變為寒而陰絕古云痢無止法然有初起即宜止者有日久不可止者未可執此一言竟不用止然不止不過久病難痊輕止每至變生不測是痢又不可輕止也夫腹痛為邪今腹不痛何邪之有腹不痛何膿血自下乃氣脫欲崩非濕熱多而奔迫也手足厥冷乃氣脫而不能運非內心熱手足反寒冷也此必須看其舌熱極舌必燥寒極舌必滑也熱變為寒其舌必滑止痢以固脫不可泄痢以攻邪用止脫救痢湯人參白朮二兩白芍茯苓一兩肉桂石脂末三錢甘草二錢三劑全愈各減半去石脂再十劑元氣如故此痢世不常有但不可執此方以治他痢受暑濕毒水穀傾囊而出晝夜七八十次膿血稠黏大渴引飲百杯不止人謂熱毒攻腸胃誰知膀胱熱結氣不化乎水濕無不從膀胱出然膀胱必奉肺氣發始能化今胃受暑熱薰肺肺不能受乃移熱於大腸大腸奔迫必鬱結於膀胱膀胱熱結則氣不化小水短赤濕熱盡趨大腸出如決水轉石法須清膀胱熱以迅利小水然不可徒清膀胱蓋水出高原肺不熱則小水自行肺與大腸相表裡肺熱大腸始熱肺熱大腸始熱故清大腸不若清膀胱清膀胱又不若先清肺熱用清源止痢湯黃芩紫參訶子花粉地榆三錢茯苓五錢甘草一錢二劑止此清化源方也黃芩地榆涼肺即解大腸熱紫參清腸胃熱又消積聚通二便訶子固腸脫合茯苓甘草則通中有塞又有調和所以特神下痢純血如陳腐屋漏狀肛門大開不閉面反紅潤唇如朱塗人謂痢疾死症苟陰猶未絕有可續之機凡下痢純血開手即宜用補因人執痢無補法不知前症何常不可補補陽則有宜有不宜補陰藥止痢實無不宜世人一見紅白不問虛實蓋用攻邪逐穢以致白變紅紅變陳腐屋漏色下痢純血原是陽旺陰虛不補陰制陽反助陽攻陰則陰愈虛陰極則有降無升肛門大開不能收閉正其驗也面紅潤唇如塗朱正見陽在上陰沈在下也陽宜降反升陰宜升反降宜必死然奄奄不死者以陰雖降未絕也急宜救陰以引陽氣下降並補陽以提陰氣上升亦死裡求生法也用補陰升提湯山藥人參棗皮熟地茯苓一兩白芍三兩升麻二錢甘草一錢北味三錢訶子三錢二劑痢止倘仍如前痢似陰已絕陽不能交不治此助陰提氣聖藥苟陰氣未絕未有不升提者正不可一用無功後遇此病置此方不用如下純血急投此方減半何至死亡貪飲久濕熱所積變痢雖無崩奔狀必有溏騖經年不愈人謂酒積在脾誰知腎泄乎酒性濕熱無經不達惟腎則不能入既不入腎何成泄蓋酒氣熏也氣熏腎中腎即醉於酒味正不必濕熱盡入也腎時旺尚能勝酒濕熱之病不生至腎衰酒且欺腎濕熱侵腎不能敵乃移邪於脾脾久困濕熱不能再藏乃積而作痢雖積在脾實在腎但治脾痢不愈必治腎然徒治腎病亦不愈必須解酒毒分消濕熱不治痢自止用化酒止痢湯人參三錢白朮一兩棗皮茯苓柞木枝白芍苡仁五錢黃連一錢檳榔五分四劑痢自止不可多服後仍忌酒否則仍發蓋酒氣薰蒸於腎受毒最深此方解之則脾胃更蘇倘仍然酣飲則酒入脾胃克伐較前更甚蓋已傷不可再傷也如大兵掃賊甫慶粗安復引賊再犯民經擾後其困益甚攻之不可撫之不能竟殞天年慎之經年裡急後重作痢乍作乍止無休此休息痢元氣已復邪氣尚存也痢忌妄止必因勢利導用補為通不可用補為塞補以通之則通中能止補以塞之則塞後宜通苟邪未滌除補塞太早痢經遽止邪在腹中時動時止況益厚味加勞役休息成法宜以利為主利小水不若利大便蓋正氣已復膀胱能氣化以分水何必再利小便邪不盡必留大腸利大腸則邪盡下然利大腸藥必從胃入脾由脾入大腸吾恐腸胃未受益脾胃先得損用盡穢丹大黃滑石厚朴檳榔一錢地榆二錢為細末煉密丸一次服盡後用膳壓之不使留胃中必得微利為度一利痢頓除此專下大腸濕熱邪原在大腸故一用奏功倘畏損傷脾胃用參湯送之更妙然宜虛人不宜健客中氣不順口中作噯下痢不止人謂濕熱作痢誰知氣逆作痢乎痢多因濕熱然濕熱所以停積腹中者多氣阻也夫大便氣閉則結逆則泄濕熱更兼氣逆徒消濕熱不理氣則過於下行氣必更滯法宜利氣佐消濕泄熱為妙然氣所以逆者以下多亡陰陰血虧損氣乃不順遂因而作逆欲氣之逆者仍返順必須補陰以生血然血難遽生陰難驟長用順藥入補陰補血中則痢速止用蓽菝散蓽菝三錢當歸白芍五錢牛乳半斤同煎一半空心服不必三劑蓋蓽菝順氣且去積滯更神同歸芍更生長陰血佐牛乳者牛屬陰乳血類無形之陰血不遽長用有形陰血以滑腸中迫急則血無傷陰不損轉佐氣以去結滯故奏功甚捷腸闢下血另作一派噴唧而出且有力射遠四散如篩腹大痛人謂陽明氣衝熱毒所作誰知氣血下陷極乎清氣上升則濁物自降惟清陽不能升濁陰之物尤留滯於腸中不化況又助濕熱則血不能藏乃下注噴射或疑血不能上藏洞泄宜矣何下出如篩此濕熱太盛邪欺正虛逞威作勢也至另作一派唧血遠射者又有說邪正不兩立正化食邪化血正衰不敢與邪戰聽邪氣化血不與邪氣化食邪氣遂驅腸中之血以自行腸中食既不得出居腹作痛未免食與血鬥邪氣怒食相侵奪門而出欲避食同行出恐不遠故另作一派遠射有力也宜升陽氣泄濕熱正氣盛邪氣自衰邪衰血亦不下用升和湯陳皮甘草五分當歸前子黃耆三錢熟地白芍五錢生地二錢丹皮升麻黃芩一錢四劑全愈方名升陽實多補陰藥蓋下血久其陰必亡但升陽不補陰則陽氣愈陷以陽升於陰氣之充也用歸芍二地補陰後益黃耆補氣則氣自升不必升麻陽已勃勃欲舉矣況助升麻又加車前子去濕丹皮黃芩散火則濕熱兩消何氣再陷此升陽全在於和也痢久不止日夜數十行下如清涕內有紫黑血絲食漸減少脈沉細弦促人謂濕熱毒未除誰知瘀血未散乎痢成於濕熱未聞成於瘀血此言恐不經不知血喜流行不喜於滯血不流行血乃化瘀況因內外之傷以成瘀欲不為痢難矣夫人飽食後加疾走或飲酒余多叫號或毆傷跌磕忍疼或大怒氣無可泄或遏鬱而愁無可解或餐燔炙太多或受訶責非分皆能致瘀成痢及成痢投治痢藥絕無一驗以似痢非痢也宜消瘀不治痢用消瘀神丹乳香沒藥廣木香檳榔一錢桃仁十四粒滑石三錢白芍五錢神麯糊為丸用米飲下百丸連服二日下穢物而愈倘二日少痊不全愈者此瘀盛也用大黃一錢煎湯送前丸二百必愈方妙在治瘀痢未常不兼治凡久不愈者可用此以下瘀血要在人消息耳癥瘕肝氣甚郁結氣塊在左脅中左腹上動痛靜寧久漸壯大面黃枯吞酸吐痰無休此木鬱成癥瘕也夫肝木喜飛揚不喜閉滯肝鬱必克脾胃土受木克則氣不能暢行於臟腑遇肝部位必阻滯不敢行日積月累無形化為有形非血積成瘕食積為癥宜舒肝鬱助脾胃氣則有形化為無形倘誤認為食妄用消導誤認為血輕施敗血則脾胃氣大傷肝鬱仍不能解勢必其形愈大每致死不悟不可悲乎用平肝消瘕湯白朮白芍一兩當歸五錢柴胡神麯一錢山楂一錢枳殼一錢半夏一錢鱉甲三錢二十劑塊全消此平肝解鬱肝氣舒不克脾胃則土氣自安又加白朮健脾開胃則脾胃氣旺不畏肝克氣自通肝又何阻滯況山楂鱉甲攻堅去穢如主將健軍士勇敢善鬥賊亦何苦死戰不散乎且原無賊黨不過自己畏怯閉塞門路一旦資財富饒興工動作重開路徑何至鬱悶不舒再堆糞土脾氣虛寒又食寒物結小腹間久不化成硬塊久能動人謂徵結生瘕誰知命門火衰不能化物乎脾濕土非命門火不生亦非命門火不燥倘命門火衰則釜底無火何以蒸腐水穀如陽和之地有太陽照則萬物發育陰寒之地則雪積冰堅草木萎稿安得萌芽非土得火之驗乎淤泥濕田非烈日炎氛未易爍干是土又得火而燥也人脾土亦然無火則脾濕濕則脾氣不化飲食停住於中癥瘕生濕能生物又加癥瘕之結宜有變動之物以成其間然乘其初動用逐穢攻堅未嘗不可遽去但因火衰致土衰由土衰生物仍用攻逐之法則愈損脾陰何若仍補命門火以扶脾氣則旺土自能消化不用攻逐癥瘕自開用溫土消瘕湯茯苓白朮一兩肉桂枳實二錢山楂一錢人參巴戟五錢十劑全消方用巴戟肉桂溫命門火火旺陰邪自滅參苓白朮健脾又利濕濕去燥土溫和寒蟲水怪何所潛形況有楂實原能攻逐乎此治本又治標者也胃氣虛食不能消偶食硬物存胃中久變有形物腹中亂動動則痛不可忍得食則解後漸大雖飲食亦痛人謂痞塊成鱉誰知似鱉實非乎蓋痛時手按宛如鱉背又四足齊動何謂非鱉蓋鱉動物既成鱉豈肯久安一處其非鱉明甚既非鱉何形宛如鱉蓋胃屬土土所生物大約四足居多土所生物喜靜不喜動故安土重遷形如鱉而不移但喜靜何亂動蓋覓食充飢動靜之物皆然試思得食則減其亂動非索食之驗乎日供飲食身形必大及大飲食不足以供自嚼傷皮肉安得不痛當以殺蟲為主然殺蟲必傷正氣又宜補正用攻補兩益湯榧子使君子十個白薇雷丸神麯三錢檳榔二錢白朮一兩人參五錢一劑腹必大痛堅忍茶水半日如渴再服少頃必盡下蟲穢物愈不必二劑方用殺蟲藥於參術中且以二味為君何也蓋衝鋒破敵之師必得聖君賢相運籌帷幄始能決勝千里倘徒用殺蟲未必無功然斬殺過多自損亦甚氣虛下陷食停脾胃成塊久形漸大悠悠忽忽似痛不痛似動不動人謂痞塊誰知由於陽氣不升乎脾胃氣不可下陷者倘飢飽勞役傷其形房幃秘戲傷其骨又不節口腹則脾胃氣又何能升脾胃氣降則陽閉陰中陽閉陰中陰自離陽內陰陽不交飲食不易消化飲食即能化氣結不伸亦能成形但其形外大內歉按如空虛現假象惑人也法不必治塊惟升陽氣脾胃不下陷氣塊不消自化用補中益氣湯人參當歸三錢黃耆白朮一兩甘草陳皮柴胡半夏一錢升麻四分此湯乃提陽氣聖藥病本氣虛故用黃耆為君白朮用一兩者以塊結於腹取利腰臍通上下氣參歸助耆術生脾胃土土旺用升柴提之則氣尤易升徵瘕未必無痰涎相壅故加半夏於陳草中則消痰不耗氣同群共濟發揚陽氣即有邪結無不散況原系氣塊非血塊有不消化哉飲食時被驚遂致停滯不化久成癥瘕醫作痞塊治不效用補藥亦不效蓋驚未收也少陽膽主發生一遇驚則氣鬱不伸肝膽相表裡膽病肝亦病同病相憐必加怒於脾胃土畏木旺雖欲消化糟粕惟恐木奪其權逡巡畏縮不敢轉輸於是木土之氣兩停腸胃遂成癥瘕必須開少陽郁佐之平肝則脾胃不畏肝膽自能分消水穀何癥瘕不散用逍遙散白朮柴胡二錢白芍五錢當歸鱉甲茯苓三錢二陳一錢甘草五分十劑全愈此解鬱神劑專入肝膽二經郁開脾胃癥瘕不攻自破偶食難化物又被驚氣結不散食亦難消因而痰裹成瘕此驚氣閉結也驚則氣下食宜隨下胡因驚反阻滯耶不知氣無形食有形無形氣隨驚下降有形物隨驚上升且驚則氣下氣下肝中非氣下脾中也氣下肝中則肝氣不散勢必下克脾土無物相間尚留物而不化況原受難化物於未驚前又安能既化此癥瘕所以長存腹中也法必去驚氣大培脾胃自不攻而散用培土化瘕湯白朮一兩柴胡白薇山楂厚朴一錢茯苓雄鼠矢三錢枳殼五分神麯生首烏白芥子二錢鱉甲五錢白芍五錢山藥四錢二十劑全消此用白朮培土何又用白芍平肝蓋脾弱由肝膽制也平肝膽正培脾胃也木既不克脾胃土氣自升無物不化況益消癥破瘕何塊不除何必用安驚揮駭乎且柴胡已舒肝膽氣膽揚肝快即有驚駭消歸何有寧患癥瘕哉飽食即睡臥風露間醒覺腹中飽悶遂成痞人謂食未消誰知風露邪裹痰於胃乎風陽邪露陰邪二邪合最難化物每停腹中不散宜通陰陽使陽邪入陰中陰邪出陽外陰陽正氣兩不相損而後入陰出陽痰氣開邪易遁然陽邪不過居胃中陰邪每越出胃外凡藥皆歸胃邪在胃易散邪不在胃何能即散然邪分陰陽但補陰陽正氣邪不祛自散用兩祛丹白朮一兩人參生首烏鱉甲末地慄粉當歸三錢神麯茯苓二錢半夏貝母一錢十劑痞全消此脾腎兼治也脾腎俱屬陰何置陽不問不知陽邪入陰分已全乎陰矣全乎為陰是忘其為陽故治陰不必治陽然方治陰未嘗非治陽故能入陰中又能出陰外陰邪陽邪有以消之食蔬菜胸膈有礙疑有蟲因作痞人謂蟲子作祟誰知心疑物不化乎脾胃主化物凡入胃即化既蟲入胃到脾又安有不化蟲既化何成痞蓋疑心害之也脾胃化物全藉後天火氣後天火氣在心包先天火氣在命門心包生胃命門生脾二經火旺後能化糟粕出精微土得火而生也食菜動疑則心動心本無為動則有為必包代君出治者也心包主動不主靜宜有為心既有為心包反不能有為宜動不動宜有為不為則心包不代君出治則火氣不入胃胃不能化物脾遂不為胃而運行飲食又安得而化自停住腹中成痞若不解疑心健胃脾消痞癥痞寧易哉用釋疑湯人參茯苓三錢巴戟白朮五錢白薇二錢甘草肉桂一錢使君子三枚砂仁三粒廣香木三分菖蒲五分十劑全消此溫補心包心包氣旺則心包火自升騰心包火動寧安無為不代心包宣化哉心包火宣於胃命門火自翕從不啻如夫婦同心合力攻擊雖有癥瘕何不立化
