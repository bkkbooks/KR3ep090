body:
  text: 卷三咽喉門感冒風寒忽咽喉腫痛勢甚急變成雙蛾其症痰涎稠濁口渴呼飲疼痛難當甚有勺水難入者此陽火壅阻於喉勢若重病實輕夫陽火太陽膀胱火也膀胱與腎表裡膀胱火動腎經少陰火即來相助故直衝咽喉肺脾胃火亦隨之上升於是借三經之痰涎盡阻塞喉間結成火毒不解似宜連數經治然本始於太陽泄膀胱火諸經之火自安但咽喉近肺太陽即假道於肺肺即狹路戰場也安有舍戰場要地先搗其本國乎用破隘湯桔梗玄參花粉三錢甘草二錢柴胡麻黃山豆根一錢白芍五錢一劑咽寬二劑蛾消此方散太陽邪二散各經邪五尤加意散肺邪者由近致遠也時喉忽痛吐痰如湧口渴求水下喉少快已復呼水長成雙蛾大且赤形如雞冠此喉痹俗名纏喉風蓋因君相二火兼熾某勢甚暴咽喉之管細小火不得遽泄遂遏抑其間初作腫後成蛾蛾有雙蛾單蛾雙蛾生兩旁兩相壅擠中反留一線可通藥水單蛾獨自成形反塞住水穀勺水莫咽宜先用刺法一則刺少商等穴然欠切近用刀直刺喉腫處一分必少消可用吹藥開之吹藥方膽礬牛黃皂角燒灰末冰片一分麝香三釐為絶細末和勻吹入喉中必大吐痰而愈後用救喉湯射干甘草一錢山豆根二錢玄參一兩麥冬五錢花粉三錢一劑全愈若雙蛾不必用刺方用玄參為君以泄心腎火自歸經咽喉之間關門清肅矣咽喉腫痛日輕夜重亦成蛾如陽症但不甚痛自覺咽喉燥極水咽少快入腹又不安吐誕如水將涎投水中即散化為水人謂喉痛生蛾用泄火藥反重亦有勺水不能下咽者蓋日輕夜重陰蛾也陽蛾則日重夜輕此火因水虧火無可藏上衝咽喉宜大補腎水加補火以引火歸藏上熱自愈用引火湯熟地三兩巴戟麥冬一兩北味二錢茯苓五錢一劑火歸腫消二劑全愈方用熟地為君補水麥味為佐滋肺金水相資水足制火加入巴戟之溫又補水藥則水火既濟水下趨火不得不隨增茯苓前導則水火同趨共安腎宮何必用桂附引火歸元乎況症因水虧火騰今補水倘用大熱之藥雖引火畢竟耗水余用巴戟取其引火又足補水腎中無乾燥之虞咽喉有清肅之益此巴戟所以勝附桂也咽喉乾燥久疼痛人謂肺燥乃肺熱之故誰知腎水涸竭乎夫肺生腎惟肺虛肺中津液僅可自養腎耗自來取給剝膚之痛烏能免哉譬人無不養子處困窮窘迫則無米之炊何能止索飯啼飢之哭倘子成立自然顧家聊免迫索今子日多金取耗子母兩貧狀不可言肺腎何獨不然用子母兩富湯熟地麥冬三兩一劑燥少止三劑痛止十劑盡去熟地補腎救肺子麥冬滋肺救腎母上下兩治腎有潤澤肺無焦焚此肺腎兼治熟地麥冬所以並用咽喉生癬致喉嚨疼痛症先癢面紅耳熱不可忍後則咽唾覺乾燥必再咽唾而後快久之成形作痛變楊梅之紅瘰或癢或痛而為癬夫癬必有蟲咽喉防範出入稽查盜賊賊在關門豈明知故縱亦平日失覺察及根深欲殺之而不能故此病多不為意到後追悔已晚病因腎水耗致腎火沖肺金又燥清肅之令不行水火金火相形相戰於關門焚燒而用火攻傷殘必多瘡痍聚集久戀於敗憐廢礫以為棲止仍須補腎水益肺氣大滋化源兼殺蟲以治癬庶正固邪散蟲可盡掃用化癬神丹玄參一兩麥冬五味白薇牛子甘草一錢百部三錢紫苑白芥子二錢二劑痛痊六劑蟲死另服潤喉湯熟地麥冬各一兩棗皮四錢生地三錢桑皮三錢甘草貝母一錢苡仁五錢十劑癢痛除更加肉桂一錢飢服蓋前方微寒恐傷脾胃加肉桂水無冰凍土得生髮下焦熱上焦自寒生長膏粱素耽飲又勞心致咽喉臭痛人謂肺氣傷誰知心火太盛移熱於肺乎夫飲酒傷胃胃氣薰蒸宜肺熱然胃火熏肺胃土實生肺故飲酒尚不傷肺惟勞心過度火起於心肺乃受刑胃火助之咽喉乃成燔燒之路自然唾涕稠黏氣腥而臭痛症乃成蓋心主五臭入肺為腥用解腥丹甘草桔梗二錢麥冬五錢枯芩一錢桑白皮天冬生地丹皮三錢貝母五分二劑痛止六劑臭除此治肺兼治心治心兼治胃膏梁之人心肺氣血原虛不滋益二經但泄火胃中氣血必傷反增火熱之焰妙在補肺以涼肺補心以涼心補胃以清胃火自退痛自定咽喉腫痛食不得下身發寒熱頭疼日重大便不通人謂熱誰知因感寒乎理宜逍遙散散其寒喉痛即解人既不信為寒以用祛寒之藥獨不可外治以辨其寒乎法用木通一兩蔥十條煎湯浴於火室中如熱病必有汗病不解倘寒症雖湯火大熱淋洗甚久斷然無汗乃進逍遙散定然得汗而解痛立除此法辨寒熱甚確特用治感寒之喉痛也牙齒齒痛不可忍每至呼號此臟腑火旺上行牙齒作痛不泄火不能捷效然火虛實大約虛火動於臟實火起於腑實火有心包胃虛火有肝脾肺腎齒牙各有部位兩門牙上下四齒屬心包門牙旁上下四齒屬肝再上下四齒乃胃再上下四齒脾也再上下四齒肺也再上下四齒腎也大牙亦屬腎腎經有三牙齒多者貴以前數分治多驗火既多宜分治然吾用治牙仙丹玄參生地一兩諸火俱效辨心包火加黃連五分肝火加炒梔子二錢胃火加石膏五錢脾火加知母一錢肺火加黃芩一錢腎火加熟地一兩二劑火散四劑平復火既有虛實何一方均治不知火有餘乃水不足滋陰則陰陽之火無不自戢況玄參泄浮遊之火生地止無根焰瀉中有補故虛實咸宜實巧而得其要者也況辨症加各經藥乎或曰火生於風治火不治風恐非妙法不知火旺生風未有風大生火人感風邪身必發熱斷無風止入牙而獨痛之理治火兼治風此世人之誤治火病用風藥反增火勢或疑膀胱膽心大小腸三焦皆有火何俱不言不知臟病腑亦病腑病臟亦病治臟不必治腑泄腑不必泄臟況膀胱心膽三焦大小腸俱不入牙齒故不談多食肥甘齒牙破損作痛如行來行去蟲也齒乃骨余最堅何能藏蟲不知過食肥甘熱在胃胃火日沖口齒濕氣乘之濕熱相搏不散乃蟲生於牙初少久則蕃衍蝕損其齒遂致墮落一而再再而三有終身之苦必外治若內治蟲未殺而臟腑先傷用五靈至聖散五靈脂三錢研絶細末白薇三錢細辛骨碎補五分各研為細末先用滾水含漱齒牙至淨後用藥末五分滾水調如稀糊含漱口齒半日至氣急吐出如是三次痛止蟲死斷不再發齒痛原因蟲五靈白薇殺蟲於無形加細辛散火骨碎補透骨引靈薇直進骨內蟲無可藏蟲死痛自止牙痛久牙床腐爛飲食難進日夜號呼乃胃火獨盛上升於牙有升無降故也人惟胃火最烈火在何處即於在處受病火易升不易降火即升於牙齒牙齒非藏火之地焚燒兩頰牙床紅腫久腐爛似宜用治牙仙丹加石膏然火蘊結可用前方消於無形今腐爛前方又不可用以有形難於補救用竹葉石膏湯加減治之石膏青蒿五錢葛根半夏知母二錢茯苓麥冬三錢竹葉三百片四劑火退腫消再用治牙仙丹收功方用石膏泄胃火何又加葛根青蒿不知石膏降而不升入二味引於牙齒則痛除何腐爛之不愈牙齒疼痛至夜而重呻吟不臥此腎火上衝然虛火非實火作火盛治必不效作虛火治時效時不效蓋火盛當作火衰有餘當作不足乃下虛寒上假熱也腎不寒則龍雷之火安於腎宮惟下寒甚水虧腎火無可藏於是上衝齒乃骨余同氣相招留戀不去至夜腎主事水不能養火火自遊於外仍至齒作祟如家寒難於棲處必至子舍子又貧乏自然觸怒大補腎水兼補火火有水養自不上越用八味湯加骨碎補二劑不發六味補水桂附引火歸源何又加骨碎補不知藥不先入齒中則痛根不除用骨碎補透齒後達命門拔根塞源也齒疼難忍閉口少輕開口更重人謂陽明胃火誰知風閉於陽明太陽乎此飲後開口向風而臥風入牙齒留而不去初小痛後大痛論理去風宜愈風因虛入風藥必耗人氣氣愈虛邪必欺正而不出古用灸法甚神灸其肩尖微近骨後縫中小舉臂取之當骨解陷中灸五壯即瘥灸後項必大痛良久乃定齒疼永不發若人畏灸法用散風湯治之白芷升麻三分石膏花粉二錢胡桐淚乾葛細辛一錢生地麥冬五錢當歸三錢二劑愈不必三劑此方補過於風藥風得補而易散齒痛甚吸涼風則暫止閉口則復作人謂陽明火盛誰知是濕熱壅於牙齒乎夫濕在下易散在上難祛治濕不外利水下行順上散逆且濕從下受易行從上感難散濕熱感於齒牙尤難以飲食必經不已濕而重濕乎濕重不散火且更重所以經年不止必上祛濕熱不可單利小水佐以風藥則濕得風而燥熱得風而涼濕熱解齒痛自愈方用上下兩疏湯茯苓五錢白朮三錢澤瀉二錢薏仁五錢防風五分白芷三分升麻三分荊芥二錢梧桐淚五分甘草一錢水煎服四劑而濕熱盡解而風亦盡散也蓋茯苓白朮澤瀉薏仁原是上下分水之神藥又得防風白芷升麻荊芥風藥以祛風夫風能散濕兼能散火風火既散則濕邪無黨安能獨留於牙齒之間耶仍恐難竟去故加入甘草梧桐淚引入齒縫之中使濕無些須之留又何痛之不止耶況甘草緩以和之自不至相雜而相犯也鼻淵鼻流清水久流涕又久流黃濁物如膿髓腥臭不堪聞流十年必死此病得之飲酒太過臨風而臥風入膽中膽之酒毒不能外泄遂移熱於腦腦得熱毒又不能久藏從鼻竅出夫腦竅通鼻膽氣何以通腦酒氣又何以入膽凡善飲酒先入膽膽不受酒能滲酒酒經膽滲酒氣盡解倘多飲膽不及滲則膽不勝酒即不及化酒而毒存臥則膽氣不行又加寒風膽更不舒夫膽木最惡寒風外寒侵則內熱愈甚膽屬陽頭亦陽膽熱不能久藏必移熱上走於頭腦在頭中頭無藏熱之外遇穴即入況膽與腦原相通腦之穴大過於膽遂樂居不肯還於膽逮久思遷尋竅而出乃順趨於鼻火毒淺涕清深涕濁愈久愈重並腦髓盡出欲不死得乎治腦可也必仍治膽者探其源也用取淵湯辛夷二錢當歸三兩柴胡貝母一錢炒梔子三錢玄參一兩三劑全愈蓋辛夷最入膽引當歸補腦氣引玄參泄腦火加柴梔舒膽中鬱熱膽不助火自受補益矣然不止涕者清火益氣正止之也蓋鼻原無涕遏上遊出涕之源何必截下流之水乎或疑當歸過多不知腦髓盡出不大補則腦氣不生辛夷耗散非可常用故乘其引導大用當歸補腦添精倘後減辛夷即重用無益此用藥先後之機也疑者不過嫌性滑妨脾不知腦髓直流髓不化精精少精少必不能分布於大腸而乾燥當歸潤之正其所喜何疑之有鼻流清涕經年不愈人謂內熱成腦漏誰知肺氣虛寒乎夫腦漏有寒熱不只膽熱而成蓋涕臭屬實熱涕清不臭屬虛寒茲但流清涕不腥臭正屬虛寒熱宜清涼寒宜溫和倘概不用補損傷肺氣則肺金益寒愈流清涕用溫肺止流丹訶子甘草一錢桔梗三錢細辛石首魚頭骨五錢煅存性為末荊芥人參五分水煎調服一劑即止此方藥味溫和自能曖肺性又帶散更能祛邪或謂石首魚頭骨古用治內熱鼻淵宜為寒物何以用治寒症吾恐熱而非寒也不知實有寒熱二症此藥並治但熱涕通於腦寒涕出於肺所用皆入肺藥無非溫和之味肺寒自解得石首魚頭骨佐之以截腦路則腦氣不下陷肺氣更閉故一劑止流鼻塞濁涕稠黏數年人謂鼻淵火結於肺誰知火不宣似鼻淵而非乎夫郁五臟皆有不獨肝內經曰諸氣僨郁皆屬於肺肺鬱則氣不通鼻乃肺門鼻氣亦不通難經曰肺熱甚則出涕肺清虛之府最惡熱肺熱則肺氣必粗肺液必上沸結為涕熱甚涕黃熱極涕濁敗濁豈容於清虛之府自從鼻而出用逍遙散加味治柴胡白朮茯苓二錢當歸白芍桔梗三錢陳皮五分甘草黃芩白芷半夏一錢二劑輕八劑愈此治肝鬱何肺郁亦效不知逍遙散治五郁非獨肝況佐桔便散肺邪黃芩泄肺熱且引群藥直入肺經何郁不宣故壅塞通稠濁化目痛目痛如刺兩角多眵羞明畏火見日則澀胞浮腫淚濕此肝風火作祟脾胃氣不升耳人脾胃為後天不甘受肝之制則土氣遏抑土不伸則津液枯木亦無所養加風襲木更燥目肝竅肝皆風火目欲清涼得乎惟肝燥目痛偏生淚者蓋腎救耳肝腎子子為風火所困必求救於母腎痛其子必以水濟然風火未除腎欲養木而不能肝欲得水而不敢於是目反損矣然水終為木所喜火終為木所畏故畏日羞明法當祛風滅火然徒治風火不用和解則風火不易散用息氛湯柴胡花粉白蒺藜二錢當歸白芍甘菊炒梔子白茯苓三錢荊子一錢草決明一錢二劑退四劑不羞明六劑愈此方泄肝木調脾胃佐治目退醫真和解得宜目痛經年紅赤胬肉攀睛拳毛倒睫乃誤治而成凡目初痛為邪盛久痛為正虛正虛誤作邪盛則變此症世動外治不知內未痊外治劫藥反受害今一方凡胬肉攀睛拳毛倒睫無不漸愈但不速效名磨翳丹葳蕤甘菊當歸白芍同州蒺藜一斤陳皮二兩柴胡三兩白芥子四兩茯神半斤各為末密丸早晚滾水送下五錢服完愈此方用攻於補不治風火風火自息不治胬肉攀晴拳毛自痊勿謂無奇也目痛後迎風流淚不已夜則目暗不明一見燈光兩目乾澀此少年斫喪元陽又加時眼不守色戒損傷大眥眥孔不閉一見風寒即透內虛外邪難杜故出淚夫淚生於心大眥心竅傷心則淚出傷大眥淚亦出正內外關切也傷大眥即傷心欲止淚必急補心然補心必兼治腎肝使腎生肝肝更補心用固根湯葳蕤熟地一兩當歸白芍麥冬五錢甘菊三錢菖蒲三分柴胡五分四劑不畏風八劑不流淚再十劑愈蓋葳蕤止淚當歸白芍補肝熟地滋腎麥冬補心佐甘菊菖蒲柴胡舒風火引諸藥塞淚竅固本末自愈患時眼後目不痛淡紅羞明畏日無異痛時此內傷誤作實火又多色欲耳再作風火治必失明必大補肝腎使水生肝木肝木旺祛風目得液養虛火盡散用養目湯熟地當歸一兩白芍麥冬葳蕤五錢棗皮四錢北味甘草一錢甘菊二錢柴胡五分八劑全愈矣方大補肝腎世醫每拘成方不顧虛實治火為主豫傳此方望治目者察虛實如虛此方之效如響正不必分先後也初痛內傷又何辨蓋日痛重陽火實症夜痛重陰火虛症虛症用此方隨手建功陰火上衝兩目紅腫淚出不熱不甚羞明日輕夜重此虛症然虛不在肝而在腎腎中無火下焦寒甚逼火上浮法宜補火兼補水腎中有火則水不寒有水火不燥陰虛火動當兼治治目豈殊用八味湯加減治熟地一兩棗皮山藥五錢苓澤丹皮甘菊三錢柴胡五分肉桂一錢一劑火歸頓愈蓋陰陽之道歸源最速六味滋腎水肉桂溫命門火火喜水養同歸本宮龍雷安靜火光自散又佐柴芍甘菊風以吹之通天澤之氣雷火更安近視不能遠視人謂肝血不足誰知腎火微乎腎火先天火存腎中目不特神水涵之神火亦藏之遠照者火也江上漁火明透數十里水氣嵐煙不得掩然漁火細光亦若隱若現可見火盛照遠火衰照近近視正神火之微神火發於腎必補腎火為主然火非水不養水中補火不易之道也用養火助明湯熟地葳蕤五錢棗皮麥冬枸杞三錢巴戟一兩肉桂一錢北味三分一月漸遠視一年遠近俱能視但必堅忍色欲倘服興陽以圖善戰且有病戒之瞳子大於黃精視物無準人謂熱多誰知氣血虛驟用火酒熱物乎臟腑精皆注目瞳子尤精之所注故精盛則瞳明精虧則瞳暗視物知有無責瞳子虛實茲視物殊大小何也蓋筋骨氣血之精為脈併為系上屬腦腦熱瞳子散大所以熱者多食辛熱也火酒尤熱氣主散腦精最惡散又最易散熱而加散腦氣隨熱而散矣腦熱難於清涼腦散難於靜固此瞳子散大而視物無準也法宜解熱益氣解熱必滋陰滋陰自降火後佐酸收斂瞳子之散大用瞼瞳丹熟地白芍一兩棗皮當歸地骨皮五錢黃連人參柞木枝三錢北味甘草一錢柴胡陳皮黃柏五分四劑瞳漸小八劑視物準一月愈此涼血於補血泄邪於助正祛酒熱於無形收散精於不覺較東垣法更神病目數日生翳由下而上翳色淡緑瞳痛莫當人謂肝風誰知腎火乘肺兩火合而不解乎夫腎色黑肺色白白黑合必變緑目翳現緑非肺腎病乎惟是二臟子母二火相犯子母之變也夫母克子子亦順受子克母母宜姑息似無輕重何目翳變緑由下而上子犯母明矣亦母之太柔也安有母旺子敢犯哉補母子逆可安然必有故腎炎犯肺亦經絡多不調補肺安腎烏可不調經絡以孤腎火之黨用健母湯二冬一兩生草黃芩一錢桔梗茯苓青蒿白芍丹參三錢陳皮三分花粉二錢一劑緑退四劑翳散十劑愈二冬補肺桔甘散肺邪黃芩退肺火則肺旺腎自難侵益茯苓泄膀胱火青蒿泄胃脾熱白芍平肝丹參清心臟腑清涼腎火安能作祟如正人君子群來解勸逆子縱不自艾斷不增橫目無恙視物顛倒人謂肝逆誰知肝葉倒置乎夫目系通肝肝神注目肝之邪正曲直視物如之今視物倒置乃肝葉倒而不順此必因吐而得蓋吐則五臟反覆肝葉開張壅塞上焦不及迅轉故肝葉倒視物亦倒宜再吐然再吐必傷五臟氣血不吐肝葉不遽轉用安臟湯參蘆二兩瓜蒂七個甘草一兩荊芥三錢頓服三大碗用鵝翎探喉中必大吐肝葉自順瓜蒂散加參蘆甘草荊芥補中行吐即吐中安經絡何致五臟反覆重傷氣血凡虛人用吐皆宜驚悸後目開不瞑人謂心氣弱誰知肝膽氣血結雖臟腑皆稟脾土上貫目目系實內連肝膽肝膽血足則氣舒血虧則氣結今肝膽逢驚則血縮悸則血止氣因而結氣結不能上通於目目睫不能下仍當補肝膽之血血旺氣伸氣伸結乃解用解結舒氣湯白芍當歸炒棗仁一兩郁李仁三錢一劑目瞑白芍平肝膽泄中能補當歸滋肝膽補中能散炒棗仁安心心安不取資於肝膽郁李仁善去肝膽之結入之於三味尤易入肝而舒滯走膽而去郁視物如兩人謂肝氣有餘誰知腦氣不足蓋目系下通肝上實屬腦腦氣不足則肝氣大虛肝虛不能應腦於是各分其氣以應物因之見一為兩必大補肝氣使肝足應腦則肝氣足腦氣益足用助肝蓋腦湯白芍二兩當歸一兩人參川芎天冬三錢郁李仁花粉二錢柴胡細辛五分甘菊生地五錢薄荷八分甘草一錢白芷三分二劑愈全補肝非益腦不知補腦必添精添精必滋腎然滋腎補腦肝氣不能遽補不若直補肝佐祛邪為當益腦氣不足邪得以居不祛邪單補精於腦終無益治肝正所以益腦病目後眼有物飛走捉之則無此肝膽血虛有痰閉結也夫肝膽無血以潤則木氣過燥內燥必取給於水然肝膽喜內水資不喜外水養於是外水不變血而變痰血資則益痰侵則損且血能入於肝膽中痰難入於肝膽內痰在外反塞肝膽之竅氣不展見物飛走皆痰作祟怪病皆起於痰又何疑焉法益肝膽血兼消痰自易奏功用四物湯加味治熟地青相子茯苓半夏三錢白芍棗仁五錢當歸一兩川芎白朮二錢陳皮甘草一錢四劑愈用四物滋肝膽苓朮半夏分消濕痰加棗仁青葙另有妙理蓋青相正目系棗仁去心痰心氣清痰易出目系明邪自散然但用二味不合前藥正未能出奇制勝也目痛余白眥變黑目不疼痛仍能視物毛髮直如鐵條癡癡如醉不言語人謂血晴症誰知腎邪乘心乎夫心火腎水似相剋然心火非腎水不能養腎不交心必煩躁但腎可資心不可過侮夫心得資心宜受益惟腎有邪水挾以資心心不傷乎心受腎邪本死症但現黑色於目者以腎救心非犯心也白眥變黑赤白難分毛髮直非其驗乎癡癡如醉不言語挾制太甚無可如何也法宜斬關直入急救君主祛蕩腎邪撥亂反正用轉治湯茯苓人參白朮五錢附子菖蒲良薑一錢五靈脂末二錢白芥子三錢一劑癡醉醒二劑發軟三劑黑眥解四劑愈腎邪不過寒濕用辛燥溫熱自易祛除又佐奪門引路有不復國於須臾定亂於頃刻經閉三月忽目紅腫疼痛如刺人謂血虛不能養目誰知血壅而痛乎夫經不通似血枯然血過盛肝反閉塞不通經閉熱無可泄轉壅於上肝開竅於目乃走肝而目痛肝脈必大而有力或弦而滑非細澀徵緩無力宜通經以泄肝用開壅湯紅花歸尾丹皮鬱金三錢牛膝柴胡二錢花粉二錢桃仁十四枚大黃香附玄胡一錢一劑經行二劑愈此不治目但通經經通熱散目安耳痛附耳聾雙耳忽腫痛內流清水久變膿血發寒熱如沸湯響或如蟬鳴此少陽膽氣不舒風邪乘之火不得散宜舒膽氣佐祛風瀉火然或不效蓋膽受風火之邪燥干膽汁祛風泄火膽汁愈干火勢益熾火借風威耳病轉甚用潤膽湯白芍當歸玄參一兩柴胡一錢炒梔子二錢花粉三錢菖蒲八分十劑全痊歸芍入膽且入肝膽病肝必病平肝膽亦平柴梔舒肝正舒膽肝舒肝血必旺肝血旺膽汁自濡膽汁濡風火不治自散加花粉逐痰風火無黨菖蒲耳竅引玄參退浮遊之焰自然風火漸祛上焦清涼耳痛隨愈耳中如針觸生痛並無水生只有聲沸人謂火邪誰知水耗耳腎竅腎不足則耳閉然必先痛而後閉腎火沖也火不得出則火路塞火不再走於耳而成聾但火上衝耳火之路何以塞蓋火日衝於耳耳竅之內有物塞之如火坑薪成炭成灰歲久必塞阻無路宜速治否則成聾難治用益水平火湯生熟地麥冬玄參一兩菖蒲一錢三劑愈四味補水又泄火不損腎氣腎氣足腎火自降菖蒲引腎氣上通火得上達又何阻抑老人耳聾高壽之微不知已聾不必治未聾宜治此治已聾尚效矧未聾耳痛後雖愈耳鳴如故人謂風火猶在仍用祛風散火嗚更甚以手按耳嗚少息此陽虛氣閉法宜補陽氣兼理肝腎用發陽通陰湯人參白朮當歸白芥子二錢茯苓黃耆白芍三錢肉桂甘草五分熟地五錢柴胡炒荊芥一錢二劑愈即十全大補變方也治氣血兩虛何治陽虛亦效不知陽虛陰必虛單補陽陽旺陰衰轉動其火不若兼補陰陽相濟彼此氣通蟬鳴頓除耳聾不聞雷霆耳內不疼痛大病後年老多有乃腎火內閉氣塞最難效法當大補心腎雖耳屬腎非心氣相通則心腎不交反致阻塞故必補腎使腎液滋心即補心使心氣降腎心腎交自上升通耳方用啓竅湯熟地二兩棗皮麥冬一兩遠志炒棗仁茯神柏子仁三錢北味二錢菖蒲一錢四劑耳中必響再十劑外用龍骨一分雄鼠膽一枚麝香一釐冰片三釐研絶細末分作二丸以綿裹塞耳中不可取出一晝夜即通神效耳通仍用前湯再服一月後用六味丸大料吞服否恐不能久聰耳聞如風雨聲或如鼓角響人謂腎火盛誰知心火亢極凡心腎交始上下清司視聽否必聽聞亂故腎火太旺心畏腎炎不交腎心火太旺腎畏心亢不交心均使耳嗚但心不交腎鳴輕腎不交心鳴重今風雨鼓角鳴之重也欲腎氣歸心必須使心氣歸腎用兩歸湯麥冬熟地一兩黃連二錢生棗仁五錢丹參茯神三錢四劑不發此涼心藥也心清涼腎不畏心熱樂與來歸況全是益心滋腎不特心無過燥腎且大潤不啻夫婦同心御女耳中即痛或癢發不已或流臭水以涼物投入則快甚人謂腎火盛誰知腎火虛乎腎火龍雷之火旺則難動易息衰則易動難息蓋火旺水旺火衰水衰水衰不能制火火易動水衰不能養火火難息欲火之難動必使水之不衰欲火之易息必使火之仍旺故補水必補火水乃生補火必補水火乃盛二者相制而相成也腎開竅於耳腎水虛則腎火亦虛水火虛耳安獨實此癢痛作於交感後正顯腎中水火虛也法須補腎火火不可獨補須於水中補之用加減八味湯熟地一兩棗皮丹皮山藥麥冬五錢澤瀉肉桂二錢茯苓三錢北味一錢十劑全愈此補水多於補火以火不可過旺也水旺於火火引水中水資火內火不至易動難息何致上騰耳門作痛癢輕於出水哉因怒發越經來時兩耳出膿兩太陽作痛乳房脹悶寒熱往來小便不利臍下滿築人謂腎與膀胱熱誰知肝氣逆火盛血虧乎腎開竅於耳肝氣未嘗不相通子隨母象也況怒則肝不藏血經來宜血隨經下不宜藏經絡作痛滿悶不知怒則肝逆上奔血何肯順行而為經勢必散走經絡不泄火隨鬱勃之氣衝兩耳化膿血出於腎母之竅矣太陽膀胱部位腎與膀胱表裡肝走腎竅獨不走膀胱部位乎小便不利正肝氣乘膀胱也腎氣通腰臍臍下滿築肝氣乘腎也至乳房脹悶尤肝逆之明驗兩脅屬肝乳房兩脅之際也用加味消遙散白芍當歸一兩柴胡花粉二錢甘草陳皮炒梔子一錢茯神丹皮三錢白朮三錢枳殼五分二劑諸症痊此方補血無阻滯之虞退火無寒涼之懼不治腎腎已包不通膀胱膀胱已統世人不用可嘆也口舌産婦舌出不收人謂舌脹誰知心驚乎舌乃心苗心氣安舌如之産子驚恐自異常時心氣動心火不寧胎胞之系通於心用力産子心為之懼故子下舌亦出舌出不收心氣過升故也必須降氣為主古有以恐勝者舌由驚出復增以恐愈傷心氣未必不隨收隨出且産後心虛又變他症故降氣必補心用助氣鎮心丹人參三錢茯神二錢菖蒲五分硃砂北味一錢水煎調硃砂末含漱久之咽下一二劑愈用硃砂鎮心人參生氣氣旺火自歸心火歸焰息舌亦隨收何必重增恐懼哉舌下牽強手大指次指不仁兩臂麻木或大便祕或皮膚赤暈人謂風熱誰知惱怒因鬱而成乎夫舌屬陽明胃大腸之脈散居舌下舌下牽強胃與大腸之病也原因肝氣不伸木克胃土土虛不能化食遂失養於臂指經絡間麻木不仁臂指經絡如此何能外潤皮膚此赤暈所由起也胃受木克胃氣太燥無血以潤大腸因熱生風腸中燥結遂失傳送矣法須通大腸而健胃然肝鬱不平肝以補血又何濟乎用八珍湯加減治之人參柴胡甘草槐角白朮茯苓一錢當歸白芍熟地一錢陳皮半夏五分十劑全愈八珍補氣血柴胡舒肝槐角清火肝鬱解胃自旺轉輸搬運無滯矣血症一時狂吐血必本於火然吐血雖本於火吐多火必為虛況血去無血養身又用泄火重傷胃氣無論血不驟生氣亦不轉必至氣脫死法禁止血當活血不僅活血急固氣蓋氣固則已失之血漸生未失之血再旺用固氣生血湯黃耆一兩當歸五錢炒黑荊芥二錢二劑血止氣旺四劑血歸此即補血湯之變妙在荊芥引血歸於氣中引氣生於血內血氣之陰陽交水火之陰陽自濟臟腑經絡不致再沸至於有形之血不能速生無形之氣所當速固大約此方治初起嘔吐狂血最妙若吐血久不可多服久吐血未止或半月或一月一吐或三月數次或經年一次雖未咳嗽吐痰不已委因殊甚此腎肝吐也吐血未必皆肝腎病然吐久未有不傷肝腎者腎枯肝燥龍雷之火不安於木中下克脾胃脾胃虛寒火逆衝上欺肺金挾胃血沸騰隨口而出必腎肝肺三經統補為妙用三合救命湯熟地半斤麥冬三兩丹皮二兩水煎一二碗日盡服方用熟地補腎滋肝麥冬清肺制肝丹皮去肝浮遊之火又引火歸腎使血歸經然非大用重劑不濟至火息血靜後以地黃丸服之願世人守此以當續命丹吐黑血雖未傾盆痰咳必甚口渴思飲此腎經實火腎有虛無實蓋腎火又挾心包相火並起上衝耳腎火禁瀉心包火亦禁瀉乎然瀉心包火必致傷腎將何以瀉之吾瀉肝肝為心包母腎子母弱不能強子虛而母亦自弱用兩瀉湯白芍丹皮地骨皮玄參一兩炒梔子三錢服二劑黑變紅四劑咳除血止黑北方水色黑血兼屬心火乃火極似水如火投水中必為烏薪方瀉肝仍瀉心包與腎火得水而解血得寒而化所以神效感暑一時氣不及轉狂嘔血塊此暑邪犯胃必頭痛如破汗出如雨口大渴狂叫作虛治反劇如補血湯不可輕用宜清暑熱佐下降歸經藥則氣順血自安用解暑止血湯青蒿石膏一兩當歸麥冬玄參五錢炒黑荊芥三錢大黃一錢一劑暑消渴止二劑盡愈不可用三劑青蒿於解暑中退陰火則陰陽濟拂逆自除石膏退胃火麥冬退肺火玄參退腎火荊芥引火下行又得大黃不再停胃又恐血既上越大腸必燥加當歸助速行之勢故旋轉如環取效甚捷痰中吐血絲日少夜多咳嗽不已多不能眠此腎火沖咽喉不歸命門故沸為痰上升心火又欺肺弱復來相刑是水中兼有火氣所以痰中見血絲用化絲湯熟地麥冬一兩貝母蘇子荊芥一錢玄參茯苓五錢地骨皮沙參三錢二劑血絲除此肺腎心三經兼治加去痰退火倘不用補吾恐痰愈多血愈結但愈後不可仍服用益陰地黃丸熟地一斤山藥棗皮半斤麥冬地骨皮十兩北味三兩丹皮茯苓六兩澤瀉四兩蜜丸日服三錢久吐血百計莫止蓋血犯濁道也夫火不盛氣不逆則血不吐然氣逆由於火盛治氣逆必須降火然久則火不能盛氣更加逆似瀉火易轉氣難然火瀉氣亦隨轉但火久必虛虛火宜引引火多辛熱用之反助逆不若壯水以鎮陽火用壯水湯熟地二兩生地一兩炒黑荊芥二錢三七末三錢煎調服一二劑不發二地補精寓止血之妙荊芥引血歸經三七隨斷路徑入不再出火得水消氣得水降此理莫與淺見寡聞道大怒吐血色紫氣逆兩脅脹滿作痛此因怒而吐血肝藏血怒則肝葉開張血即不藏肝氣急怒則更急血自難留故湧出往往有傾盆者血湧肝無所養自兩脅痛輕則脹滿急宜平肝少加清涼龍雷必收一味止血反拂火性動其嘔逆之機用平肝止血散白芍二兩當歸一兩荊芥丹皮三錢炒梔子二錢甘草一錢一劑肝平三劑血除芍藥平肝又益肝同當歸用生血活應實有神功丹皮梔子不過少涼血以清火俟荊芥引經甘草緩急耳咳血血不聚出先咳嗽覺喉下氣不能止必咯出其血而後快人謂肺逆誰知腎氣逆乎腎氣者腎中虛火也虛火盛由於真水衰水衰則不能制火火逆上衝血宜大吐何以必咳而出蓋肺氣阻也夫肺乃腎母腎水肺順子腎火肺嬌子肺本生水不生火惡嬌子也驕子於是罵詬呼號上奪肺血肺又不肯遽豫故兩相牽而咯血用六味地黃湯熟地麥冬一兩山藥棗皮五錢北味一錢茯苓澤瀉丹皮三錢四劑咯止一月全愈六味滋水麥味益肺自足制火何至再咯此治水不須瀉火也血因咳嗽出多因勞傷耗腎水不能分給各臟又多房勞水益涸水涸金生以泄肺氣無如腎取給無已夫貧子盜氣母痛剝膚求救於胃胃受肝凌不敢生肺肝木生火心火必旺心旺必乘肺肺受外侮呼子相援腎不能制火火凌肺愈甚肺避子宮子窘不得不仍返本宮而咳嗽吐血治宜救肺然救肺腎涸肺仍顧腎故治肺須補腎腎足肝平心火息而肺安用救涸湯麥冬熟地二兩地骨皮丹皮一兩白芥子三錢二劑輕十劑自愈麥地同用肺腎兩治加地骨皮丹皮實有微義蓋嗽血必損陰陰虛則火旺此火乃陰火二味解骨髓中熱則腎無熬煎不索肺金肺中滋潤自濟腎子母相安腎漸濡養肝制心外侮不侵何有耗散白芥子消膜膈痰無他深意以陰氣虛耗必有痰取不耗真陰氣也鼻衄經年不止或愈或不愈鼻衄較吐血少輕然不治或不得法皆殺人吐血犯胃衄血犯肺胃濁道肺清道犯濁五臟反復犯清只肺一臟逆犯清雖輕氣逆則一逆則變生宜調肺氣但肺逆成於肺火肺無火肺火仍是腎火肺因心逼腎水來救久之水涸腎火來助二火斗血妄從鼻上越則調氣舍調腎無他法調腎在補水制火用止衄湯生地一兩麥冬三兩玄參二兩一劑止麥冬治肺乏生地玄參解腎火火退氣自順氣順血歸經倘畏重減輕火未易遏正不效耳出血涓涓不斷三日人死此病少實有其症耳腎竅耳流血自是腎虛然血不從胃從口出從耳出心包火引之耳心包與命門火相通胃為心包子胃恐腎火害心兼害胃故引火上走耳諸經所過捲土而行故血隨出雖耳竅甚細不比胃口無沖決之虞涓涓不絶其能久乎用填竅止氛湯麥冬一兩熟地二兩菖蒲一錢一劑即效用熟地補腎麥冬息心包火二火息耳竅不閉血暫止必仍越出故用菖蒲引二味直透耳中引火返心包火歸耳竅閉矣舌上出血不止舌必紅爛裂紋中有紅痕血從痕出雖不猝殺人久亦不救此心火炎腎水不濟也邪水犯心則死真水養心則生故心腎似相剋實相生今水不交心欲求腎養而不得乃求救於舌下之廉泉然腎水足廉泉亦足如江河水旺井泉自滿今水既不濟心又何能上升於唇口此廉泉欲自養方寸舌而不能又濟心乎故泉脈斷而井裂亦無濟於心並爛其舌舌爛清泉泥濘必流血大補心腎使交濟舌血自斷用護舌丹丹皮麥冬桔梗三錢甘草人參北味一錢玄參五錢熟地一兩黃連三分肉桂一分一劑血止四劑愈此方專交心腎使心通腎腎濟心舌無取給症自愈齒縫出血如線標此腎火沸騰也夫齒屬腎腎病直現於齒然齒若堅固血無隙可乘似治齒標血宜治齒然腎為本齒乃末夫腎龍雷之火宜奔咽喉宜從口出何以入齒蓋腎火走任督上趨唇齒乘隙而出火性急齒縫隙小故標如線用六味地黃湯加味治熟地一兩山藥棗皮四錢丹皮麥冬五錢苓瀉三錢北味骨碎補一錢一劑血止四劑不發六味補水水足火自降火降血不妄行加麥味從化源以補肺水尤易生骨碎補透骨補漏血欲不止得乎臍中出血不多如水流出夫臍通氣海關元命門烏可泄氣雖但血流日日如此氣必隨泄可不急治此大小腸火斗於腸中小腸火欲趨於大腸大腸火欲升於小腸兩不相受火乃無依上下莫泄直攻臍隙而出血亦隨之似宜急安二腸火然火動腎枯無水潤也故治二腸火仍須治腎用兩止湯熟地三兩棗皮麥冬一兩五味五錢白朮五錢一劑血止四劑除根熟地棗皮補水麥味益肺多用五味取酸收也白朮利腰臍腰臍利水火流通二腸各取給於腎而不爭水足火息血自止九竅出血氣息奄奄欲臥不欲見日頭暈身困人謂祟憑蓋血熱妄行散走九竅症若重較狂血走一經反輕人身無非血九竅出血由近而遠非盡從臟腑出法仍治臟腑不可只治經絡以臟腑統經絡也用當歸補血湯加味治當歸一兩黃耆二兩人參炒黑荊芥三錢白朮生地五錢二劑愈血熱妄行不清火反補氣得毋氣旺助火不知血妄出火已泄血之妄行由氣虛不能攝血血得火逢竅則鑽今補氣氣旺自攝血倘用止抑則一竅閉安必衆竅盡閉況又加行氣涼血兼清火有不奏功哉大便或前或後出血人謂糞前屬大腸火糞後屬小腸火其實皆大腸火腸本無血因大腸火燥干腸液腸薄開裂血從外滲入腸裂在上血來遲腸裂在下則血來速非小腸出血也小腸出血人立死蓋小腸無血出血則心傷安能活乎故大便出血統小腸以辨症則可以糞後屬小腸不可宜單治大腸然腎主二便腎水無濟於大腸故火旺致便血用三地湯生熟地當歸一兩地榆三錢木耳末五錢水煎調服一二劑全愈此精血雙補腸中自潤既無乾燥自無滲泄況地榆涼木耳塞有不速效哉尿血痛澀馬口如刀刺人謂小腸火不知小腸出血人立死安得痛楚猶生因不慎酒色欲泄不泄受驚而成精欲泄因驚縮入精已離宮不能仍反腎宮小腸因驚不能直泄其水出則水積火生熱極煎熬所留之精化血而實本腎精非小便血法宜解小腸火然不利水則水壅火仍不出精血何從外瀉用水火兩通湯車前子梔子三錢茯苓當歸五錢木通黃柏扁蓄一錢白芍生地一兩二劑痛血止三劑全愈此通利水火又平肝補血蓋血症最懼肝木克脾胃脾胃不能升氣下陷血又何從升散乎今平肝肝舒脾胃亦舒脾胃氣舒小腸水火兩通敗精速去毛孔出血或標或滲如線或頭身或兩脛皆肺腎虧火乘隙越出舍補腎無二法然補腎功緩當急補氣氣旺肺自旺皮毛自固用肺腎兩益湯熟地二兩人參麥冬一兩三七根末三錢一劑血止再用六味地黃湯加麥冬五味調理一月不發用熟地壯水麥冬益肺金水相資肺腎火息血自歸何至走入皮毛外泄況三七根原止血宜效之捷也唾血只唾一口人謂唾少似輕不知實重蓋唾出脾不出於胃也脾胃相表裡血犯胃中州已傷後天虧矣況更犯脾陰後天乎胃主受脾主消脾傷不能為胃化其津液雖糟粕已變但能化粗不能化精以轉輸於臟腑而皆困是脾唾甚於胃唾也然脾之所以唾仍責胃虛不特胃虛尤責水衰蓋胃為腎之關門腎衰胃不司開合脾血上吐胃無約束任其越出故脾唾雖脾火沸騰實腎胃二火相助法平脾火必須補脾土補脾土以平脾火必須補腎水以止胃火用滋脾飲人參三分茯苓二錢玄參芡實茅根山藥丹皮三錢熟地一兩沙參五錢甘草五分二劑愈方輕治脾重補腎探本也倘止泄脾火必傷胃土胃傷脾更傷然後補腎則不能生腎水何能制脾火無論唾血難止吾恐胃關不閉血且傾盆茲滋脾飲所以妙耳雙目流血甚直射出女閉經男口乾唇燥人謂肝血妄行誰知腎中火動腎相火君火寧相火不敢上越於目惟君火衰心動嗜欲相火即挾君以令九竅心系通於目肝竅開於目肝命門心包同為相火同氣相助沸騰不啻小人結黨上走心肝之系竅法似宜補心以制腎火然心既虛補不易旺必補腎生心則心火不動腎火亦靜用助心丹麥冬熟地一兩志肉二錢茯神玄參丹皮當歸三錢棗皮芡實五錢蓮子心一錢柴胡三分二劑不發此心肝腎藥也補腎生肝即補腎生心或疑腎火動不宜補腎不知火動乃水衰況心火必得水資乃旺心旺腎火自平實有至理非漫然耳舌上無故出血不止細觀之有小孔標血人謂血衄誰知心火上升克肺乎夫鼻血名衄未可以舌血為衄雖舌竅不閉出血亦如鼻謂之衄血似宜然鼻衄血犯氣道舌衄與犯氣道有間蓋舌衄只犯經絡之小者耳然血出於舌無異血出於口出口犯食道出舌非犯食道比出口犯胃不犯心出舌犯心不犯胃胃腑心臟烏可謂經絡細小病哉宜內補心液外填舌竅之孔心火自寧舌血易止用補液丹人參生地山藥三錢麥冬當歸玄參五錢丹參二錢北味十粒黃連貝母一錢外用炒槐花三七根末等搽之即愈二味止血何必用補液丹然內不治本外徒治末恐隨止隨出遍身骨痛背腰膝足脛皆痛飲食知味不能起床即起疼痛不耐必須捶敲按摩否則其痛串走在骨節空隙處作苦不可忍人謂痛風然痛風多感風濕感風濕多入骨髓風濕入經絡易去入骨髓難祛以骨髓屬腎腎有補無泄祛風濕則傷腎腎傷則邪欺正弱深居久住然腎無泄胃與大腸未嘗不可瀉泄胃大腸風濕風濕自去蓋胃乃腎關大腸腎戶也用並祛丹黃耆玄參一兩白朮茯苓五錢甘菊三錢炙草一錢羌防五分三劑全愈後用八味地黃丸調理論理不治腎治胃與大腸風濕風宜乾葛濕宜豬苓有風濕必化為火宜石膏知母然邪在骨髓必用氣分之劑提出在氣分後微寒輕散和解之則邪易化邪即出後補腎真水火足邪不再侵遍身疼痛腰以下不痛人謂痛風不知火鬱於上中二焦不能散蓋火生於郁則肝膽氣不宣必克脾胃土氣不升則火亦難發以致氣血耗損不能灌溉經絡作痛用逍遙散加味治柴胡白朮二錢白芍五錢當歸一兩甘草羌活陳皮一錢炒梔子茯苓三錢一劑痛如失逍遙散專解肝膽郁梔子解鬱火火盛膽汁必干肝血必燥歸芍平肝膽更滋肝膽血足氣自流加羌活以疏經絡自然火散而痛除遍身生塊而痛人謂痛風不知因濕不入臟腑反走經絡皮膚其痛較風濕入骨髓反輕然治不得法其痛正同此塊乃濕痰結成消痰於腸胃易消痰於經絡皮膚難然吾治腸胃經絡皮膚之痛塊自消用消塊止痛湯人參半夏白朮三錢黃耆茯苓苡仁五錢羌防一錢桂枝五分四劑痛止十劑塊消二十劑消盡塊因正氣虛氣虛則痰結人參耆術補氣氣旺痰勢衰茯苓苡仁利濕半夏消痰羌防去風桂枝逐邪欲留其塊不可得也倘徒治經絡皮膚反損脾胃脾胃傷氣不行於經絡皮膚塊且益大遍身痛疼難忍然時止人謂風濕相摶誰知氣血虧損風束於肌骨雨濕入肢節皆作痛但非時痛時止惟氣血虛不能流行肢節肌骨每視盛衰以分重輕故時或不痛倘認作風寒水濕祛除掃蕩氣血愈虛痛疼更甚必大補氣血佐溫熱正旺邪不侵痛自止用忘痛湯當歸一兩黃耆二兩肉桂二錢玄胡秦艽一錢花粉三錢一劑必大汗聽自干二劑不再發此補血湯之變也益肉桂祛寒玄胡活血化氣花粉消痰濕秦艽散風即有外邪無不兼治
