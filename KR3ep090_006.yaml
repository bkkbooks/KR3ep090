body:
  text: 卷六火熱陽明火起發狂腹滿不得臥面赤而熱妄見妄言人謂內熱極然陽明屬土不屬火何火出於土謂是外邪助乎既非暑氣侵又非寒氣變一旦火起發狂人多不識不知土中之火乃心中之火心火起陽明火翕然而發陽明胃府多氣多血胃火一發猛烈莫制往往捲土而來火焰升騰其光燭天旁燒四境不盡不已非惟焚民室且上燒宮殿心君不寧逼之下堂神既外越自妄見安止妄言故譫語生此內因非外邪法與傷寒狂不同即與傷暑狂亦異然陽明火由來雖有內外之殊治陽明火法無彼此之異必須急滅其火以救燎原之勢不可因循觀望使高堂廣廈矮屋低房盡成烏燼用竹葉石膏湯人參一兩石膏麥冬一兩竹葉二百片知母三錢甘草一錢糯米一撮二劑諸證愈不必三劑此退胃火神藥也凡胃熱無不宜然救一時不可泄長久火論理內熱既起於心宜泄心反先泄胃者恐胃火太盛變生不測蓋心火不止不過增胃火炎胃火不止必犯心所以治心火者必先泄胃胃既泄減石膏知母加黃連一錢玄參一兩二劑不特胃火全消心火亦息熱病完穀不化奔迫直泄者人謂大腸火誰知胃火太盛胃火上騰不下降胡直趨大腸作泄蓋胃為腎關腎虛關門不守胃挾水穀之氣下行腎虛為寒胃何反能熱不知腎虛水虛也水虛則命門火無制直衝於胃胃火盛龍雷之火共相附會不上騰而下泄胃火盛又得龍雷火則勢更猛以龍雷之性傳於大腸不可傳導故奔迫直泄似宜先治腎然胃火不泄則腎火斷不回遽泄胃火則胃土因火而崩胃水隨土而泄又安能底止又必先健土而後利水則水清土健土健火安龍雷火易收用緩流湯茯苓苡仁人參一兩芡實山藥三兩車前子五錢甘草北味一錢方無一味非健土又無一味非利水故利水之中不走其氣下氣不走上火自升況健土又無非補腎腎得補而真陰生龍雷之火自仍歸腎藏腎火安胃火失黨胃土又健水穀更易分消自火衰泄止口乾舌燥面目紅赤易喜易嘆人謂心火熱極誰知心包膻中火熾乎心包膻中相火也相火虛火膻中臣使之官喜樂出焉是膻中乃心宰輔代心君而行賞罰喜怒者賞罰所出也心君神明則賞罰正心君亂則賞罰移如權臣假君以行己喜怒久忘其為臣以一己之喜怒為私門之賞罰及後置公議任私情喜嘆失正宜泄心包火然泄心包必至損志志虛心包氣更虛必致心包火更盛不如專補心氣心氣足心包火自安何致上炎口舌面目成喜嘆不節乎用歸脾湯人參茯苓麥冬山藥當歸三錢炒棗仁五錢遠志一錢廣木香末三分黃耆二錢甘草二分三劑諸症平此補心氣仍是補心包火何以火反息不知心火宜泄以為補心包火宜補以為泄心包火旺由於心君氣衰補心心包不敢奪權又何敢喜嘆自若僭我君主喜嘆既正則賞罰條教頒賜無不得宜寧有酷烈炎炎之變鼻出黑血不止名曰衄衊乃心熱極火刑肺金也夫肺為心火克宜紅血今血黑得毋疑腎火刑母乎腎肺子安有子殺其母者然黑實腎色何也因心火太熱心移熱於肺肺受火刑必求救於腎腎噁心火克母乃出其全力以制心心已移熱於肺腎即隨火而奔入肺肺併力相戰誓滅此而後朝食混殺肺宮肺無可藏腎即逐血出鼻紅變為黑真不共戴天焦頭爛額白日俱昏宜單治心火不必泄腎火蓋火息金安腎水不與心相鬥用救衊丹黃連二錢茯神二錢丹皮生棗仁生地三錢麥冬五錢玄參一兩柏子仁一錢四劑愈此制心火不損心氣腎見君火衰肺金旺則仇之已極矣自返兵旋旅何至窮寇再追或謂心為腎子所篾則心氣必傷自宜急泄腎氣毋使追奔何泄心以助其虛不知腎水原非有餘不過因肺母之難奮不顧身若因心火起釁轉伐腎子非理也況方雖泄心火正未損心氣名泄心即補心也不過少解其炎氛以泄腎子之憤耳憤雪火即解且腎有補無泄倘泄腎轉足激怒必變生不測非善矣何若泄心火為得熱極發斑身中如紅雲一片人謂內熱極外發皮膚孰知此熱鬱於內不能外發乎此病寒熱藥兩不宜火熱宜涼藥何不可投蓋內熱未有不從外泄者火得寒解然火得寒又閉微火可寒解盛火寒折往往遏外出之機閉塞不泄成發狂不能治若用熱藥則火以濟火勢加酷烈必變亡陽是寒熱兩治均誤事治須和解然和解又不可拘火盛者水必衰徒解火不益水火未必遽散宜於補水中行散火法則火無乾燥而發越方用風水散斑湯玄參當歸二兩荊芥升麻三錢生地一兩三劑斑全消不必四劑此方玄參補陰以解浮游火歸地補心胃血尤妙在多用荊芥升麻風藥解鬱熱火得水制亦火得風揚全不泄火已獲泄火之效實有深義熱極發斑目睛突出兩手冰冷人謂心火熱極不知又有肝火助也熱病何反見寒冷火極似水耳火極何似水熱極於心四肢之血齊來救心轉無血以養手足故為冰冷外寒極也外寒極實內熱極致目睛突出肝開竅於目目大眥心竅也心火既盛又得木中火相助則火更添焰火性炎上所以直奔其竅而出目竅細小不足暢泄其火怒氣觸睛故突出宜泄心火更平肝木則木氣舒心火自散方用風水散斑湯加減自愈玄參一錢當歸一兩黃連荊芥升麻三錢白芍一兩生地五錢此方加黃連泄心火白芍平肝火二經火散又得荊芥升麻引群藥入腠理則上下四旁餘熱盡消且不至遏抑尤妙補多於攻散火不耗氣自成既濟之美庶熱者不熱冷者不冷熱極日夜兩眼不閉人謂心腎不交心腎何不交致此皆謂火盛誰知是水火衰乎心火最畏腎水克又最愛腎水生蓋火非水不養腎水最愛心火生最噁心火燒蓋水非火不幹是心腎相愛則相交心腎相惡則相背欲使相背者相交必使相惡者相愛使相交者相背自相愛者相惡求其閉目神遊華胥式好無尤得乎宜補心液下降腎中補腎精上滋心內並調肝氣相引於心腎間俾相惡者仍相愛則相背者必相交方用引交湯菖蒲炒棗仁棗皮沙參玄參故紙五錢熟地麥冬一兩茯苓炒梔子三錢白芍二兩二劑酣睡此方心腎雙補妙在專平肝氣兼清木火蓋肝火泄心火自平肝火泄腎水亦旺勢必心氣通肝腎氣亦通肝方中又有菖蒲引心破故紙引腎介紹既同心復有幣帛之投有不歡好如初重結寤寐哉人肝火內郁結而不伸悶煩躁急吐痰黃塊人謂火鬱宜達然達之愈熾何哉蓋未嘗肝腎同治也肝屬木木中有火火鬱而不宣雖是外邪蒙之亦因內無水潤之也木無水潤郁更甚倘徒用風藥以解肝火不用潤劑蔭肝則熬干肝血火益盛徒用潤劑益心不用風劑舒肝則拂抑肝氣郁更深郁深則煩悶於心火盛則臊急於腹欲痰涎化得乎治法舒肝解火復補腎濟水自鬱結伸諸症愈方用肝腎兩舒湯熟地玄參白芍一兩茯苓三錢丹皮三錢柴胡甘草炒梔子一錢當歸五錢四劑全愈方用柴芍梔子舒肝風以吹之也熟地玄參丹皮補腎雨以潤之也茯苓甘草調和二者使風雨和順如夏令炎熱草木枯槁忽金風習習大雨滂沱自然快暢枯槁倏變青蔥井中泥濘盡為清泉爽氣迎人猶有煩悶躁急吐痰成塊哉頭面紅腫臍以下現青色口渴甚似欲發狂人謂下寒上熱誰知下熱極假現風象乎若作下寒上熱治立發狂死必至皮肉盡腐此症誤聽方士修合金石助命門火強陽善鬥金金石藥必火煅煎烹性燥烈又鼓勇浪戰自動其火必大泄精火極原已耗精復倍泄精以竭水而再再而三也勢必陰虛火動人每日日吞咽此藥臟腑無非火氣雖多用飲食火極易消不及生精化水火無水制自騰頭面初微紅久純紅作腫臍以下現青者蓋青風木之色臍下部位屬腎腎火旺腎水乾則肝無所養於是肝氣不安下求於腎腎又作強火熾肝氣乾燥之極不敢自還遂走腎部位現青色人肝氣不上行而下行氣逆何如氣逆火愈上升欲不渴得乎然水止可救胃中乾燥不能救五臟焦枯勢且飲水而口愈渴安得不發狂須大補水不可大泄火蓋泄火則火息水竭必死用解毒救焚湯熟地四兩玄參二兩麥冬白芍銀花三兩甘菊五錢牛膝一兩黃柏一錢數劑青色除再數劑紅腫漸愈此方減半再服一月始不發疽蓋熱極發紅是極惡兆況青色則臟腑腸胃內爛瘡瘍外生安有性命前聖不論及者以上古恬淡沖和未嘗服金石毒藥後世覓春藥如飴方士逢迎貴介用意造方全不識水火既濟夭人天年特傳方救之火有餘水不足故地冬大益腎水又恐不足息燎原之火又益玄參甘菊平胃炎雖泄火仍滋陰則火息正又無虧火既上行非引而下之則水不濟火恐上升又加牛膝潤下使火下降不上升腎既久竭所補之水僅足供腎安能分餘膏養肝復佐白芍滋肝肝平不必取給腎水自氣還本宮不致走下外泄然火焚既久火毒將成雖現在火為水所克從前火毒安能遽消故補銀花消毒妙在銀花更益陰消毒不消陰也又恐陽火非至陰之味不能消少加黃柏折之雖黃柏大寒入大補陰水中反解火毒引補水藥入至陰中泄虛陽之火此方除黃柏外必宜多用始能補水不足泄火有餘否則火熾不可救或謂補藥太多恐胃難受盍減分兩使胃安徐奏功不知非滂沱大雨安能止遍野燎原且火騰胃中不啻望甘霖止渴何慮難受目紅腫口舌盡爛咽喉微痛兩脅脹滿人謂肝火旺誰知腎火旺乎目屬肝兩脅亦肝位何謂腎火以咽喉口舌之痛爛知也然口舌屬心咽喉屬肺與腎無干不知腎火龍雷火也龍雷由地升天腎火由下升上入兩脅兩脅脹入咽喉咽喉痛口舌眼目隨至俱病今四處病腎火大熾耳蓋各經火只流連一處斷不如此齊病烏可獨治一經然治腎火各經火盡散用六味地黃湯加味治熟地麥冬白芍一兩苓瀉三錢山藥丹皮五錢棗皮四錢四劑俱病痊六味補水水足火自息白芍舒肝平木麥冬養肺益金金生水水不必去生肝水尤易足火尤易平蓋腎火雖龍雷其實虛火虛火得水即伏何必泄火以激怒此補水制火之妙也或曰六味補水制火然師每用原方不遵分兩何皆各愈嗟乎用藥必須看病藥投其病雖佐使多用為君病忌其藥雖君主當減為佐但不可輕自去留違立方初意寒熱時止時發日四五次熱來躁莫當寒來顫不已人謂寒邪在陰陽間誰知火熱在心腎內心腎本相剋而相交者倘相剋不交必寒熱無定蓋心喜寒不喜熱腎喜熱不喜寒今心熱為寒宜心喜腎寒為熱宜腎喜然熱為腎喜心必惡寒為心喜腎必惡腎噁心寒恐寒犯腎不敢交心心惡腎熱恐熱犯心不敢交腎然腎噁心寒又噁心不交腎自欲交心心不受則以熱凌心心惡腎熱又惡腎不交心自欲交腎腎又不受則以寒犯腎於是因寒熱盛衰分止發時候心腎無時不交日間寒熱止發無常因交而發因不交即止何怪熱來躁莫當寒來顫無已實有妙義也夫熱來時腎氣升騰也心雖惡熱心中正寒宜不躁茲何躁蓋心寒則心氣大虛惟恐腎氣攻入懼而躁非熱而躁也寒來時心氣下降也雖腎惡寒腎中正熱宜不顫茲何顫蓋熱氣大乏惟恐心氣耗奪吝而顫非寒而顫也然欲不躁須使心不寒欲不顫須使腎不熱用解圍湯人參棗皮茯神棗仁五錢熟地當歸白芍一兩柴胡菖蒲一錢遠志半夏二錢玄參三錢四劑俱症失六劑不發此心肝腎均治也心腎交必肝為介紹分寒熱止躁顫非肝調劑斷不奏功故加入柴芍大舒肝鬱從中委曲寧尚乖離用此藥之理所宜知也熱極心頭一塊出汗如雨他處全無人謂心熱誰知小腸熱極乎小腸在脾胃下何火能犯心出汗蓋小腸與心為表裡小腸熱心亦熱矣然汗出於心頭皮肉之外仍心熱非小腸熱然心無液取給於腎以養心倘汗是心出竟如雨必亡陽立化烏燼胡心神守舍不狂明是小腸熱水不下行而上出也然水無有不下何不走陰器而反走心前皮膚正表裡關切心因小腸而焚小腸即升水救心心無竅入遂走皮膚由毛竅盡出法仍治小腸利水分消火氣水自歸源汗不外出用返汗化水湯茯苓一兩豬苓劉寄奴三錢一劑汗止二苓利水加劉寄奴止汗又利水性又速同二苓從心直趨膀胱由陰器下泄水去火亦隨去矣正不必再劑以損臟腑口舌紅腫不能言胃甚飢渴人謂胃火上升夫胃火動非發汗亡陽必躁妄發狂寧止口舌紅腫不能言乎然此心包火也舌乃心苗亦心包竅心包代心君出治必藉口舌以宣政令惟心包無火則口舌間無非清氣上升喉舌安閒言語響亮逮心包火動易於作祟如權臣多欲立威示權必先從宣傳之人始今相火動喉舌紅腫勢也既紅且腫何能言語又如相臣肆戮辱則喉舌之臣鉗口結舌緘默求容然過於肅穆不投貨財不足饜所求貪叨念起飢渴所以甚也法清心包火不泄胃恐胃土衰心包轉來生胃其火愈旺用清火安胃湯麥冬一兩石斛丹參生地三錢炒棗仁五錢竹葉百片三劑症痊飢渴愈此全泄心包火又不泄心氣心包火息胃氣自安又如大臣遇明主格外包涵悔艾洗心共圖安奠亂世奸雄轉為治世能臣滿身皮竅如刺鑽又骨節內疼痛外拍冷水少止人謂火出皮膚誰知火鬱臟腑乎臟腑火必從皮毛出既外出又何刺痛蓋火欲出不得出也火性炎上從皮膚旁出本非宜人既內虛火盛陽氣又旺火欲外泄皮膚堅固火本郁又拂意遂鼓勇外攻皮膚思奪門以出毛竅不遽開火不得已仍返臟腑作痛冷水拍少止火喜其水之潤膚而反忘其水之剋火也非因水外擊即足散火能止痛也法不必統臟腑火盡泄但泄胃火餘火自息用攻火湯大黃炒梔子白芍三錢石膏五錢當歸一兩厚朴柴胡甘草一錢二劑愈不必三劑此泄脾胃火不損脾胃氣又兼舒肝火尤易消此扼要爭奇實有祕奧心中如火燒自覺焰一起輒欲小便急遺溺大便隨出人謂心火下行誰知心與心包二火作祟乎心包代君司化者也君火盛相火寧君火衰相火動似相火猖狂仍系君火然亦有君火盛相火亦動者蓋君相二火不可齊動齊動不兩立相見君火旺不敢上奪君權讓君下行君火既動無可發泄心與小腸為表裡自移熱小腸相火隨輔君火下行既入小腸更引入大腸矣故二便同遺也法安二火勢焰自消用四物湯加味治之熟地當歸玄參一兩川芎黃連車前子二錢白芍五錢黃柏一錢四劑全愈四物補血火動由於血燥補血臟腑無干涸涼血火焰不浮游況黃連清君火黃柏清相火車前利水引二火直走膀胱盡泄何亂經之慮大怒後百節俱疼痛胸腹脹目緊閉四肢逆冷指甲青黑人謂陰症傷寒誰知是火熱乎陰症似陽陽症似陰最宜辨此陽症似陰指甲青陰症之外象也逆冷非寒極乎不知內熱極反現外寒乃似寒非寒也大怒必傷肝肝氣急肝葉極張怒則更急葉更張血沸火起不可止抑肝主筋火起筋乃攣束作痛火外焚痰內結痰火相搏濕氣莫散乃走其濕於手足指甲筋之餘也故青黑手足逆冷胸腹正大熱也宜平肝氣散內熱寒象自散用平肝舒筋湯柴胡陳皮甘草秦艽烏藥一錢芍一兩牛膝生地丹皮炒梔子三錢當歸五錢防風三分神麯五分四劑全愈此入肝解怒怒解火自平火平筋舒理也此症誤辨陰陽必致殺人宜先以水探之飲水不吐者陽症飲水即吐者陰症倘不吐即投此方效暑症行役負販馳驅於烈日感暑猝倒人謂中暑誰知中暍乎暍與暑何分蓋暑熱由外入暍熱由內出行役負販馳驅勞苦內熱欲出外暑遏抑故猝倒是暑在外熱閉也倘暑不宣揚內熱則氣閉熱反不散宜散內熱佐消暑用救暍丹青蒿五錢茯苓白朮三錢香薷知母乾葛一錢甘草五分二劑熱散不必三劑方用青蒿平胃火又解暑熱為君香薷解暑乾葛解熱為佐又慮內熱極但散而不寒恐火炎上故加知母涼之更妙在白朮茯苓利腰臍通膀胱使火熱下趨小腸盡出火下行自不逆沖外暑內熱各化烏有膏粱子弟多食瓜果寒胃忽感暑猝倒人謂中熱誰知中暑乎蓋膏梁人天稟弱又多欲未有不內寒者復加瓜果增寒涼宜暑難中然內寒極外熱反易入暑氣瀰漫兩間無陰可依遇陰虛人即乘而入法不可先祛暑必須補氣然既因陰虛以致陽邪似宜補陰何反補陽氣不知補陰則陰雖旺轉為陽邪所喜陽正恐陰弱不能相配若助陰毋論陰難祛陽陽邪且久居不去必深根蒂固而生變惟補其陽則陽氣旺正陽與邪陽攻擊又益散暑藥則邪陽自不戰而走用散暑回陽湯人參茯神白朮五錢香薷扁豆二錢陳皮五分甘草一錢方中參朮茯豆健脾補氣用以回陽香薷散暑何多少懸殊不知陰虛脾虛也脾雖屬陰非補陽藥不效況陽邪盛非多用何以相敵倘少用恐致敗衄即取勝暑退元氣未能遽復與其暑退補陽何若於邪旺時多用正無虧邪又速去中暑氣不升降霍亂吐瀉角弓反張寒熱交作心胸煩悶人謂暑氣內熱誰知陰陽拂亂乎陰陽和則邪不能幹苟陰不交陽陽不交陰邪即乘之而入邪扶強不扶弱陰強助陰陽強助陽夏人多陰虛陽旺邪即乘陰虛而入欺陰弱也然陽旺又助陽不助陰陰見邪助陽又妒陽旺而相戰陽又嫌與邪黨欲嫁邪於陰陰不受於是陰陽亂邪往來作崇此陰陽所以不通上不升下不降霍亂吐泄角弓反張陰不交陽作寒陽不交陰作熱心胸競成戰場安得不煩悶宜和陰陽佐祛暑緩調不可遽折用和合陰陽湯人參香薷藿香蘇葉花粉一錢白朮二錢茯苓五錢厚朴五分陳皮枳殼三分砂仁一粒水煎探冷徐服二劑愈不必三劑此分陰陽清濁通上下浮沉調和拂亂實有奇功助正不增火祛邪不傷氣殆此方歟中暑熱腹疼痛欲吐不能欲泄不得人謂乾霍亂霍亂向分乾溼以不吐瀉耳邪在胃則吐則邪越上在腹得泄則邪趨下越上邪不入中趨下邪不入內今不吐不泄堅居中焦如皇城反叛四境雖安腹心之禍立時變亂喋血于禁門橫尸於內殿非奮不顧身之將冒矢受鋒烏能安反側於頃刻定禍亂於須臾用人參瓜蒂湯人參一兩瓜蒂七個煎飲即吐愈此脈必沉伏不吐則死古亦知用瓜蒂但不敢加參胃氣虛故中暑今大吐胃必更傷故用人參吐中安胃且胃素虛暑邪壅之雖用瓜蒂氣祛不能上送欲吐不能即吐不多邪終難出用人參一兩則陽氣大旺力能祛邪得瓜蒂安得不大吐使邪散正氣無傷如內亂定君臣復歸仍是攸寧中暑熱極登高而呼棄衣而走見水而投人謂暑毒侵誰知胃火助乎暑熱犯心不犯胃蓋暑與心俱屬火同氣相得也胃心子胃見暑邪犯心即登土中之火以相衛胃多氣多血火最酷烈暑邪畏胃火遁心中心喜寒不喜熱又畏暑邪直入不敢自安胃又怒暑邪入心縱火焚燒心外二火相逼心君下堂神無所依登高而呼火上騰棄衣而走憎衣添熱見水而投喜剋火也此時無津液養必多汗亡陽陰陽兩竭火不大泄燎原之勢何以撲滅用三聖湯人參石膏玄參三兩二劑另用緩圖湯玄參二兩人參青蒿一兩麥冬三兩二劑全愈前湯少有霸氣然火熱極必爍干腎水故重用然人參與石膏同重故但泄胃火不傷胃氣玄參又滋潤生水水生火尤易滅後方不用石膏以胃火大泄不過余煙時起時滅故改麥冬青蒿益陰又息火或問因暑發狂宜消暑前方泄火不顧暑何以奏功不知暑亦火泄火即泄暑若加入藿香香薷等則石膏下降二香外散掣肘反不建功中暑熱症必多汗今大汗如雨一出不止人謂發汗亡陽死症誰知亡陰死症乎暑熱傷心心傷汗自外泄然心中無汗何以有汗此汗生於腎蓋心液腎所生也豈心中之汗非腎所出乎雖汗多亡陽乃陽旺非陰虛但陰不能制陽陽始旺亦陰不能攝陽陽始亡陰陽互為其根陰不能攝陽陽能戀陰尚可回陰中陽一出不返陽根於陰陽出不留陰亦俱出罄腎中之精化汗大泄試思心液幾何能發汗如雨乎明是腎汗非心汗汗是腎非心亡亦是陰非陽矣世謂發汗亡陽未知陰陽之道也用救亡生陰丹人參二兩棗皮二兩熟地半斤北味茯神白芍一兩熟地棗味俱填精補水茯神安心白芍收魂人參回陽此人所知陰已外亡非填精何以灌注涸竭之陰陽已外亡非補關元何以招散失之陽妙在棗皮北味補陰仍收斂陰得補而水生腎中有本汗得補而液轉心內無傷又茯神安之白芍收之則陽回陰返自有神捷如家遭回祿搬移惟恐不速及火滅屋存親友爭助兼有金帛米粟自速奔回重尋家室整舊如新以安眷屬倘少用煎藥無論水不驟生火不遽息遙望室廬盡化又無米粟金帛神亦何戀而復歸乎此論實人所未知中暑熱極妄見妄言見鬼然人不煩躁口不甚渴人謂熱極發狂誰知寒極相戰寒引神出似狂非狂乎中暑熱症何變寒寒更變似狂蓋陰氣素虛陽又不旺暑熱乘陰陽兩衰由肺入心心氣不足神即越出逃腎腎中陰寒之氣上升則暑邪自出心外流連肺內暑邪既出心宜重歸本宮然心尚恐暑侵仍依肝子以安神肝藏魂神入於肝則肝魂不寧出於軀殼妄見妄言見鬼魂外遊神居魂室反享寧靜況無肝火腎中陰寒相逼心君藉以杜暑恃此無恐有何煩燥乎惟肺獨受暑邪火刑金作渴然腎見肺被刑腎中陰寒直衝救肺故口雖渴不甚宜散肺中暑邪補脾胃土旺肺亦旺矣肺旺又得散邪藥暑自難留暑散魂歸神返用護金湯麥冬一兩人參茯苓三錢百合五錢紫苑香薷甘草一錢二劑愈妙在補肺脾胃氣不救心以益寒不助腎以泄火不補肝逐神魂自歸肝神自返心者以邪有制不必逐之太過正不大虛不必補之太多不可因邪居上而下治正輕於下而重治中暑熱吐血傾盆色紫黑氣喘作脹不能臥口渴飲水又不快人謂暑極動血誰知腎熱極嘔血乎明是中暑吐血何謂屬腎熱蓋暑火動腎火也腎火龍雷火龍雷原伏地夏月地甚寒不能下藏多上泄怒激而成霹靂火光劃天大雨如注腎火下伏於腎每與天之龍雷相應暑氣亦天龍雷火暑熱極龍雷乃從地出非同氣相引之驗乎天氣大熱龍雷之火遍滿六合豈人身五臟反不深入乎然人龍雷不動則暑氣不能相引苟腎水虧腎火欲動一遇天之龍火同氣相感安得不勃然振興龍雷一發已不可止況兩火相激其勢更烈乃直衝而上挾胃中血大吐血紫黑者正顯龍雷之氣也況龍雷霹處必變紫黑臟腑何不然火既升所過胃氣必大傷氣傷則逆逆則喘胃血出胃火又傷何能遽生新血以養胃故胸膈脹胃為腎關關門不閉夜無開合之權安得臥吐血則液干液干則口渴內水不足必索外水以救飲水不快者龍雷火陰火非陽火宜大補腎水不可大泄火以傷腎氣用沛霖膏玄參四兩人參一兩生地麥冬二兩牛膝五錢荊芥炒黑三錢四劑全愈仍服六味地黃丸此大補腎水水足火自歸腎火歸血自止於胃關何用知柏泄火香薷藿香散暑況泄火必損胃散暑必耗肺必血不止火不滅而死若用前方既沛腎水又生胃氣有益無損中暑熱足冰冷上身火熱煩躁不安飲水則吐人謂暑氣阻隔陰陽誰知暑散腎火不能歸腎乎龍雷之火因暑相感乃奔騰世徒泄暑熱不引火歸源暑散火不得歸留上焦而作熱火盡在上下焦無火安得不兩足如冰火在上寒在下兩相攻中焦排難解紛兩不相合自煩躁不安上熱熏肺口必渴飲水止可救上焦熱中焦已非所宜下焦純寒正惡冷水欲不吐得乎不可治暑泄火必須補火蓋龍雷火實宜泄虛宜補然補火仍須補腎水真火非真水不歸得真水火下藏腎不至再升用八味地黃湯熟地一兩山藥棗皮五錢丹皮苓瀉三錢附桂一錢二劑愈六味補水附桂引火於真水引真火則火易歸於真火生真水水尤潤澤水火既濟何至陰陽相背夏日自汗足逆冷至膝腹脹滿不省人事人謂陽微之厥誰知傷暑濕不解乎夫濕從下受濕感人必從下而上故所發病亦先見於下濕病得汗邪宜解何自汗濕仍不解得毋非濕乎此非自汗不能解濕也濕又感暑自汗止可解暑不能解濕以暑熱浮上身濕中下身汗解陽分不解陰分耳宜利水以解濕逐熱以解暑上下氣通濕熱盡解用解利湯石膏二錢知母半夏豬苓一錢澤泄一錢甘草五分白朮茯苓三錢肉桂一分十劑愈此五苓白虎合方也濕因於暑不祛暑濕不易消用白虎於五苓中解暑利濕也冬令偶開笥箱取綿衣箱內熱氣衝鼻須臾煩渴嘔吐灑灑惡寒翕翕發熱惡食喜水大便欲出不出人謂中惡誰知傷暑乎夫冬月傷暑言本不經不知氣虛人遇邪即感不必酷熱烈日奔走暑始傷或高堂靜室避暑反得暑是暑傷人每不在熱而在寒暑天曬衣裳被褥夾熱收藏笥中暑氣未發一旦開泄體虛感觸正易中傷及中傷暑氣必發況冬時外寒內熱以熱投熱病發必速故聞氣即病不可作傷寒治當舍時治暑症自愈用香薷飲加減人參白朮三錢茯苓香薷扁豆二錢黃連陳皮厚朴五分甘草三分不必二劑若執冬月無傷暑症置香薷不用幾固哉甚矣醫宜通變貴審問燥症陰已耗思色以降精精不出內敗小便道澀如淋人謂小腸燥誰知心液燥乎久戰相火旺也然由心火旺君火靜有為行似無為君火衰不能有為轉若有為蓋心君衰相火上奪其權心欲固相欲動心欲閉相欲開況心原思色無怪精自降也然心衰因腎水虛心液腎精也精足上交心心始不動即動相代君行令不敢僭君以奪權故久戰不泄精虛心無所養本不可戰相火鼓動定難持久今陰耗非精虛比其心君寡弱惟相是任心甫思色相火操柄久之心弱相亦不強不必交接精已離既離又不能行河車逆流法安能復回故宮哉勢必閉塞溺口水澀如淋而作痛法須補心仍補腎然補腎不利水則水路不通精濁不泄用化精丹熟地二兩人參牛膝生棗仁五錢棗皮麥冬白朮沙參一兩前子三錢二劑愈人參生心液熟地棗皮沙參填腎精麥冬益肺使金生水腎自滋心又得棗仁則心有權自下通腎腎氣足氣行膀胱又白朮利腰臍則尤易通達加牛膝車前下走利水則水竅開精竅閉何患小腸之燥澀心液非補腎不化精竅非補腎不閉倘利水逐濁何能效乎陽物不舉強入房耗精則二便必牽痛數至圊不得便愈便愈痛愈痛愈便人謂腎火燥誰知腎水燥乎腎中無水火不旺無火水不生老年水火兩衰故宜閉關不戰中年乃縱欲竭精火隨水流此病不免倘慎疾閉關亦可延年無如見色奮勇或半途倒戈入門流涕腎不多精又暢泄則精已涸竭無陰以通大小腸二腸乾燥自兩相取給彼此牽痛上游無泉源下流必竭澤下便上愈燥痛下痛上愈燥便急宜大補腎水兼補腎火蓋水得火易生用潤涸湯熟地二兩白朮巴戟一兩方用熟地滋真陰巴戟助真陽妙在補陽仍補陰則陽生陰長不至強陽二味補腎水火不為之通達故腎氣不入二腸故加白朮利腰臍則前後通達何致乾燥數至圊而不得便哉日間口燥舌上無津至夜又潤澤人謂陽虛之燥誰知陰畏陽火之燥不交陽乎人無病陰平陽祕惟陽旺則陰衰陽衰則陰旺皆成病口燥陰陽兩虛然有辨夜燥陰氣虛日燥陽火旺腎水陰水也舌上廉泉正腎水所注腎水注廉泉則舌上不不燥胡陽火遽至爍竭哉陽火爍腎水宜立亡何僅口燥且腎水乾自日夜焦涸何但日燥此陽火甚旺陰水尚未大衰只可自顧保陰不能分潤濟陽堅守其陰於下焦不肯上交陽位故日燥夜不燥法不必泄陽火之旺惟補真陰水水足濟陽用六味湯加麥味熟地麥冬一兩棗皮山藥五錢丹皮苓瀉三錢北味一錢數劑愈六味補水麥味固肺肺腎相資水尤易生下水滿上水自盂陰何吝而不交陽陽得陽而化亦得陰而平陰既既濟陽又不旺口安得再燥交感樂極情濃精泄陽物不倒精盡血隨人謂火動極誰知水燥極乎腎中水火不可須臾離蓋以陰陽之氣彼此相吸不能脫陽欲離陰陰下吸陰欲離陽陽上吸惟醉飽入房亂其常度陰陽不能平於是陽離陰而陽脫陽不來救也陰離陽而陰脫陰不來援也至是則水火兩絶魂魄且不能自主有精脫而死者今但精盡血隨乃陰脫陽未脫也使陽脫陽物何能不倒急大補腎水俾水生留陽然陰脫須陽藥引陰今陽強不倒倘補陽必更燥涸水且不生又何能引陰不知無陰則陽不得引無陽陰亦不能引宜用九分陰藥一分陽藥大劑煮飲水火無偏勝阻陽相抱合用引陰奪命丹熟地八兩人參一兩北味三錢沙參二兩肉桂一錢連服四劑始有性命再將前藥減十分之七服一月如故用熟地沙參大補腎陰人參固未脫之陽北味收耗散之氣用肉桂於純陰引入於孤陽肉令已離者重合已失者重歸倘不多補陰重用人參桂則陽旺陰涸止可救絶於一時不能救燥於五臟夜不能寐口中無津舌乾燥或開裂紋或生瘡點人謂火起於心誰知燥在心乎心屬火必須腎水滋為既濟水既不滋心舌心苗何得不燥至夜心氣入腎腎中無水不敢入故不寐宜大補心津則心不燥口舌自潤然徒補心心液未必大潤蓋心津腎內精也腎水上交心則成既濟尤宜補腎生心用心腎兩資湯人參茯神炒棗仁沙參棗皮芡實山藥三錢柏子仁北味一錢麥冬五錢熟地一兩丹參菟絲子二錢十劑夜臥安口中生津諸症盡愈此心腎同治補火水足濟補水火相生故不見焦焚反蕕優渥咳嗽吐痰皮膚不澤少動則喘人謂邪在肺誰知燥在肺乎內經曰夏傷於熱秋必病燥前症皆燥症人咸謂燥症必補腎水腎水乾燥乃成不知此燥因夏傷於熱耗損肺氣不必補腎但潤脾肺燥可解然脾肺母腎肺子脾健本生肺腎足尤不耗肺補脾腎肺不更潤乎用子母兩濡湯麥冬熟地五錢天冬玄參三錢紫苑牛膝花粉一錢甘草三分蘇葉五分丹皮二錢十劑愈此肺脾腎同治方也然治脾腎無非治肺脾腎濡肺安獨燥兩脅脹滿皮膚如蟲咬乾嘔不吐酸人謂肝氣逆誰知肝氣燥乎肝藏血肝中有血則肝潤氣舒無血肝燥氣鬱鬱則下克脾胃土氣不能潤何以化精微生肺故傷於中脹滿嘔吐傷於外皮毛拂抑似肝逆實肝燥也然肝燥由腎虧滋肝不補腎終非治法故必大滋腎腎濡肝亦濡用水木兩生湯熟地白芍一兩茯苓白朮牛膝玄參三錢柴胡陳皮一錢甘草三分神麯五分甘菊枸杞二錢四劑愈或疑用地芍濡潤自建功今朮苓柴曲不益燥乎不知過於濡潤反無益以脾喜燥純用濡潤未免太濕脾先損安能資肝用燥於濕中正善治燥口渴喜飲時煩燥喜靜不喜動見水果則快遇熱湯則憎人謂胃火盛誰知胃氣燥乎胃屬土似不喜水然水潤物生火燥物病況胃土屬陽陽土非陰水不養胃中無水斷難化物物難化愈無水養土土正如大旱望時雨也無水解熱煩燥生理也人靜火降動火起內火盛自索外水救熱湯水果相反喜寒不喜熱又何疑論理胃燥尚未至熱然燥極必至熱極解燥須清熱用清解湯玄參一兩生地五錢花粉甘菊茯苓麥冬沙參三錢丹參二錢十二劑全愈方何平胃火兼平少陰相火蓋胃火必得相火勢乃烈雖治躁不必泄火然土燥由火熾平相火胃火失勢燥尤易解此先發制人之妙也肌肉四肢消瘦皮膚飛屑口渴飲水人謂風消誰知脾燥乎蓋脾燥由肺燥肺燥由胃燥胃燥必致胃熱胃熱必移熱於脾脾熱燥乃成脾濕土本喜燥燥宜脾所喜何反成風消症蓋脾最懼肝木木剋土肝怒胃火逃竄見胃火入脾即挾風木之氣相侮脾畏肝木不敢不受其風風火合安得不燥脾燥何以外榮是以內外交困風消成用救消湯麥冬一兩玄參二兩柴胡一錢二十劑痊愈此潤肺不潤脾何脾消能愈蓋病成於肺潤肺脾亦潤加柴胡大有深意柴胡最舒肝氣肝不克脾脾氣得養況又泄脾肺火火息風不揚故脾燥易解風消又何難愈目痛後眼角刺觸羞明喜暗人謂風邪在肝誰知膽血燥乎膽屬木木中有汁是木得水而後養膽系通於目不若肝竅開於目目無血而燥宜是肝病非膽病然肝膽為表裡肝燥膽亦燥膽肝皆主藏不泄膽汁藏目明膽汁泄目暗蓋膽汁即膽內血血少則汁少汁少不能養膽即不養目宜亟滋膽中汁尤不可止治其膽更宜潤肝中血膽汁自潤目之火自解用四物湯加味熟地白芍一兩川芎柴胡一錢當歸甘菊三錢白蒺藜錢半連服八諸症愈四物補肝中血補肝膽在其中且四物尤入心腎心得之而濡不助膽火腎得之而澤不盜膽氣心肝腎無乾燥膽獨居於燥乎目不痛瞳神日緊小口乾舌苦人謂心火旺誰知心包乾燥乎目系通於五藏不止心包一經何瞳神緊小獨責心包不知瞳神之光全責心腎心包代君出治瞳神實心腎所注然心精必得腎精交心包心腎之精始交於目蓋心君無為心包有為也故心包屬火全恃腎水滋蓋腎不交心包即心包不交心火無水濟則心包無非火氣乾燥急何能內潤心外潤目窘迫情形安得上顯瞳神是則瞳神緊小其原因腎水乾枯用救瞳湯熟地玄參白芍一兩棗皮丹皮當歸五錢甘菊山藥三錢柴胡五分此肝腎同治法也心包無水不治心包滋肝腎者以肝乃心包母肝取給於外家以大益子舍勢甚便理甚順即無扦格自獲優渥緊小之形不化為寬象哉秋後閉結不能大便人謂大腸火誰知肺燥因而大腸亦燥蓋肺與大腸相表裡肺燥大腸安得獨潤且大腸之能開合腎氣主之也腎足大腸有津腎涸大腸無澤有津則大腸易於轉輸無澤大腸難於搬運是大腸全藉腎水之相資然肺腎母肺潤則清肅之令行易於生水肺衰則腎水無源腎又何能潤於大腸此大腸所以燥也宜補肺腎大腸自潤用六味地黃湯加味熟地麥冬一兩棗皮四錢北味一錢山藥茯苓丹皮澤泄三錢四劑自通切戒用大黃芒硝蓋此病本傷陰又加劫陰藥重傷其陰心成陽結使腹中作痛危哉夏秋小便點滴不出人謂膀胱熱結誰知肺燥膀胱亦燥乎膀胱之通故由腎氣足亦由肺氣足膀胱與腎相表裡肺為水道上游二經足水始有源肺燥至既虧清肅之行復少化生之氣膀胱純是乾枯又從何處以導細流此小便不通實無水化也宜亟潤肺更當補腎腎水足自膀胱滂沛何虞燥結用啓結生陰湯熟地一兩棗皮苡仁麥冬五錢前子三錢沙參三錢山藥四錢肉桂一分益智仁一錢此補腎仍補肺者滋生化之源也補中仍通結者水得補無停滯益收補利加益智防遺肉桂引路滂沛之水自趨膀胱燥者不燥閉者不閉消渴飲水時重時輕人謂心腎火騰誰知三焦氣燥乎消症分上中下其實皆三焦火熾下焦火動上中二焦火同起故渴甚下焦火息上中二焦火浮游不定故時渴時輕蓋下焦火發每不可遏故下焦火宜靜不宜動又易動難靜蓋此火必得腎水相制人多腎水不足水本虛取資於水者又多奚能制火乎火動必爍干三焦氣則三焦更燥如大旱望雨法必補腎水用六味湯加味熟地二兩棗皮丹皮麥冬一兩茯苓山藥澤瀉五錢北味三十劑愈六味治腎麥味治肺非止清肺火也蓋補肺助腎源肺旺腎更有氣腎水旺足制下焦火上中二焦烏能興焰大病後小腸細小不能出溺脹甚欲死人謂小腸火誰知小腸燥乎小腸開合半由膀胱半由腎氣故小腸結全在膀胱閉膀胱閉又成於腎閉也然腎氣無時不入膀胱即無時不入小腸何便閉結蓋腎水結而膀胱枯故小腸亦燥而成結宜大補腎水又補肺金以膀胱氣化必得肺金清肅之令行肺旺更利水則腎氣開小腸亦開用治本消水湯熟地二兩棗皮麥冬一兩前子茯苓五錢北味二錢牛膝劉寄奴三錢二劑愈此專治肺腎肺腎不燥小腸自潤故奏功痿證胃火日沖肺遂痿弱不起不能咳嗽及咳嗽又連聲不止肺中大痛非肺癰之毒乃肺痿之病也肺之成痿也乃陽明火上衝肺肺液少不能減陽明焰金從火化久之肺葉釀成火宅清涼藥又不能直入肺非格清涼也肺熱何能生腎水乾無以濟火則陽明火更甚自求救水穀水穀清肅之令不行不能化津輸肺則肺燥為何如如是肺液盡變涎沫濁唾不得不從外出肺液干肺氣自怯涎沫濁唾苦難推送故咳嗽不能然涎沫終非養肺之物必吐出始快無如盤居於火宅不可犯咳則火必沸騰胸膈必痛此欲嗽所以不敢也然咳終不可忍而咳嗽生涎沫雖出火無水養上衝咽喉不肯下故連聲不止咳且胸膈痛連聲不止安得不損乾燥之肺乎若用治痿藥愈傷其肺宜泄胃火大補肺氣更兼補腎水用生津起痿湯麥冬玄參熟地一兩甘草二錢甘菊銀花五錢天冬三錢花粉一錢貝母一錢八劑咳止再十劑痿除此方補水泄火不用大寒蓋陽明胃火初起用大寒泄火所以救腎水久用微寒散火所以生胃土也胃火盛乃胃土之衰扶胃土即所以泄胃火胃火散胃土健胃氣自升化水穀之精微輸津於肺又加二冬草粉貝母益肺消痰肺中更潤又得銀花敗濁之毒則肺何至再燥尤妙加熟地以補水水旺不耗肺則肺更安清肅下行各臟水生火息痿自愈胃火衝心煩悶怔忡驚悸久成痿足難動履謂心火旺誰知胃火盛乎胃土心火心能生胃胃不宜克心然心火生胃則心火不炎胃火薰心則心火大燥倘徒泄心火胃見心寒益肆其炎愈添心燥必下取腎水胃火盛熬干腎水何能濟心心火益旺水益枯骨中無髓安得足有力宜大補腎水少清胃火胃氣安腎水生自上交心用清胃生髓丹玄參一兩麥冬甘菊沙參五錢熟地二兩北味二錢四十劑全愈痿症無不成於陽明火然多用石膏知母必傷胃氣胃傷脾亦傷脾傷腎安得不傷故不若玄參甘菊既清胃火不損胃土胃氣生自生津下注腎上且灌心況麥味益心熟地沙參滋腎上下相資水火既濟痿自愈陽明火固結於脾不解善用肥甘食後即飢少不飲食便頭紅面熱兩足乏力不得行人謂陽明胃火成痿誰知太陰脾火盛爍陰乎痿症責陽明何太陰火旺亦成痿蓋脾胃相表裡陽明火旺太陰火亦旺二火搏結腑臟飲食僅足供火消磨不生津注腎腎宮涸又何足充骨髓故骨無力難步履宜益太陰陰水以治陽明陽火則脾胃不亢筋骨中髓血有盈滿之機用調脾湯人參麥冬甘菊五錢薏仁山藥五錢玄參芡實一兩金叉石斛三錢二十劑愈此補脾胃不助火乎夫火旺正因土衰土衰不能生水火乃烈又加玄參甘菊石斛微寒火自衰土自旺脾胃既旺津液生灌注五臟轉輸兩足火下溫不上發頭面不紅熱脛趾何有伶仃之嘆或疑火盛易消致善飢似宜消導今不損有餘反增不足恐不可為訓不知脾胃俱不可傷傷之火愈熾補陰則陽伏消食則傷陰何必消導怒後兩脅脹滿胸旁時痛不思食口渴索飲久之兩腿疼痛後遍身亦痛或痛兩脅或痛十指痛時但可臥足腰筋麻艱動履人謂痰火作祟誰知肝痿乎肝何以成痿蓋陽明火助也大怒傷肝肝必燥木中火無以自存必克脾胃土脾陰不受胃乃獨受胃初強不服肝克兩相戰故胸脅痛後則胃土不能敵肝聽其使令久之飲食少用人生賴水穀化生津注腎食少處無水養肝肝更燥胃又出其火以增焰肝火之性動遂往來經絡作痛倘更入房則精泄無水制火自足軟筋麻呻吟於臥榻不能行動似須平肝泄陽明火但陽明久受克其氣必虛再加泄火不虛虛乎又須泄火不傷氣為得用伐木湯炒梔仁骨皮丹皮青黛金叉石斛三錢白芍一兩當歸甘菊女貞子五錢二十劑愈此妙在平肝火陽明胃土亦同治胃氣不傷胃火自息食進津液生水足骨髓裕痛痿無不自愈素好色加勞役傷骨動火復入房大戰至兩足痿弱立腿顫行骨痛臥不起然頗能飲食易消人謂食消誰知腎火盛引動胃火成腎痿乎腎火何以引胃火蓋胃為腎關胃開合腎司之也腎火沖胃胃之關門敢阻抑乎必同來助勢聽腎火使令況腎火龍雷火也龍雷過處劈木焚林且胃火性喜炎上安得不相因而起二火上消鑠腎水立干幸腎火盛胃火尚未大旺故但助腎消食不至發汗亡陽且飲食易消猶有水穀養陰雖不能充滿骨中亦可少延腎內宜急補腎水以制陽光用起痿降火湯熟地三兩薏仁金叉石斛牛膝五錢棗皮二兩二十劑全愈此大補腎陰全不泄胃火如皇居糧足則士馬飽騰關門守卒安敢興鼓譟之聲自見糧糈搬運任出入何至攘奪爭取及轉輸如意國富民殷朽紅充滿於天庾邊塞盡皆支給既無枵腹之愁必多超距之勇煩燥口渴面紅耳熱時索飲食後仍飢渴足乏力不能起立吐痰多人謂陽明實火誰知陽明虛火乎陽明水屬陽宜為陽火陽火宜實何以名虛不知胃火初起為實久旺為虛胃火初起口大渴身大汗甚則發狂登高而呼棄衣而走所謂燎原火也非實而何至旺極必衰時起時滅口雖渴不甚汗雖出不多雖譫語無罵詈雖煩悶無躁擾得水渴除得食飢止此乃零星餘火非虛而何實火不泄必出神虛火不清必成痿實火不泄必熬干腎水必亡陽虛火不清則銷鑠骨髓必亡陰陰亡安得不成痿宜清胃火加生津液藥自陰長陽消用散余湯生地玄參麥冬一兩茯苓花粉神麯二錢竹葉百片人參三錢麥芽一錢十五劑全愈此方散胃火不損胃氣胃氣生津液自潤自灌注腎經分養骨髓倘用大寒直泄胃火則胃氣必傷如大亂後巨魁擾亂而去所存餘黨宜用招撫若再用兵賊雖斬死無遺必致四境蕭然杳無人民非招徠數十年不可何若攻補兼施為得好酒久坐腰痛漸次痛及右腳延及右手不能行動已而齒痛人謂賊風侵體誰知痿症乎或謂痿不宜痛今腰痛牙齒痛恐非痿嗟乎諸痿皆起於肺熱善飲肺必大熱經云治痿必取陽明陽明胃主四肢豈獨腳夫痿雖熱病熱中有濕宜察痿兼濕重者緩筋而軟兼熱多者筋急而痛是痿未嘗無痛苟不祛濕以清火反助濕以動熱痿必不痊轉增其痛宜專治陽明生胃氣佐泄火利濕諸痛自消用釋痛湯人參黃耆茯苓當歸三錢白朮生地麥冬五錢玄參一兩甘草三分四劑病除方皆入陽明藥入陽明平胃氣即入陽明平胃火況苓術更利濕復生胃是治濕又治陽明藥投病之所喜安得不速愈肥胖好飲素畏熱忽自汗如雨四肢俱痿復惡寒小便短赤大便或溏或結飲食亦減人謂中風誰知痿病已成乎痿有五皆由肺熱好飲必肺熱胃肺母欲救肺必速救胃土經云治痿獨取陽明正言救胃也胃土不足肺金又傷金失所養不能下生腎水水乾則火盛肺更傷況胃主四肢肺主皮毛肢痿乃胃衰汗如雨乃肺匱明是子母兩病不急救胃何以生肺滋腎用滋涸湯玄參麥冬一兩茯苓人參甘菊女貞子天冬三錢生地二錢黃芩一錢花粉一錢芡實五錢四十劑全愈此補陽明胃兼清肺熱不補腎腎水自潤較東垣清燥湯更神消渴消渴氣喘痰嗽面紅虛浮口舌腐爛咽喉腫痛得水則解日飲水汁一斗人謂上消誰知肺消乎肺屬金宜清肅何火熾如此心火刑也心火刑肺何竟成消渴火刑肺肺金乾燥肺又因腎虛欲下顧腎肺燥肺中津液自顧不遑安能顧腎肺既無津養腎又恐腎水涸乃索外水以濟然肺得補水只可救本宮之炎終無益於腎腎得外水不受與膀胱為表裡故飲水即溲似宜專泄心火救肺熱然肺因火熱發渴日飲外水必有水停心下水日侵心則心火留肺不歸心久成虛寒是寒涼反為心惡且寒涼不能上存勢必下趨脾胃夫肺火盛不可解者正苦於脾胃虛土不能生金也再用寒涼必損脾胃氣肺又何養必仍治肺金少加補土則土旺肺氣自生清肅行口渴止用清上止消丹麥冬二兩天冬銀花一兩人參三錢生地茯苓五錢二十劑全愈此重治肺輕治脾胃治肺不損金清火不傷土土生金金生水但加金銀花實有妙義火刑金多飲水則寒熱相擊熱雖暫解毒必留積用清金藥解熱不能解毒與其俟毒發用解毒何若乘解熱兼解毒為得哉尤妙銀花不特解毒且善滋陰消渴恣飲數十碗始覺胃中少快否則胸中嘈雜如蟲鑽易飢得食渴減不食渴尤甚人謂中消誰知胃消乎胃消多因燔熬烹炙肥甘醇厚過於貪叨釀成內熱津液乾涸不得不求濟外水水入胃不能遊溢精氣上輸於肺肺因胃火熾不能通調水道於是內外水建瓴而下飲一溲二不但外水難化且平日素蘊水精竭絶盡輸而下較暴注暴泄為尤甚此竭澤之水不盡不止腎水未虧尚可制火膏梁人腎水無不素乏者能保不爍干腎水足矣尚望腎救援乎內外無制勢必求外水相濟外水又不可濟思食濟之食入胃止解火於須臾不能生水於旦夕不得不仍求水救渴宜少泄胃火大補腎水腎水生胃火息腎有水關門不開又何從沸騰用閉關止渴湯石膏青蒿五錢玄參麥冬熟地二兩二十劑全愈用石膏青蒿止胃火玄參熟地填腎水重用麥冬益肺夫胃關開由腎火動腎火動由腎水乏今補水則水旺腎火無亂動火靜腎水不沸騰腎水既安腎宅胃火何能獨開胃關消渴飲一斗溲一斗吐清痰投之水中立散化為清水面熱唇紅口舌不峭人謂下消誰知腎水泛上作消乎腎水泛上升咽喉口舌宜不渴何渴甚如此蓋下寒極逼火上焦作渴此火乃腎中龍雷火龍雷一發莫制可於水中引不可於水中逐論理仲景腎氣丸最妙然此丸只治消渴已痊症不能治消渴初起症當漢武乍患下消張使君實別有方惜未傳鐸即得其隱不出之救萬世乎用引龍湯玄參三兩肉桂三錢棗皮四錢北味一錢麥冬一兩此火非玄參三兩不能止焰非肉桂三錢不能引歸棗皮北味非用生精實取止渴又益麥冬者以龍火久上未免損肺得麥冬生其氣則金生水火得水尤易歸或疑多用玄參止焰用肉桂引火何重用三錢不知玄參消浮游火恐性太涼非多用肉桂不能制寒制其寒則寒變為溫又非大熱龍雷性惡大寒又惡大熱大寒愈激其怒火上炎大熱愈助橫火上熾今為肉桂三錢玄參三兩則寒居九熱居一調和於水火之中又有棗皮麥味不見熱惟見溫龍雷喜溫所以隨歸腎臟火歸腎命門不寒蒸動腎水下溫上熱自除實有妙義消渴口乾舌燥吐痰如蟹涎白沫氣喘不能臥但不大渴渴時必須飲水然飲後即化白沫人謂下消誰知腎火沸乎腎火乃水中火火生水中然亦藏水內火無水不養亦無水不藏故水不足必至火有餘火於是越出腎宮上騰咽喉口齒腎中水火原不可離火既上升水必隨之水即不欲升釜底火大烈安得不沸騰惟是水涸以致沸騰烈火日炊自成焦釜不以外水濟得乎然焦釜沃水仍沸騰而上故吐如蟹涎沫不必瀉火宜補水使精足自制陽光用寧沸湯麥冬棗皮三兩茯苓一兩日一劑半月全愈方用棗皮三兩大補腎水又加麥冬三兩豈滋肺生腎乎不知久渴口吐白沫必熬干肺液使但補水火得水雖下降肺中乾燥又必成肺痿肺癰故補腎隨補肺不特子母相生亦能防禍未形然為二味復加茯苓不益燥乎詎知飲水多膀胱必有積水今驟大補腎水不為分消則因補留滯亦未可知得茯苓利導之則補陰無膩膈水下趨火不上沸水火濟消渴除善飲喜果患消渴飲水數斗食倍溺數服消渴藥益甚人謂蟲消誰知脾氣虛熱乎消渴脾壞而腎敗脾壞則土不勝水腎敗則水難敵火二者合病成倘脾不壞腎不敗宜無消渴不宜消渴而消渴必脾熱乘之得之酒果而致也酒性熱熱甚則飢非飽餐不解然多食愈動火火動須水濟飲水多安得不多溺此似消渴非消渴法平脾中虛熱佐解酒消果藥則火毒散消渴除用密香散木密三錢麝香三分酒為丸更用黃連神麯一錢茯苓人參三錢陳皮三分煎湯日送三丸丸完愈用麝香取能散酒且最克瓜果瓜果聞麝即不結子非明驗乎木密又名枳即吉勾子入酒過夜酒化為水故合二味專消酒果毒更用參連芩曲平脾中虛熱則腹中清涼消渴自愈
